<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Training Program — Level Guide</title>
<style>
  :root {
    --bg: #121016;
    --card: #1e3942;
    --card2: #2d2d2d;
    --accent: #e85b3c;
    --text: #ffffff;
    --sub: rgba(255,255,255,.65);
    --muted: rgba(255,255,255,.38);
    --correct: #4ade80;
    --radius: 12px;
    --radius-lg: 20px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes staggerIn {
    from { opacity: 0; transform: translateX(-20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── Page wrapper ────────────────────────────────────── */
  .page {
    max-width: 960px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ── Header ──────────────────────────────────────────── */
  .page-header {
    padding: 56px 0 48px;
    animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) both;
  }
  .page-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .page-title {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 12px;
  }
  .page-title span {
    background: linear-gradient(135deg, var(--accent), #ff9b6e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .page-sub {
    font-size: 16px;
    color: var(--sub);
    max-width: 560px;
    line-height: 1.65;
  }

  /* ── Track tabs ───────────────────────────────────────── */
  .track-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 48px;
    animation: fadeUp 0.45s cubic-bezier(0.22,1,0.36,1) 0.1s both;
    opacity: 0;
    animation-fill-mode: forwards;
  }
  .track-tab {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 999px;
    border: 1.5px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: var(--sub);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.01em;
  }
  .track-tab:hover {
    border-color: rgba(232,91,60,0.4);
    color: var(--text);
    background: rgba(232,91,60,0.07);
  }
  .track-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 16px rgba(232,91,60,0.35);
  }
  .track-tab-icon {
    font-size: 15px;
    line-height: 1;
  }

  /* ── Track description ───────────────────────────────── */
  .track-desc {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-left: 3px solid var(--accent);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 16px 20px;
    margin-bottom: 36px;
    font-size: 14px;
    color: var(--sub);
    line-height: 1.6;
    animation: fadeIn 0.3s both;
  }

  /* ── Browse cards ────────────────────────────────────── */
  .browse-cards { display: flex; flex-direction: column; gap: 24px; }

  .browse-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: var(--radius-lg);
    padding: 36px;
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 28px;
    transition: border-color 0.2s;
    animation: staggerIn 0.4s both;
  }
  .browse-card:hover { border-color: rgba(232,91,60,0.3); }

  .browse-card-num {
    font-size: 96px;
    font-weight: 900;
    line-height: 0.9;
    color: rgba(255,255,255,0.05);
    user-select: none;
    letter-spacing: -0.05em;
  }
  .browse-card-body { display: block; }
  .browse-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .browse-card-header h2 {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }


  .browse-focus {
    font-size: 14px;
    color: var(--sub);
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .browse-scenarios h4 {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  .browse-scenarios ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }
  .browse-scenarios li {
    font-size: 14px;
    color: var(--sub);
    line-height: 1.55;
    padding-left: 20px;
    position: relative;
  }
  .browse-scenarios li::before {
    content: '\2192';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 12px;
    top: 1px;
  }

  /* ── Keyword deep-dive ───────────────────────────────── */
  .scenario-drill {
    margin-top: 10px;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 8px;
    overflow: hidden;
    background: rgba(0,0,0,0.15);
  }
  .scenario-drill summary {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
    list-style: none;
    outline: none;
    transition: background 0.15s;
  }
  .scenario-drill summary::-webkit-details-marker { display: none; }
  .scenario-drill summary:hover { background: rgba(255,255,255,0.03); }
  .scenario-drill[open] summary { border-bottom: 1px solid rgba(255,255,255,0.07); }

  .kw-chevron {
    font-size: 10px;
    color: var(--accent);
    margin-right: 8px;
    transition: transform 0.2s;
    display: inline-block;
    flex-shrink: 0;
    opacity: 0.8;
  }
  .scenario-drill[open] .kw-chevron { transform: rotate(90deg); }

  .kw-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    flex-shrink: 0;
    margin-right: 12px;
  }


  .kw-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 12px 12px;
  }
  .kw-tag {
    display: inline-block;
    padding: 3px 9px;
    background: rgba(232,91,60,0.08);
    border: 1px solid rgba(232,91,60,0.2);
    border-radius: 5px;
    font-size: 11.5px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0.01em;
    line-height: 1.4;
    transition: background 0.15s, color 0.15s;
  }
  .kw-tag:hover {
    background: rgba(232,91,60,0.16);
    color: rgba(255,255,255,0.9);
  }

  .browse-topics {
    margin-top: 24px;
    background: rgba(0,0,0,0.3);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 14px 16px;
  }
  .browse-topics h5 {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .browse-topics p {
    font-size: 13px;
    color: var(--sub);
    line-height: 1.6;
  }

  /* ── Footer ──────────────────────────────────────────── */
  .page-footer {
    margin-top: 64px;
    padding-top: 32px;
    border-top: 1px solid rgba(255,255,255,0.07);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    font-size: 13px;
    color: var(--muted);
  }

  /* ── Responsive ──────────────────────────────────────── */
  @media (max-width: 640px) {
    .browse-card { grid-template-columns: 1fr; gap: 8px; }
    .browse-card-num { font-size: 48px; }
    .page-header { padding: 32px 0 32px; }
    .track-tabs { gap: 6px; }
    .track-tab { padding: 8px 14px; font-size: 12px; }
  }
</style>
</head>

<div class="page">

  </footer>

</div>

var activeTrack = 'database';

/* ═══════════════════════════════════════════════════════
   RENDER
════════════════════════════════════════════════════════ */
function buildTabs() {
  var container = document.getElementById('track-tabs');
  container.innerHTML = '';
  Object.values(TRACKS).forEach(function(track) {
    var btn = document.createElement('button');
    btn.className = 'track-tab' + (track.id === activeTrack ? ' active' : '');
    btn.innerHTML = '<span class="track-tab-icon">' + track.icon + '</span>' + track.label;
    btn.addEventListener('click', function() { switchTrack(track.id); });
    container.appendChild(btn);
  });
}

function buildDesc() {
  var el = document.getElementById('track-desc');
  el.textContent = TRACKS[activeTrack].desc;
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'fadeIn 0.3s both';
}

function buildCards() {
  var container = document.getElementById('browse-cards');
  container.innerHTML = '';
  var levels = TRACKS[activeTrack].levels;

  levels.forEach(function(d, idx) {

    var scenariosHtml = d.scenarios.map(function(s, i) {
      var kws = (d.keywords && d.keywords[i]) ? d.keywords[i] : [];
      var drillHtml = '';
      if (kws.length) {
        var allChips = kws.map(function(k) {
          return '<span class="kw-tag">' + escapeHtml(k) + '</span>';
        }).join('');
        drillHtml =
          '<details class="scenario-drill">' +
            '<summary>' +
              '<span class="kw-chevron">&#9658;</span>' +
              '<span class="kw-label">Skills &amp; tools</span>' +
            '</summary>' +
            '<div class="kw-chips">' + allChips + '</div>' +
          '</details>';
      }
      return '<li>' + escapeHtml(s) + drillHtml + '</li>';
    }).join('');

    var card = document.createElement('div');
    card.className = 'browse-card';
    card.style.animationDelay = (idx * 0.07) + 's';
    card.innerHTML =
      '<div class="browse-card-num">' + d.num + '</div>' +
      '<div class="browse-card-body">' +
        '<div class="browse-card-header">' +
          '<h2>' + escapeHtml(d.name) + '</h2>' +
        '</div>' +
        '<p class="browse-focus">' + escapeHtml(d.focus) + '</p>' +
        '<div class="browse-scenarios">' +
          '<h4>I feel comfortable performing the following activities\u2026</h4>' +
          '<ul>' + scenariosHtml + '</ul>' +
        '</div>' +
      '</div>';
    container.appendChild(card);
  });
}

function switchTrack(id) {
  activeTrack = id;
  buildTabs();
  buildDesc();
  buildCards();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

   INIT
════════════════════════════════════════════════════════ */
buildTabs();
buildDesc();
buildCards();
