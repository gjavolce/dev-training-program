      {"level": 4, "diff": 2, "scenario": 2, "q": "During a canary deployment at 10% traffic, your error rate SLO starts burning. What is the correct observability-driven response sequence?", "opts": ["Increase canary traffic to 50% to gather more signal", "Immediately roll back without investigating to preserve the SLO budget", "Scale canary pods down to 1 replica to reduce impact", "Wait for three consecutive alert periods before acting", "Compare error rates between canary and stable pods, then roll back if canary is the source"], "ans": 4, "fb": "Comparing canary vs stable error rates confirms whether the canary is the causal source before rollback. Blind rollback is appropriate if comparison is inconclusive and burn rate is critical, but investigation first avoids unnecessary disruption."},
      {"level": 4, "diff": 2, "scenario": 3, "q": "You are writing a platform alerting guide. A team asks what value to use for their alert evaluation period. What is the correct guidance?", "opts": ["Let each team choose independently without a standard", "Always use a 30-second evaluation period for fastest response", "Set evaluation period equal to pod startup time", "Match evaluation period to the SLO window and avoid periods shorter", "Use 1-hour periods for all alerts to reduce noise"], "ans": 3, "fb": "Short evaluation windows produce noisy alerts from transient spikes. Aligning the evaluation period to the SLO measurement window ensures alerts reflect meaningful reliability signals. A platform standard prevents inconsistent alerting quality across teams."},
      {"level": 4, "diff": 2, "scenario": 4, "q": "You are planning a Cloud SQL major version upgrade in production. Which pre-upgrade step is most critical for minimising rollback risk?", "opts": ["Disable all read replicas before the upgrade begins", "Test the upgrade against a clone of the production instance", "Increase connection pool size before upgrading", "Notify users of a 4-hour maintenance window and proceed", "Run VACUUM FULL on all tables before the upgrade"], "ans": 1, "fb": "Testing against a production clone catches compatibility issues, query regressions, and extension conflicts before they affect real users. Cloning also validates the upgrade procedure itself, giving the team a rehearsed rollback path."},
      {"level": 4, "diff": 3, "scenario": 0, "q": "Your payment service SLO is 99.95% availability. A third-party dependency fails intermittently and accounts for 40% of your error budget consumption. What is the correct long-term SLO management action?", "opts": ["Split your service into two SLOs: one internal, one external", "Add retry logic with no timeout to absorb all vendor errors", "Exclude all third-party errors from your SLO calculation unconditionally", "Define a separate dependency SLI, attribute errors to the vendor, and negotiate", "Lower the availability SLO to 99.9% to match the vendor's reliability"], "ans": 3, "fb": "Attribution tracking separates your reliability from vendor reliability, enabling evidence-based SLA negotiation. Unconditionally excluding vendor errors hides user impact; retries without timeouts amplify cascading failure risk."},
      {"level": 4, "diff": 3, "scenario": 2, "q": "A Liquibase migration runs as an init container during a rolling deployment. The migration takes 4 minutes and includes a column rename. What is the critical deployment risk and how do you mitigate it?", "opts": ["Use a maintenance window to stop all traffic before the migration runs", "Old pods reading the renamed column will fail", "Run the migration after all new pods are ready by adding a post-deploy hook", "Rename the column only in a feature branch and merge after deployment", "Pause Kafka consumers during migration to prevent data inconsistency"], "ans": 1, "fb": "During a rolling deployment, old and new pods run simultaneously. Renaming a column breaks old pods immediately. The expand-contract pattern (add, dual-write, remove) allows both versions to coexist safely without downtime."},
      {"level": 4, "diff": 3, "scenario": 3, "q": "A team's Grafana dashboard has 40 panels and loads slowly. Engineers ignore it during incidents. What is the primary redesign principle for an incident-effective dashboard?", "opts": ["Replace all time-series panels with single-stat gauges for faster rendering", "Organise panels around golden signals", "Move all panels to a single row to reduce scroll time", "Increase the dashboard refresh interval to 60 seconds to reduce load", "Add more panels to capture every possible failure mode"], "ans": 1, "fb": "Incident dashboards must answer 'is my service broken and why' in under 30 seconds. Golden signals provide that structure. Panel sprawl forces cognitive overhead during high-stress situations, which is when simplicity matters most."},
      {"level": 4, "diff": 3, "scenario": 4, "q": "After a Cloud SQL HA failover during maintenance, application pods experience 45-second connection errors despite HikariCP's connectionTimeout being 30 seconds. What is the root cause and fix?", "opts": ["Add a Cloud SQL read replica to absorb traffic during failover", "Restart all application pods immediately after every failover", "Disable HikariCP connection validation to reduce overhead", "Increase connectionTimeout to 60 seconds to wait for failover completion", "HikariCP's idle connections to the old primary are stale"], "ans": 4, "fb": "After failover, existing pool connections point to the terminated primary. HikariCP won't discard stale connections without active validation. keepaliveTime sends periodic pings to detect dead connections proactively, allowing eviction before they are handed to application threads."},
      {"level": 5, "diff": 1, "scenario": 0, "q": "You are defining the org-wide instrumentation standard for Spring Boot services. Which three fields must appear on every log line?", "opts": ["userId, endpoint, and HTTP status", "severity, timestamp, and podName", "requestId, duration, and stackTrace", "traceId, tenantId, and serviceName", "spanId, region, and deploymentVersion"], "ans": 3, "fb": "traceId enables cross-service correlation, tenantId is mandatory for multi-tenant compliance queries, and serviceName allows filtering without relying on infrastructure metadata. These three are the minimum for meaningful distributed diagnosis."},
      {"level": 5, "diff": 1, "scenario": 0, "q": "A team is using string concatenation to build log messages in a hot path. What standard should your instrumentation guide enforce?", "opts": ["Log only to stdout and disable file appenders", "Switch to TRACE level so expensive logs are disabled in production", "Use asynchronous logging with a queue size of 1000", "Replace all log statements with metrics counters", "Use structured logging with parameterised fields"], "ans": 4, "fb": "String concatenation evaluates arguments regardless of log level, wasting CPU in hot paths. Structured parameterised logging defers argument evaluation and produces machine-parseable JSON, enabling fast Cloud Logging queries."},
      {"level": 5, "diff": 1, "scenario": 1, "q": "You are incident commander for a payment processing outage. What is your first action after joining the incident channel?", "opts": ["Escalate to the database team and wait for their findings", "Post a status page update before investigating", "Immediately restart all payment service pods to restore service", "Establish a timeline, assign roles", "Run kubectl describe on all pods to gather evidence"], "ans": 3, "fb": "Effective incident command starts with structure, not immediate technical action. Assigning roles prevents duplicated effort, a scribe preserves the timeline, and a working hypothesis focuses investigation. Blind restarts can destroy evidence needed for root cause analysis."},
      {"level": 5, "diff": 1, "scenario": 1, "q": "During a major incident, two teams are investigating different hypotheses simultaneously. As incident commander, what is the most important coordination action?", "opts": ["Pause all investigation until the incident channel has 100% team attendance", "Escalate to VP Engineering immediately to get more resources", "Assign the most senior engineer to pick one hypothesis and stop the other", "Let both teams work independently and compare findings after resolution", "Time-box each hypothesis to 10 minutes and require teams to report findings to a central channel"], "ans": 4, "fb": "Parallel hypotheses are efficient, but without structured check-ins findings fragment and insights are lost. Time-boxed reporting forces convergence and allows the commander to pivot strategy based on emerging evidence."},
      {"level": 5, "diff": 1, "scenario": 2, "q": "You are evaluating Grafana Cloud as a replacement for your self-managed Grafana. What is the primary total cost consideration beyond licensing?", "opts": ["Number of dashboards and alert rules configured", "Kubernetes node count in your GKE cluster", "Latency between GKE and the Grafana Cloud endpoint", "Data ingestion volume: metrics series count, log bytes", "Number of Grafana user seats only"], "ans": 3, "fb": "Grafana Cloud pricing is consumption-based. High-cardinality metrics, verbose logging, and unsampled traces can make managed cost exceed self-managed infrastructure cost. Seat count is secondary; data volume is the primary cost driver."},
      {"level": 5, "diff": 1, "scenario": 2, "q": "A vendor claims their observability tool has 'no limits on cardinality'. Why should this claim receive additional scrutiny during evaluation?", "opts": ["High-cardinality storage is expensive", "Cardinality limits only matter for logs, not metrics or traces", "Unlimited cardinality means the tool cannot enforce data governance standards", "High cardinality is always a sign of poor instrumentation practice", "Vendors always deliver on unlimited claims in enterprise contracts"], "ans": 0, "fb": "Every observability backend has a cost for storing high-cardinality data. 'No limits' often means per-series or per-query pricing that scales sharply with cardinality. Evaluations must test cost at production cardinality levels, not just feature demos."},
      {"level": 5, "diff": 1, "scenario": 3, "q": "Leadership asks for a monthly GKE cost report. Which GCP tool provides the most accurate per-namespace cost breakdown?", "opts": ["kubectl top nodes compared to the monthly billing invoice", "Compute Engine billing line items by machine type", "Cloud Monitoring dashboards filtered by cluster name", "GKE Cost Allocation with namespace labels exported to BigQuery billing export", "GCP Resource Manager grouped by project only"], "ans": 3, "fb": "GKE Cost Allocation attributes node and pod costs to namespaces using the Kubernetes resource model. BigQuery billing export allows custom aggregations and trend analysis. kubectl top shows current usage, not historical cost."},
      {"level": 5, "diff": 1, "scenario": 3, "q": "You notice a GKE node pool is running at 30% average CPU utilisation. What is the first analysis step before recommending cost reduction?", "opts": ["Consolidate all workloads to a single large node", "Switch the node pool to spot instances to reduce cost", "Check P95 CPU utilisation and burst patterns to distinguish", "Add a Horizontal Pod Autoscaler to all deployments in the pool", "Immediately reduce node count by 50% to save cost"], "ans": 2, "fb": "Average CPU is misleading if the workload has traffic spikes. P95 and burst analysis reveals whether the headroom is genuinely wasted or necessary for handling peaks. Premature downsizing risks OOMKilled pods and availability degradation."},
      {"level": 5, "diff": 1, "scenario": 4, "q": "You are defining a runbook standard. Which section is most often missing from runbooks that causes failed incident response?", "opts": ["The deployment procedure for the service", "The service architecture diagram", "Escalation criteria: when to escalate, who to", "The service owner's on-call rotation schedule", "A full list of all possible alert conditions"], "ans": 2, "fb": "Engineers following a runbook often reach a decision point where the runbook stops — unclear when to escalate delays resolution and increases blast radius. Architecture diagrams and deployment procedures are useful but rarely the gap that causes failed response."},
      {"level": 5, "diff": 1, "scenario": 4, "q": "A peer review of a team's runbook reveals the triage steps assume the engineer has background knowledge of the service. What is the correct feedback?", "opts": ["Add a glossary section at the end of the runbook", "Restrict runbook usage to engineers who have been onboarded to the service", "Rewrite triage steps as explicit commands with expected outputs, assuming zero prior service knowledge", "Accept it as-is since on-call engineers should know the services they support", "Link to the service's internal wiki instead of duplicating knowledge"], "ans": 2, "fb": "Runbooks are used at 3am by engineers who may not own the service. Explicit commands with expected outputs enable correct execution without internalised knowledge. Links to wikis introduce latency and dependency on external availability during incidents."},
      {"level": 5, "diff": 2, "scenario": 0, "q": "Three teams have adopted your logging standard but are using different field names for the same concept (e.g., tenant_id vs tenantId vs organisationId). How do you drive convergence without blocking teams?", "opts": ["Accept all variants and write Cloud Logging queries that handle all field names", "Rename all fields in the central logging pipeline using a regex transform", "Mandate immediate migration with a two-week deadline", "Publish a shared logging library with pre-configured MDC fields, make adoption a scored", "Ask each team to self-certify compliance without verification"], "ans": 3, "fb": "A shared library removes the effort barrier to adoption. Scoring creates accountability without coercion. Regex transforms in the pipeline are fragile and mask the root cause. Hard deadlines without migration support generate resistance and technical debt."},
      {"level": 5, "diff": 2, "scenario": 0, "q": "A team argues that adding traceId propagation to their service will require significant refactoring. How do you address this objection as platform owner?", "opts": ["Accept their custom tracing solution as equivalent", "Provide a Spring Boot auto-configuration starter that injects MDC", "Exempt the team from the standard until the next major refactor", "Require the team to add traceId manually to each log statement", "Escalate to their engineering manager to enforce compliance"], "ans": 1, "fb": "Adoption friction is the most common reason standards fail. A Spring Boot starter using Micrometer Tracing and MDC bridge provides traceId propagation automatically through the request thread, making the correct behaviour the zero-effort default."},
      {"level": 5, "diff": 2, "scenario": 1, "q": "A major incident has been running for 90 minutes with no resolution. The on-call team is fatigued and investigation is stalling. What is your most effective action as incident commander?", "opts": ["Extend the incident bridge indefinitely until root cause is found", "Declare the incident resolved to reduce pressure and reopen if needed", "Escalate to all senior engineers available regardless of whether they are on-call", "Hand off incident command to whoever has been on the call longest", "Rotate fresh engineers into investigation leads, summarise findings to date, and reset the working hypothesis"], "ans": 4, "fb": "Fatigue causes cognitive errors and missed signals. Fresh engineers with a clear summary of what has been ruled out can pivot faster. Escalating indiscriminately floods the bridge and increases coordination overhead without adding clarity."},
      {"level": 5, "diff": 2, "scenario": 1, "q": "Post-incident review reveals the incident took 40 minutes longer than it should have because no one had access to the correct Cloud SQL query logs. What process improvement should you drive?", "opts": ["Restrict Cloud SQL access further to prevent misuse during incidents", "Build an automated tool that exports query logs on every alert trigger", "Add query logs to the post-incident report template as a required section", "Give all engineers production DBA access permanently", "Add Cloud SQL query insights access to the incident responder runbook and verify"], "ans": 4, "fb": "Access gaps discovered during incidents are systemic risks. Pre-provisioning and documenting access in the runbook ensures the next responder can act immediately. Blanket DBA access violates least-privilege principles required for PCI-DSS compliance."},
      {"level": 5, "diff": 2, "scenario": 2, "q": "You are evaluating replacing Cloud Trace with Grafana Tempo. The vendor demo shows excellent single-service trace views. What production scenario should you test that the demo likely did not cover?", "opts": ["Cost per span at 1000 spans per minute", "Cross-service trace propagation with high fan-out", "Alert rule migration from Cloud Monitoring to Grafana Alerting", "Single-service latency histogram accuracy", "Dashboard import compatibility with existing Grafana dashboards"], "ans": 1, "fb": "Vendor demos use simple, clean traces. Production systems have deep fan-out, partial failures, and high span volume. Testing at production cardinality and topology exposes storage costs, query latency, and UI usability issues that demos never show."},
      {"level": 5, "diff": 2, "scenario": 2, "q": "During an observability tool evaluation, you discover the new tool's agent has a known issue causing 2% CPU overhead per pod. Your cluster has 800 pods. What is the correct evaluation response?", "opts": ["Test the tool on only 10 pods and extrapolate manually", "Quantify the infrastructure cost impact, request vendor roadmap for", "Ask the vendor to provide a custom build without the overhead", "Reject the tool immediately based on the overhead finding", "Accept the overhead as negligible and proceed with selection"], "ans": 1, "fb": "2% CPU across 800 pods is 16 full CPUs of wasted capacity — a material cost. Quantifying impact and including it in a scored matrix allows fair comparison against competing tools. Immediate rejection without quantification is not rigorous evaluation."},
      {"level": 5, "diff": 2, "scenario": 3, "q": "Leadership asks why GKE costs increased 35% this quarter despite no new services launching. What data should you present to explain the increase?", "opts": ["Total invoice comparison between Q2 and Q3", "Node pool growth from HPA scaling events, increased persistent", "Average CPU utilisation trend for the quarter", "Cloud SQL instance count changes", "Number of new deployments and Kubernetes objects created"], "ans": 1, "fb": "A 35% cost increase without new services suggests organic growth in existing workloads. HPA scaling, storage growth, and egress are the three most common drivers. A total invoice comparison tells leadership the 'what' but not the 'why' needed to act."},
      {"level": 5, "diff": 2, "scenario": 3, "q": "You want to model the cost impact of migrating three services from standard GKE nodes to Spot VMs. What input data is required for an accurate model?", "opts": ["Number of pods per service and their container image sizes", "On-call engineer hours spent managing the services", "Current node count and Spot VM list price only", "Kafka consumer lag history and Cloud SQL connection count", "Service uptime SLO requirements, historical pod eviction"], "ans": 4, "fb": "Spot VMs are preemptible — services without fault tolerance cannot use them safely. Accurate modelling requires SLO constraints, eviction risk assessment, and actual resource utilisation to size the replacement fleet correctly."},
      {"level": 5, "diff": 2, "scenario": 4, "q": "A runbook peer review session reveals three different runbooks each describe the same triage step differently. What is the correct process response?", "opts": ["Delete two of the runbooks and keep the most recently updated one", "Ask each team to validate their own version independently", "Extract the shared step into a reusable runbook fragment and link to it from each", "Standardise on whichever version was written first", "Keep all three versions since different teams may have different contexts"], "ans": 2, "fb": "Reusable fragments eliminate maintenance drift — a single update propagates to all runbooks. Keeping divergent versions creates ambiguity during incidents. Standardising on version age is arbitrary and does not guarantee correctness."},
      {"level": 5, "diff": 2, "scenario": 4, "q": "You are running a runbook review session and an engineer says 'this step always fails in practice so I skip it'. What is the correct facilitation response?", "opts": ["Keep the step as written since it may work in edge cases", "Remove the step immediately since it is not being followed", "Mark the step as optional and continue the review", "Document why the step fails in practice, investigate whether to fix or", "Escalate to the service owner to decide whether the step is needed"], "ans": 3, "fb": "A step that is consistently skipped is either broken or unnecessary. Documenting and investigating in the session produces an immediately improved runbook. Escalating delays the fix and leaves on-call engineers with a runbook they will not follow."},
      {"level": 5, "diff": 3, "scenario": 0, "q": "You are setting the org-wide OTEL sampling rate. Compliance requires all payment transaction traces to be retained. Non-payment traffic is 95% of volume. What sampling strategy should you implement?", "opts": ["Sample only error traces and drop all successful transaction traces", "Tail-based sampling at 100% for all traffic regardless of cost", "Disable sampling entirely and rely on log correlation instead", "Head-based sampling with a rule that forces 100% sampling for requests with", "Head-based sampling at 5% applied uniformly across all traffic"], "ans": 3, "fb": "Compliance requirements make payment trace completeness non-negotiable. Rule-based head sampling targeting a context header achieves this without prohibitive storage cost from sampling all traffic at 100%. Tail-based sampling at 100% is architecturally sound but requires infrastructure to buffer all spans before the sampling decision."},
      {"level": 5, "diff": 3, "scenario": 1, "q": "You are incident commander for a cascading failure affecting 6 services. All teams are reporting symptoms, but no single root cause is confirmed. What is the most effective next 15-minute structure?", "opts": ["Rotate through each service sequentially giving each team 2 minutes to report", "Create a timeline of first-symptom timestamps per service, identify the service that degraded", "Ask all 6 teams to simultaneously investigate their own service in parallel", "Pause all investigation and wait for GCP status page confirmation", "Declare the incident a platform-level outage and initiate a full GKE cluster restart"], "ans": 1, "fb": "Cascading failures have a root cause that triggered the cascade. Building a symptom timeline reveals the originating service. Parallel independent investigation without coordination produces fragmented findings and duplicated effort."},
      {"level": 5, "diff": 3, "scenario": 2, "q": "Your evaluation of a new observability platform concludes it is technically superior but costs 3× more than the current stack. How do you present this finding to leadership?", "opts": ["Select the new tool and present the decision after contracts are signed", "Recommend deferring the decision until the budget cycle", "Present only the technical advantages and let finance make the cost decision", "Recommend the cheaper tool by default since cost is always the deciding factor", "Model the engineering time currently spent on tooling maintenance and incident overhead"], "ans": 4, "fb": "TCO analysis transforms a raw price comparison into a business decision. Maintenance overhead, MTTR reduction, and incident cost avoidance often close the gap. Presenting only technical merits without cost context is incomplete analysis that undermines trust."},
      {"level": 5, "diff": 3, "scenario": 3, "q": "Your GKE cost model for leadership shows three optimisation scenarios. Scenario A saves 20% with low risk, Scenario B saves 40% with medium risk, Scenario C saves 60% with high risk (Spot VMs for all workloads). How should you structure the recommendation?", "opts": ["Recommend Scenario A as baseline, present B as the stretch target with a", "Only present Scenario A to avoid leadership choosing a risky option", "Recommend Scenario C since maximum savings serve the business best", "Present all three equally and let leadership choose without guidance", "Recommend Scenario B as the compromise without explaining risk"], "ans": 0, "fb": "Leadership needs a recommendation, not a menu. Recommending the risk-adjusted baseline with a growth path demonstrates engineering judgment. Presenting all options without guidance transfers the risk decision to people without the technical context to evaluate it."},
      {"level": 5, "diff": 3, "scenario": 4, "q": "A team's runbook peer review reveals their incident escalation path goes directly to the CTO. Why is this a systemic risk and what is the correct fix?", "opts": ["Add a second executive to the escalation path to reduce single-point dependency", "The CTO should be involved in all production incidents for visibility", "Remove the escalation path entirely since most incidents resolve without escalation", "Single-step escalation to CTO bypasses engineering triage, creating bottleneck and toil for leadership", "Require the CTO to approve the runbook before it is published"], "ans": 3, "fb": "Direct CTO escalation bypasses the engineering layers that can resolve most incidents. It creates executive toil, slows escalation when the CTO is unavailable, and does not develop engineering incident response maturity. Multi-tier escalation distributes responsibility appropriately."},
      {"level": 6, "diff": 1, "scenario": 0, "q": "Your organisation currently runs all services on GKE. A new BaaS product requires 10ms P99 latency guarantees. What architectural option should you evaluate first?", "opts": ["Deploy on bare-metal servers outside GCP to eliminate virtualisation overhead", "Use Cloud Functions for all endpoints to minimise cold start variance", "Add more GKE nodes to the existing shared node pool", "Migrate all services to Cloud Run immediately for lower management overhead", "GKE with dedicated node pools and latency-optimised machine types before considering alternative platforms"], "ans": 4, "fb": "Dedicated node pools with network-optimised machine types can achieve 10ms P99 on GKE without platform migration. Evaluating the current platform's tuning options before migrating avoids unnecessary complexity and cost."},
      {"level": 6, "diff": 1, "scenario": 0, "q": "Leadership asks whether the organisation should adopt Cloud Run for new stateless services. What is the primary technical constraint you must communicate?", "opts": ["Cloud Run instances scale to zero by default", "Cloud Run requires a different programming language runtime", "Cloud Run does not support containerised workloads", "Cloud Run is more expensive than GKE for all workload types", "Cloud Run cannot connect to Cloud SQL"], "ans": 0, "fb": "Scale-to-zero is Cloud Run's main trade-off: it reduces idle cost but introduces JVM cold start latency (often 2-8 seconds for Spring Boot). Services with strict latency SLOs must either use minimum instance configuration or remain on GKE."},
      {"level": 6, "diff": 1, "scenario": 1, "q": "You are designing a DR drill for your payment processing platform. What is the minimum success criterion that makes a drill meaningful?", "opts": ["All engineers participated in the drill", "The drill completed within the scheduled maintenance window", "The DR runbook was followed without deviation", "No production incidents occurred during the drill", "Recovery Time Objective"], "ans": 4, "fb": "A DR drill's purpose is to validate RTO and RPO commitments. Participation and runbook adherence are process metrics. If RTO is missed or data is lost, the drill has revealed a gap regardless of how smoothly the process ran."},
      {"level": 6, "diff": 1, "scenario": 1, "q": "A DR drill reveals that restoring from a Cloud SQL backup takes 3 hours, but the RTO is 1 hour. What architectural change addresses this gap most directly?", "opts": ["Increase backup frequency from daily to hourly", "Schedule DR drills more frequently to reduce surprise", "Enable Cloud SQL HA with a hot standby replica so failover completes", "Move the application to a different GCP region", "Increase Cloud SQL instance CPU to speed up restore operations"], "ans": 2, "fb": "HA standby failover is a metadata operation taking ~30-60 seconds, not a restore operation. Backup restore time is a function of data volume and cannot be tuned to meet a 1-hour RTO for large databases. HA eliminates the restore path entirely for single-region failures."},
      {"level": 6, "diff": 1, "scenario": 2, "q": "The CFO asks why cloud spend increased 40% year-over-year. What is the most effective first slide in your executive cost narrative?", "opts": ["A list of cost optimisation initiatives planned for next quarter", "A full breakdown of every GCP SKU and its monthly cost", "The engineering team headcount growth over the same period", "A comparison of GCP prices against AWS and Azure", "Business growth context: show revenue, transaction volume, and customer"], "ans": 4, "fb": "Absolute cost increase without business context is alarming. Showing cost-per-transaction or cost-per-customer normalises the increase against growth and reframes it as investment efficiency. SKU breakdowns are supporting detail, not the opening narrative."},
      {"level": 6, "diff": 1, "scenario": 2, "q": "Leadership asks for a committed cost reduction target for next year. What approach produces a credible commitment rather than an estimate?", "opts": ["Ask each team to reduce their service costs by 15%", "Defer the commitment until a full audit is completed", "Identify specific initiatives", "Commit to freezing cloud spend at current levels", "Commit to a 20% reduction based on industry benchmarks"], "ans": 2, "fb": "A credible commitment names the specific levers, their current cost, and the projected saving from each change. Industry benchmarks and team-level percentage targets are not grounded in your actual cost structure and will not hold up to scrutiny."},
      {"level": 6, "diff": 1, "scenario": 3, "q": "A security audit requires evidence that all privileged database access is logged. Which GCP capability provides this evidence most directly?", "opts": ["Kubernetes RBAC audit logs for pod-level access", "Terraform state files showing database IAM bindings", "HikariCP connection pool metrics exported via Micrometer", "Cloud SQL audit logs with DATA_READ and DATA_WRITE activity", "Cloud Monitoring alerts on high CPU from database queries"], "ans": 3, "fb": "Cloud SQL audit logs capture the SQL statements, user identity, and timestamp for all data access when DATA_READ/DATA_WRITE audit types are enabled. This is the direct, GCP-native evidence an auditor requires. RBAC logs capture pod permissions, not database query content."},
      {"level": 6, "diff": 1, "scenario": 4, "q": "You are launching a new platform capability: a shared Spring Boot starter for distributed tracing. What is the single most important factor for organic team adoption?", "opts": ["Zero-config integration: the starter works correctly by adding", "Demonstrating the capability at an all-hands presentation", "Publishing a detailed 20-page integration guide", "Making adoption mandatory via an engineering policy", "Offering dedicated onboarding sessions for each team"], "ans": 0, "fb": "The adoption barrier for platform capabilities is always friction. A zero-config starter that works out of the box removes every technical objection. Mandates create compliance without enthusiasm; documentation helps only after the decision to adopt has been made."},
      {"level": 6, "diff": 2, "scenario": 0, "q": "Your platform runs 40 Spring Boot services on GKE. A new LTS Java version promises 15% throughput improvement. How do you structure the migration decision for the organisation?", "opts": ["Pilot with two representative services, measure actual throughput and cost impact, assess", "Mandate all teams migrate within 30 days to capture the performance gain", "Upgrade the JVM base image org-wide in a single deployment wave", "Wait for all 40 teams to independently validate and migrate on their own schedule", "Migrate only new services and leave existing services on the current LTS"], "ans": 0, "fb": "Vendor benchmarks rarely match production workloads. A pilot with representative services validates real gains and surfaces compatibility issues before committing the organisation. A big-bang migration risks unknown regressions across 40 services simultaneously."},
      {"level": 6, "diff": 2, "scenario": 0, "q": "Leadership asks whether to adopt GKE Autopilot for all new services. What is the key trade-off you must present?", "opts": ["Autopilot is strictly better than Standard GKE in all dimensions", "Autopilot requires migrating to a new container registry", "Autopilot is only available in premium GCP regions", "Autopilot removes node management toil but restricts pod configuration", "Autopilot only supports stateless workloads without persistent storage"], "ans": 3, "fb": "Autopilot's value is operational simplicity, but its restrictions on pod security context and host access can block services with infrastructure-level requirements. Cost comparison depends heavily on workload density — Autopilot charges per pod resource, not per node."},
      {"level": 6, "diff": 2, "scenario": 1, "q": "A DR drill uncovers that the Kafka consumer group offsets are not replicated to the DR region. What is the architectural gap and how do you address it?", "opts": ["Add a Cloud Monitoring alert when offset replication lag exceeds 5 minutes", "Disable offset tracking and reprocess all events from the beginning of each topic on DR activation", "Consumer offsets represent processing state", "Re-deploy all Kafka consumers in the DR region and start from the latest offset", "Use Cloud SQL as the source of truth instead of Kafka offsets"], "ans": 2, "fb": "Without offset replication, DR consumers start from latest (losing unprocessed events) or from earliest (causing full replay). MirrorMaker 2 replicates offsets with translation for the target cluster's partition layout, enabling near-exact resumption after failover."},
      {"level": 6, "diff": 2, "scenario": 1, "q": "After three DR drills, your RTO consistently misses by 15 minutes due to manual steps. What is the correct long-term response?", "opts": ["Run more frequent drills until engineers execute the manual steps faster", "Automate the manual steps as runbook scripts, validate in the next drill, and measure", "Hire additional on-call engineers to parallelise the manual steps", "Increase the RTO commitment by 15 minutes to match observed performance", "Remove the manual steps from the drill scope to improve the reported RTO metric"], "ans": 1, "fb": "Consistently missing RTO due to manual steps is a process automation opportunity, not a commitment calibration problem. Automating and validating closes the gap sustainably. Adjusting the RTO to match poor performance is dishonest to stakeholders."},
      {"level": 6, "diff": 2, "scenario": 2, "q": "The board asks for cloud cost projections for the next two years alongside the product growth roadmap. What input is required that finance alone cannot provide?", "opts": ["Historical AWS pricing trends", "Cloud provider contract renewal dates", "Architecture decisions that affect cost scaling", "Number of engineering hires planned for next year", "Competitor infrastructure cost benchmarks"], "ans": 2, "fb": "Cost projections must be grounded in planned architectural changes that alter the cost curve. Finance can extrapolate linear growth but cannot anticipate the non-linear cost impact of multi-region deployment or new high-volume data flows without engineering input."},
      {"level": 6, "diff": 2, "scenario": 2, "q": "You discover that committed use discounts for GKE compute are not being applied correctly because workloads are spread across too many machine types. What is your recommendation?", "opts": ["Apply committed use discounts at the project level without standardising machine types", "Standardise on two to three node pool machine types to maximise committed use discount coverage", "Request custom machine types from GCP to fit each workload exactly", "Purchase on-demand capacity for all workloads to maintain flexibility", "Migrate all workloads to Spot VMs to avoid needing commitments"], "ans": 1, "fb": "Committed use discounts apply per machine type. Fragmented machine type usage means each type individually falls below the commitment threshold. Standardising to two or three types consolidates usage and makes 1-year commitments cost-effective."},
      {"level": 6, "diff": 2, "scenario": 3, "q": "A PCI-DSS auditor asks for evidence of network segmentation between cardholder data environment services and other services on GKE. What is the correct evidence to produce?", "opts": ["Kubernetes NetworkPolicy definitions restricting ingress/egress to CDE namespaces, plus GKE", "A diagram showing the intended network architecture", "Terraform apply logs showing the cluster was created with network isolation flags", "IAM policy bindings restricting developer access to CDE namespaces", "Cloud Monitoring alerts configured for cross-namespace traffic"], "ans": 0, "fb": "PCI-DSS requires demonstrable, enforced controls — not diagrams or intentions. NetworkPolicy objects with version-controlled change history prove both the control and its governance. Diagrams and alerts describe intent and detection, not enforcement."},
      {"level": 6, "diff": 2, "scenario": 4, "q": "A platform capability you shipped six months ago has only 20% adoption despite strong technical quality. What is the most likely root cause and response?", "opts": ["Present the capability at a company all-hands to increase awareness", "The capability needs more documentation before teams will use it", "The capability solves a problem teams do not feel acutely", "Rebuild the capability with a different technology stack", "Make adoption mandatory via a platform health scorecard"], "ans": 2, "fb": "Low adoption of high-quality tooling almost always reflects a problem-definition mismatch. Teams adopt tools that reduce their current pain. Co-owning the first adoption proves value in a real context and generates an internal advocate. Mandates create surface compliance without internalisation."},
      {"level": 6, "diff": 2, "scenario": 4, "q": "You want platform capabilities to be self-service without requiring teams to raise support tickets. What is the architectural principle that enables this?", "opts": ["Assign a platform engineer as dedicated support for each product team", "Build a comprehensive ticketing system with 2-hour SLA for platform requests", "Pave the path: make the correct, secure, compliant option the lowest-friction default", "Publish all platform source code and expect teams to self-fork and customise", "Create a certification programme that gates access to platform capabilities"], "ans": 2, "fb": "Paved paths embed the platform's constraints and best practices into the default experience. When the right way is also the easy way, teams adopt without support overhead. Dedicated support and ticketing systems scale linearly with teams; paved paths scale independently."},
      {"level": 6, "diff": 3, "scenario": 0, "q": "Your organisation is evaluating a move from GKE Standard to a multi-cloud strategy for resilience. What is the primary technical argument against multi-cloud for a GCP-native platform?", "opts": ["Multi-cloud is always more expensive than single-cloud", "Multi-cloud requires rewriting all application code", "Multi-cloud eliminates managed service dependencies", "GKE workloads cannot run on other Kubernetes distributions", "GCP does not support cross-cloud VPN connectivity"], "ans": 2, "fb": "GCP-native services (Cloud SQL HA, Cloud Trace, Pub/Sub) are often the reason GKE works well. Multi-cloud forces abstraction to the lowest common denominator and doubles the operational surface. Resilience goals are usually better served by multi-region GCP than by multi-cloud."},
      {"level": 6, "diff": 3, "scenario": 0, "q": "Leadership is considering migrating all batch processing services to Cloud Run Jobs to save GKE node costs. What hidden cost must you model before endorsing this?", "opts": ["Cloud Run Jobs container image storage costs in Artifact Registry", "Cloud Run Jobs cold start time for JVM services and the impact on batch", "Number of Cloud Run Job revisions stored in the registry", "Cloud Monitoring alert configuration migration effort", "Loss of kubectl debugging capability for batch failures"], "ans": 1, "fb": "JVM cold start on Cloud Run Jobs adds 3-8 seconds per invocation. For high-frequency short-duration batch jobs, this can dominate execution time and violate SLAs. Cross-service egress at scale can also offset node cost savings. Both must be modelled at actual job frequency."},
      {"level": 6, "diff": 3, "scenario": 1, "q": "Your DR drill succeeds technically (RTO met, RPO met) but post-drill analysis reveals engineers were unsure who had decision authority to activate DR during the drill. What is the systemic gap and fix?", "opts": ["Add more engineers to the DR on-call rotation", "The DR runbook lacks a RACI for activation authority", "Make DR activation fully automated to remove human decision points", "Require board-level approval for all DR activations", "Document the decision authority retrospectively without changing the process"], "ans": 1, "fb": "Technical success with unclear authority is a governance gap. In a real disaster, authority confusion causes dangerous delays. RACI-based runbooks with named roles (not individuals) survive team changes and ensure activation can proceed without ambiguity."},
      {"level": 6, "diff": 3, "scenario": 2, "q": "The CFO proposes eliminating all non-production GKE clusters to save cost. What is the correct engineering response that addresses both the cost concern and the delivery risk?", "opts": ["Agree to eliminate staging but retain development clusters", "Move non-production workloads to a personal developer cluster to avoid the discussion", "Accept the proposal since cost reduction is always the correct priority", "Quantify the delivery risk", "Reject the proposal outright and defend the current architecture"], "ans": 3, "fb": "Eliminating pre-production environments removes the blast radius buffer for broken deployments. The engineering response must quantify the risk in business terms (cost of production incidents prevented by staging) and offer a real alternative that addresses the CFO's cost concern."},
      {"level": 6, "diff": 3, "scenario": 3, "q": "A regulator requests evidence that your system can detect and respond to anomalous data access within 15 minutes. Your current Cloud Logging export has a 20-minute delay. What architectural change closes this gap?", "opts": ["Add a Cloud SQL read replica to isolate audit queries from production access", "Configure log-based metrics with Cloud Monitoring alerts on anomalous SQL patterns", "Export logs to BigQuery and query them manually during audits", "Implement a 10-minute log sampling interval to reduce export volume", "Reduce the Cloud Logging export delay by upgrading to a premium logging tier"], "ans": 1, "fb": "Log-based metrics in Cloud Monitoring evaluate in near real-time against the log ingestion stream, not the export pipeline. Configuring anomaly detection alerts on the metric achieves sub-5-minute detection. The export pipeline serves compliance retention, not detection speed."},
      {"level": 6, "diff": 3, "scenario": 3, "q": "During a security audit, the auditor finds that a former employee's service account key was not rotated after offboarding. What process gap does this reveal and what is the architectural fix?", "opts": ["Set a 90-day automatic key rotation policy for all service accounts", "Audit service account keys quarterly and rotate any older than 180 days", "Add service account key rotation to the HR offboarding checklist", "Restrict service account key creation to the security team only", "Manual key rotation depends on offboarding process reliability"], "ans": 4, "fb": "Process-dependent key management will always have gaps. Workload Identity Federation eliminates exportable keys entirely by binding workload identity to GCP IAM without credentials. No key means no rotation gap and no offboarding risk."},
      {"level": 6, "diff": 3, "scenario": 4, "q": "A platform capability you built is widely adopted but has created a hidden coupling: all 40 services share one OTEL collector deployment. A collector outage causes total observability loss across the platform. What is the architectural correction?", "opts": ["Reduce the collector's metric scrape interval to lower resource pressure", "Add a second OTEL collector in active-passive configuration", "Split services into two groups and assign each a dedicated collector", "Deploy the OTEL collector as a DaemonSet per node or as a sidecar per service", "Increase the OTEL collector resource limits to prevent OOM restarts"], "ans": 3, "fb": "A single shared collector is a single point of failure for the entire observability pipeline. DaemonSet deployment scopes failure to one node. Sidecar deployment scopes failure to one service. Both include buffering to survive brief collector restarts without data loss."},
      {"level": 1, "diff": 1, "scenario": 0, "q": "A Grafana panel shows a metric that spiked once 3 days ago and has been flat since. What does this most likely indicate?", "opts": ["A one-time event, not an active problem", "A misconfigured alert threshold", "An ongoing incident requiring immediate action", "A data gap in the time series", "A memory leak gradually building"], "ans": 0, "fb": "A single historical spike with no recurrence is typically a one-time event such as a deployment or traffic burst. Ongoing incidents show sustained elevation, not isolated spikes followed by normal baselines."},
      {"level": 1, "diff": 1, "scenario": 0, "q": "Your Grafana dashboard shows an alert firing for high error rate, but the panel time range is set to 'Last 5 minutes'. What should you do first?", "opts": ["Widen the time range to see context", "Disable the alert to stop noise", "Page the on-call engineer immediately", "Check if the alert rule is misconfigured", "Restart the affected service"], "ans": 0, "fb": "Widening the time range reveals whether the spike is isolated or part of a trend, helping distinguish real incidents from transient noise. Acting on a 5-minute window without context risks false escalations."},
      {"level": 1, "diff": 1, "scenario": 0, "q": "Which Grafana panel type is best suited for showing the current value of a single metric like active database connections?", "opts": ["Heatmap", "Time series", "Bar chart", "Stat panel", "Logs panel"], "ans": 3, "fb": "A Stat panel is designed to display a single current value prominently with optional thresholds for at-a-glance status. Time series panels are better for showing trends over time."},
      {"level": 1, "diff": 2, "scenario": 0, "q": "A Grafana alert fires at 9am every weekday but not on weekends. What is the most likely cause?", "opts": ["Cloud SQL maintenance window overlap", "GKE autoscaler failing on weekdays", "A bug introduced every Monday", "A misconfigured dashboard refresh interval", "Normal business-hours traffic pattern hitting a"], "ans": 4, "fb": "Recurring alerts tied to business hours almost always reflect traffic patterns exceeding a threshold calibrated for off-peak load. The fix is to adjust the threshold or use a relative baseline rather than a fixed value."},
      {"level": 1, "diff": 2, "scenario": 0, "q": "You see two panels on a dashboard: one shows p99 latency at 2s, another shows p50 latency at 80ms. What does this mean?", "opts": ["The service is uniformly slow", "Most requests are fast but a tail", "The p99 panel has incorrect data", "Latency is improving over time", "Average latency is around 1s"], "ans": 1, "fb": "p50 at 80ms means the median request is fast; p99 at 2s means 1% of requests experience much higher latency. This tail latency pattern often indicates specific slow code paths, GC pauses, or database contention."},
      {"level": 1, "diff": 2, "scenario": 0, "q": "A dashboard panel shows 'No data' for the last 10 minutes. What should you check first?", "opts": ["Increase the panel refresh rate", "Contact the Grafana admin", "Check if the metric-emitting", "Restart Grafana", "Delete and recreate the panel"], "ans": 2, "fb": "A 'No data' result most commonly means the data source stopped receiving metrics, which points to the emitting service being down or misconfigured. Grafana itself rarely loses data for a single panel."},
      {"level": 1, "diff": 3, "scenario": 0, "q": "An alert fires for 'high JVM heap usage' at 85%, but the service is performing normally with no user impact. What is the most appropriate response?", "opts": ["Investigate but do not escalate", "Restart the pod immediately", "Mark the alert as a known false positive and ignore it permanently", "Increase heap limit and redeploy", "Trigger a heap dump immediately"], "ans": 0, "fb": "JVM heap at 85% with no latency impact often means GC is collecting effectively and the service is stable. Immediate restarts cause unnecessary downtime; permanent suppression is dangerous. Investigate trends before acting."},
      {"level": 1, "diff": 3, "scenario": 0, "q": "Two alerts fire simultaneously: 'Cloud SQL CPU > 80%' and 'API p99 latency > 3s'. Which should you investigate first?", "opts": ["Check Cloud SQL connections count first", "Both equally — flip a coin", "Cloud SQL CPU, as it is the root cause", "Escalate both without investigating", "API latency, as it directly impacts users"], "ans": 2, "fb": "User-facing latency is the symptom confirming real impact; Cloud SQL CPU is the likely cause. Starting with the latency alert confirms blast radius, then tracing to Cloud SQL confirms root cause. In practice, both are investigated together."},
      {"level": 1, "diff": 3, "scenario": 0, "q": "Your service's Grafana dashboard shows RPS dropped to zero at 14:02 but recovered by 14:05. No alerts fired. What is the most likely reason no alert fired?", "opts": ["RPS is not a valid alert metric", "Grafana alerts were disabled", "The alert evaluation window was longer than 3 minutes", "The on-call engineer acknowledged and resolved it", "The metric was not scraped during that period"], "ans": 2, "fb": "Alert rules evaluate over a configured window; if the window is 5 minutes and the outage lasted 3 minutes, the condition may never have been sustained long enough to trigger. Short spikes often slip under fixed evaluation windows."},
      {"level": 1, "diff": 1, "scenario": 1, "q": "A pod is in 'CrashLoopBackOff' state. Which kubectl command gives you the most recent logs from the crashed container?", "opts": ["kubectl get pod <name>", "kubectl top pod <name>", "kubectl describe pod <name>", "kubectl exec <name> -- journalctl", "kubectl logs <name> --previous"], "ans": 4, "fb": "The --previous flag retrieves logs from the last terminated container instance, which is essential when the current container has already restarted and its logs are gone. Without it, you see the new (possibly empty) container's logs."},
      {"level": 1, "diff": 1, "scenario": 1, "q": "What does a pod status of 'Pending' indicate?", "opts": ["The pod crashed and is waiting to restart", "The pod is being terminated", "The pod failed its readiness probe", "The pod is running but not yet ready", "The pod has not been scheduled to a node yet"], "ans": 4, "fb": "Pending means the scheduler has not yet placed the pod on a node, often due to insufficient resources, taints/tolerations mismatch, or PVC binding issues. It is not related to application health."},
      {"level": 1, "diff": 2, "scenario": 1, "q": "A pod keeps restarting every few minutes. 'kubectl describe pod' shows the exit code is 137. What does exit code 137 mean?", "opts": ["The container was killed by the OOM killer", "The application threw an unhandled exception", "The pod was evicted by the scheduler", "The readiness probe failed", "The liveness probe timed out"], "ans": 0, "fb": "Exit code 137 is SIGKILL (128 + 9), which the kernel sends when a container exceeds its memory limit. This is the OOM kill signature. Check memory usage and adjust limits or fix the memory leak."},
      {"level": 1, "diff": 2, "scenario": 1, "q": "You want to see all recent events for a pod including scheduling and probe failures. Which command is most useful?", "opts": ["kubectl logs <pod>", "kubectl rollout status deployment/<name>", "kubectl exec <pod> -- env", "kubectl top pod <pod>", "kubectl get events --field-selector"], "ans": 4, "fb": "kubectl get events filtered by pod name shows scheduling decisions, probe failures, image pull errors, and OOM kills in chronological order. kubectl logs only shows stdout/stderr from the container process."},
      {"level": 1, "diff": 3, "scenario": 1, "q": "A pod restarts once a day at roughly the same time. Logs show no errors before the restart. What should you investigate?", "opts": ["A liveness probe that is too aggressive", "Random GKE node failures", "Cloud SQL failover causing pod restart", "A scheduled job or cron that causes memory pressure", "A Kubernetes version bug"], "ans": 3, "fb": "Regular restart patterns often correlate with scheduled jobs, daily batch processing, or crons that create memory spikes. The absence of application errors suggests an external trigger rather than a code bug."},
      {"level": 1, "diff": 3, "scenario": 1, "q": "A pod is running but receiving no traffic despite the service selector matching. What is the most likely cause?", "opts": ["The service is in the wrong namespace", "The pod's resource requests are too low", "The HPA scaled the deployment to zero", "The pod's readiness probe is failing", "The pod has no liveness probe defined"], "ans": 3, "fb": "Kubernetes removes a pod from service endpoints when its readiness probe fails, even if the pod is running. A failing readiness probe is the most common reason a running pod receives no traffic."},
      {"level": 1, "diff": 1, "scenario": 2, "q": "In Cloud Logging, which filter would show only ERROR-level logs from a specific service named 'payment-service'?", "opts": ["severity>=ERROR AND resource.labels.container_name='payment-service'", "jsonPayload.service='payment-service' AND severity='high'", "logName='payment-service' AND level='error'", "resource.type='payment-service' AND severity=ERROR", "filter: errors from payment-service"], "ans": 0, "fb": "Cloud Logging uses severity>=ERROR (or severity=ERROR) combined with resource labels to filter by container. The resource.labels.container_name field identifies the specific service in GKE workloads."},
      {"level": 1, "diff": 1, "scenario": 2, "q": "You need to find logs for a specific user's request in Cloud Logging. The logs include a 'userId' field. Which approach is correct?", "opts": ["Use jsonPayload.userId='<value>' in the filter", "Use labels.userId='<value>' in the filter", "Search for userId in the free-text search bar", "Filter by resource.type and scroll manually", "Download all logs and grep locally"], "ans": 0, "fb": "Structured log fields emitted as JSON are accessible via jsonPayload.<fieldName> in Cloud Logging filters. This is precise and efficient compared to free-text search which may match unrelated entries."},
      {"level": 1, "diff": 2, "scenario": 2, "q": "You are investigating an incident that started at 14:02. How do you restrict Cloud Logging results to a specific time window?", "opts": ["Filter by log name only", "Use the severity filter to narrow results", "Sort by newest and scroll backward", "Set the time range picker or use timestamp filters", "Use the resource type filter"], "ans": 3, "fb": "Cloud Logging's time range picker (or timestamp>= / timestamp<= filters) restricts the query to the relevant window, dramatically reducing noise. Sorting without filtering still returns all logs in that bucket."},
      {"level": 1, "diff": 2, "scenario": 2, "q": "Logs from your GKE pod are missing from Cloud Logging for the last 30 minutes. What should you check first?", "opts": ["Whether the pod is still running and", "Cloud Logging retention settings", "Log exclusion filters", "Grafana dashboard configuration", "IAM permissions for the Logging API"], "ans": 0, "fb": "Missing logs most often mean the pod stopped running or the log agent (Fluentd/Fluent Bit on GKE) has an issue. Checking pod health first is faster than investigating logging infrastructure."},
      {"level": 1, "diff": 3, "scenario": 2, "q": "You find 10,000 log entries matching your filter. The critical error is somewhere in the middle. What is the most efficient next step?", "opts": ["Ask a colleague to help scroll", "Increase log verbosity to get more context", "Add a more specific filter on a known field", "Download to CSV and search offline", "Read all 10,000 entries top to bottom"], "ans": 2, "fb": "Narrowing the filter with additional known fields (timestamp, traceId, specific error text) reduces the result set to a manageable size. Downloading or scrolling 10,000 entries wastes time and misses the point of structured logging."},
      {"level": 1, "diff": 3, "scenario": 2, "q": "A developer says 'I can't find my logs in Cloud Logging.' They are logging with System.out.println(). What is the most likely issue?", "opts": ["Cloud Logging is not enabled on the project", "println output is not captured by GKE's log agent", "The pod is using a custom log driver", "println goes to a file not captured by Fluentd", "The IAM role is missing the logs.viewer permission"], "ans": 1, "fb": "GKE's log agent (Fluent Bit) captures stdout/stderr, and System.out.println() does write to stdout. However, if the Spring Boot log format is not structured JSON, logs may appear but be difficult to filter. The real issue is often log format, not capture. That said, in most GKE setups stdout IS captured — the problem is unstructured output not being queryable."},
      {"level": 1, "diff": 1, "scenario": 3, "q": "A runbook step says 'check if the service is returning 5xx errors'. Which tool gives you this information fastest during an incident?", "opts": ["Review the last deployment diff", "SSH into the pod and tail logs", "Check the Grafana error rate panel", "Query Cloud SQL directly", "Read the application source code"], "ans": 2, "fb": "Grafana dashboards showing error rate metrics give an immediate visual answer during incidents. Source code and SQL queries take much longer and don't answer the current state question."},
      {"level": 1, "diff": 1, "scenario": 3, "q": "When escalating an incident to a senior engineer, what information is most important to include?", "opts": ["Your opinion on the root cause", "The names of other services that might be affected", "A full history of past incidents", "What you observed, what you tried, and the current impact", "Screenshots of all Grafana panels"], "ans": 3, "fb": "Good escalation includes current observable state, steps already taken, and user impact. This lets the senior engineer pick up without repeating your work. Speculation without data wastes time."},
      {"level": 1, "diff": 2, "scenario": 3, "q": "A runbook says 'if error rate exceeds 5%, restart the affected deployment'. You observe 6% errors for 2 minutes. What should you do?", "opts": ["Escalate without acting since you are unsure", "Check if the runbook is outdated first", "Increase the error rate threshold to 10%", "Wait longer to confirm it is sustained before acting", "Follow the runbook and restart the deployment"], "ans": 4, "fb": "Runbooks exist to reduce decision latency during incidents. If the condition is met, follow the documented step. Second-guessing a clear runbook threshold during an active incident typically causes longer outages."},
      {"level": 1, "diff": 2, "scenario": 3, "q": "You followed all runbook steps and the issue is not resolved. What is the appropriate next action?", "opts": ["Open a ticket and go home", "Mark the incident as resolved and monitor", "Escalate to the next responder with a summary of what you tried", "Keep repeating the same steps hoping they work", "Restart all services in the namespace"], "ans": 2, "fb": "Runbooks cover common cases. When they are exhausted without resolution, escalation with a clear summary of observations and steps taken is the correct next step. Repeating failed steps wastes time."},
      {"level": 1, "diff": 3, "scenario": 3, "q": "An alert fires for a service you have never worked on. The runbook link is broken. What is your first action?", "opts": ["Ignore the alert until someone else picks it up", "Restart the service immediately as a safe default", "Escalate immediately without investigating", "Find the service owner and wait for them to respond", "Check recent deployments, error logs, and metrics to"], "ans": 4, "fb": "A broken runbook means you need to build context manually. Checking recent deployments, error rates, and logs gives you the data needed to either resolve or escalate intelligently. Blind restarts can make things worse."},
      {"level": 1, "diff": 3, "scenario": 3, "q": "During an incident you notice a second unrelated alert fires. What is the correct approach?", "opts": ["Escalate both simultaneously without context", "Restart both services at once", "Ignore the second alert entirely", "Stop the first investigation and switch to the second alert", "Acknowledge the second alert and note it for after the first is"], "ans": 4, "fb": "Splitting focus during an active incident usually extends both outages. Acknowledge the second alert to prevent it being missed, note it, and resolve the higher-impact issue first unless the second alert is clearly more severe."},
      {"level": 1, "diff": 1, "scenario": 4, "q": "Cloud SQL CPU is at 95% sustained. What is the immediate operational concern?", "opts": ["Storage will fill up", "The instance will automatically shut down", "Connections will be dropped immediately", "Query performance will degrade significantly", "Replication lag will cause data loss"], "ans": 3, "fb": "Sustained 95% CPU causes query queuing and dramatically increased latency. Cloud SQL does not auto-shutdown at high CPU, but performance degrades severely. Storage and replication are separate concerns."},
      {"level": 1, "diff": 1, "scenario": 4, "q": "The Cloud SQL connections dashboard shows 'connections used: 98/100'. What risk does this indicate?", "opts": ["Replication is falling behind", "The instance is about to run out of storage", "The database will restart", "Queries are running slowly", "New connection attempts will fail"], "ans": 4, "fb": "Cloud SQL has a maximum connection limit. At 98/100, any new connection attempt will be rejected with a 'too many connections' error. This is a common failure mode when connection pooling is misconfigured."},
      {"level": 1, "diff": 2, "scenario": 4, "q": "Cloud SQL storage is at 90% capacity. What should you do before it reaches 100%?", "opts": ["Enable read replicas to offload storage", "Restart the Cloud SQL instance", "Archive old tables to a different project", "Enable storage auto-increase or manually increase storage", "Increase the instance tier"], "ans": 3, "fb": "Cloud SQL supports storage auto-increase, which can be enabled proactively. If not enabled, manual storage increase is needed. Reaching 100% storage causes the instance to go read-only, causing write failures."},
      {"level": 1, "diff": 2, "scenario": 4, "q": "You notice Cloud SQL CPU spikes every hour for about 5 minutes. What is the most likely cause?", "opts": ["A GKE node is throttling the database", "A connection pool is cycling connections", "The instance is undersized for normal load", "Cloud SQL autoscaling is adjusting CPU", "A scheduled job or maintenance task runs hourly"], "ans": 4, "fb": "Regular hourly CPU spikes are a strong signal of a scheduled task such as a cron job, batch process, or autovacuum activity. Investigate what runs on that schedule before resizing the instance."},
      {"level": 1, "diff": 3, "scenario": 4, "q": "Cloud SQL CPU is at 30%, connections are at 50%, but application latency is 4x normal. What should you investigate?", "opts": ["Scale up GKE pods to reduce per-pod load", "Add more connection pool capacity", "Check for lock contention or long-running", "Check Cloud SQL storage usage", "Increase Cloud SQL CPU tier"], "ans": 2, "fb": "High latency with low CPU and normal connections points to lock contention or a slow query blocking others, not resource exhaustion. Cloud SQL's active queries and locks view reveals blocking chains that CPU metrics hide."},
      {"level": 2, "diff": 1, "scenario": 0, "q": "What is the difference between a GKE resource 'request' and a resource 'limit' for CPU?", "opts": ["Request is the maximum allowed; limit is the minimum guaranteed", "Both are the same — one is for scheduling, one is for runtime", "Requests apply to CPU; limits only apply to memory", "Request is the minimum guaranteed", "Limits are set by GKE automatically based on requests"], "ans": 3, "fb": "Requests are used by the scheduler to place pods on nodes with sufficient capacity; limits cap actual usage. A pod can burst above its request up to the limit but will be throttled (CPU) or killed (memory) if it exceeds limits."},
      {"level": 2, "diff": 1, "scenario": 0, "q": "A GKE pod is throttled but not OOMKilled. Which resource is being exceeded?", "opts": ["Storage limit", "Memory limit", "CPU limit", "Network egress limit", "PVC size limit"], "ans": 2, "fb": "CPU throttling occurs when a container tries to use more CPU than its limit. Unlike memory, exceeding the CPU limit does not kill the pod — it slows it down. OOMKill only happens when memory limits are exceeded."},
      {"level": 2, "diff": 1, "scenario": 0, "q": "In Cloud Monitoring, which metric would you use to verify a GKE service is healthy from an external perspective?", "opts": ["uptime_check/check_passed", "networking/pod_flow_count", "container/memory/limit_utilization", "container/cpu/usage_time", "logging/byte_count"], "ans": 0, "fb": "Cloud Monitoring uptime checks probe an endpoint from multiple locations and expose the check_passed metric, confirming external reachability. CPU and memory metrics confirm resource health, not service-level availability."},
      {"level": 2, "diff": 2, "scenario": 0, "q": "A deployment's pods are being OOMKilled every few hours even though the app works correctly on a single request. What is the likely cause?", "opts": ["The JVM heap is too small for startup", "The node does not have enough CPU", "Cloud SQL is consuming the pod's memory", "The readiness probe is failing intermittently", "Memory accumulates over time due to a leak or unbounded cache"], "ans": 4, "fb": "OOMKills that happen gradually — not at startup — typically indicate memory accumulation over time: a slow leak, an unbounded in-memory cache, or session objects that are not released. Profiling with JFR or a heap dump after several hours reveals the culprit."},
      {"level": 2, "diff": 2, "scenario": 0, "q": "You set CPU request=100m and CPU limit=200m on a latency-sensitive service. Under sustained load, p99 latency spikes. What should you investigate first?", "opts": ["The node running out of memory", "The readiness probe timeout being too short", "CPU throttling due to the 200m limit being too low", "Insufficient replicas handling the load", "Cloud SQL connection pool exhaustion"], "ans": 2, "fb": "CPU throttling silently adds latency because the container is paused when it hits the limit. A latency-sensitive service with a tight CPU limit will experience p99 spikes under load without any error signals."},
      {"level": 2, "diff": 2, "scenario": 0, "q": "Cloud Monitoring shows a GKE workload's memory utilization at 90% of its limit for 3 days. What is the recommended action?", "opts": ["Restart the pods to clear memory", "Ignore it — 90% is fine as long as no OOMKills occur", "Increase the memory limit proactively before OOMKills occur", "Decrease the limit to force the app to use less memory", "Add more replicas to distribute memory usage"], "ans": 2, "fb": "90% utilization sustained over days means any traffic spike or GC spike will push the pod to OOMKill. Proactively increasing the limit is safer than waiting for a production kill. Decreasing limits never reduces app memory usage."},
      {"level": 2, "diff": 3, "scenario": 0, "q": "A service has CPU request=500m and limit=500m. Cloud Monitoring shows consistent CPU at 490m. What is the problem with this configuration?", "opts": ["The limit must always be higher than 1000m on GKE", "The request is too high and wastes cluster resources", "Cloud Monitoring cannot track CPU below 1 core", "No headroom exists", "The request and limit cannot be equal in GKE"], "ans": 3, "fb": "Setting request equal to limit with usage at 98% leaves zero headroom. Any short burst — a GC pause, a connection spike — immediately hits the limit and causes throttling. Best practice is to keep limits 20-50% above typical usage."},
      {"level": 2, "diff": 3, "scenario": 0, "q": "A team sets CPU requests very low to pack more pods per node. What is the likely operational consequence?", "opts": ["Pods will fail to start due to insufficient scheduling capacity", "Cloud Monitoring will show inaccurate utilization", "The HPA will not scale correctly", "CPU contention causes latency spikes as pods compete for actual CPU time", "Pods will be evicted by the scheduler"], "ans": 3, "fb": "Low CPU requests allow many pods to be scheduled on the same node. When they all run simultaneously, they compete for actual CPU, causing throttling and latency spikes that don't show up as OOMKills. This is a common cause of mysterious intermittent latency."},
      {"level": 2, "diff": 1, "scenario": 1, "q": "Which structured log fields are most important for correlating a single request across multiple services?", "opts": ["timestamp and severity", "traceId and spanId", "pod name and namespace", "userId and sessionId", "level and message"], "ans": 1, "fb": "traceId links all logs and spans belonging to one distributed request across services. spanId identifies the specific operation within that request. Together they enable cross-service correlation in Cloud Logging and Cloud Trace."},
      {"level": 2, "diff": 1, "scenario": 1, "q": "Why should tenantId be included as a structured log field in a multi-tenant BaaS platform?", "opts": ["To reduce log volume by grouping entries", "To comply with Kubernetes logging standards", "To enable per-tenant log filtering and isolate", "To allow Grafana to split dashboards by region", "To encrypt log data per tenant"], "ans": 2, "fb": "In multi-tenant systems, tenantId lets you quickly scope an incident investigation to one tenant's logs. Without it, you cannot determine whether an issue is tenant-specific or platform-wide without reading all log content."},
      {"level": 2, "diff": 2, "scenario": 1, "q": "A Spring Boot 3 service logs plain text strings. Ops teams can't filter logs effectively in Cloud Logging. What change would most improve this?", "opts": ["Switch to Log4j2 instead of Logback", "Add more log statements throughout the code", "Configure Logback to output JSON with structured fields", "Add timestamps to each log line", "Increase log verbosity to DEBUG level"], "ans": 2, "fb": "Cloud Logging can parse structured JSON logs and index individual fields for filtering. Plain text logs land in textPayload, which is only searchable as a raw string — much less useful for operational queries."},
      {"level": 2, "diff": 2, "scenario": 1, "q": "During an incident, ops wants to see all logs for a specific tenant in the last 30 minutes. Which log query would work correctly?", "opts": ["severity=ERROR AND timestamp>=30m", "textPayload:'tenant-42' AND severity>=WARNING", "logName:'tenant-42'", "resource.labels.namespace='prod' AND tenantId='tenant-42'", "jsonPayload.tenantId='tenant-42' AND timestamp>='<30min ago>'"], "ans": 4, "fb": "jsonPayload.tenantId filters on the structured field directly, which requires JSON-formatted logs. The textPayload approach works only if logs are unstructured and the string appears verbatim, which is fragile."},
      {"level": 2, "diff": 3, "scenario": 1, "q": "A developer logs the full request body including payment card numbers 'for debugging'. What is the correct course of action?", "opts": ["Mask the data in Grafana dashboards", "Remove PCI-DSS data from logs immediately and review other", "Rotate the API keys and continue logging", "Accept it temporarily and remove it in the next sprint", "Restrict log access to senior engineers only"], "ans": 1, "fb": "Logging card numbers violates PCI-DSS compliance and must be remediated immediately — not in a future sprint. Log access controls do not fix the compliance violation of the data existing in logs at all."},
      {"level": 2, "diff": 3, "scenario": 1, "q": "A service emits 500MB of DEBUG logs per hour in production, causing high Cloud Logging costs. What is the best long-term fix?", "opts": ["Set the production log level to INFO and use log", "Delete logs daily with a retention policy", "Switch to a different logging library", "Raise the Cloud Logging ingestion quota", "Compress logs before sending to Cloud Logging"], "ans": 0, "fb": "Production services should log at INFO or above. DEBUG logs at production scale are a cost and noise problem. Log exclusion filters or log-level sampling allow debug-level visibility for specific investigations without continuous volume."},
      {"level": 2, "diff": 1, "scenario": 2, "q": "What is the difference between a Micrometer Counter and a Gauge?", "opts": ["Gauge is deprecated in Spring Boot 3", "Both track the same thing — one is for JVM, one is for HTTP", "Counter tracks current state; Gauge counts events", "Counter is for latency; Gauge is for error rates", "Counter only increases monotonically"], "ans": 4, "fb": "Counters accumulate a monotonically increasing count (e.g., total requests served). Gauges track a current instantaneous value (e.g., active connections, queue depth). Using the wrong type produces misleading metrics."},
      {"level": 2, "diff": 1, "scenario": 2, "q": "You want to measure how long a business operation takes in a Spring Boot service. Which Micrometer type is most appropriate?", "opts": ["DistributionSummary", "Counter", "Timer", "LongTaskTimer", "Gauge"], "ans": 2, "fb": "Timer records both the count and duration of events, giving you throughput and latency in one instrument. It automatically exposes p50/p95/p99 percentiles when configured. Counter only tracks occurrence count without duration."},
      {"level": 2, "diff": 2, "scenario": 2, "q": "A Grafana panel shows a custom Micrometer metric but the line is flat at 0 after a deployment. What is the most likely cause?", "opts": ["Grafana's data source is misconfigured", "The metric was registered but the code path that", "The metric name changed in the new deployment", "Prometheus is not scraping the pod", "Micrometer counters reset to 0 after each scrape"], "ans": 1, "fb": "A flat-zero metric is commonly caused by the code path not being reached — for example, a feature flag is off or the operation is not being triggered. Check whether the business logic is actually executing before debugging the metrics pipeline."},
      {"level": 2, "diff": 2, "scenario": 2, "q": "You build a Grafana panel using a Micrometer Timer metric, but p99 latency always shows 0. What is likely missing?", "opts": ["The Timer was not registered with MeterRegistry", "Spring Boot 3 does not support Timer percentiles", "Percentile publishing is not enabled on the Timer configuration", "Grafana cannot display p99 from Micrometer", "The Timer needs to be a Histogram to show percentiles"], "ans": 2, "fb": "Micrometer Timers do not publish percentiles by default. You must enable them via percentiles(0.99) or percentilesHistogram(true) in the Timer builder. Without this, only count and total duration are exposed."},
      {"level": 2, "diff": 3, "scenario": 2, "q": "A team adds a custom Micrometer metric with a 'tenantId' tag and has 5,000 active tenants. What problem will this cause?", "opts": ["The metric will not be exported to Prometheus", "Grafana cannot render panels with more than 100 label values", "High cardinality will bloat Prometheus storage and slow queries", "Spring Boot will throw an exception at startup", "The metric will be truncated after 1,000 tag values"], "ans": 2, "fb": "Each unique tag value creates a separate time series in Prometheus. With 5,000 tenants, a single metric becomes 5,000 series. High cardinality causes storage explosion and degraded query performance — tenantId should never be a Prometheus label."},
      {"level": 2, "diff": 3, "scenario": 2, "q": "A Grafana panel shows a 'rate' of a Micrometer counter as zero even though the counter is incrementing. What is most likely wrong?", "opts": ["Micrometer resets counters between scrapes", "Counters cannot be used with rate() in Prometheus", "The rate interval in the Grafana query is shorter than", "The counter value is too small to display", "The panel is using the wrong visualization type"], "ans": 2, "fb": "rate() requires at least two data points within the specified interval to calculate a rate. If the rate interval is shorter than the scrape interval (typically 15s-30s), Prometheus has only one point and returns zero or no data."},
      {"level": 2, "diff": 1, "scenario": 3, "q": "What is the purpose of the traceparent header in distributed tracing?", "opts": ["To carry the request payload between services", "To propagate the trace context so spans from", "To identify the tenant making the request", "To authenticate inter-service requests", "To enable mTLS between GKE services"], "ans": 1, "fb": "The W3C traceparent header carries the traceId and parent spanId, allowing the receiving service to create a child span linked to the originating trace. Without it, each service creates an isolated, unlinked trace."},
