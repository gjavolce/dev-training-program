    {"level":1,"diff":3,"scenario":2,"q":"You see -XX:+UseContainerSupport in a JVM configuration. What does this flag do?","opts":["Enables Spring Boot to detect it's running in Docker","Tells the JVM to read memory and CPU limits from the container's cgroup instead of the host machine","Enables Kubernetes health probes for the JVM","Optimises GC for containerised environments","Enables JFR recording in containers"],"ans":1,"fb":"Without container support, the JVM reads the host machine's total memory (e.g., 32GB on a GKE node) and may set its heap accordingly. With UseContainerSupport, the JVM reads cgroup limits. Default since Java 8u191 and Java 11+."},
    {"level":1,"diff":1,"scenario":3,"q":"A Spring Boot service takes 15 seconds to start. During those first 15 seconds, API response times are 2-3x higher than normal. Why?","opts":["The database is slow during startup","The JVM's JIT compiler hasn't yet optimised hot code paths — it runs in interpreted mode initially","The service is downloading dependencies at startup","Kubernetes is throttling CPU during startup","The readiness probe is misconfigured"],"ans":1,"fb":"The JVM initially runs bytecode through an interpreter. The JIT compiler identifies hot methods and compiles them to native machine code over time. Until hot paths are compiled, they run significantly slower."},
    {"level":1,"diff":2,"scenario":3,"q":"A freshly deployed pod passes its readiness probe but the first 50 API requests have 3x higher latency. What is happening?","opts":["The pod has a memory leak that only appears under initial load","The JVM is still warming up — JIT compilation, connection pool creation, and cache population haven't completed yet","The Kubernetes scheduler placed it on an overloaded node","The container image is being downloaded during these requests","The database needs to warm its cache for this pod"],"ans":1,"fb":"Readiness probes check basic health but the JVM isn't fully warm yet. JIT hasn't compiled hot paths, HikariCP may create connections lazily, Spring caches are empty, and Kafka consumers may still be rebalancing."},
    {"level":1,"diff":1,"scenario":4,"q":"What is 'garbage collection' in the JVM?","opts":["A background process that deletes unused files from the container's filesystem","The JVM's automatic process of identifying and reclaiming memory occupied by objects that are no longer referenced","A manual cleanup developers must trigger by calling System.gc()","A process that removes unused Docker images from the node","A Kubernetes feature that evicts idle pods"],"ans":1,"fb":"Garbage collection (GC) is the JVM's automatic memory management. It identifies objects in heap memory that are no longer reachable and reclaims that memory for new allocations."},
    {"level":1,"diff":2,"scenario":4,"q":"A log shows java.lang.OutOfMemoryError: Java heap space. What does this mean?","opts":["The Linux kernel killed the container","The JVM could not allocate a new object because the heap is full and GC could not free enough space","The JVM ran out of thread stack space","The container's disk is full","Metaspace is exhausted"],"ans":1,"fb":"'Java heap space' means the garbage collector ran but could not free enough heap memory. This is different from OOMKill (exit 137). Metaspace exhaustion produces 'OutOfMemoryError: Metaspace'."},
    {"level":1,"diff":3,"scenario":4,"q":"What is the difference between OutOfMemoryError: Java heap space and the pod being OOM-killed (exit code 137)?","opts":["They are the same thing","OutOfMemoryError is the JVM detecting it can't allocate heap; OOMKill is the Linux kernel killing the container for exceeding its memory limit — they can happen independently","OutOfMemoryError always causes an OOMKill","OOMKill always produces an OutOfMemoryError first","OutOfMemoryError is for CPU; OOMKill is for memory"],"ans":1,"fb":"These are separate mechanisms. You can have OOMKill without OutOfMemoryError (non-heap exceeds limit while heap is fine). You can have OutOfMemoryError without OOMKill (heap full but total memory under limit)."},
    {"level":2,"diff":1,"scenario":0,"q":"A Spring Boot service runs in a container with 1Gi memory limit. The JVM uses heap, Metaspace, thread stacks, direct byte buffers, and native memory. What must be true?","opts":["Only the heap needs to fit within 1Gi","The sum of all JVM memory regions must fit within 1Gi, not just the heap","Metaspace and thread stacks are outside the container limit","Kubernetes automatically adjusts the limit for non-heap memory","The JVM manages the container limit automatically"],"ans":1,"fb":"The container memory limit applies to the entire process. Total = heap + Metaspace + thread stacks (each ~1MB) + direct byte buffers + JIT code cache + native allocations. If this exceeds the limit, the kernel sends SIGKILL."},
    {"level":2,"diff":2,"scenario":0,"q":"You are sizing a new service. It has 200 Tomcat threads, 10 HikariCP connections, 3 Kafka consumers (50MB fetch buffer each). Estimated Metaspace is 120MB. What is the minimum non-heap memory needed?","opts":["About 120MB (just Metaspace)","About 200MB (Metaspace + some buffers)","About 520MB (200 threads x 1MB stacks + 150MB Kafka buffers + 120MB Metaspace + overhead)","About 50MB (non-heap is always small)","Impossible to estimate without a heap dump"],"ans":2,"fb":"Thread stacks: 200 x ~1MB = 200MB. Kafka buffers: 3 x 50MB = 150MB (direct byte buffers). Metaspace: 120MB. Plus JIT code cache (~50MB). Total non-heap ~520MB+."},
    {"level":2,"diff":3,"scenario":0,"q":"A service has -Xmx=600m in a 1Gi container. After adding a new Kafka consumer group (5 threads, 50MB fetch.max.bytes each), the pod starts getting OOM-killed. Heap dashboards look normal. Why?","opts":["The heap is too small for the new consumer's messages","The 5 new Kafka consumers added ~250MB of direct byte buffer memory, pushing total JVM memory past the 1Gi container limit","Kafka is incompatible with the current JVM version","The new consumer group is causing GC pressure","The liveness probe is failing due to Kafka connectivity"],"ans":1,"fb":"Kafka consumer buffers are allocated as direct byte buffers outside the heap. 5 consumers x 50MB = 250MB off-heap. Before: ~900MB total. After: ~1.15Gi > 1Gi limit."},
    {"level":2,"diff":1,"scenario":1,"q":"Why should -Xmx be set to 60-70% of the container memory limit, not 100%?","opts":["The JVM doesn't use all the heap anyway","The remaining 30-40% is needed for non-heap memory: Metaspace, thread stacks, direct byte buffers, JIT code cache, and native memory","Kubernetes reserves 30% for system processes","The GC needs 30% headroom to function","It's just a convention with no technical basis"],"ans":1,"fb":"Metaspace (~80-200MB), thread stacks (each ~1MB), direct byte buffers (NIO, Kafka, Netty), JIT compiled code cache (~50-240MB), and native allocations all live outside the heap but inside the container's memory limit."},
    {"level":2,"diff":2,"scenario":1,"q":"A team sets -Xmx equal to resources.limits.memory (both 2Gi). The service OOM-kills on every deployment but works at steady state. What explains this?","opts":["Deployments use more memory than steady state","During deployment, the JVM starts with heap + Metaspace for class loading + JIT compilation. Since -Xmx=2Gi and limit=2Gi, there is zero room for non-heap","The deployment manifest is incorrect","Kubernetes doubles memory usage during rolling updates","The readiness probe causes extra memory allocation"],"ans":1,"fb":"At startup, the JVM allocates heap (reserves 2Gi), loads classes into Metaspace (100-200MB), creates thread stacks, and JIT-compiles code. 2Gi heap + any non-heap > 2Gi limit = OOMKill before startup completes."},
    {"level":2,"diff":3,"scenario":1,"q":"Two identically configured services (-Xmx=512m, limit=1Gi) but one is OOM-killed weekly while the other never is. What is the most likely difference?","opts":["Different JVM versions","One service has more active threads, Kafka consumers, or larger caches — its non-heap memory footprint is higher","The OOM-killed service has a heap memory leak","They must be on different GKE node types","Cloud SQL is configured differently"],"ans":1,"fb":"Same -Xmx and limits but different non-heap consumption. One service might have 50 threads + 5 Kafka consumers, the other 200 threads + 10 consumers. Same config, very different non-heap footprints."},
    {"level":2,"diff":1,"scenario":2,"q":"Grafana shows JVM heap at 55% utilisation, but container memory usage is at 92%. What is consuming the remaining memory?","opts":["The heap metric is wrong","Non-heap JVM memory: Metaspace, thread stacks, direct byte buffers, JIT code cache, and native allocations","Kubernetes overhead","Other containers in the pod","Disk cache"],"ans":1,"fb":"JVM heap metrics only show heap. Container memory shows everything the process uses. The gap is non-heap: Metaspace, thread stacks, direct byte buffers, JIT-compiled code, and native allocations."},
    {"level":2,"diff":2,"scenario":2,"q":"A service's container memory usage grows slowly over days while heap usage stays stable. What are the most likely non-heap culprits?","opts":["Heap fragmentation","Metaspace growth (dynamic class loading) or direct byte buffer accumulation (connection/buffer leaks)","GC pressure causing fragmentation","Kafka consumer lag","Increasing request payload sizes"],"ans":1,"fb":"Stable heap + growing container memory = something outside the heap. Top candidates: Metaspace (dynamic class generation), direct byte buffers (Kafka/Netty not releasing buffers), or thread count growing."},
    {"level":2,"diff":3,"scenario":2,"q":"After adding a new @Cacheable method using Spring's default ConcurrentMapCacheManager, heap usage grows linearly over weeks. What is the root cause?","opts":["The cache eviction policy is too aggressive","Spring's default ConcurrentMapCacheManager has no size limit or eviction — entries accumulate indefinitely","GC is not running frequently enough","The cache key is too large","The @Cacheable annotation is on the wrong method"],"ans":1,"fb":"Spring's default uses ConcurrentHashMap with no max size, no TTL, no eviction. Every unique key is permanent. Fix: switch to Caffeine with maximumSize and expireAfterWrite."},
    {"level":2,"diff":1,"scenario":3,"q":"After an OOMKill, you run kubectl describe pod. What fields tell you the container exceeded its memory limit?","opts":["The pod's CPU usage section","'Last State: Terminated', 'Reason: OOMKilled', 'Exit Code: 137', and the container's memory limit","The pod's event log only","The node's disk usage","The container's image version"],"ans":1,"fb":"kubectl describe pod shows 'Last State: Terminated, Reason: OOMKilled, Exit Code: 137'. The resources section shows limits.memory. Next step: correlate with heap dashboards."},
    {"level":2,"diff":2,"scenario":3,"q":"A pod shows OOMKilled in kubectl describe, but the JVM's last log was a normal request — no OutOfMemoryError. What does this tell you?","opts":["The logs are incomplete","The JVM heap was fine — OOMKill was caused by non-heap memory pushing total past the container limit","The OOMKill was for a different container","The JVM suppressed the error","The container was killed for CPU"],"ans":1,"fb":"No OutOfMemoryError means heap had room. The kernel killed the process because total memory (heap + non-heap) exceeded the limit. The kernel kills instantly — the JVM has no chance to log."},
    {"level":2,"diff":1,"scenario":4,"q":"What does UseContainerSupport do for a JVM on GKE?","opts":["Enables health probes","Makes the JVM read memory and CPU limits from the container's cgroup instead of the host node","Optimises GC for containers","Enables JFR in containers","Allows swap memory"],"ans":1,"fb":"Without container support, a JVM on a 32GB node sees 32GB and may auto-size heap to 8GB — exceeding a 1Gi limit. UseContainerSupport reads cgroup limits. Default since Java 8u191+."},
    {"level":2,"diff":2,"scenario":4,"q":"What is the difference between resources.requests.memory and resources.limits.memory for a JVM pod?","opts":["They are the same","Requests is the scheduling guarantee; limits is the kill boundary","Requests controls heap; limits controls non-heap","Requests is for startup; limits is for steady state","Limits is advisory; requests is enforced"],"ans":1,"fb":"Requests: scheduler places pods on nodes with enough. Limits: kernel enforces — exceeding causes SIGKILL. For JVM, set requests close to limits (predictable usage)."},
    {"level":2,"diff":3,"scenario":4,"q":"A JVM pod has requests.memory=512Mi and limits.memory=1Gi. It consistently uses 800Mi. What is the risk?","opts":["No risk — within limits","The pod may be scheduled on a node without 800Mi — scheduler only guarantees 512Mi, pod could be evicted under pressure","The pod will be OOM-killed at 512Mi","The JVM will crash at 512Mi","Kubernetes will autoscale"],"ans":1,"fb":"Scheduler places based on requests (512Mi). Under node pressure, Kubernetes may evict Burstable pods (requests != limits). For JVM, set requests = limits (Guaranteed QoS)."},
    {"level":3,"diff":1,"scenario":0,"q":"A Spring Boot service is using more memory than expected. Which components should you check first?","opts":["Only the heap size","HikariCP connection pool, Kafka consumer buffers, Tomcat thread pool, and Spring caches","Only REST endpoint count","The JVM version","CPU allocation"],"ans":1,"fb":"HikariCP holds DB connections (each ~1MB), Kafka consumers allocate fetch buffers (off-heap), Tomcat threads each have ~1MB stacks, Spring caches can grow unboundedly."},
    {"level":3,"diff":2,"scenario":0,"q":"A service has fetch.max.bytes=52428800 (50MB) and concurrency=3. How much off-heap memory do Kafka consumers use?","opts":["50MB total","150MB","300MB — Kafka double-buffers, so 3 x 50MB x 2","Zero — buffers are on heap","Depends on partition count"],"ans":2,"fb":"Each consumer thread uses direct byte buffers with double-buffering: 3 x 50MB x 2 = 300MB entirely outside the heap."},
    {"level":3,"diff":3,"scenario":0,"q":"Three identical pods (same config) use 400MB, 600MB, and 900MB. What is the most likely cause?","opts":["Different JVM versions","Different Kafka partition assignments — more partitions means more buffers and cached data","Random GC timing","Different container limits","Network latency"],"ans":1,"fb":"Kafka partitions are assigned unevenly. A pod with more partitions uses more fetch buffers and caches more state. Same config but divergent runtime state."},
    {"level":3,"diff":1,"scenario":1,"q":"Which Actuator metric tells you current heap usage?","opts":["/actuator/health","jvm.memory.used (with area=heap tag)","hikaricp.connections.active","process.cpu.usage","jvm.threads.live"],"ans":1,"fb":"jvm.memory.used with tag area=heap reports current heap usage. Related: jvm.memory.max shows -Xmx."},
    {"level":3,"diff":2,"scenario":1,"q":"jvm.memory.used{area=heap} is stable but jvm.buffer.memory.used is growing. What does this indicate?","opts":["A heap leak","Direct byte buffers (off-heap) are accumulating — commonly from NIO, Kafka, or Netty","GC not running","Metrics wrong","Metaspace growing"],"ans":1,"fb":"jvm.buffer.memory.used tracks direct byte buffers outside the heap. Growth while heap is stable = off-heap accumulation. Counts toward container limit."},
    {"level":3,"diff":3,"scenario":1,"q":"After a load test, hikaricp.connections.active stays at 10 (max) and never decreases. connections.pending is 45. What does this mean?","opts":["Database healthy","All 10 connections held and not returned (possible leak), 45 threads blocked waiting","Pool too large","HikariCP misconfigured","Load test still running"],"ans":1,"fb":"Active at max with high pending = pool exhausted. If persistent after load stops, it's a connection leak. Check leakDetectionThreshold."},
    {"level":3,"diff":1,"scenario":2,"q":"A log shows OutOfMemoryError: Metaspace. What ran out?","opts":["JVM heap","The area where class definitions and metadata are stored","Container total memory","Thread stack space","Direct byte buffers"],"ans":1,"fb":"Metaspace stores class metadata. This error means too many classes loaded. Common: dynamic class generation (CGLIB, reflection, SpEL)."},
    {"level":3,"diff":2,"scenario":2,"q":"OutOfMemoryError: unable to create native thread. Heap is 40% full. What is the cause?","opts":["Heap too small","OS cannot allocate memory for a new thread stack — too many threads or insufficient remaining memory","GC not collecting threads","Thread pool misconfigured","Kafka creating too many partitions"],"ans":1,"fb":"Each thread needs ~1MB stack. With 1Gi container, 600MB heap, 150MB Metaspace, 200 threads (200MB), only ~50MB remains for new threads."},
    {"level":3,"diff":3,"scenario":2,"q":"OutOfMemoryError: Java heap space during a batch job processing 500K records in single @Transactional. Worked for 100K. What is the cause?","opts":["Heap globally too small","Hibernate's first-level cache holds all 500K entities until transaction completes","Database query too slow","Kafka consuming too much memory","Wrong GC algorithm"],"ans":1,"fb":"Hibernate's session cache retains every entity within a transaction. 500K entities all stay in heap until commit. Fix: flush() and clear() every 1000 records."},
    {"level":3,"diff":1,"scenario":3,"q":"When reviewing a PR, which pattern is a memory risk?","opts":["List<String> as local variable","Adding entries to a ConcurrentHashMap field based on request data with no size limit","Using @Autowired","Creating a new ObjectMapper in a utility method","Using Stream.of() for a small collection"],"ans":1,"fb":"A ConcurrentHashMap field that grows from request data with no limit is a classic leak. Every unique key is permanent. Fix: bounded cache with eviction."},
    {"level":3,"diff":2,"scenario":3,"q":"A PR adds @Cacheable('partnerRates') using Spring's default cache for exchange rates per partner per currency. What memory concern?","opts":["No concern","Default ConcurrentMapCacheManager has no size limit — many combinations will grow indefinitely","Only staleness concern","@Cacheable uses off-heap","Thread safety concern"],"ans":1,"fb":"Default Spring caching has no eviction. 500 partners x 50 currencies = 25K permanent entries. Recommend Caffeine with maximumSize."},
    {"level":3,"diff":3,"scenario":3,"q":"A PR adds @Async pool with corePoolSize=50, maxPoolSize=200. Service runs in 1Gi with -Xmx=600m. What concern?","opts":["No concern","200 threads x ~1MB stack = 200MB. With existing threads, heap, Metaspace, total may exceed 1Gi under load","CPU concern, not memory","@Async pools don't create real threads","Only pool exhaustion concern"],"ans":1,"fb":"Each thread = ~1MB stack outside heap. 600MB + 150MB Metaspace + 100 existing threads + 200 new threads = ~1.05GB > 1Gi."},
    {"level":3,"diff":1,"scenario":4,"q":"Estimate: -Xmx=500m, 150 Tomcat threads, 5 Kafka consumers (30MB each), 100MB Metaspace. Fits in 1Gi?","opts":["Yes — 600MB total","No — 500MB + 150MB stacks + 300MB Kafka + 100MB Metaspace + 50MB overhead = ~1.1GB","Yes — non-heap negligible","Impossible to estimate","Yes — K8s auto-adjusts"],"ans":1,"fb":"Budget: 500 heap + 150 stacks + 300 Kafka buffers + 100 Metaspace + 50 overhead = ~1.1GB > 1Gi."},
    {"level":3,"diff":2,"scenario":4,"q":"Service uses 800MB in 1Gi container. New feature adds 3 @Cacheable methods. How to assess fit?","opts":["Caches negligible","Estimate: unique keys x size per entry x 3 caches, add to 800MB. If over 1Gi, increase limit or bound caches","Just deploy and see","Need heap dump","Increase -Xmx"],"ans":1,"fb":"Cache is heap memory. 10K entries x 500 bytes = 5MB/cache = fine. But 100K x 50KB = 500MB+ = not fine. Always bound caches."},
    {"level":4,"diff":1,"scenario":0,"q":"Which tool takes a heap dump from a running JVM without restarting it?","opts":["jstack","jcmd <pid> GC.heap_dump <file>","jstat -gcutil","async-profiler","kubectl logs"],"ans":1,"fb":"jcmd triggers a heap dump on a live JVM. Briefly pauses all threads. jstack = thread dumps. jstat = GC stats. async-profiler = CPU/allocation sampling."},
    {"level":4,"diff":2,"scenario":0,"q":"In Eclipse MAT, a ConcurrentHashMap shows 'Retained Heap' of 800MB in a 1GB heap. What does this mean?","opts":["Map's own memory","Total memory freed if this map were GC'd — including everything it exclusively references","Max the map can grow to","Allocated but unused","Keys only"],"ans":1,"fb":"Retained heap = memory freed if this object and all exclusively retained objects were GC'd. 800MB retained = massive object graph held by map references."},
    {"level":4,"diff":3,"scenario":0,"q":"Heap dump shows 600MB byte[] retained by LinkedHashMap with access-order, no eviction. Multi-tenant service. Diagnosis?","opts":["Normal serialisation","Unbounded LRU cache accumulating per-tenant entries without eviction","Kafka buffer","HikariCP state","Logging buffer"],"ans":1,"fb":"LinkedHashMap with access-order but no removeEldestEntry = entries accumulate forever. Fix: Caffeine with maximumSize."},
    {"level":4,"diff":1,"scenario":1,"q":"GC log: 'before' and 'after' heap nearly equal. What does this indicate?","opts":["Efficient GC","GC reclaimed almost nothing — most objects survived, suggesting leak or undersized heap","Heap correctly sized","GC didn't run","Log format wrong"],"ans":1,"fb":"Before ~= after means very few objects collected. Repeated = strong leak signal. Healthy GC shows before >> after."},
    {"level":4,"diff":2,"scenario":1,"q":"Frequent minor GCs with high allocation rate, but old-gen stable. Problem?","opts":["Yes — frequent GC always bad","No — short-lived objects collected in young gen. Stable old-gen = throughput pattern, not leak.","Yes — leak","No — only below 1GB/s","Yes — eden too small"],"ans":1,"fb":"High allocation + stable old-gen = healthy high-throughput. Objects created and collected in young gen. Rising old-gen would indicate leak."},
    {"level":4,"diff":3,"scenario":1,"q":"After leak fix, old-gen growth slowed but didn't stop. 50MB/24h. Fix complete?","opts":["Yes — slow growth OK","No — complete fix = stable baseline with sawtooth. Ongoing growth = retained objects still accumulating.","Yes — 50MB/day normal","No — switch GC","Wait a week"],"ans":1,"fb":"50MB/day x 30 = 1.5GB — eventual crisis. Take two heap dumps 4 hours apart, compare in MAT."},
    {"level":4,"diff":1,"scenario":2,"q":"What does JFR offer for memory that Grafana metrics don't?","opts":["Same metrics, different format","Allocation hotspots — which methods create the most objects — code-level detail","Fixes leaks","Oracle JDK only","Replaces heap dumps"],"ans":1,"fb":"Grafana = aggregates. JFR = method-level allocation profiling. Traces GC pressure to specific code. Production-safe (<1% overhead)."},
    {"level":4,"diff":2,"scenario":2,"q":"JFR shows top allocator: byte[] from logback at 300MB/s. What does this mean?","opts":["Logback memory leak","Enormous log output — string formatting allocates byte arrays at massive rate, increasing GC pressure","JFR miscounting","Logback needs upgrade","Kafka bytes"],"ans":1,"fb":"Log formatting creates temporary byte[]/String objects. At DEBUG with high volume = hundreds MB/s garbage. Fix: INFO level, parameterised logging."},
    {"level":4,"diff":3,"scenario":2,"q":"JFR shows TierEvaluationContext promoted to old gen despite being short-lived. Why?","opts":["Too large for young gen","Calculation spans multiple minor GC cycles — objects survive collections and get promoted","Static singletons","JFR misreporting","Old gen undersized"],"ans":1,"fb":"If calculation takes longer than minor GC interval, objects survive and promote. Fix: faster calculations or larger young gen."},
    {"level":4,"diff":1,"scenario":3,"q":"Thread dump: 150 threads TIMED_WAITING in HikariPool.getConnection. What does this indicate?","opts":["Normal","Connection pool exhausted — 150 threads waiting for a connection","Deadlock","Too many threads","Kafka blocked"],"ans":1,"fb":"TIMED_WAITING in getConnection = pool fully checked out, threads queued. Cascades into timeouts. Root cause: leaks, slow queries, or undersized pool."},
    {"level":4,"diff":2,"scenario":3,"q":"Thread dump: deadlock. Thread A holds X waits Y, Thread B holds Y waits X. Both @Transactional. Cause?","opts":["JVM bug","Two transactions acquiring row locks in different orders","Spring proxy","Kafka interference","HikariCP deadlock"],"ans":1,"fb":"Classic lock-ordering deadlock at DB level. Fix: consistent ordering (always lower ID first) or optimistic locking (@Version)."},
    {"level":4,"diff":3,"scenario":3,"q":"Thread dump: 180 of 200 threads RUNNABLE inside HashMap.put. Cause?","opts":["Normal usage","Non-thread-safe HashMap used concurrently — infinite loop in bucket chains","Map too large","GC interfering","HashCode slow"],"ans":1,"fb":"HashMap is not thread-safe. Concurrent modification forms cycles. Threads stuck forever. Fix: ConcurrentHashMap."},
    {"level":4,"diff":1,"scenario":4,"q":"Metaspace grows slowly over weeks after startup. Most likely cause?","opts":["Normal per-request class loading","Dynamic class generation — CGLIB, SpEL compilation, reflection creating new classes at runtime","Classpath loading over time","Metaspace fragmentation","GC not running on Metaspace"],"ans":1,"fb":"After startup, classpath is loaded and Metaspace should plateau. Continued growth = runtime class creation."},
    {"level":4,"diff":2,"scenario":4,"q":"Metaspace grows 5MB/day. Eventually will OOM-kill container. What is the two-part fix?","opts":["Increase container limit","Set MaxMetaspaceSize as safety net AND investigate what generates classes at runtime","Reduce -Xmx","Switch to ZGC","Restart daily"],"ans":1,"fb":"Part 1: MaxMetaspaceSize converts silent OOMKill to visible error. Part 2: Use JFR class loading events to find source."},
    {"level":5,"diff":1,"scenario":0,"q":"Service needs P99 < 30ms. G1GC has 100ms pauses. Evaluating ZGC. Key trade-off?","opts":["ZGC always slower","ZGC eliminates STW pauses (sub-ms) but uses more CPU and ~2x RSS. P99 improves, cost increases.","ZGC only for >16GB heaps","ZGC experimental","ZGC needs different JVM"],"ans":1,"fb":"ZGC does concurrent marking/compaction. Trade-offs: ~15-20% more CPU, ~2x RSS from coloured pointers. Worth it for P99 SLOs with enough CPU."},
    {"level":5,"diff":2,"scenario":0,"q":"ZGC drops P99 from 100ms to 3ms but pod OOM-killed — RSS is 2x G1's. Fix?","opts":["Switch back to G1","Increase container limit for ZGC's higher RSS. P99 improvement justifies the cost.","Halve -Xmx","Switch to Shenandoah","Set SoftMaxHeapSize to half"],"ans":1,"fb":"ZGC maps heap multiple times, increasing RSS. Increase container limit. Reducing -Xmx defeats purpose."},
    {"level":5,"diff":1,"scenario":3,"q":"A team has no GC logging, no HeapDumpOnOutOfMemoryError, -Xmx at 95% of limit. Risk?","opts":["No risk","No diagnostics when issues occur, and 95% leaves no room for non-heap — guaranteed OOMKill under load","Slightly higher usage","Only platform team risk","GC logging too expensive"],"ans":1,"fb":"No GC logs = blind. No heap dump = no evidence. 95% heap = guaranteed OOMKill. Modern GC logging has negligible overhead."},
    {"level":5,"diff":2,"scenario":3,"q":"What should a mandatory JVM baseline include?","opts":["Only -Xmx","UseContainerSupport, HeapDumpOnOutOfMemoryError, GC logging, MaxMetaspaceSize, -Xmx at 60-70%","Mandate ZGC","Only dashboards","Weekly heap dumps"],"ans":1,"fb":"Baseline: container awareness, post-mortem capability, observability, non-heap safety net, correct heap sizing. Via shared Helm chart."},
    {"level":5,"diff":1,"scenario":4,"q":"Evaluating Java 17→21. Memory-related changes to assess?","opts":["No changes","ZGC generational mode (default in 21), virtual thread memory model, GC ergonomics changes","Only virtual thread stacks","Only SecurityManager removal","Only GC performance"],"ans":1,"fb":"Java 21: generational ZGC, virtual threads (heap-allocated stacks), GC ergonomics changes. Test compatibility."},
    {"level":6,"diff":1,"scenario":0,"q":"Designing fleet-wide memory reliability strategy. What should it include?","opts":["Just -Xmx values","Standard config, HeapDumpOnOutOfMemoryError, GC anomaly alerting, automated JFR, per-service dashboards","Only dashboards","Only runbooks","Only auto-restarts"],"ans":1,"fb":"Prevention (standard config), detection (anomaly alerting), diagnosis (auto heap dump, JFR), visibility (per-service dashboards, not averages)."},
    {"level":6,"diff":2,"scenario":0,"q":"Fleet dashboard shows average heap at 45% across 20 services. Stakeholder says 'fine.' Why misleading?","opts":["Averages always accurate","Average hides outliers — one service at 95% invisible when averaged with 19 at 40%. Show per-service MAX or P95.","45% is healthy","Dashboard wrong","Averages fine with alerts"],"ans":1,"fb":"19 at 40% + 1 at 95% = average 43%. Leaking service invisible. Fix: per-service panels, MAX indicator."},
    {"level":6,"diff":1,"scenario":1,"q":"How does GC translate into SLA latency commitments?","opts":["No impact","GC pauses directly add to P99 — 100ms pause = 100ms+ added to in-flight requests. Memory config must match SLA targets.","Only heap matters","Exclude GC from SLAs","Too small to matter"],"ans":1,"fb":"GC pauses freeze all threads. If SLA = P99 < 50ms but 100ms pauses every 30s, ~3% of requests violate. GC config = SLA engineering."},
    {"level":6,"diff":1,"scenario":2,"q":"Evaluating Java 21 virtual threads. Key memory implication?","opts":["Same memory as platform threads","Much smaller stacks (heap-allocated), millions of tasks possible — but ThreadLocal-heavy libraries may leak memory per virtual thread","Eliminate connection pools","Reduce heap usage","Only for batch"],"ans":1,"fb":"Virtual threads: tiny heap continuations vs ~1MB OS stacks. But ThreadLocal per virtual thread can explode heap. HikariCP, Spring Security use ThreadLocal heavily. Audit required."}
    ]
  },

  design: {
    id: "design", label: "Solution Design", icon: "design",
    desc: "Architecture and system design for distributed BaaS services. API design, data modelling, event-driven patterns, and cross-team decisions.",
    levels: [
      { num:1, name:"Foundations", desc:"Understanding existing system designs and contributing to discussions with confidence.", scenarios:["Reading API contracts (OpenAPI specs) and integrating against them independently","Following design discussions and understanding trade-offs being made","Identifying whether a change requires a schema change, new endpoint, or event","Reading and understanding Architecture Decision Records (ADRs)","Articulating why a bug is a design problem, not just a code problem"] },
      { num:2, name:"Practitioner", desc:"Designing features that span service boundaries and documenting those decisions clearly.", scenarios:["Designing multi-service interactions (API contracts, sync vs async, Kafka vs HTTP)","Writing ADRs that explain context, decision, alternatives, and consequences","Designing REST endpoints with correct HTTP verbs, status codes, and pagination","Identifying aggregate roots, consistency boundaries, and data replication trade-offs","Giving concrete design feedback in PRs and design docs"] },
      { num:3, name:"Advanced", desc:"Designing systems that handle complex domains, failure modes, and regulatory constraints.", scenarios:["Designing audit and event sourcing strategies for regulated domains (PCI-DSS, SOX)","Designing sagas (orchestration vs choreography) with compensation and idempotency","Designing API versioning strategies and managing breaking changes","Designing multi-tenancy patterns (data isolation, tenant context propagation)","Designing Kafka retry and dead-letter strategies for external integrations"] },
      { num:4, name:"Specialist", desc:"Owning cross-service designs end-to-end and raising the quality bar across your domain.", scenarios:["Leading cross-team design sessions and maintaining design coherence","Redesigning system boundaries (CQRS, read models, caching) for scale","Identifying reuse opportunities and proposing consolidation across teams","Identifying systemic risks in designs (retry storms, thundering herds, ordering assumptions)","Tracing a financial transaction end-to-end across all services for compliance"] },
      { num:5, name:"Expert", desc:"Setting architectural standards for the organisation and leading the highest-complexity design work.", scenarios:["Identifying diverging architectural decisions across teams and driving standards","Scoping major architectural shifts and presenting phased approaches to leadership","Facilitating stuck design decisions by surfacing real trade-offs and hidden assumptions","Leading technology evaluations (new messaging systems, service meshes, API gateways)","Defining the solution design curriculum for the training programme"] },
      { num:6, name:"Authority", desc:"Architectural governance, technology strategy, and building the organisation's design capability.", scenarios:["Leading architecture for new strategic directions (new markets, new BaaS products)","Redesigning the architectural decision-making process (when ADRs are required, who is involved)","Owning audit/regulatory responses about system design (data flows, failure handling)","Producing structured technical debt assessments with sequenced improvement roadmaps","Building shared architectural vocabulary (standards, design guild, reference architectures)"] }
    ],
    questions: [
      {"level":1,"diff":1,"scenario":0,"q":"An OpenAPI spec defines a parameter as `required: true`. What happens if your client omits it?","opts": ["The server returns 404 Not Found", "The server uses a default value", "The server ignores the missing field", "The server must return 400 Bad Request", "The behaviour is undefined by the spec"], "ans": 3,"fb":"`required: true` means the server contract guarantees rejection with 400. Default values apply only to optional parameters with a defined default. 404 signals a missing resource, not a bad request."},
      {"level":1,"diff":1,"scenario":1,"q":"In a design discussion, the team debates caching vs. always querying the database. What is the core trade-off?","opts": ["Cost vs. security", "Reliability vs. simplicity", "Latency vs. throughput", "Consistency vs. performance", "Scalability vs. availability"], "ans": 3,"fb":"Caching improves performance but risks serving stale data, so the fundamental tension is consistency vs. performance. The other pairs are real concerns but not what this specific decision centres on."},
      {"level":1,"diff":1,"scenario":2,"q":"A new business rule says every payment must record the approving user. Which change is needed?","opts": ["A new Kafka event", "A change to existing business logic only", "A new service", "A new REST endpoint", "Schema change to add an approved_by column"], "ans": 4,"fb":"Storing an extra attribute requires a schema change. No new endpoint or event is needed unless the approval itself is a new operation exposed to callers."},
      {"level":1,"diff":1,"scenario":3,"q":"What is the primary purpose of the 'Context' section in an ADR?","opts": ["Document who made the decision", "Record the implementation steps", "Define the rollback plan", "List all alternatives considered", "Explain why the decision was needed"], "ans": 4,"fb":"Context sets the scene: the forces, constraints, and problem that drove the decision. Alternatives and consequences are separate sections. Author attribution is metadata, not context."},
      {"level":1,"diff":1,"scenario":4,"q":"Users see duplicate charges after clicking 'Pay' twice quickly. This is best described as what kind of problem?","opts": ["A frontend bug", "A network bug", "A design problem", "A race condition in the JVM", "A database bug"], "ans": 2,"fb":"Non-idempotent payment endpoints are a design flaw; accepting the same request twice and creating two charges means the contract is wrong. Frontend protection and DB constraints are mitigations, not root-cause fixes."},
      {"level":1,"diff":2,"scenario":0,"q":"An OpenAPI spec marks a response field as `nullable: true`. How should your client handle it?","opts": ["Treat null as a valid value and handle it explicitly", "Throw an exception on null", "Ignore the field entirely", "Assume it will never actually be null in practice", "Treat null as an error"], "ans": 0,"fb":"`nullable: true` is a contract promise that the field will sometimes be null. Clients must handle it; assuming it never arrives is a common source of NullPointerExceptions."},
      {"level":1,"diff":2,"scenario":1,"q":"The team chooses HTTP for a service call instead of Kafka. What trade-off have they accepted?","opts": ["Event replay capability in exchange for latency", "Better reliability in exchange for ordering guarantees", "Loose coupling in exchange for observability", "Higher throughput in exchange for complexity", "Tighter coupling and synchronous latency in exchange for simpler flow"], "ans": 4,"fb":"HTTP is synchronous and couples caller to callee availability, but it is simpler to reason about. Kafka provides decoupling, replay, and durability but adds operational complexity."},
      {"level":1,"diff":2,"scenario":2,"q":"A feature adds real-time notifications when a payment completes. Which change best matches this requirement?","opts": ["A new Kafka event published on payment completion", "A change to the existing payment endpoint response", "A new microservice only", "A schema change to add a notifications table", "A new REST endpoint polled by clients"], "ans": 0,"fb":"Real-time notifications driven by state changes are a classic event use case. REST polling works but is inefficient. Adding a table stores notifications but doesn't deliver them. A new endpoint alone does not push."},
      {"level":1,"diff":2,"scenario":3,"q":"An ADR has status 'Superseded'. What does this mean for the team?","opts": ["The decision only applies to a specific team", "The decision was rejected and never implemented", "The document was archived for compliance", "The decision is still active but under review", "A newer decision replaced it"], "ans": 4,"fb":"'Superseded' means a later ADR has replaced this one. The old ADR remains for history. 'Rejected' and 'Proposed' are distinct statuses. Superseded does not mean deprecated or team-specific."},
      {"level":1,"diff":2,"scenario":4,"q":"A service throws NullPointerException when a third-party API returns an unexpected null field. What design problem does this reveal?","opts": ["The API is poorly designed", "The serialisation library has a bug", "The service lacks proper error handling code", "The service assumes a contract stricter than the", "The integration test coverage is insufficient"], "ans": 3,"fb":"The root design problem is an unchecked assumption about the external contract. Error handling, tests, and API quality are related, but the design flaw is trusting an unvalidated assumption."},
      {"level":1,"diff":3,"scenario":0,"q":"An OpenAPI spec uses `oneOf` for a response type. Your generated client ignores the discriminator. What risk do you accept?","opts": ["Missing authentication headers", "Broken pagination on list responses", "Incorrect deserialisation when the response", "Increased latency from schema validation", "Invalid request bodies being sent"], "ans": 2,"fb":"Without honouring the discriminator, the client may deserialise the wrong variant silently. The risk is correctness, not performance or auth."},
      {"level":1,"diff":3,"scenario":1,"q":"The team picks eventual consistency for cross-service data sync. A colleague objects that users will see stale data. What is the right response?","opts": ["Escalate to the architect to decide", "Add a cache TTL to control the staleness window", "Switch to synchronous calls to avoid the issue entirely", "Agree that staleness is a real cost and confirm the team has", "Dismiss the concern"], "ans": 3,"fb":"Acknowledging the real trade-off is correct engineering judgment. Dismissing or hiding staleness is dishonest. Switching to sync solves staleness but introduces coupling. A cache TTL manages it but does not eliminate it."},
      {"level":1,"diff":3,"scenario":2,"q":"Adding a new optional field to an existing REST response: does this require a schema migration, a new endpoint, or neither?","opts": ["A new API version", "A schema migration", "A new endpoint", "A Kafka event", "Neither — adding an"], "ans": 4,"fb":"Adding an optional field to a response is backward-compatible; existing clients ignore unknown fields. A DB migration may be needed separately, but the API contract change itself requires neither a new endpoint nor a version bump."},
      {"level":1,"diff":3,"scenario":3,"q":"An ADR documents a decision to use Kafka for all async communication but lists no alternatives. What is the main weakness?","opts": ["The ADR needs a cost estimate", "The ADR is invalid without a rollback section", "The decision cannot be superseded without alternatives", "Without alternatives, readers cannot understand why other", "The ADR should be in a different format"], "ans": 3,"fb":"ADRs derive their value from capturing the reasoning, including why alternatives were not chosen. Missing alternatives makes the decision opaque for future readers who must re-evaluate it."},
      {"level":1,"diff":3,"scenario":4,"q":"Payments occasionally fail when two requests arrive simultaneously for the same account. The bug is fixed with a database lock. Is this the right long-term approach?","opts": ["Yes — database locks are the correct tool for concurrency", "Yes — as long as the lock timeout is short enough", "No — the design should enforce idempotency or use optimistic", "No — the fix should be a retry in the client", "No — the fix should be a distributed lock in Redis"], "ans": 2,"fb":"Database locks solve the symptom but not the design problem. Idempotency keys or optimistic locking at the domain level are the correct design-level fixes and avoid lock contention at scale."},
      {"level":2,"diff":1,"scenario":0,"q":"A feature requires fetching user data from another service on every request. What is the main risk of synchronous HTTP here?","opts": ["Weaker security boundaries", "Availability coupling", "Increased schema migration complexity", "Reduced observability", "Higher message ordering guarantees"], "ans": 1,"fb":"Synchronous HTTP chains availability: a slow or failing upstream directly impacts the caller. Kafka or caching can break that dependency. The other options are not risks introduced by sync HTTP specifically."},
      {"level":2,"diff":1,"scenario":1,"q":"What does the 'Consequences' section of an ADR capture?","opts": ["The monitoring setup required", "The positive and negative outcomes of", "The list of engineers who reviewed it", "The estimated cost of implementation", "The rollout timeline"], "ans": 1,"fb":"Consequences describe what becomes easier or harder as a result of the decision — the honest trade-offs. Reviewer lists are metadata; timelines and costs are project management concerns."},
      {"level":2,"diff":1,"scenario":2,"q":"A client needs to retrieve 10,000 records. Which REST design is correct?","opts": ["GET /records/all with a header controlling page size", "GET /records?page=1&size=100 returning a paginated response", "GET /records returning all 10,000 in one response", "DELETE /records/page/1 to consume records in batches", "POST /records/query with a body specifying the count"], "ans": 1,"fb":"Pagination via query parameters is the standard REST pattern for large collections. Returning everything in one call creates memory and latency issues. POST for reads is non-idiomatic and breaks caching."},
      {"level":2,"diff":1,"scenario":3,"q":"In a domain model, multiple entities share an invariant that must always hold together. What DDD concept governs this?","opts": ["Service — it coordinates cross-entity logic", "Domain event", "Value object", "Repository", "Aggregate root"], "ans": 4,"fb":"The aggregate root is the single entry point for changes within a consistency boundary, ensuring invariants hold. Repositories persist aggregates; they do not enforce business rules."},
      {"level":2,"diff":1,"scenario":4,"q":"A PR introduces a public method with a boolean flag parameter `processPayment(boolean isRetry)`. What design feedback is most appropriate?","opts": ["Boolean flags in method signatures suggest a missing abstraction", "Boolean parameters are fine if the method is small", "Add a comment explaining what each flag value means", "The method needs more parameters to be flexible", "The flag should be an integer to allow more states"], "ans": 0,"fb":"Boolean flag parameters are a code smell indicating the method does two things. Two explicit methods (`processPayment()` and `retryPayment()`) are clearer and easier to test and extend."},
      {"level":2,"diff":2,"scenario":0,"q":"Service A publishes to Kafka; Service B consumes and updates its own database. Service C needs the same data synchronously. What is the best design?","opts": ["Service C queries Service A directly to bypass the topic", "Service C uses a shared database with Service B", "Service C also consumes the Kafka topic directly and maintains its own copy", "Service C queries Service B's API", "Service A publishes twice, once for B and once for C"], "ans": 3,"fb":"Service B owns the data after consuming it; Service C should use B's API. Sharing databases creates coupling. Duplicate topics and direct queries to producers both break ownership boundaries."},
      {"level":2,"diff":2,"scenario":1,"q":"Your team chose to use Kafka for audit events instead of writing directly to the audit database. Write the ADR decision statement.","opts": ["We will publish audit events to a Kafka topic consumed by the audit", "The audit service will poll for changes every minute", "We will write audit events asynchronously to reduce latency", "Audit events will be stored in a separate schema for compliance", "Kafka will be used for all inter-service communication"], "ans": 0,"fb":"A good ADR decision statement names the mechanism, the direction, and the rationale concisely. The other options are too vague, too broad, or describe implementation details rather than the decision."},
      {"level":2,"diff":2,"scenario":2,"q":"You need an endpoint that creates a resource and must be safely retried. Which HTTP verb and status code are correct?","opts": ["GET with 200", "POST with 201", "DELETE with 200", "PUT with 200 or 201", "PATCH with 204"], "ans": 3,"fb":"PUT is idempotent: repeating the same PUT produces the same result, making retries safe. POST is not idempotent by definition. PATCH idempotency depends on implementation. GET does not create resources."},
      {"level":2,"diff":2,"scenario":3,"q":"Two services need the same customer data. Service A owns it; Service B also stores a copy. What problem does this introduce?","opts": ["Reduced latency in all scenarios", "Data consistency risk", "Higher query performance", "Stronger data isolation between tenants", "Simplified transactions"], "ans": 1,"fb":"Replicating data creates a consistency problem: if the sync mechanism fails or is delayed, the copies diverge. Performance gains are real but secondary to the consistency risk that must be managed explicitly."},
      {"level":2,"diff":2,"scenario":4,"q":"A PR adds a `catch (Exception e) { log.error(e); }` block that swallows all errors silently. What design feedback do you give?","opts": ["Wrap it in a retry instead", "This is acceptable if the operation is non-critical", "Swallowing exceptions hides failures", "Add more logging inside the catch block", "Replace Exception with Throwable for completeness"], "ans": 2,"fb":"Swallowing exceptions silently makes failures invisible and breaks the fail-fast principle. Specific exception handling or re-throwing is required so callers and monitoring can react to errors."},
      {"level":2,"diff":3,"scenario":0,"q":"Service A calls Service B synchronously for every payment. B has a 99.5% uptime SLA. What is A's effective uptime ceiling?","opts": ["99.9% — A adds its own availability on top of B's", "99.0% — availability degrades multiplicatively with each dependency", "100% if A has a fallback", "Unaffected", "Also 99.5%"], "ans": 4,"fb":"A synchronous hard dependency means A cannot succeed when B is unavailable, so A's ceiling equals B's SLA at best. Graceful degradation can help but does not eliminate the coupling for hard dependencies."},
      {"level":2,"diff":3,"scenario":1,"q":"An ADR was written 18 months ago choosing REST over gRPC. A new team member wants to switch to gRPC. What should happen first?","opts": ["Reject the proposal since the ADR is already decided", "Escalate to the principal engineer", "Review the original ADR to understand the context and whether", "Immediately write a new ADR superseding the old one", "Prototype gRPC and present benchmarks"], "ans": 2,"fb":"The first step is understanding the original decision's context. The constraints may have changed, making a new ADR reasonable — or they may still apply. Jumping to implementation or escalation skips the reasoning step."},
      {"level":2,"diff":3,"scenario":2,"q":"You need to remove a field from an existing response without a major version bump. What must be true for this to be safe?","opts": ["You announce the change in the team Slack channel", "No active client uses the field", "The field is optional in the spec", "The field is null in all current responses", "You add a deprecation header to the response"], "ans": 1,"fb":"Removing a field is a breaking change unless you can prove no client reads it. Optional fields, deprecation headers, and announcements are good practices but do not make removal safe on their own."},
      {"level":2,"diff":3,"scenario":3,"q":"Two aggregates in different services share an ID and are updated together in the same transaction. What is the design problem?","opts": ["Aggregate boundaries are wrong", "This is acceptable if both services use the same database", "One aggregate should extend the other via inheritance", "The aggregates need a shared database schema", "The transaction should use a distributed lock"], "ans": 0,"fb":"Aggregates are consistency boundaries; cross-aggregate or cross-service transactions indicate the boundaries are drawn incorrectly. Sagas or eventual consistency should replace the shared transaction."},
      {"level":2,"diff":3,"scenario":4,"q":"A reviewer comments that a method is 200 lines long and does three distinct things. What is the best design feedback to add?","opts": ["Identify the three responsibilities and suggest extracting each", "Request unit tests to cover all branches", "Ask the author to add comments explaining each section", "Suggest the method is acceptable if it is well-named", "Ask the author to split the file into two classes"], "ans": 0,"fb":"Long methods with multiple responsibilities violate single responsibility. Extracting named methods makes intent explicit. Comments describe code but do not improve structure; tests verify but do not fix the design."},
      {"level":3,"diff":1,"scenario":0,"q":"Under PCI-DSS, a card transaction is modified. What must the audit log capture?","opts": ["A hash of the record before and after", "The user ID and a change summary", "Who changed what, the previous value, the", "The new value and the timestamp only", "A log message with the transaction ID"], "ans": 2,"fb":"PCI-DSS requires full before/after audit trails with actor and timestamp. A hash or summary is insufficient for regulatory audit review. Timestamps alone do not satisfy the 'who' and 'what' requirements."},
      {"level":3,"diff":1,"scenario":1,"q":"In a choreography-based saga, Service A publishes an event and Service B reacts. What is the main operational risk compared to orchestration?","opts": ["Compensation is impossible in choreography", "Orchestration is always slower", "Services are more tightly coupled in choreography", "Choreography requires a shared database", "It is harder to trace the overall flow"], "ans": 4,"fb":"Choreography distributes control, making end-to-end flow harder to observe and debug. Orchestration puts the flow in one place. Compensation is possible in both; coupling is actually lower in choreography."},
      {"level":3,"diff":1,"scenario":2,"q":"You rename a JSON field in a REST response. Existing clients still use the old name. What kind of change is this?","opts": ["A deprecation that requires one release cycle", "A schema migration only", "A non-breaking change if the new name is optional", "A breaking change", "A backward-compatible change if the old name is kept as an alias"], "ans": 3,"fb":"Renaming removes the old field from the response, breaking any client that reads it by the old name. Keeping both names (alias) would be backward-compatible, but renaming alone is breaking."},
      {"level":3,"diff":1,"scenario":3,"q":"In a multi-tenant SaaS platform, what is the safest isolation pattern for tenant data in a shared database?","opts": ["Separate databases per tenant", "Row-level security enforced in the database with", "Application-level filtering in every query", "A single shared table with no isolation", "Separate schemas per tenant"], "ans": 1,"fb":"Row-level security enforced in the database catches missing filters even if application code has bugs. Application-only filtering is risky because a single missing WHERE clause leaks cross-tenant data. Separate schemas/databases scale poorly."},
      {"level":3,"diff":1,"scenario":4,"q":"A Kafka consumer fails processing a message and keeps retrying. What is the purpose of a dead-letter topic (DLT)?","opts": ["To compress failed messages for storage efficiency", "To store all messages for replay", "To capture messages that cannot be processed after all retries", "To alert engineers when a message fails once", "To route messages to a secondary consumer automatically"], "ans": 2,"fb":"A DLT breaks the retry loop for poison-pill messages, preserving the failed message for inspection without blocking the main consumer partition. It is not a replay mechanism or a general archive."},
      {"level":3,"diff":2,"scenario":0,"q":"You need to store the full history of account balance changes for SOX compliance. Which pattern is most appropriate?","opts": ["Versioned rows with a valid_from / valid_to timestamp", "A separate audit table with before/after snapshots", "A nightly backup of the accounts table", "Event sourcing", "A soft-delete pattern on the accounts table"], "ans": 3,"fb":"Event sourcing captures the full history as first-class data, enabling point-in-time reconstruction required for SOX. Audit tables and versioned rows capture snapshots but may miss intermediate states."},
      {"level":3,"diff":2,"scenario":1,"q":"A saga's compensation step must reverse a payment that may have already been compensated. What property must the compensation implement?","opts": ["Consistency", "Durability", "Isolation — no other saga may run during compensation", "Atomicity — compensation must complete in a single transaction", "Idempotency"], "ans": 4,"fb":"Compensation steps can be triggered more than once in failure scenarios. Idempotency ensures repeated calls are safe. The other ACID properties apply to individual database transactions, not to distributed saga steps."},
      {"level":3,"diff":2,"scenario":2,"q":"You need to introduce a breaking API change without disrupting existing clients. What strategy allows both versions to coexist?","opts": ["Add new fields to v1 and remove old fields in the next release", "URI versioning: /v1/payments and /v2/payments run in parallel until clients migrate", "Require all clients to upgrade simultaneously in a coordinated release", "Use a feature flag to switch clients to v2 one at a time", "Deploy v2 and notify clients to update within one sprint"], "ans": 1,"fb":"URI versioning lets v1 and v2 coexist so clients migrate at their own pace. Feature flags can route individual clients but are not an API versioning strategy. Coordinated big-bang upgrades are high-risk."},
      {"level":3,"diff":2,"scenario":3,"q":"A service reads the tenant ID from a JWT and passes it as a method parameter through 10 layers. What design problem does this indicate?","opts": ["The tenant ID should be stored in the database only", "The JWT should be passed through instead of the tenant ID", "The service has too many layers", "The JWT should be validated at every layer", "Parameter drilling"], "ans": 4,"fb":"Threading a cross-cutting concern through every method signature is parameter drilling. Request-scoped context (ThreadLocal in Spring, reactive context in WebFlux) carries it implicitly without polluting method signatures."},
      {"level":3,"diff":2,"scenario":4,"q":"A Kafka consumer calls an external payment provider. The provider is flaky. What retry strategy avoids overloading the provider during an outage?","opts": ["Exponential backoff with jitter, sending failed messages to a DLT", "Publish a compensation event and stop retrying", "Increase the consumer thread count to process retries faster", "Retry every 500ms indefinitely until the provider recovers", "Retry immediately up to 10 times, then discard"], "ans": 0,"fb":"Exponential backoff with jitter spaces retries to avoid thundering herds. A DLT preserves messages after max retries. Immediate retries and fixed-interval retries flood a struggling provider. Discarding loses messages."},
      {"level":3,"diff":3,"scenario":0,"q":"Event sourcing stores all account events. A regulator asks for the account balance as it stood on a specific date 3 years ago. How do you satisfy this?","opts": ["Query the audit log for the last write before that date", "Query the accounts table for the row with that effective date", "Ask the client to provide a screenshot", "Check the nightly backup for that date", "Replay events up to that timestamp to reconstruct the balance at that"], "ans": 4,"fb":"Event sourcing's primary value is exactly this: replaying the event log to any past point reconstructs state deterministically. An audit log captures changes but may not include enough data to derive the exact balance."},
      {"level":3,"diff":3,"scenario":1,"q":"An orchestrated saga fails at step 3 of 5. The orchestrator triggers compensation in reverse order but step 4 never ran. What must the orchestrator track?","opts": ["The compensation timeout for each step", "Which steps completed successfully so it only compensates", "The original request payload for re-submission", "Whether the saga was initiated by a human or an event", "The total number of steps in the saga"], "ans": 1,"fb":"The orchestrator must compensate only steps that actually ran. Compensating a step that never executed can cause incorrect side effects. Tracking completed steps is the minimal state required for correct rollback."},
      {"level":3,"diff":3,"scenario":2,"q":"A field is deprecated in v1 of your API. Clients still read it. You want to remove it in v2. What must you validate before releasing v2?","opts": ["That v2 has been deployed to staging successfully", "That the field removal is documented in the ADR", "That the field has been null in responses for 30 days", "That the deprecation was announced in the changelog", "That no active client is reading the deprecated field"], "ans": 4,"fb":"Releasing v2 with a removed field is safe only when you have evidence no client reads it. Null values, changelogs, and staging deployments do not prove absence of usage in production clients."},
      {"level":3,"diff":3,"scenario":3,"q":"A bug leaks data from Tenant A to Tenant B due to a missing WHERE clause. Application-level filtering was the only guard. What architectural change prevents recurrence?","opts": ["Adding integration tests that check tenant isolation", "Row-level security in the database that enforces tenant_id", "A middleware layer that appends tenant_id to all queries", "A code review checklist requiring tenant_id in every query", "A separate database per tenant"], "ans": 1,"fb":"Database-enforced row-level security is the only control that cannot be bypassed by a missing WHERE clause in application code. Tests and checklists reduce risk but do not eliminate it. Separate databases scale poorly."},
      {"level":3,"diff":3,"scenario":4,"q":"A third-party webhook delivers events out of order. Your consumer processes a 'cancelled' event before the 'created' event. What design must handle this?","opts": ["Idempotent, order-tolerant event handling", "Add a sequence number check and discard early arrivals", "Reject out-of-order events and ask the provider to resend in order", "Increase Kafka partition count to improve ordering", "Process all events in insertion order using a database queue"], "ans": 0,"fb":"External webhooks cannot guarantee order. The consumer must be designed to handle out-of-order delivery, either by buffering, by ignoring inapplicable events, or by making processing idempotent to any order. Rejecting or relying on Kafka ordering does not solve the upstream problem."},
      {"level":4,"diff":1,"scenario":0,"q":"Two teams propose conflicting API designs for the same resource. You are leading the design session. What is your first step?","opts": ["Ask each team to prototype their approach and compare", "Surface the different requirements driving each proposal", "Pick the simpler design and move on", "Vote on which design the group prefers", "Escalate to the principal engineer to decide"], "ans": 1,"fb":"Conflicting designs often reflect different requirements or constraints. Surfacing those differences first prevents the session from becoming a debate about syntax while the actual disagreement remains hidden."},
      {"level":4,"diff":1,"scenario":1,"q":"A reporting service runs slow queries on the same database as the transactional service, causing latency spikes. What pattern resolves this?","opts": ["CQRS — separate the read model onto a read replica or", "Schedule reports to run during off-peak hours", "Add more indexes to the shared database", "Cache all report queries in Redis", "Increase the database connection pool size"], "ans": 0,"fb":"CQRS separates writes (transactional) from reads (reporting), directing heavy read queries to a store that does not contend with OLTP traffic. Indexes and caches help but do not eliminate the resource contention."},
      {"level":4,"diff":1,"scenario":2,"q":"Three teams each maintain their own email-sending library with slightly different retry logic. What should you propose?","opts": ["Ask each team to document their approach in an ADR", "Leave them separate to avoid a single point of failure", "Standardise the retry configuration via environment variables", "Migrate all three to the same third-party library", "Consolidate into a shared internal library or service owned by one team"], "ans": 4,"fb":"Duplicate logic across teams creates inconsistency and maintenance burden. A shared library or service consolidates the implementation and ensures consistent behaviour. Documentation does not remove the duplication."},
      {"level":4,"diff":1,"scenario":3,"q":"Service A retries failed calls to Service B with no backoff. Service B is briefly overloaded. What systemic risk does this create?","opts": ["A cascading connection pool exhaustion in Service A", "A retry storm", "A split-brain scenario in the database", "A thundering herd from cold starts", "A deadlock between the two services"], "ans": 1,"fb":"Immediate, unthrottled retries compound the load on a struggling upstream, pushing it further into failure. Exponential backoff with jitter breaks this feedback loop. The other options describe different failure modes."},
      {"level":4,"diff":1,"scenario":4,"q":"A PCI-DSS audit asks you to trace a specific card payment end-to-end. What must be true about your observability setup?","opts": ["A correlation ID must be propagated across all services so the full", "Each service must log the full request payload", "The audit team must have direct database access", "A distributed tracing tool must be deployed across all services", "All services must write to a centralised logging database"], "ans": 0,"fb":"A consistent correlation ID propagated across service boundaries is the minimum requirement for end-to-end tracing. Distributed tracing tools help but are only useful if the ID is actually propagated. Full payload logging raises data classification risks."},
      {"level":4,"diff":2,"scenario":0,"q":"During a cross-team design review, two services propose writing to each other's databases for convenience. What is the design risk?","opts": ["It breaks service ownership", "It violates PCI-DSS data residency requirements", "It makes deployments harder to coordinate", "It creates a circular dependency in the CI pipeline", "It increases write throughput unnecessarily"], "ans": 0,"fb":"Services writing to each other's databases tightly couple their data models and remove the owning service's ability to evolve its schema independently. This is a foundational ownership boundary violation."},
      {"level":4,"diff":2,"scenario":1,"q":"A service builds a materialised view of orders for fast dashboard queries, updated via Kafka events. The view is 15 minutes stale during peak load. What is the right response?","opts": ["Add a cache in front of the materialised view", "Alert on the staleness and page the on-call engineer", "Switch dashboards back to direct database queries", "Increase the database connection pool for the dashboard service", "Evaluate whether 15-minute staleness is acceptable for dashboard use"], "ans": 4,"fb":"The design intent of a read model is to accept some staleness for performance. The correct response is a trade-off evaluation: is 15 minutes acceptable? If not, improve the pipeline — not abandon the pattern."},
      {"level":4,"diff":2,"scenario":2,"q":"Four teams use four different HTTP client libraries for outbound calls, each with different timeout configurations. What is the reuse proposal?","opts": ["A meeting to align on timeout values team by team", "A shared Spring Boot starter that configures a standard HTTP client with agreed", "A code review guideline requiring all new services to use the same library", "A shared document listing the recommended timeout values", "A Confluence page documenting each team's current configuration"], "ans": 1,"fb":"A shared starter enforces the standard in code, not documentation. Docs and guidelines require each team to apply them correctly. A meeting aligns intent but not implementation. Starters are the standard pattern for cross-cutting Spring Boot configuration."},
      {"level":4,"diff":2,"scenario":3,"q":"All services call a shared configuration service on startup. A deploy causes 50 services to restart simultaneously. What risk does this create?","opts": ["A thundering herd", "A deadlock in the configuration service's database", "A split-brain scenario where services get different configs", "A Kafka consumer rebalance triggered by the restarts", "A retry storm from services failing to reach each other"], "ans": 0,"fb":"Simultaneous cold starts from many services create a thundering herd on a shared dependency. Solutions include staggered restarts, local caching of config, or circuit breakers. This is a known startup concurrency anti-pattern."},
      {"level":4,"diff":2,"scenario":4,"q":"An auditor asks which services touched a specific payment transaction and what data they wrote. What must exist in your system?","opts": ["A distributed tracing tool showing service call graphs", "A Grafana dashboard showing payment processing latency", "A database transaction log for the payments database", "A correlation ID in all logs and a structured audit trail", "A Kafka topic containing all payment events"], "ans": 3,"fb":"The auditor needs both: the call path (correlation IDs in logs) and what data was written (audit trail). Tracing shows the path but not data writes. DB transaction logs are too low-level. Kafka events may not cover all writes."},
      {"level":4,"diff":3,"scenario":0,"q":"Two teams reach an impasse on whether a new entity belongs in Service A or Service B. You are facilitating. What technique breaks the deadlock?","opts": ["Ask the most senior engineer to decide", "Have the teams vote", "Ask both teams to define who is the primary consumer of the", "Place the entity in a new shared service", "Defer the decision and build both options as spikes"], "ans": 2,"fb":"Ownership questions are resolved by following responsibility: who enforces the entity's rules and who reads it most. A vote or authority decision skips the analysis. A shared service often just defers the problem."},
      {"level":4,"diff":3,"scenario":1,"q":"Migrating from a shared monolith database to service-owned databases: what is the highest risk during the transition period?","opts": ["Higher infrastructure cost", "Loss of foreign key constraints across services", "Dual-write inconsistency", "Slower query performance during the migration", "Increased deployment complexity"], "ans": 2,"fb":"The dual-write period is the most dangerous phase: any inconsistency between the two stores is hard to detect and can corrupt data permanently. This requires careful synchronisation, change data capture, or a strangler fig pattern with validation."},
      {"level":4,"diff":3,"scenario":2,"q":"Three services independently implement pagination but with different conventions. You propose consolidation. A team lead objects that changing their API is a breaking change. How do you respond?","opts": ["Agree the change is breaking", "Only standardise new services going forward", "Override the objection", "Defer consolidation until all clients have been migrated first", "Document both conventions and allow teams to choose"], "ans": 0,"fb":"The team lead is right that it is breaking. Acknowledging that and providing a concrete migration plan (parallel support during deprecation) is the mature response. Overriding ignores legitimate concerns; deferring indefinitely means it never happens."},
      {"level":4,"diff":3,"scenario":3,"q":"A new feature introduces a fan-out: one event triggers 20 downstream consumers. During a spike, all 20 retry simultaneously. What design change prevents this becoming a systemic failure?","opts": ["Deploy more consumer instances to absorb the retry load", "Per-consumer exponential backoff with jitter", "Throttle the producer to slow down event emission", "Add a rate limiter on the event bus", "Increase Kafka partition count to 20"], "ans": 1,"fb":"Jitter spreads retry timing; circuit breakers prevent cascading failures; DLTs handle poison pills. Increasing partitions or adding instances absorbs load but does not prevent amplification. Throttling the producer sacrifices throughput for all consumers."},
      {"level":4,"diff":3,"scenario":4,"q":"A regulator requires proof that no payment data was accessible outside its authorised service boundary during a specific 6-month period. What evidence satisfies this?","opts": ["A statement from the engineering team confirming no breach occurred", "A Kafka consumer group listing for the payments topic", "The current firewall rules applied retroactively", "A signed architecture diagram showing the service boundary", "Network policy logs showing egress was restricted"], "ans": 4,"fb":"Regulators require verifiable, time-stamped evidence. Architecture diagrams and current configs do not prove past state. Engineering statements are insufficient. Log-based evidence (network, access, RBAC) for the specific period is what satisfies the requirement."},
      {"level":5,"diff":1,"scenario":0,"q":"You notice that three teams have independently built different patterns for propagating tenant context across service calls — one uses HTTP headers, one uses a thread-local, and one injects it via a Spring interceptor. What is the first thing an Expert should do before proposing a standard?","opts": ["Document the three existing approaches, catalogue where each is used, and identify concrete problems each", "Immediately write an ADR mandating the HTTP header approach", "Leave it alone", "Raise the divergence in the architecture guild and let the group vote on which pattern to adopt", "Ask each team to migrate to a shared library you write this week to unify the behaviour"], "ans": 0,"fb":"Before proposing a standard you must understand the full landscape: what exists, where it is used, and what real harm the divergence causes. Skipping this step leads to standards that miss edge cases or mandate migration work with unclear benefit. Calling a vote (D) without documented evidence produces uninformed decisions. Immediately writing a new library (C) risks creating a fourth pattern. Doing nothing (E) ignores compounding drift. An immediate ADR (B) without analysis may mandate the wrong approach.","context":{}},
      {"level":5,"diff":1,"scenario":0,"q":"Two teams are building event-driven flows on Kafka. Team A publishes domain events with full entity payloads; Team B publishes thin notification events and expects consumers to query back for state. A new team is about to start building a third consumer and asks which pattern to follow. What should an Expert say?","opts": ["Tell them to follow Team A", "Tell them to follow Team B", "Acknowledge both patterns have merit, explain the trade-offs", "Defer the decision to the new team's tech lead", "Tell them to implement both patterns and let their consumers choose what they need"], "ans": 2,"fb":"When a third team enters and both patterns coexist, allowing them to pick freely entrenches the divergence. The Expert role is to surface the trade-offs (fat vs thin events: consumer coupling, schema versioning, query load) and drive a platform-level decision. Recommending one pattern without that discussion (A or B) is premature. Implementing both (D) creates more complexity. Deferring to the new tech lead (E) abdicates the Expert's responsibility to drive standards.","context":{}},
      {"level":5,"diff":2,"scenario":0,"q":"After auditing four services, you find each team has defined its own retry strategy for Kafka consumer failures: fixed delay, exponential backoff with different caps, and one team using no retry at all. You want to drive a standard. Which approach best balances consistency with team autonomy?","opts": ["Write an ADR documenting the recommended pattern and let teams adopt it whenever they choose", "Write a shared Spring Boot starter that provides a configurable retry and DLQ pattern with sensible defaults", "Ask each team to write their own ADR explaining their current approach and invite peer review", "Mandate that all teams adopt exactly the same retry parameters immediately or they cannot deploy", "Only standardise teams whose retry bugs have caused incidents"], "ans": 1,"fb":"A shared starter library encodes the standard in code, making the right thing the easy thing, while configurable parameters preserve legitimate team differences. A hard deploy gate (A) is too coercive and creates friction without teaching. An ADR alone (C) is easy to ignore. Per-team ADRs (D) just documents divergence. Incident-triggered standardisation (E) is reactive and misses latent risk. The key Expert move is providing a paved path, not just a written rule.","context":{}},
      {"level":5,"diff":2,"scenario":0,"q":"You are running an architecture guild session. Two senior engineers from different teams argue for opposite pagination strategies: one prefers offset-based pagination, the other prefers cursor-based. Both have implemented their approach in production APIs. How do you facilitate the discussion toward a durable platform decision?","opts": ["Adopt cursor-based pagination as the standard", "Treat them as equivalent and document both as acceptable, letting new teams choose freely", "Frame the decision around concrete axes: dataset size, sort stability, client UX needs, and compliance requirements", "Decide by team size: whichever pattern more teams currently use becomes the standard", "Ask the two engineers to each present a benchmark and let the fastest approach win"], "ans": 2,"fb":"Architecture decisions should be grounded in the platform's actual constraints and use cases, not benchmarks in isolation or recency bias. Framing around axes (dataset size, sort stability, client needs, compliance) gives the guild a structured way to evaluate both patterns against reality. Defaulting to the majority pattern (D) entrenches the status quo regardless of merit. Accepting both (E) perpetuates the divergence. A benchmark alone (A) ignores non-performance trade-offs. 'More modern' (B) is not an engineering argument.","context":{}},
      {"level":5,"diff":2,"scenario":0,"q":"Three teams have diverged on how they model soft deletes: one uses a boolean deleted flag, one uses a deleted_at timestamp, and one uses a status enum with ACTIVE/ARCHIVED/DELETED states. A compliance audit is approaching and the auditors want consistent data retention evidence across the platform. What is the Expert's move?","opts": ["Only change the approaches that auditors explicitly flag as problems", "Ask the compliance team to write the standard and hand it to engineering to implement", "Map all three approaches to the compliance requirement, identify whether any fails to meet retention and auditability needs", "Tell the auditors that each team's approach is internally consistent and they should audit each service independently", "Pick the boolean flag"], "ans": 2,"fb":"The Expert bridges engineering reality and compliance requirements. The right move is to evaluate each existing pattern against what the audit actually requires — retention period traceability, recoverability, audit log completeness — rather than defaulting to the simplest or waiting for auditors to dictate. Mandating the boolean flag (A) may lose timestamp evidence. Deferring to compliance to write the spec (D) abdicates technical ownership. Reactive-only change (E) is high risk ahead of an audit.","context":{}},
