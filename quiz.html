      {"level":2,"diff":3,"scenario":4,"q":"A PR review reveals that a service uses `Thread.sleep()` to wait for an async operation to complete before proceeding. What design concern should you raise?","opts": ["It's a polling anti-pattern", "Thread.sleep is deprecated in modern Java", "It will cause a memory leak", "It prevents the JVM from garbage collecting", "The sleep duration should be configurable"], "ans": 0,"fb":"`Thread.sleep` for coordination is a polling anti-pattern that wastes threads, is fragile under load, and has arbitrary timeouts. The correct design uses CompletableFuture, message-driven callbacks, or an event that signals completion — making the coordination explicit and non-blocking.","context":{}},
      {"level":3,"diff":1,"scenario":0,"q":"You're designing an audit trail for a PCI-DSS-regulated payment flow. Which fields are non-negotiable in every audit log entry?","opts": ["Who did what, to which resource, and when", "The user's IP address and browser type", "The full request and response body", "The database query that was executed", "The deployment version at the time of the action"], "ans": 0,"fb":"PCI-DSS audit trail requirements centre on actor (who), action (what), target (which resource), and timestamp (when). Full request/response bodies may contain PAN data and should be masked or excluded. IP is useful but not sufficient alone.","context":{"PCI-DSS Requirement 10":"All access to system components must be logged with sufficient detail to reconstruct events"}},
      {"level":3,"diff":1,"scenario":0,"q":"A regulated system needs to store the state of a record at the time of an audit event, not just a log that 'it changed.' What pattern satisfies this requirement?","opts": ["Optimistic locking version numbers", "Soft deletes", "A change event on a Kafka topic", "Storing a snapshot or full record copy in the audit log", "A database trigger that writes to a log table"], "ans": 3,"fb":"Storing a snapshot of the record at audit time (not just a reference to current state) means the audit trail is immutable and self-contained. If the record is later modified or deleted, the historical state is preserved. This is essential for regulatory investigations.","context":{}},
      {"level":3,"diff":2,"scenario":0,"q":"A SOX-regulated workflow requires that no single user can both initiate and approve a financial transaction. What design pattern enforces this?","opts": ["A nightly reconciliation job that checks for violations", "Two-factor authentication on the approve action", "Role-based access control (RBAC) alone", "A UI validation that greys out the approve button", "Separation of duties enforced in the domain model"], "ans": 4,"fb":"Separation of duties must be enforced in the domain model, not just the UI. The transaction entity should record both actor IDs and reject (with a domain exception) if they match. UI controls are easily bypassed via direct API calls. A nightly job catches violations too late.","context":{"SOX":"Requires controls that prevent a single person from having complete control over a financial transaction"}},
      {"level":3,"diff":2,"scenario":0,"q":"You're designing a temporal data model for a financial system that needs to answer 'what was the fee schedule at the time of this transaction?' How should this be modelled?","opts": ["Store rates in a configuration file with version numbers", "Store the fee schedule with effective_from and effective_to dates and", "Store only the current fee schedule and recalculate on request", "Cache the fee schedule at transaction time", "Use soft deletes so old rates are not physically removed"], "ans": 1,"fb":"Temporal modelling requires storing validity periods. A snapshot of the applicable rate on the transaction record ensures the historical answer is always available. Recalculating from a current schedule would give wrong answers if rates have changed.","context":{"Bitemporal modelling":"Records both the time data was valid in reality and the time it was recorded in the system"}},
      {"level":3,"diff":3,"scenario":0,"q":"A regulator asks to prove that the audit log for a specific transaction has not been tampered with since it was written. Your current design stores audit records in PostgreSQL. What architectural gap does this expose?","opts": ["The regulator's question is unreasonable", "Audit records should use UUIDs instead of sequential IDs", "PostgreSQL doesn't support audit logs", "The audit log should be encrypted at rest", "A database record can be updated or deleted by a privileged user"], "ans": 4,"fb":"Records in a relational database can be modified by DBAs or privileged processes, so they are not cryptographically tamper-evident. For tamper-evidence, options include: write to an append-only log with hash chaining, stream to an immutable store (GCS with object lock), or use Cloud Logging with export to a locked bucket.","context":{"Tamper evidence":"Requires that modification is detectable, not just prohibited"}},
      {"level":3,"diff":3,"scenario":0,"q":"You're designing an event-sourced payment ledger for SOX compliance. A developer asks whether command handlers should be allowed to read from the event store and also issue side effects (e.g., sending emails). What is the concern?","opts": ["Reading and writing in the same handler is a performance problem", "This is not a design concern", "Email side effects need to be in a separate microservice", "Command handlers should only use Kafka, not the event store", "Side effects in command handlers make replaying events for audit dangerous"], "ans": 4,"fb":"Event replay is a key audit capability in event-sourced systems. If command handlers produce side effects during processing, replaying the event log for audit purposes would re-trigger those effects. Side effects (emails, external calls) should be handled by projections that are aware of whether they're running in replay mode.","context":{}},
      {"level":3,"diff":1,"scenario":1,"q":"A payment saga involves three steps: reserve funds, process payment, send receipt. The payment step fails. In orchestration, who decides to trigger the compensation?","opts": ["The message broker automatically compensates", "The calling service is responsible", "Each service decides independently", "The saga orchestrator detects the failure and", "The database rolls back all steps atomically"], "ans": 3,"fb":"In orchestration, a central coordinator (the orchestrator) knows the full saga definition and is responsible for detecting failures and triggering compensating transactions. Individual services don't need to know about the saga — they just execute their step and report success or failure.","context":{}},
      {"level":3,"diff":1,"scenario":1,"q":"A saga step that reserves inventory fails intermittently. The saga retries it automatically. What must the reservation step implement to make this safe?","opts": ["Idempotency — repeated invocations with the same saga ID", "A timeout longer than the retry interval", "A database lock held for the duration of the saga", "Synchronous HTTP instead of Kafka", "At-least-once delivery"], "ans": 0,"fb":"Saga steps must be idempotent because retries are inherent to the pattern. If the reservation step creates a new reservation on every invocation, retries will create duplicates. The saga ID (or a correlation ID) should be used to detect and skip already-completed steps.","context":{}},
      {"level":3,"diff":2,"scenario":1,"q":"In a choreographed saga, the payment service emits a `PaymentProcessed` event and the fulfilment service listens to it. A bug in the fulfilment service causes it to crash after consuming the event but before committing its own state. What pattern prevents data loss here?","opts": ["Saga orchestration instead of choreography", "Transactional outbox on the fulfilment service", "Exactly-once delivery in Kafka", "Idempotent consumers with at-least-once delivery", "Dead letter topics"], "ans": 3,"fb":"With at-least-once delivery and idempotent consumers, the message is redelivered after the crash and the consumer can safely process it again (detecting it was already partially processed and completing the work). Transactional outbox is a producer-side pattern. Exactly-once delivery is available but requires careful Kafka configuration and doesn't help with application-level crashes.","context":{}},
      {"level":3,"diff":2,"scenario":1,"q":"A choreography-based saga has five services each emitting and consuming events. A business incident reveals that a saga completed partially — three of five steps ran, two did not. How do you investigate the failure?","opts": ["Check the database for the final state", "Correlate all events in the saga by correlation ID", "Ask each service team if they received the event", "Check the saga orchestrator's state table", "Replay the Kafka topic from the beginning"], "ans": 1,"fb":"In choreography, there is no central coordinator — the saga's state is implicit across services. Investigation requires correlating all events by a shared correlation ID (saga ID) across service logs and Kafka topics to reconstruct the full execution timeline and identify where it stopped.","context":{}},
      {"level":3,"diff":3,"scenario":1,"q":"A saga's compensation step for 'refund customer' is failing due to a downstream payment gateway being unavailable. The saga framework keeps retrying indefinitely. What design concern does this create?","opts": ["Indefinite retries on a compensation step can leave the saga stuck", "The payment gateway SLA should be improved", "The retry interval should be increased", "The refund should be handled outside the saga", "The saga should use orchestration instead of choreography"], "ans": 0,"fb":"Some failures cannot be resolved by retrying. A saga that retries compensation indefinitely becomes stuck, blocking resources and preventing the business case from resolving. Good saga design includes a dead-end state that triggers human intervention and alerting, rather than infinite retry loops.","context":{}},
      {"level":3,"diff":3,"scenario":1,"q":"You're choosing between orchestration and choreography for a new cross-service saga. The saga has 7 steps, involves 5 teams, and must be auditable for SOX. Which approach is more appropriate and why?","opts": ["Choreography — it's more resilient to failures", "Orchestration — it provides a central, auditable record", "Choreography — it's simpler to implement", "Orchestration — it's faster at runtime", "They are equivalent in complexity at this scale"], "ans": 1,"fb":"With 7 steps across 5 teams and SOX auditability requirements, orchestration is significantly more appropriate. The orchestrator holds explicit state (current step, compensations applied), making it auditable. Choreography at this complexity makes the saga's state implicit and distributed across services — very hard to audit or debug.","context":{}},
      {"level":3,"diff":1,"scenario":2,"q":"You add a new required field to an existing REST API response that external consumers depend on. Why is this a breaking change?","opts": ["Required fields must be approved by the API gateway team", "It requires a database migration", "It increases the response payload size", "Consumers that deserialize into a fixed model and don't expect the", "It changes the HTTP status code"], "ans": 3,"fb":"Adding a required field to a response is breaking for consumers with strict deserialization (e.g., they fail on unknown fields) or those that validate the response schema. Even if most clients tolerate it, the contract has changed without a version bump — which is a breaking change.","context":{}},
      {"level":3,"diff":1,"scenario":2,"q":"Your team is about to release a new major API version (v2) alongside v1. What is the minimum support commitment needed for v1?","opts": ["Give consumers a defined deprecation window with a specific sunset date", "v1 can be removed immediately once v2 is live", "Move v1 to a separate service", "Keep v1 forever to avoid breaking anyone", "v1 support depends on whether consumers have acknowledged the migration"], "ans": 0,"fb":"A defined deprecation window with a sunset date gives consumers time to migrate without leaving v1 alive indefinitely. The window length depends on consumer count and integration complexity, but must be communicated explicitly — a silent removal will break production systems.","context":{}},
      {"level":3,"diff":2,"scenario":2,"q":"A consumer integrating with your API is on v1. You've released v2 with breaking changes. The consumer is slow to migrate. What is the correct approach?","opts": ["Track the consumer's migration, communicate the sunset date clearly, and escalate", "Extend the sunset date unilaterally", "Maintain both versions indefinitely", "Remove v1 on schedule and wait for the consumer to fix their integration", "Cherry-pick v2 features back into v1"], "ans": 0,"fb":"API migrations require active management. Track consumers' migration progress, maintain clear communication about the sunset date, and escalate early if milestones are missed. Unilaterally extending the sunset date without data encourages slow migration. Removing on schedule without tracking creates production incidents.","context":{}},
      {"level":3,"diff":2,"scenario":2,"q":"You're designing a v2 of an API that changes the structure of the `address` field from a flat string to a structured object. How should you communicate this change to consumers?","opts": ["Add a comment to the existing OpenAPI spec", "Update the README file", "Publish a migration guide that shows before/after", "Send an email to the API mailing list", "Update the OpenAPI spec and send a Slack message"], "ans": 2,"fb":"Structural changes require more than a spec update. A migration guide with before/after examples, a changelog entry, and a clear deprecation timeline gives consumers everything they need to plan and execute the migration. A Slack message alone is ephemeral and easily missed.","context":{}},
      {"level":3,"diff":3,"scenario":2,"q":"A partner team says they can't migrate from v1 to v2 because they use a generated client from the v1 OpenAPI spec and regenerating it will break their internal code. What is the right response?","opts": ["Maintain v1 forever for their benefit", "Give them the v2 spec and let them figure it out", "Understand their specific blockers and explore whether", "Tell them to prioritise the migration", "Roll back v2 and redesign the API"], "ans": 2,"fb":"A concrete migration blocker deserves a concrete conversation. Understanding their constraint may reveal that a compatibility shim (a thin adapter that accepts v1 requests and translates to v2 internally) can unblock them without indefinitely maintaining v1. The goal is enabling migration, not just enforcing a deadline.","context":{}},
      {"level":3,"diff":3,"scenario":2,"q":"Your team is considering header-based versioning (`Accept: application/vnd.payments.v2+json`) instead of URI versioning (`/v2/payments`). What is the main trade-off?","opts": ["URI versioning prevents caching", "Header versioning is faster", "URI versioning requires more infrastructure", "Header versioning is the industry standard for REST APIs", "Header versioning is harder to test and debug in browsers and"], "ans": 4,"fb":"Header versioning keeps resource URIs clean and is considered more RESTful, but it's harder to test (you can't just paste a URL) and less visible to operators. URI versioning is simpler to work with but makes the version part of the resource identity. Neither is universally correct — the choice depends on your consumer tooling and operational needs.","context":{}},
      {"level":3,"diff":1,"scenario":3,"q":"Your platform serves multiple tenants. A bug is reported where Tenant A's data appeared in Tenant B's API response. What is the immediate design question to answer?","opts": ["Is tenant context being propagated and enforced at every", "Is the load balancer routing requests correctly?", "Is the database performance adequate?", "Is the Kafka consumer group configured correctly?", "Is the authentication token expired?"], "ans": 0,"fb":"A cross-tenant data leak almost always points to tenant context not being enforced at a data access point. Either the tenant filter was missing from a query, tenant context was not propagated through the call chain, or a shared cache returned another tenant's data.","context":{"PCI-DSS":"Tenant data isolation is a core requirement for multi-tenant regulated platforms"}},
      {"level":3,"diff":1,"scenario":3,"q":"A multi-tenant system stores all tenants' data in a single database schema with a `tenant_id` column. What is the most important safeguard to apply at the application layer?","opts": ["Use database-level row-level security as the only safeguard", "Encrypt all data at rest", "Hash the tenant_id column for privacy", "Use a separate connection pool per tenant", "Every query must include a `tenant_id` filter derived from the"], "ans": 4,"fb":"In a shared schema model, the application is responsible for filtering every query by `tenant_id`. A single missing filter exposes all tenants' data. This filter must come from the authenticated session context — never from a user-supplied parameter that could be spoofed.","context":{}},
      {"level":3,"diff":2,"scenario":3,"q":"A tenant-scoped Kafka consumer receives a message that contains a `tenantId` field in the payload. Should the consumer trust this field to determine which tenant's data to process?","opts": ["No — all Kafka messages should be processed without tenant context", "Yes, if the producer is internal", "Yes, if the field is encrypted", "Yes — the producer is trusted", "No — tenant context should come from the authenticated message header or be"], "ans": 4,"fb":"Trusting a payload field for tenant context creates an injection risk — a misconfigured or compromised producer could set a false tenantId. Tenant context should come from a verified source: the authenticated message header, the topic the message was published to, or validated against expected tenant assignments.","context":{}},
      {"level":3,"diff":2,"scenario":3,"q":"A new feature needs to run a background job that processes data for all tenants. The developer queries all records without a tenant filter 'because the job needs everything.' What design concern should you raise?","opts": ["Background jobs should run in a separate GKE namespace", "Cross-tenant operations must be explicitly scoped and auditable", "The job should use a separate database connection", "The job needs rate limiting to avoid overloading the database", "Background jobs should not access the database directly"], "ans": 1,"fb":"Cross-tenant operations are high-risk in regulated platforms. Any job that processes all tenants' data must be explicitly justified, scoped to only the data it needs, and auditable. Blanket 'needs everything' access is a design smell that should be challenged before implementation.","context":{}},
      {"level":3,"diff":3,"scenario":3,"q":"You're designing a multi-tenant feature where tenants can configure custom webhook endpoints. Tenant A configures a webhook URL that points to Tenant B's internal service. What attack does this enable, and how do you mitigate it?","opts": ["A DDoS attack — rate limit webhook calls", "A man-in-the-middle attack", "A replay attack — add a timestamp to the webhook payload", "Server-Side Request Forgery", "A SQL injection attack"], "ans": 3,"fb":"Allowing users to configure arbitrary outbound URLs enables SSRF — an attacker can use your service to probe or call internal services that are unreachable from the public internet. Mitigation requires validating webhook URLs against an allowlist of permitted destinations and blocking private IP ranges.","context":{"SSRF":"Server-Side Request Forgery — using a server as a proxy to reach otherwise unreachable internal resources"}},
      {"level":3,"diff":3,"scenario":3,"q":"Your multi-tenant platform stores tenant configuration in a shared Redis cache with keys like `config:{tenantId}`. A developer proposes caching a 'default' configuration under the key `config:default` to avoid database calls for new tenants. What risk does this introduce?","opts": ["Default configurations should be hardcoded, not cached", "The default key will expire before it's needed", "Redis memory usage will increase", "Redis keys should use UUIDs, not human-readable names", "A misconfigured cache miss could fall back to `config:default`"], "ans": 4,"fb":"A fallback to a 'default' key can silently apply the wrong configuration to real tenants if the cache lookup logic has a bug or a key is missing. In a multi-tenant system, wrong configuration can mean wrong pricing, wrong feature flags, or wrong isolation settings. The fallback path must be explicit and safe.","context":{}},
      {"level":3,"diff":1,"scenario":4,"q":"A Kafka consumer receives a payment event from an external partner but the event is missing a required field. The consumer throws an exception and the message is retried. What is the risk?","opts": ["The consumer will fall behind on its offset", "The exception will be propagated to the producer", "The message will be silently dropped", "The message will be retried indefinitely, blocking all", "The consumer group will rebalance"], "ans": 3,"fb":"A 'poison pill' message that always fails blocks the partition — all subsequent messages behind it cannot be processed until it's resolved. The design must include a dead letter topic to park unprocessable messages and allow the consumer to continue.","context":{"Poison pill":"A message that a consumer cannot process, causing it to block indefinitely"}},
      {"level":3,"diff":1,"scenario":4,"q":"A message is sent to a Dead Letter Topic (DLT) after failing all retries. What information must the DLT message include to be useful for investigation?","opts": ["The timestamp of the original message only", "Only the original message payload", "The original payload, the exception that caused", "The consumer group ID only", "The Kafka partition offset only"], "ans": 2,"fb":"A DLT message without failure context is a black box. The exception, retry count, and original payload together let engineers understand why the message failed and decide whether to replay it, fix the consumer, or alert the partner about a malformed event.","context":{}},
      {"level":3,"diff":2,"scenario":4,"q":"A DLT has accumulated 10,000 messages over a weekend due to a bug in the consumer. The bug is now fixed. What is the safest way to reprocess the DLT?","opts": ["Move all messages back to the original topic immediately", "Replay all messages at full speed", "Process only the most recent messages", "Replay messages in controlled batches with monitoring, ensuring", "Delete the DLT and ask the partner to resend"], "ans": 3,"fb":"Replaying 10,000 messages at once can overwhelm downstream systems, create a thundering herd, or reveal edge cases in the fix. Controlled batch replay with monitoring lets you validate the fix on real messages before committing to full replay and spot any remaining issues early.","context":{}},
      {"level":3,"diff":2,"scenario":4,"q":"An external partner sends webhook events to your Kafka topic via a gateway. Occasionally, the same event arrives twice. What consumer-side design handles this safely?","opts": ["Reject any event that arrives more than once", "Deduplicate at the gateway before it reaches Kafka", "Store a processed event ID after each successful processing and skip", "Increase the consumer timeout to prevent duplicate deliveries", "Use Kafka transactions to prevent duplicates"], "ans": 2,"fb":"Idempotent consumer design requires tracking processed event IDs (typically in a database or Redis) and skipping events already successfully processed. This is the correct layer to handle deduplication for at-least-once delivery. Gateway deduplication helps but can't guarantee exactly-once delivery end-to-end.","context":{}},
      {"level":3,"diff":3,"scenario":4,"q":"Your team is deciding the retry strategy for a Kafka consumer that calls an external payment gateway. The gateway occasionally rate-limits with 429 responses. What retry design is most appropriate?","opts": ["No retries — fail fast and alert", "Retries handled by the Kafka broker", "Immediate retries up to 10 times", "Fixed-interval retries every 5 seconds", "Exponential backoff with jitter, capped at a"], "ans": 4,"fb":"Exponential backoff with jitter is appropriate for rate-limited external dependencies. It reduces pressure on the gateway while recovering quickly from transient issues. A cap prevents unbounded delays. Jitter prevents thundering herds when many consumers retry simultaneously. A DLT handles messages that exhaust retries.","context":{}},
      {"level":3,"diff":3,"scenario":4,"q":"A partner sends payment events that can arrive out of order (e.g., a REFUNDED event arrives before the COMPLETED event for the same payment). Your consumer processes state transitions. What design problem does this create?","opts": ["The consumer should reorder events before processing", "The consumer may apply a state transition to a state that doesn't", "Kafka doesn't support out-of-order messages", "Out-of-order messages should be rejected with a 400", "This is only a problem if the consumer is not idempotent"], "ans": 1,"fb":"Out-of-order events require the consumer to handle cases where the expected predecessor state hasn't been seen yet. Options include: storing the event and applying it when the predecessor arrives, using a state machine that tolerates out-of-order application, or using sequence numbers to detect and buffer out-of-order messages.","context":{}},
      {"level":4,"diff":1,"scenario":0,"q":"Three teams are independently designing APIs for customer management and each has chosen a different pagination style (offset, cursor, page number). You need to lead a design session to align them. What is the first thing you should establish?","opts": ["Whether they have external consumers already, which", "Who owns the final decision", "Which team's design is technically superior", "Whether the pagination is needed at all", "Whether the teams agree on a common framework"], "ans": 0,"fb":"Before proposing a standard, understand the constraints. Teams with existing external consumers can't change their API without a breaking change and migration. Teams still in development have more flexibility. The first step is mapping the constraint landscape, not jumping to a solution.","context":{}},
      {"level":4,"diff":1,"scenario":0,"q":"You're facilitating a design session and two senior engineers strongly disagree on an approach. The discussion has gone in circles for 30 minutes. What is the most productive intervention?","opts": ["Ask the tech lead to decide", "Take a vote", "Suggest combining both approaches", "Schedule a follow-up meeting", "Ask each to state what evidence would"], "ans": 4,"fb":"Circular disagreements often persist because the parties are arguing from different assumptions rather than different evidence. Asking 'what would change your mind?' surfaces the underlying assumptions and moves the discussion from opinion to testable claims.","context":{}},
      {"level":4,"diff":2,"scenario":0,"q":"Two teams built separate libraries that do the same thing — HTTP client wrappers with retry logic. You want to consolidate them into a shared library. What is the most important risk to address first?","opts": ["Which team will own the shared library", "Whether the libraries use the same HTTP client framework", "Whether consolidation will create a shared deployment bottleneck", "Which library has better performance", "Whether both teams agree the consolidation is needed"], "ans": 2,"fb":"Consolidation creates a shared dependency — changes to it affect all consumers simultaneously. If ownership is unclear or release processes are slow, the shared library becomes a bottleneck. Address governance (who owns it, how changes are proposed and released) before the technical consolidation.","context":{}},
      {"level":4,"diff":2,"scenario":0,"q":"A design review reveals that two services are using different approaches to trace propagation — one uses W3C trace context headers, the other uses a custom correlation header. What is the systemic risk?","opts": ["The services cannot communicate", "Grafana dashboards will show duplicate spans", "One approach will be deprecated", "Distributed traces will break at the boundary", "Higher network overhead"], "ans": 3,"fb":"Distributed tracing only works if all services speak the same trace context protocol. A boundary where one service emits W3C headers and the other reads a custom header breaks the trace chain — you get two disconnected traces instead of one end-to-end trace.","context":{}},
      {"level":4,"diff":3,"scenario":0,"q":"You notice that four teams have each built their own onboarding flow for new tenants, each with slightly different steps and validation rules. A compliance audit is coming. What is the systemic problem and the correct response?","opts": ["Performance — four flows are slower than one", "This is a team autonomy issue, not a design issue", "The flows need to be merged into one service immediately", "Inconsistent compliance controls", "The flows are duplicating database writes"], "ans": 3,"fb":"Four divergent onboarding flows means compliance requirements may be enforced inconsistently — one flow may skip a KYC check that another includes. For a compliance audit, this is a significant risk. The response is to map what each flow does, identify gaps against requirements, and drive convergence to a single authoritative implementation.","context":{"PCI-DSS":"Consistent control implementation is required — gaps in one path can invalidate compliance across the platform"}},
      {"level":4,"diff":3,"scenario":0,"q":"You've been asked to lead a cross-team API design guild. Three teams have competing proposals for a new event schema standard. How do you drive convergence without alienating the teams?","opts": ["Run a design spike to validate each proposal against", "Pick the best proposal and mandate adoption", "Ask the CTO to decide", "Average the three proposals into a compromise", "Delay the decision until all teams agree"], "ans": 0,"fb":"Technical standards gain adoption through legitimacy, not mandate. Running a spike that tests each proposal against real cases gives the group shared data to reason from. Documented trade-offs mean the group makes an informed decision, and teams who didn't 'win' understand why their concerns were considered.","context":{}},
      {"level":4,"diff":1,"scenario":1,"q":"Your reporting service is slow because it queries the same OLTP database as your transactional services. What architectural pattern addresses this?","opts": ["Move reporting to a scheduled batch job", "Add a caching layer in front of the OLTP database", "Introduce CQRS — a separate read model updated", "Increase the database connection pool size", "Add more indexes to the OLTP database"], "ans": 2,"fb":"CQRS separates the read model from the write model. Reporting queries run against a denormalised read model optimised for reads, populated asynchronously from domain events. This removes reporting load from the OLTP database and lets both be optimised independently.","context":{}},
      {"level":4,"diff":1,"scenario":1,"q":"A service boundary is violated: Service B directly reads from Service A's database because 'it's faster than an API call.' What is the long-term cost?","opts": ["The database will become a single point of failure", "Higher cloud costs", "Service A can never change its schema without", "Service A's API will become redundant", "Service B will have worse performance over time"], "ans": 2,"fb":"Direct cross-service database access couples schema to consumers. Every schema change in Service A requires coordinating with Service B to avoid breaking it. Over time, this creates a distributed monolith where teams cannot deploy independently.","context":{}},
      {"level":4,"diff":2,"scenario":1,"q":"Your read model for a reporting feature is 15 minutes stale because the update pipeline is slow. Product asks for near-real-time reporting. What architectural changes should you evaluate?","opts": ["Reduce the batch size and move to event-driven read model updates", "Add more replicas of the reporting service", "Switch to a direct OLTP query for reports", "Increase the polling interval of the read model updater", "Cache the reports for 15 minutes to match the staleness"], "ans": 0,"fb":"A 15-minute batch update pipeline is fundamentally latency-bound. Moving to event-driven updates (each domain event triggers an incremental update to the read model) reduces staleness to seconds. This requires the write path to emit events, but eliminates the polling lag.","context":{}},
      {"level":4,"diff":2,"scenario":1,"q":"A service currently handles both writes (creating payments) and reads (reporting on payments). Under high write load, reporting becomes slow. What is the first question to ask before introducing CQRS?","opts": ["Which team will own the read model?", "Can we just scale the existing service horizontally?", "Which ORM should the read model use?", "Should the read model use PostgreSQL or a different database?", "Is the read/write contention severe enough to justify the operational"], "ans": 4,"fb":"CQRS adds significant complexity — two models, synchronisation logic, eventual consistency. Before introducing it, validate that the problem (read/write contention) is real and severe enough to justify the cost. Simple horizontal scaling or read replicas may solve the problem at far lower complexity.","context":{}},
      {"level":4,"diff":3,"scenario":1,"q":"You're redesigning the boundary between an Order service and a Fulfilment service. Currently they share a database table. What is the safest migration sequence?","opts": ["Move the table to the fulfilment service database and update all references at once", "Introduce an API between them while both still use the shared table, migrate Order to use the API", "Stop both services, migrate, then redeploy", "Copy the table to both databases and reconcile nightly", "Build a new Fulfilment service from scratch with no migration path"], "ans": 1,"fb":"Strangler fig pattern: introduce the API abstraction first while keeping the shared table as the backing store. Once all cross-service access goes through the API, migrate the table to its owner service. This allows incremental migration with rollback options at each step.","context":{}},
      {"level":4,"diff":3,"scenario":1,"q":"A CQRS read model is rebuilt by replaying 3 years of domain events. Replay takes 6 hours. Product wants the read model available within 30 minutes of a rebuild. What architectural options address this?","opts": ["Reduce the number of events stored", "Use periodic snapshots of the read model", "Run multiple replay workers in parallel", "Accept the 6-hour SLA", "Increase the replay worker's CPU"], "ans": 1,"fb":"Snapshotting captures the read model state at a point in time. Rebuild then replays only events since the last snapshot, reducing replay time from years to hours or minutes depending on snapshot frequency. This is the standard pattern for event-sourced systems with large event histories.","context":{}},
      {"level":4,"diff":1,"scenario":2,"q":"Two teams each built their own email notification service because neither knew the other had started. You're asked to consolidate. What is the first thing to do?","opts": ["Map all consumers of each service to understand", "Delete the newer one", "Pick the one with more features", "Ask each team to maintain their own going forward", "Merge the codebases immediately"], "ans": 0,"fb":"Before any consolidation work starts, map the consumers — which services call which notification service, with what contracts, and with what SLAs. This defines the migration scope, identifies the riskiest consumers, and informs how long a transition period is needed.","context":{}},
      {"level":4,"diff":2,"scenario":2,"q":"You identify that a shared authentication library is used by 12 services but is maintained by one team as a side project. What is the systemic risk?","opts": ["The library may have performance issues under load", "Other teams will fork the library", "A critical dependency is under-resourced", "The library will become outdated", "The team maintaining it will burn out"], "ans": 2,"fb":"A shared library used by 12 services is platform-critical infrastructure. If the owning team is maintaining it as a side project, security patches may be delayed, breaking changes may go unannounced, and the library may not be updated for new Spring Boot versions. This needs explicit ownership and resource allocation.","context":{}},
      {"level":4,"diff":2,"scenario":2,"q":"You're proposing to consolidate three payment retry implementations into a shared library. One team refuses because their implementation has bespoke logic for their payment provider. How should you respond?","opts": ["Explore whether the bespoke logic can be a pluggable extension", "Accept their objection and only consolidate two services", "Override the objection", "Ask the tech lead to mandate adoption", "Fork the shared library for their use case"], "ans": 0,"fb":"Bespoke logic is often a reason to design for extensibility, not to exclude a use case. A shared library with a pluggable provider interface can accommodate core shared behaviour while allowing custom provider adapters. This keeps the team in the consolidation while meeting their needs.","context":{}},
      {"level":4,"diff":3,"scenario":2,"q":"You're leading a consolidation of three separate Kafka consumer frameworks into one shared Spring Boot starter. What governance decision is most critical to get right before writing any code?","opts": ["Whether to use Java or Kotlin", "The package namespace convention", "Which framework to use as the base", "How changes are proposed, reviewed, and released", "The CI/CD pipeline for the shared library"], "ans": 3,"fb":"A shared library across 3+ teams will receive conflicting demands. Without a clear change governance process (how PRs are raised, who reviews, who can block, how releases are versioned and communicated), the library becomes a source of cross-team conflict. Governance must come before implementation.","context":{}},
      {"level":4,"diff":3,"scenario":2,"q":"A shared platform library releases a minor version that inadvertently breaks one of 15 consuming services in production. What process gap does this expose?","opts": ["The library should not have released a minor version with breaking changes", "The consuming team should have tested the new version before upgrading", "The release process lacks a cross-consumer compatibility validation step before release", "The consuming service should have pinned the dependency version", "The library needs more unit tests"], "ans": 2,"fb":"When a shared library has 15 consumers, minor releases must be validated against all consumers before release. The process gap is the absence of an integration test suite that exercises the library against representative consumer scenarios. Pinning versions is a workaround, not a fix.","context":{}},
      {"level":4,"diff":1,"scenario":3,"q":"A service calls three downstream services in sequence. Each has 99.5% availability. What is the approximate availability of the composite operation?","opts": ["98.5%", "98.0%", "99.0%", "97.5%", "99.5%"], "ans": 3,"fb":"Availability compounds multiplicatively for sequential dependencies: 0.995 × 0.995 × 0.995 ≈ 0.985, or about 98.5%. With three hops, you lose roughly 1.5 percentage points of availability. This is the core argument for minimising synchronous dependencies in critical paths.","context":{}},
      {"level":4,"diff":2,"scenario":3,"q":"A new feature sends a notification to 50,000 tenants simultaneously when a platform event occurs. All 50,000 HTTP calls are made in parallel at the same instant. What failure mode does this create?","opts": ["A Kafka consumer lag spike", "A thundering herd", "A database connection pool exhaustion", "A certificate rotation failure", "A memory leak in the notification service"], "ans": 1,"fb":"Simultaneous fan-out to 50,000 endpoints is a thundering herd. The notification service's connection pool, the target endpoints, and any shared infrastructure will all be hit at the same instant. The fix is to spread notifications over time using jitter or a queue-based fan-out with rate limiting.","context":{}},
      {"level":4,"diff":2,"scenario":3,"q":"Service A uses Service B as a synchronous dependency. Service B becomes slow (p99 latency increases from 50ms to 5s). How does this affect Service A if no circuit breaker is in place?","opts": ["Service A will failover to a backup instance of Service B", "Service A will return 504 Gateway Timeout immediately", "Service A's threads will back up waiting for slow responses", "Service A will degrade gracefully with cached responses", "Service A will automatically retry and recover"], "ans": 2,"fb":"Without a circuit breaker and timeout, threads waiting for slow responses from Service B accumulate in Service A. When the thread pool is exhausted, Service A can no longer serve any requests — even those not involving Service B. A cascading failure has occurred.","context":{}},
      {"level":4,"diff":3,"scenario":3,"q":"A design proposes that all services start by loading their configuration from a shared configuration service. The configuration service is on the same cluster. What systemic risk does this create during a rolling restart of the cluster?","opts": ["Services will load incorrect configuration", "Rolling restarts will take longer", "Configuration will become stale", "A startup dependency creates a bootstrap problem", "The configuration service will be overloaded"], "ans": 3,"fb":"A startup dependency on a service that may itself be restarting creates a bootstrap deadlock. Services that can't load config at startup will fail liveness probes and restart — but if the config service is also restarting, no service can come up. Startup dependencies must be designed carefully with local fallbacks or startup ordering guarantees.","context":{}},
      {"level":4,"diff":3,"scenario":3,"q":"A financial transaction touches 6 services end-to-end. A compliance team asks to trace a specific transaction through all services. The request ID is lost at the third service boundary. What design risk does this indicate at scale?","opts": ["The third service's logs are not indexed correctly", "The transaction was processed incorrectly", "Request ID propagation is not enforced as a platform standard", "The compliance question is too specific to answer from logs", "The third service is misconfigured"], "ans": 2,"fb":"Losing a request ID at a service boundary means that service didn't propagate the correlation header. At scale, this breaks end-to-end traceability for compliance and incident investigation. It signals that correlation header propagation is not a platform standard — it's implemented ad hoc and inconsistently.","context":{"PCI-DSS":"End-to-end traceability of financial transactions is a compliance requirement"}},
      {"level":5,"diff":1,"scenario":1,"q":"Leadership asks you to migrate the platform from synchronous REST to an event-driven architecture. Where do you start scoping the work?","opts": ["Ask each team to migrate independently", "Identify the highest-risk integration points, define what 'event-driven' means", "Start with the most complex service to get the hard work done first", "Rewrite all services in parallel", "Build a new event bus and migrate all services at once"], "ans": 1,"fb":"Major architectural shifts need phased approaches. Start by defining what the target state looks like, identify the integration points that would benefit most (and least), and propose a phased plan that delivers value incrementally while managing risk. 'Migrate everything at once' is how large projects fail.","context":{}},
      {"level":5,"diff":1,"scenario":1,"q":"You need to present a 12-month architectural migration plan to leadership. What does leadership most need to understand to approve it?","opts": ["The business risk of the current state, the value delivered", "The team's preferred technology choices", "The full list of services to be migrated", "The detailed implementation timeline with milestones", "The technical design in detail"], "ans": 0,"fb":"Leadership approves plans based on business outcomes, not technical detail. They need to understand: what risk does the current state pose, what does each phase deliver (risk reduction, new capability), and what does it cost. Technical detail belongs in appendices.","context":{}},
      {"level":5,"diff":2,"scenario":1,"q":"You're scoping a migration from a monolith to microservices. How do you determine which bounded contexts to extract first?","opts": ["Identify modules with high change frequency, clear ownership", "Extract the simplest modules first to build momentum", "Extract the modules with the most external consumers", "Extract all modules in a single release", "Extract the largest modules first"], "ans": 0,"fb":"Prioritise extraction where it delivers the most value: modules that change frequently (high deployment friction from the monolith), modules with clear team ownership (reduces coordination), or modules with distinct scaling needs (can't be scaled independently in a monolith). Starting with simple modules is appealing but may not justify the cost.","context":{}},
      {"level":5,"diff":2,"scenario":1,"q":"You're proposing a phased migration to event-driven architecture. Phase 1 takes 6 months and delivers no new user-visible features. How do you make the case for it to leadership?","opts": ["You can't — features always win", "Show a benchmark of the improved architecture's performance", "Promise to deliver features in Phase 2", "Frame it as enabling capability: this phase creates the foundation", "Explain the technical debt in detail"], "ans": 3,"fb":"Infrastructure phases without visible features are funded on the strength of the future capability they unlock and the risk they reduce. The framing must connect the technical work to business outcomes: 'this enables us to onboard 10x more tenants' or 'this reduces the incident rate by X.' Abstract technical debt arguments rarely secure funding.","context":{}},
      {"level":5,"diff":3,"scenario":1,"q":"Halfway through a major migration, the business changes direction and needs a new product feature urgently. The migration is 50% complete and stopping now leaves the platform in a partially migrated state. How do you advise leadership?","opts": ["Stop the migration immediately and focus on the feature", "Complete the minimum viable set of migration work to reach a stable checkpoint, then pivot to the", "Ask leadership to choose: migration or feature", "Deliver the feature using the old architecture while the migration continues in parallel", "Continue the migration"], "ans": 1,"fb":"A partially migrated platform is the worst outcome — you bear the cost of both architectures without the benefits of either. If the pivot is necessary, find the nearest stable checkpoint in the migration (not arbitrary abandonment) and complete it before pivoting. Then document the plan to resume.","context":{}},
      {"level":5,"diff":3,"scenario":1,"q":"You're scoping a platform shift from per-service databases to a shared data platform for analytics. The shift affects 15 services and requires a data contract for each. How do you sequence the work?","opts": ["Build the data platform first, then negotiate contracts", "Start with 2-3 services to validate the data contract design and tooling", "Define all 15 data contracts upfront before any migration", "Migrate the highest-volume services first to get the biggest wins", "Assign each service to a team and let them migrate independently"], "ans": 1,"fb":"Designing all 15 contracts upfront before validating the approach is high-risk — if the contract design is wrong, you've wasted significant effort. Starting with 2-3 services validates the pattern, surfaces unexpected complexity, and produces a reference implementation that makes subsequent migrations faster.","context":{}},
      {"level":5,"diff":1,"scenario":2,"q":"A design decision has been debated for three weeks with no resolution. Both options have valid trade-offs. What is the most useful intervention?","opts": ["Schedule a final vote", "Escalate to the engineering director", "Ask both sides to write down what would", "Accept the status quo", "Implement both options and A/B test"], "ans": 2,"fb":"Persistent disagreement often persists because both sides are treating their position as identity rather than hypothesis. Asking each side to articulate the conditions under which they'd be wrong shifts the conversation from advocacy to shared analysis of assumptions.","context":{}},
      {"level":5,"diff":2,"scenario":2,"q":"A design discussion keeps circling back to the same disagreement. You suspect the real issue is not the technical question but a misalignment on team ownership. How do you surface this?","opts": ["Continue the technical discussion until a technical answer emerges", "Explicitly name the observation: 'I think what we're really debating is ownership", "Ignore the ownership issue and focus on the technical decision", "Propose a technical solution that works regardless of ownership", "Ask the manager to resolve the ownership question separately"], "ans": 1,"fb":"Hidden assumptions — including ownership — are a common source of circular technical debates. Naming the underlying issue explicitly and proposing to address it directly is more productive than continuing to debate the symptom. A technical decision made without resolving ownership will surface again.","context":{}},
      {"level":5,"diff":2,"scenario":2,"q":"Two teams are deadlocked on whether to use synchronous HTTP or Kafka for a specific integration. Both have legitimate concerns. What process produces the best outcome?","opts": ["Use the option that the more senior team prefers", "Ask a senior architect to decide", "Pick the platform default and move on", "Flip a coin — both options are equivalent", "Run a time-boxed spike to test both options against the"], "ans": 4,"fb":"When both options have legitimate trade-offs, a time-boxed spike produces shared data that moves the decision from opinion to evidence. Both teams participate in defining what the spike should test, which builds buy-in for the outcome regardless of which option wins.","context":{}},
      {"level":5,"diff":3,"scenario":2,"q":"A design review reveals hidden assumptions that, if wrong, would invalidate the entire proposal. The proposing team has been working on this for a month. How do you raise this?","opts": ["Raise it directly but frame it as a hypothesis to", "Wait until implementation to raise it", "Raise it and propose starting over", "Don't raise it to avoid demoralising the team", "Email the concern privately to the tech lead"], "ans": 0,"fb":"Raising a critical assumption late is uncomfortable but necessary. The framing matters — 'here's a risk we should test before committing' respects the work done while being honest about the risk. Framing it as a killshot or staying silent are both worse outcomes.","context":{}},
      {"level":5,"diff":3,"scenario":2,"q":"A design proposal has strong support from the most vocal engineers but you've noticed that quieter engineers in the room have not expressed their concerns. What is the risk, and how do you address it?","opts": ["The quiet engineers can raise concerns in the PR review", "The risk is minimal — the vocal engineers are likely right", "Groupthink — important concerns may be suppressed by social", "Conclude the meeting and follow up with individuals", "Ask the quiet engineers to submit written feedback"], "ans": 2,"fb":"Social dynamics in design discussions can suppress dissenting views. Groupthink in architecture decisions leads to blind spots that surface as production incidents later. Explicitly inviting quieter participants to contribute is a facilitation skill that produces better decisions.","context":{}},
      {"level":5,"diff":1,"scenario":3,"q":"Your team is evaluating a new API gateway. What is the most important first step in the evaluation?","opts": ["Evaluate the cheapest option first", "Run a performance benchmark", "Check which gateways other companies use", "Ask the vendor for a demo", "Define the criteria for success based on the"], "ans": 4,"fb":"Technology evaluations without defined success criteria produce inconclusive results. Before evaluating any option, define what problems you're solving and what 'good' looks like for each requirement. This makes the evaluation objective and prevents picking technology for the wrong reasons.","context":{}},
      {"level":5,"diff":2,"scenario":3,"q":"You're evaluating two messaging systems: one is managed (vendor-hosted) and one is self-hosted. Both meet functional requirements. What non-functional dimensions most influence the decision for a PCI-DSS platform?","opts": ["Integration with existing tools", "Ease of migration from Kafka", "Cost and feature count", "Operational burden, data residency", "Open-source community size"], "ans": 3,"fb":"For a PCI-DSS platform, data residency (is data leaving the regulated boundary?), vendor security certifications (is the vendor PCI-compliant?), and operational burden (who is responsible for patching and incident response?) are critical non-functional requirements alongside features and cost.","context":{}},
      {"level":5,"diff":2,"scenario":3,"q":"A technology evaluation concludes that Option A is technically superior but requires skills your team doesn't have. Option B is less powerful but well-understood by the team. How should this factor into the recommendation?","opts": ["Let the team vote", "Always choose the technically superior option", "Team capability and the cost of learning are real factors", "Hire for the missing skills before deciding", "Always choose the familiar option"], "ans": 2,"fb":"Technology evaluations that ignore team capability are incomplete. A superior technology that the team can't operate effectively in production is worse than a well-understood one. The recommendation should quantify the capability gap and the cost to close it as part of the decision.","context":{}},
      {"level":5,"diff":3,"scenario":3,"q":"Your evaluation recommends replacing the current service mesh with a newer alternative. The current mesh is embedded in 20 services. What must the evaluation include beyond the technical comparison?","opts": ["A full feature comparison table", "A reference to another company that uses the new mesh", "A performance benchmark of the new mesh", "A migration plan, rollback strategy, and assessment of the", "A cost model for the new mesh only"], "ans": 3,"fb":"Evaluating a replacement without addressing migration is incomplete. The recommendation is only viable if there's a credible path from here to there — how the 20 services will migrate, in what sequence, what the rollback plan is if it fails mid-migration, and what the transition period looks like for teams.","context":{}},
      {"level":5,"diff":3,"scenario":3,"q":"After a rigorous evaluation, your team recommends Technology A. A senior leader advocates for Technology B because they used it at a previous company. How do you handle this?","opts": ["Override the senior leader", "Present the evaluation criteria, findings", "Escalate to a higher authority", "Compromise by using both technologies", "Defer to the senior leader"], "ans": 1,"fb":"The right response is to engage with the leader's position professionally. Present the evaluation transparently and invite them to challenge specific criteria — perhaps they have context you don't. If their objection is 'I like it' without specific criteria, the evaluation stands. This approach respects the process while remaining open to new information.","context":{}},
      {"level":6,"diff":1,"scenario":0,"q":"The company is entering a new market that requires processing payments in a currency with non-standard precision rules. What is the first architecture question to answer?","opts": ["Whether to build a separate service for the new market", "Whether the current data model and arithmetic layer can represent the required", "How to update the UI for the new currency symbol", "Which payment provider supports this currency", "How the new market's regulatory requirements differ from existing ones"], "ans": 1,"fb":"Currency precision is a foundational concern — it touches storage (column types), computation (arithmetic libraries), APIs (serialisation format), and reporting. Understanding whether the existing data model can represent the precision and where it needs to change is the first question before any other design decision.","context":{}},
      {"level":6,"diff":2,"scenario":0,"q":"The business wants to launch a new BaaS product for a different vertical (e.g., lending). Your current platform was designed for payment processing. How do you approach the architecture decision?","opts": ["Adopt a lending-specific off-the-shelf platform", "Reuse the existing platform without changes", "Evaluate which capabilities are genuinely reusable", "Ask each team to extend their own service for lending", "Build a completely separate platform from scratch"], "ans": 2,"fb":"Forced reuse of a payments platform for lending creates architectural debt when the domains have fundamentally different models (e.g., amortisation, repayment schedules). The architecture decision must map genuine shared capabilities (auth, tenant management) from domain-specific ones (payment lifecycle vs loan lifecycle) and design accordingly.","context":{}},
      {"level":6,"diff":3,"scenario":0,"q":"The company is expanding to a jurisdiction that requires data to remain within a specific country. Your current architecture uses a single GCP region. What is the scope of the architecture impact?","opts": ["Only the services that handle PII", "Just the database — move it to the new region", "Just the API gateway and authentication service", "Potentially every layer that stores or processes regulated data: databases, caches", "Only services that the new jurisdiction's customers directly interact with"], "ans": 3,"fb":"Data residency requirements typically apply to all regulated data in motion and at rest. This means databases, message queues (Kafka topics), caches (Redis), logs (Cloud Logging export targets), and any service that processes the data. Each layer must be audited and potentially moved or replicated within the boundary.","context":{"Data residency":"Regulated data must not leave the specified jurisdiction — this applies to all storage and processing layers"}},
      {"level":6,"diff":1,"scenario":1,"q":"Your organisation is growing and teams are making significant architectural decisions without coordination. What process change addresses this?","opts": ["Ask teams to document their decisions in Confluence", "Require all decisions to be approved by the CTO", "Define which decisions require an ADR, who must be consulted, and establish a", "Assign all architectural decisions to a central architecture team", "Implement a weekly architecture review meeting for all decisions"], "ans": 2,"fb":"The goal is appropriate governance, not centralisation. Defining which decisions require an ADR (significant, hard-to-reverse, cross-cutting) and who must be consulted ensures coordination where it matters without slowing down every team decision. Over-centralisation creates bottlenecks.","context":{}},
      {"level":6,"diff":2,"scenario":1,"q":"Teams are writing ADRs but they vary wildly in quality — some are one-paragraph decisions, others are 10-page essays. How do you standardise without creating overhead?","opts": ["Allow any format — quality will improve naturally over time", "Hire a technical writer to maintain ADR quality", "Mandate a specific ADR template with required sections and a max page limit", "Only require ADRs from senior engineers", "Reject poor ADRs and send them back for revision"], "ans": 2,"fb":"A lightweight standard template (context, decision, alternatives, consequences) with clear section guidance and a soft page limit normalises quality without bureaucracy. The template sets expectations; examples of good ADRs calibrate what 'good' looks like. This is the right balance between consistency and overhead.","context":{}},
      {"level":6,"diff":3,"scenario":1,"q":"The ADR process is causing bottlenecks — teams feel that every decision requires review and approval, slowing them down. How do you redesign the process?","opts": ["Create a tiered process: significant/cross-cutting decisions", "Remove the ADR requirement entirely", "Make ADR review asynchronous to reduce meeting overhead", "Limit the number of ADRs any team can submit per sprint", "Delegate all ADR reviews to tech leads"], "ans": 0,"fb":"The bottleneck comes from applying the same process to all decisions regardless of scope. A tiered model — 'review required for cross-cutting decisions, self-approved for team-scoped ones' — preserves governance where it matters while removing friction for everyday decisions. Clear criteria for each tier prevent gaming.","context":{}},
      {"level":6,"diff":1,"scenario":4,"q":"You're establishing a design guild for your engineering organisation. What is its primary purpose?","opts": ["To review all ADRs before they are accepted", "To produce architecture diagrams for each service", "To approve all design decisions", "To manage the technology radar", "To build shared vocabulary, propagate patterns, and"], "ans": 4,"fb":"A design guild's primary value is community and shared learning, not governance or approval. It creates a space where good patterns spread, engineers learn from each other's decisions (including failures), and shared vocabulary develops organically. Conflating it with an approval body makes it a bottleneck.","context":{}},
      {"level":6,"diff":2,"scenario":4,"q":"Your platform lacks shared architectural vocabulary — teams use 'event', 'message', and 'command' interchangeably, causing confusion in design discussions. How do you address this?","opts": ["Leave it to individual teams to define their own vocabulary", "Hire a domain architect to define the vocabulary", "Mandate which terms to use in a company policy", "Write a glossary document and share it", "Run a workshop where teams define these terms together, anchored to"], "ans": 4,"fb":"Vocabulary imposed from above is resisted; vocabulary built together is adopted. A workshop that grounds definitions in real codebase examples builds shared understanding and buy-in. Embedding the vocabulary in templates and docs ensures it's reinforced in everyday work, not just in a document no one reads.","context":{}},
      {"level":6,"diff":3,"scenario":4,"q":"You want to establish reference architectures for common patterns (e.g., 'how to integrate with an external partner via Kafka'). What makes a reference architecture actually useful versus shelf ware?","opts": ["It should be validated against real use cases in your platform, include the", "It should be written by the most senior architects", "It should be stored in a wiki where everyone can find it", "It should prescribe a single implementation without alternatives", "It should be exhaustive and cover every edge case"], "ans": 0,"fb":"Reference architectures become shelf ware when they're abstract, unvalidated, or not maintained. Grounding them in real platform use cases makes them credible. Documenting the trade-offs they encode lets engineers know when to deviate. Maintenance keeps them from becoming outdated anti-patterns.","context":{}},,
      {"level": 6, "diff": 2, "scenario": 0, "q": "Engineering is expanding into a new region with different data residency laws. You are leading architecture. What is your first move?", "opts": ["Ask legal to approve the current architecture", "Replicate the existing stack into the new region", "Raise a ticket to audit existing Cloud SQL instances", "Map data flows and classify which data crosses borders", "Design a new microservice for region-specific logic"], "ans": 3, "fb": "Before any design work, you must understand which data moves where and what residency constraints apply. Replicating the existing stack without this assessment risks non-compliance. Legal sign-off is needed but cannot precede your own architectural analysis."},
      {"level": 6, "diff": 1, "scenario": 1, "q": "Teams are making impactful architectural decisions in PRs with no formal review. What process change addresses this most directly?", "opts": ["Mandate ADRs for every change regardless of size", "Define thresholds that trigger a mandatory design review", "Hold weekly architecture syncs for all teams", "Assign a dedicated architect to each team", "Require tech leads to approve all PRs"], "ans": 1, "fb": "Defining clear criteria for when a decision requires a formal review prevents both under-governance (big changes slipping through) and over-governance (trivial changes blocked). Blanket mandates create noise; weekly syncs are too slow for async teams."},
      {"level": 6, "diff": 3, "scenario": 2, "q": "A regulator requests evidence that your platform detects and contains data leakage between tenants. What do you produce?", "opts": ["Access logs filtered by tenant ID from the last 30 days", "A summary of your row-level security policy in PostgreSQL", "The PCI-DSS compliance checklist signed off by the security team", "A diagram showing tenant ID propagation through services", "A mapped data flow with isolation controls and detection evidence at each boundary"], "ans": 4, "fb": "Regulators need to see not just design intent but proof that controls exist and are observable at every point data crosses a boundary. Diagrams and checklists state policy; mapped flows with detection evidence demonstrate it operates in practice."},
      {"level": 6, "diff": 2, "scenario": 3, "q": "You are asked to present a technical debt roadmap to leadership. What makes your assessment credible rather than just a wish list?", "opts": ["A list of all known tech debt items ranked by age", "A comparison of the current stack against industry benchmarks", "An engineering survey of pain points by team", "Debt items linked to incidents, SLO misses, or delivery slowdowns with", "A cost estimate for rewriting the oldest services"], "ans": 3, "fb": "Credible assessments connect debt to measurable business impact — incidents, missed SLOs, slower delivery — and sequence fixes by risk and dependency. Lists and surveys surface problems but do not tell leadership why to invest or in what order."},
      {"level": 6, "diff": 3, "scenario": 4, "q": "You want teams to adopt a new internal platform capability. Top-down mandates have failed before. What approach is most likely to succeed?", "opts": ["Deprecate the old approach immediately to force migration", "Send an org-wide announcement with a migration deadline", "Make adoption a quarterly OKR for all engineering managers", "Hold training sessions before the rollout begins", "Embed the capability in a high-visibility team and document the"], "ans": 4, "fb": "Teams adopt platform capabilities when they see credible evidence of value, not because they are told to. A reference implementation in a real team creates proof and a network of advocates. Mandates without demonstrated value create resistance and workarounds."}
    ]
  },

    questions: [
      {"level":1,"diff":1,"scenario":0,"q":"A Grafana panel shows a red alert on 'HTTP error rate'. The panel has been red for 2 weeks and no one has complained. What is the most likely explanation?","opts":["Grafana has a known bug with HTTP error rate panels", "The alert threshold is misconfigured", "A real ongoing incident that no one noticed", "The panel is showing data from a decommissioned service", "The Grafana data source is broken and returning fake data"],"ans":1,"fb":"A persistent alert nobody acts on usually means the threshold is wrong, not a real incident. When an alert fires continuously with no user impact, suspect a misconfigured threshold first. Real incidents get noticed through user complaints or on-call pages."},
      {"level":1,"diff":1,"scenario":0,"q":"A Grafana panel shows a spike in latency p99 at 14:00, then returns to normal by 14:05. No alert fired. Should you investigate?","opts":["No — no alert fired, so it was within normal bounds", "Yes — you must open a P1 incident for any latency spike", "Yes — a 5-minute p99 spike may indicate a transient issue worth documenting even if auto-resolved", "No — Grafana only shows real problems when the panel is red", "No — p99 spikes are always caused by garbage collection and are expected"],"ans":2,"fb":"A transient spike that auto-resolved is still worth a brief investigation. It may have caused real user impact for those 5 minutes, or it may be a leading indicator of a larger issue. Check if it correlates with a deployment, a batch job, or a Kafka lag spike."},
      {"level":1,"diff":2,"scenario":0,"q":"You open Grafana during an on-call shift and see two panels: one red (error rate > 5%), one yellow (latency p95 slightly elevated). Which do you investigate first?","opts":["The oldest panel", "Neither — wait for an alert to page you before investigating", "Both simultaneously", "The yellow panel", "The red panel"],"ans":4,"fb":"Error rate > 5% is a direct symptom: users are seeing failures. Elevated p95 latency may be minor or a precursor. Always triage the most severe user-facing signal first — errors over slowness."},
      {"level":1,"diff":3,"scenario":0,"q":"Grafana shows a panel with a constant flat line at exactly 0 for 'payment_success_total'. Is this good or bad?","opts":["Neutral — counters at 0 are normal outside business hours", "Good — this confirms the payment service is idle", "Good — zero errors means the service is healthy", "Bad — a flat line at 0 on a counter usually means the metric is not", "Bad — a payment counter at 0 means all payments are failing"],"ans":3,"fb":"A counter stuck at exactly 0 for an active service is a red flag. Either the metric is not being scraped, the label filter in the query is wrong, or the service is not emitting the metric. A healthy payment service in production should always show some non-zero rate. Verify with a simpler query before trusting the panel."},
      {"level":1,"diff":1,"scenario":1,"q":"You run `kubectl get pods` and see a pod with STATUS `CrashLoopBackOff`. What does this mean?","opts":["The pod's container is repeatedly crashing and Kubernetes is backing", "The pod is waiting for a ConfigMap to be updated", "CrashLoopBackOff means the pod has too many replicas scheduled", "The pod is starting up and will be ready shortly", "The pod was manually stopped by an operator"],"ans":0,"fb":"CrashLoopBackOff means the container exits shortly after starting, and Kubernetes is increasing the delay between restart attempts. Check `kubectl logs <pod>` and `kubectl describe pod <pod>` to find the crash reason — common causes are OOM kills, missing config, or failed health checks."},
      {"level":1,"diff":1,"scenario":1,"q":"A pod shows RESTARTS=5 in `kubectl get pods`. What is the first command to understand why it restarted?","opts":["kubectl top pod <pod>", "kubectl rollout undo deployment/<name>", "kubectl exec <pod> -- ps aux", "kubectl logs <pod> --previous", "kubectl delete pod <pod>"],"ans":3,"fb":"`kubectl logs <pod> --previous` shows the logs of the terminated container instance, which contains the crash reason. Without `--previous`, you see the current (running) container logs, which won't show why it crashed. Use `kubectl describe pod <pod>` to see the termination reason (OOMKilled, Error, etc.)."},
      {"level":1,"diff":2,"scenario":1,"q":"A pod shows `OOMKilled` as the termination reason. What does this indicate and what is the immediate action?","opts":["The pod was killed because it was unhealthy", "The container exceeded its memory limit and was killed by", "The pod crashed due to a code exception", "OOMKilled means the node ran out of memory", "OOMKilled is a Kafka consumer error"],"ans":1,"fb":"OOMKilled (Out of Memory Killed) means the container hit its `resources.limits.memory` and the OOM killer terminated it. Check actual usage with `kubectl top pod` and Grafana JVM heap panels. If usage consistently approaches the limit, either increase the limit or investigate a memory leak with heap dump analysis."},
      {"level":1,"diff":2,"scenario":1,"q":"A pod's liveness probe is failing but the service appears to handle requests correctly. What could cause this?","opts":["The probe endpoint may be slow to respond, causing timeouts", "Liveness probes are advisory", "The probe fails because the pod is under-resourced", "Liveness probes only affect readiness", "A liveness probe failure always means the service is broken"],"ans":0,"fb":"A liveness probe failure triggers a pod restart even if the service is handling traffic. Common causes: the probe endpoint is slower than `timeoutSeconds`, the port is wrong, or the `/health/liveness` endpoint has a bug. Check `kubectl describe pod` for probe failure events and review the probe configuration in the deployment."},
      {"level":1,"diff":3,"scenario":1,"q":"Three pods in a deployment all show RESTARTS=0 but users report intermittent 502 errors. What kubectl investigation steps would you take?","opts":["Run `kubectl delete pod` on all pods to force a restart and see if errors stop", "Run `kubectl rollout restart deployment/<name>` immediately without investigating", "Check `kubectl get pods` for Ready status, run `kubectl describe pod` for each to check for probe", "Run `kubectl scale deployment/<name> --replicas=6` to add more pods and reduce load", "502s are always caused by missing ConfigMaps"],"ans":2,"fb":"502s with RESTARTS=0 often mean a pod is registered but not healthy. Check: (1) `kubectl describe pod` for readiness probe failures or warning events, (2) `kubectl get endpoints` to confirm all pods are in the endpoint list — a pod failing readiness is removed from the service. Pods can be alive (liveness passing) but not ready (readiness failing), causing traffic to hit it and return errors in some load balancer configurations."},
      {"level":1,"diff":1,"scenario":2,"q":"In Cloud Logging, you want to find all ERROR-level logs from the payment-service in the last hour. Which filter would you use?","opts":["resource.type=\"k8s_container\" AND", "severity=ERROR AND timestamp>now()-1h", "service=payment-service AND log_level>WARNING", "container.name=payment-service severity>=ERROR", "logName=\"payment-service\" AND level=ERROR"],"ans":0,"fb":"Cloud Logging uses structured filter syntax. `resource.type=\"k8s_container\"` scopes to GKE containers, `resource.labels.container_name` identifies the specific service, and `severity=ERROR` filters by log level. The time range is set via the UI time picker or `timestamp` filter. Incorrect syntax like `logName=payment-service` or `level=ERROR` won't match Cloud Logging's schema."},
      {"level":1,"diff":1,"scenario":2,"q":"A developer says 'I can't find my log line in Cloud Logging — I printed it with System.out.println'. What is the issue?","opts":["System.out.println output is delayed by 10 minutes before appearing in Cloud Logging", "GKE does not capture stdout", "stdout from containers is captured by Cloud Logging, but plain System.out.println produces an unstructured log", "Cloud Logging only captures logs at ERROR level or above", "Spring Boot routes stdout to Cloud Logging but only if the app is deployed with a specific label"],"ans":2,"fb":"Container stdout is captured by Cloud Logging, so the log line is there — but System.out.println produces an unstructured string with no severity, no trace ID, no tenant ID. It's hard to filter and correlates with nothing. Structured logging with Logback/SLF4J emits JSON with severity, timestamp, and custom fields that Cloud Logging indexes and makes searchable."},
      {"level":1,"diff":2,"scenario":2,"q":"You need to find all logs for a specific request that returned a 500 error. The trace ID is `abc123`. How do you find all related log lines across services?","opts":["Search for `500` in Cloud Logging", "Filter by `labels.trace_id=\"abc123\"` or `jsonPayload.traceId=\"abc123\"` to find all log", "Search by time range and manually correlate log lines by reading through them", "Use `kubectl logs` to dump all pod logs and grep locally", "Trace IDs are only in Cloud Trace"],"ans":1,"fb":"If services log the trace ID as a structured field, filtering by it in Cloud Logging returns all correlated log lines from all services in a single query. This is why structured logging with trace ID propagation is essential — it enables request-scoped log correlation across service boundaries without manual time-based correlation."},
      {"level":1,"diff":3,"scenario":2,"q":"Cloud Logging shows the payment service emitting 10,000 log lines per minute at INFO level, causing excessive logging costs. What is the right approach?","opts":["Disable Cloud Logging entirely for the payment service", "Lower the log level to WARN or ERROR in production via the logging configuration", "INFO logs are free", "Delete all INFO logs from Cloud Logging using a sink exclusion filter", "Increase the Cloud Logging quota to accommodate the volume"],"ans":1,"fb":"10,000 log lines/minute at INFO is excessive for production. Best practice: set production log level to WARN/ERROR, log INFO only for critical business events (payment initiated, payment confirmed), and use metrics for high-frequency measurements. Cloud Logging charges by ingestion volume — reducing log verbosity is the primary cost control lever. Log-based metrics can replace log lines for counting events."},
      {"level":1,"diff":1,"scenario":3,"q":"An alert fires at 03:00. The runbook says 'Step 1: check pod health'. You check and all pods are Running. What do you do next?","opts":["Restart all pods as a precaution", "Delete the alert rule", "Follow the next step in the runbook", "Close the alert", "Page the on-call lead immediately"],"ans":2,"fb":"Runbooks are designed as sequential diagnostic steps. Pod health being OK rules out one cause but the alert still fired for a reason. Follow the next runbook step — it will check a more specific symptom. Only escalate after exhausting the runbook steps or finding something the runbook doesn't cover."},
