<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering Training — Find Your Zone</title>
<style>
  :root {
    --bg: #0f0d13;
    --surface: #1a1820;
    --card: #222028;
    --border: rgba(255,255,255,0.08);
    --border-h: rgba(255,255,255,0.15);
    --accent: #6e8efa;
    --accent-soft: rgba(110,142,250,0.12);
    --accent-mid: rgba(110,142,250,0.25);
    --text: #e8e6f0;
    --sub: rgba(232,230,240,0.65);
    --muted: rgba(232,230,240,0.35);
    --green: #4ade80;
    --green-soft: rgba(74,222,128,0.12);
    --amber: #fbbf24;
    --amber-soft: rgba(251,191,36,0.12);
    --coral: #f87171;
    --coral-soft: rgba(248,113,113,0.12);
    --radius: 10px;
    --radius-lg: 16px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 32px 32px 48px;
  }

  .app { width: 100%; max-width: 1200px; }

  /* ── Animations ─────────────────────────────── */
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  @keyframes slideIn { from { opacity:0; transform:translateX(-12px); } to { opacity:1; transform:translateX(0); } }
  @keyframes needleBob { 0%,100% { transform:translateX(0); } 50% { transform:translateX(2px); } }

  .fade-up { animation: fadeUp 0.4s cubic-bezier(0.22,1,0.36,1) both; }
  .fade-in { animation: fadeIn 0.3s both; }

  /* ── Start Screen ──────────────────────────── */
  .start-screen { text-align: center; padding-top: 60px; max-width: 700px; margin: 0 auto; }
  .start-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 16px;
  }
  .start-title {
    font-size: clamp(26px, 5vw, 42px); font-weight: 800;
    letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 16px;
  }
  .start-sub {
    font-size: 15px; color: var(--sub); line-height: 1.65;
    max-width: 440px; margin: 0 auto 32px;
  }
  .start-meta {
    display: flex; justify-content: center; gap: 24px;
    margin-bottom: 40px; font-size: 13px; color: var(--muted);
  }
  .start-meta span { display: flex; align-items: center; gap: 6px; }
  .start-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 14px 36px; border-radius: 999px;
    background: var(--accent); color: #fff; border: none;
    font-size: 15px; font-weight: 600; cursor: pointer;
    transition: all 0.2s; letter-spacing: 0.01em;
  }
  .start-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
  .start-btn:active { transform: translateY(0); }

  /* ── Compass/Needle ────────────────────────── */
  .compass { margin-bottom: 24px; }
  .compass-row {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    margin-bottom: 12px;
  }
  .compass-neighbor {
    font-size: 12px; color: var(--muted); text-align: center;
    min-width: 80px; transition: opacity 0.4s;
  }
  .compass-neighbor-name { font-weight: 600; display: block; margin-bottom: 2px; }
  .compass-neighbor-num { font-size: 11px; opacity: 0.7; }
  .compass-neighbor.hidden { opacity: 0; pointer-events: none; }

  .compass-circle {
    width: 130px; height: 130px; border-radius: 50%;
    border: 2.5px solid var(--accent);
    background: var(--accent-soft);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex-shrink: 0; position: relative;
    transition: border-color 0.5s, background 0.5s;
  }
  .compass-level-num {
    font-family: var(--mono); font-size: 36px; font-weight: 700;
    color: var(--accent); line-height: 1;
    transition: color 0.5s;
  }
  .compass-level-name {
    font-size: 13px; font-weight: 600; color: var(--accent);
    margin-top: 2px; transition: color 0.5s;
  }

  .compass-arrow {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-size: 14px;
    transition: opacity 0.3s, border-color 0.3s, color 0.3s;
  }
  .compass-arrow.pulse { color: var(--accent); border-color: var(--accent-mid); animation: pulse 1.5s ease-in-out infinite; }
  .compass-arrow.hidden { opacity: 0; }

  /* Needle track */
  .needle-wrap { margin: 0 auto 4px; }
  .needle-track {
    position: relative; height: 20px;
    display: flex; align-items: center;
  }
  .needle-bg {
    position: absolute; top: 9px; left: 28px; right: 28px;
    height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px;
  }
  .needle-center {
    position: absolute; top: 6px; left: 50%; width: 1.5px; height: 8px;
    background: rgba(255,255,255,0.15); margin-left: -0.75px;
  }
  .needle-dot {
    position: absolute; top: 5px; width: 10px; height: 10px;
    border-radius: 50%; background: var(--accent);
    transition: left 0.8s cubic-bezier(0.22,1,0.36,1);
    margin-left: -5px;
  }
  .needle-labels {
    display: flex; justify-content: space-between;
    margin: 0 auto 16px; padding: 0 20px;
  }
  .needle-labels span {
    font-size: 10px; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; color: var(--muted);
  }

  /* ── Quiz landscape layout ──────────────────── */
  #screen-quiz {
    display: grid; grid-template-columns: 240px 1fr;
    gap: 40px; align-items: start;
  }
  .quiz-sidebar { position: sticky; top: 32px; }
  .quiz-main { min-width: 0; }

  /* ── Progress dots ─────────────────────────── */
  .progress-dots {
    display: flex; justify-content: center; gap: 5px; margin-bottom: 16px;
  }
  .p-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: rgba(255,255,255,0.1); transition: all 0.3s;
  }
  .p-dot.done { background: var(--accent); }
  .p-dot.active { background: var(--accent); width: 18px; border-radius: 4px; }

  /* ── Question Card ─────────────────────────── */
  .q-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 0;
    animation: fadeUp 0.35s cubic-bezier(0.22,1,0.36,1) both;
    display: grid; grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    min-height: 360px;
  }
  .q-context-row {
    grid-column: 1 / -1;
    border-top: 1px solid var(--border);
    padding: 16px 28px;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
  }
  .q-col-left {
    padding: 28px; border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
  }
  .q-col-right {
    padding: 28px; display: flex; flex-direction: column; justify-content: space-between;
  }
  .q-meta {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px; flex-wrap: wrap;
  }
  .q-badge {
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: 6px; letter-spacing: 0.02em;
  }
  .q-badge-level { background: var(--accent-soft); color: var(--accent); }
  .q-badge-diff { background: rgba(255,255,255,0.05); color: var(--muted); }
  .q-counter { font-size: 12px; color: var(--muted); margin-left: auto; }
  .q-label {
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 8px;
  }
  .q-text {
    font-size: 15px; line-height: 1.65; color: var(--text); margin-bottom: 18px;
  }
  .q-text code {
    font-family: var(--mono); font-size: 13px;
    background: rgba(255,255,255,0.06); padding: 2px 6px; border-radius: 4px;
  }

  /* Context panels — now in full-width row, keep .q-context for legacy */
  .q-context {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    gap: 6px;
  }
  .q-ctx-item {
    background: var(--surface); border-radius: 8px; padding: 8px 10px;
  }
  .q-ctx-k {
    font-size: 10px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 2px;
  }
  .q-ctx-v {
    font-family: var(--mono); font-size: 12px; color: var(--text);
  }

  /* Options */
  .q-opts { display: flex; flex-direction: column; gap: 6px; }
  .q-opt {
    display: block; width: 100%; padding: 12px 14px;
    border-radius: var(--radius); border: 1px solid var(--border);
    background: transparent; cursor: pointer; text-align: left;
    font-family: var(--font); font-size: 13px; line-height: 1.55;
    color: var(--text); transition: all 0.15s;
  }
  .q-opt:hover { border-color: var(--border-h); background: rgba(255,255,255,0.02); }
  .q-opt.selected {
    border-color: var(--accent); background: var(--accent-soft);
  }
  .q-opt.disabled { pointer-events: none; opacity: 0.5; }
  .q-opt.correct-reveal {
    border-color: rgba(74,222,128,0.6) !important; background: var(--green-soft) !important;
    opacity: 1 !important;
  }
  .q-opt.wrong-pick {
    border-color: rgba(248,113,113,0.6) !important; background: var(--coral-soft) !important;
    opacity: 1 !important;
  }

  .q-submit-wrap {
    margin-top: 16px; text-align: right;
  }
  .q-next {
    padding: 10px 24px; border-radius: 999px;
    background: var(--accent); color: #fff; border: none;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
  }
  .q-next:disabled { opacity: 0.35; cursor: not-allowed; filter: none; }
  .q-next:not(:disabled):hover { filter: brightness(1.1); }

  /* ── Status message ────────────────────────── */
  .status-msg {
    text-align: center; padding: 10px 16px;
    border-radius: var(--radius); margin-bottom: 20px;
    font-size: 13px; line-height: 1.5;
    animation: fadeIn 0.4s both;
  }
  .status-msg.info { background: var(--accent-soft); color: var(--accent); }
  .status-msg.warm { background: var(--amber-soft); color: var(--amber); }
  .status-msg.good { background: var(--green-soft); color: var(--green); }

  /* ── Result Screen ─────────────────────────── */
  .result { animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) both; max-width: 720px; margin: 0 auto; }
  .result-header { text-align: center; margin-bottom: 32px; }
  .result-eyebrow {
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--accent); margin-bottom: 12px;
  }
  .result-title {
    font-size: clamp(22px, 4vw, 32px); font-weight: 800;
    letter-spacing: -0.02em; margin-bottom: 8px;
  }
  .result-sub {
    font-size: 14px; color: var(--sub); line-height: 1.6;
    max-width: 420px; margin: 0 auto;
  }
  .result-circle-wrap { text-align: center; margin-bottom: 28px; display: flex; align-items: center; justify-content: center; gap: 0; }
  .result-circle {
    display: inline-flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 150px; height: 150px; border-radius: 50%;
    border: 3px solid var(--accent); background: var(--accent-soft);
  }
  .result-circle.target {
    border-color: var(--green); background: var(--green-soft);
  }
  .result-num {
    font-family: var(--mono); font-size: 44px; font-weight: 700;
    color: var(--accent); line-height: 1;
  }
  .result-circle.target .result-num { color: var(--green); }
  .result-name {
    font-size: 14px; font-weight: 600; color: var(--accent); margin-top: 2px;
  }
  .result-circle.target .result-name { color: var(--green); }
  .result-ramp-arrow {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; padding: 0 18px;
  }
  .result-ramp-label {
    font-size: 11px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted);
  }
  .result-ramp-line {
    display: flex; align-items: center; gap: 0;
  }
  .result-ramp-shaft {
    width: 52px; height: 2px; background: var(--muted);
  }
  .result-ramp-head {
    width: 0; height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 10px solid var(--muted);
  }
  .result-rec {
    text-align: center; font-size: 14px; color: var(--sub);
    line-height: 1.6; margin-bottom: 32px;
  }

  .result-section {
    margin-bottom: 24px;
  }
  .result-section-title {
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  }
  .result-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .result-tag {
    font-size: 12px; padding: 5px 12px; border-radius: 6px;
    line-height: 1.4;
  }
  .result-tag.strong { background: var(--green-soft); color: var(--green); }
  .result-tag.grow { background: var(--amber-soft); color: var(--amber); }
  .result-tag.deeper { background: var(--accent-soft); color: var(--accent); }

  .result-detail {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px;
  }
  .result-detail-title {
    font-size: 13px; font-weight: 600; margin-bottom: 10px;
  }
  .result-detail-row {
    display: flex; align-items: flex-start; gap: 10px;
    font-size: 13px; color: var(--sub); padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .result-detail-row:last-child { border-bottom: none; }
  .result-dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
  }
  .result-dot.g { background: var(--green); }
  .result-dot.a { background: var(--amber); }
  .result-dot.r { background: var(--coral); }
  .result-q-text { flex: 1; line-height: 1.5; color: var(--sub); }
  .result-q-level { font-size: 11px; font-weight: 600; color: var(--muted);
    min-width: 85px; flex-shrink: 0; padding-top: 1px; }
  .result-answers { margin-top: 6px; display: flex; flex-direction: column; gap: 4px; }
  .result-ans-row { font-size: 12px; line-height: 1.45; display: flex; align-items: flex-start; gap: 6px; }
  .result-ans-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.03em;
    text-transform: uppercase; flex-shrink: 0; padding-top: 1px; min-width: 54px;
  }
  .result-ans-label.yours { color: var(--coral); }
  .result-ans-label.yours.ok { color: var(--green); }
  .result-ans-label.correct { color: var(--green); }
  .result-ans-text { color: var(--sub); }
  .result-fb {
    margin-top: 8px; padding: 8px 12px;
    border-radius: var(--radius); border-left: 2px solid var(--accent);
    background: var(--surface); font-size: 12px; line-height: 1.55;
    color: var(--muted);
  }
  .result-expand-btn {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 6px; padding: 0; background: none; border: none;
    font-size: 11px; font-weight: 600; color: var(--muted);
    cursor: pointer; letter-spacing: 0.03em; font-family: var(--font);
  }
  .result-expand-btn:hover { color: var(--accent); }
  .result-expand-btn .chevron {
    display: inline-block; width: 0; height: 0;
    border-left: 4px solid transparent; border-right: 4px solid transparent;
    border-top: 5px solid currentColor; transition: transform 0.2s;
  }
  .result-expand-btn.open .chevron { transform: rotate(180deg); }
  .result-collapsible { display: none; }
  .result-collapsible.open { display: block; }

  .result-restart {
    display: block; width: 100%; padding: 14px;
    border-radius: var(--radius); border: 1px solid var(--border);
    background: transparent; color: var(--sub); font-family: var(--font);
    font-size: 14px; cursor: pointer; transition: all 0.2s;
    margin-top: 32px;
  }
  .result-restart:hover { border-color: var(--accent); color: var(--text); }

  /* ── Responsive ────────────────────────────── */
  @media (max-width: 900px) {
    #screen-quiz { grid-template-columns: 1fr; gap: 24px; }
    .quiz-sidebar { position: static; }
  }
  @media (max-width: 700px) {
    .q-card { grid-template-columns: 1fr; }
    .q-col-left { border-right: none; border-bottom: 1px solid var(--border); padding: 20px 16px; }
    .q-col-right { padding: 20px 16px; }
    body { padding: 20px 16px 40px; }
  }
  @media (max-width: 480px) {
    .compass-neighbor { min-width: 60px; font-size: 11px; }
    .compass-circle { width: 110px; height: 110px; }
    .compass-level-num { font-size: 30px; }
  }

  /* ── Track selector grid ─────────────────── */
  .track-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    margin: 28px 0 0; text-align: left;
  }
  .track-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 20px;
    cursor: pointer; transition: all 0.2s; position: relative;
  }
  .track-card:hover { border-color: var(--accent); background: rgba(110,142,250,0.06); }
  .track-card.disabled { opacity: 0.4; pointer-events: none; }
  .track-card-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent-soft); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; margin-bottom: 12px;
    font-family: var(--mono);
  }
  .track-card-icon.db::before { content: 'DB'; }
  .track-card-icon.jvm::before { content: 'JVM'; font-size: 11px; }
  .track-card-icon.design::before { content: 'SD'; }
  .track-card-icon.cloud::before { content: 'CO'; font-size: 11px; }
  .track-card-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .track-card-desc { font-size: 12px; color: var(--sub); line-height: 1.5; }
  .track-card-count {
    position: absolute; top: 12px; right: 12px;
    font-size: 10px; font-weight: 600; color: var(--muted);
    background: var(--surface); padding: 2px 8px; border-radius: 4px;
  }
  .track-card-empty {
    font-size: 10px; color: var(--muted); font-weight: 600;
    letter-spacing: 0.04em; text-transform: uppercase;
    margin-top: 8px;
  }

  @media (max-width: 480px) {
    .track-grid { grid-template-columns: 1fr; }
  }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div class="app" id="app">

  <!-- Start Screen -->
  <!-- Start Screen -->
  <div id="screen-start" class="start-screen fade-up">
    <p class="start-eyebrow">SEB Embedded · Engineering Training</p>
    <h1 class="start-title">Find your zone</h1>
    <p class="start-sub">Pick a competency area and we'll discover where your expertise sits — so we can place you in the right training group.</p>
    <div class="track-grid" id="track-grid"></div>
    <div style="margin-top:24px;">
      <label style="display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:var(--muted);user-select:none;">
        <input type="checkbox" id="test-mode-toggle" style="accent-color:var(--accent);width:14px;height:14px;cursor:pointer;" onchange="window.__testMode=this.checked">
        Show correct answers (testing mode)
      </label>
    </div>
  </div>

  <!-- Quiz Screen -->
  <div id="screen-quiz" class="hidden">
    <div class="quiz-sidebar">
      <div class="compass" id="compass">
        <div class="compass-row">
          <div class="compass-neighbor" id="prev-neighbor">
            <span class="compass-neighbor-name" id="prev-name">—</span>
            <span class="compass-neighbor-num" id="prev-num"></span>
          </div>
          <div class="compass-arrow" id="arrow-left">←</div>
          <div class="compass-circle" id="circle">
            <div class="compass-level-num" id="circle-num">1</div>
            <div class="compass-level-name" id="circle-name">Foundations</div>
          </div>
          <div class="compass-arrow" id="arrow-right">→</div>
          <div class="compass-neighbor" id="next-neighbor">
            <span class="compass-neighbor-name" id="next-name">Practitioner</span>
            <span class="compass-neighbor-num" id="next-num">Level 2</span>
          </div>
        </div>
        <div class="needle-wrap">
          <div class="needle-track">
            <div class="needle-bg"></div>
            <div class="needle-center"></div>
            <div class="needle-dot" id="needle" style="left:50%"></div>
          </div>
        </div>
        <div class="needle-labels"><span>← previous</span><span>next →</span></div>
      </div>
      <div id="status-area"></div>
    </div>

    <div class="quiz-main">
      <div class="progress-dots" id="progress-dots"></div>
      <div id="question-area"></div>
    </div>
  </div>

  <!-- Result Screen -->
  <div id="screen-result" class="hidden"></div>

</div>

<script>
/*══════════════════════════════════════════════════
  TRACK REGISTRY — all 4 tracks with levels and questions.
  Each track can also be maintained in a separate .js file
  (questions-database.js, questions-jvm.js, etc.) for

    questions: [
    {"level":1,"diff":1,"scenario":0,"q":"You need all orders where country is 'SE' AND total > 1000. Which clause and syntax is correct?","opts":["SELECT * FROM orders FILTER(WHERE country='SE' AND total>1000)","SELECT * FROM orders HAVING country='SE' AND total>1000","SELECT * FROM orders WHERE country='SE' OR total>1000","SELECT * FROM orders WHERE country='SE' JOIN total>1000","SELECT * FROM orders WHERE country='SE' AND total>1000"],"ans":4,"fb":"WHERE filters rows before aggregation; HAVING applies after GROUP BY. AND requires both conditions; OR requires either. FILTER is only valid inside aggregate functions."},
    {"level":1,"diff":1,"scenario":1,"q":"A column customer_id is marked FOREIGN KEY REFERENCES customers(id). What does this enforce?","opts":["The column must contain UUIDs","Duplicate customer_id values are prevented within this table","PostgreSQL automatically creates an index on this column","Each value must exist as a primary key in the customers table, preventing orphan records","Deleting a customer row automatically deletes related rows"],"ans":3,"fb":"A FOREIGN KEY guarantees referential integrity — every value must point to an existing PK in the referenced table. PostgreSQL does NOT auto-create indexes on FK columns. Cascading deletes are a separate ON DELETE CASCADE setting."},
    {"level":1,"diff":1,"scenario":0,"q":"You want all customers who have at least one order, with their order count. Which query is correct?","opts":["SELECT c.name, COUNT(*) FROM customers c, orders o GROUP BY c.id","SELECT c.name, COUNT(o.id) FROM customers c INNER JOIN orders o ON c.id=o.customer_id GROUP BY c.id","SELECT c.name, SUM(1) FROM customers c JOIN orders o GROUP BY c.name","SELECT c.name, COUNT(o.id) FROM customers c LEFT JOIN orders o ON c.id=o.customer_id GROUP BY c.id","SELECT c.name, COUNT(o.id) FROM customers c RIGHT JOIN orders o ON c.id=o.customer_id GROUP BY c.id"],"ans":1,"fb":"INNER JOIN returns only customers with at least one matching order. LEFT JOIN includes customers with zero orders. A comma join without a join condition produces a Cartesian product."},
    {"level":1,"diff":2,"scenario":2,"q":"Your ORM generates one query for the parent list, then a separate query for every row returned. What anti-pattern is this?","opts":["N+1 query problem","Full table scan","Dirty read","Over-fetching","Cartesian product"],"ans":0,"fb":"N+1: 1 query fetches the parent list, then N queries fetch related data per row. Fix with JOIN FETCH in JPQL or batch-size configuration so the ORM retrieves related data in one or two queries."},
    {"level":1,"diff":2,"scenario":2,"q":"A Spring Boot app calls customerRepo.findAll() and sees 51 database queries for 50 customers. The Customer entity has a @OneToMany to orders. What is the root cause?","opts":["Spring Data JPA always generates N+1 queries for OneToMany by design","PostgreSQL limits result sets to 50 rows without pagination","The orders relationship is LAZY","findAll() calls itself recursively due to a Spring Data bug","The database schema is missing an index on the foreign key"],"ans":2,"fb":"LAZY loading defers the relationship until accessed. Iterating customers and touching .getOrders() triggers one SELECT per customer. Fix: JPQL JOIN FETCH, EntityGraph, or @BatchSize to bulk-load associations."},
    {"level":1,"diff":2,"scenario":3,"q":"A new engineer needs to connect to your Cloud SQL PostgreSQL instance from inside their DevContainer. What is the correct approach?","opts":["Run Cloud SQL Auth Proxy inside the DevContainer and connect to localhost","Use only Cloud SQL Studio in the GCP console","Install psql directly on their laptop and connect with the public IP","Use a VPN to access the Cloud SQL private IP directly","Open firewall rules to allow their IP address in the Cloud SQL authorised networks"],"ans":0,"fb":"Cloud SQL Auth Proxy handles IAM-based auth and encrypted tunnelling — no IP allowlisting needed. It runs inside the DevContainer alongside the app, so all tooling connects to localhost:5432.","context":{"Environment":"DevContainer","Database":"Cloud SQL PostgreSQL","Auth":"IAM / Auth Proxy","App connects to":"localhost:5432"}},
    {"level":1,"diff":3,"scenario":4,"q":"Transaction A reads a row (balance=500). Transaction B updates it to 300 and commits. Transaction A reads the same row again and now sees 300. What is this anomaly called?","opts":["Write skew","Non-repeatable read","Dirty read","Lost update","Phantom read"],"ans":1,"fb":"Non-repeatable read: the same row returns different values within one transaction because another transaction committed a change between the two reads. READ COMMITTED (PostgreSQL default) allows this. REPEATABLE READ prevents it."},
    {"level":1,"diff":3,"scenario":4,"q":"A Spring Boot service wraps three database writes in a single @Transactional method. The third write throws a RuntimeException. What happens?","opts":["The first two writes are committed immediately when executed","PostgreSQL retries the failed write automatically","The first two are committed if saveAndFlush() was called before the exception","Behaviour depends on whether the exception is checked or unchecked","The entire transaction is rolled back"],"ans":4,"fb":"Spring rolls back @Transactional methods on unchecked exceptions (RuntimeException, Error) by default. All writes in the transaction are undone atomically. Checked exceptions do NOT trigger rollback unless you add rollbackFor."},
    {"level":1,"diff":3,"scenario":4,"q":"SELECT * FROM items WHERE status='active' is slow on a 1M row table where 10,000 rows are active. A colleague suggests adding an index on status. What is the most accurate response?","opts":["An index on status will always speed this up","An index on status will definitely not help","Indexes only help with primary key lookups, not string columns","A standard B-tree index on status may not help due to low cardinality","The only fix is to move active items to a separate table"],"ans":3,"fb":"Low cardinality (active/inactive) makes a full B-tree index barely selective — PostgreSQL may prefer a seq scan. A partial index covers only matching rows, making it tiny and fast."},
    {"level":2,"diff":1,"scenario":1,"q":"EXPLAIN ANALYZE shows \"Seq Scan on orders (cost=0..4500 rows=120000)\". What does this signal?","opts":["The query is fast","cost=4500 means the query completed in 4.5 seconds","PostgreSQL is reading the entire table","The table has 120k duplicate rows that need deduplication","The query has a syntax error preventing index use"],"ans":2,"fb":"Seq Scan on a large table with a selective filter usually means no usable index exists. The high estimated cost and row count confirm PostgreSQL found no better path."},
    {"level":2,"diff":1,"scenario":1,"q":"EXPLAIN ANALYZE shows Index Scan (cost=0..8 rows=1) but actual execution takes 850ms and returns 50,000 rows. What explains the mismatch?","opts":["The index is corrupt and must be rebuilt","The 850ms includes network latency from Cloud SQL Auth Proxy","Index scans are always slow for more than 100 rows","Stale table statistics caused the planner to wildly underestimate row","The query is missing a WHERE clause"],"ans":3,"fb":"The planner chose the index scan because it estimated only 1 row — but 50k were returned. Stale statistics (autovacuum falling behind) cause this. Run ANALYZE on the table."},
    {"level":2,"diff":1,"scenario":0,"q":"You're designing a schema for payments. Each payment belongs to exactly one account. How do you correctly model this?","opts":["Store account_id as TEXT to allow future flexibility","Store account data as a JSONB column inside the payments table","Add account_id BIGINT REFERENCES accounts(id) NOT NULL to the payments table","Use a junction table","Add a composite primary key (payment_id, account_id) to enforce the relationship"],"ans":2,"fb":"A NOT NULL foreign key column correctly models a mandatory many-to-one relationship. JSONB loses type safety and relational integrity. TEXT for IDs sacrifices type safety."},
    {"level":2,"diff":2,"scenario":2,"q":"You need to add a NOT NULL column processed_at TIMESTAMPTZ to a 40M row production table. What is the safest approach?","opts":["Drop and recreate the table with the new column","Add the column as nullable first, batch-backfill values","Add the column as nullable permanently and handle nulls in application code","ALTER TABLE payments ADD COLUMN processed_at TIMESTAMPTZ NOT NULL","Wrap the ALTER TABLE in a transaction alongside the application deploy"],"ans":1,"fb":"Adding NOT NULL on a large table requires a full table scan to validate every row, holding an exclusive lock. Safe pattern: add nullable → batch backfill in chunks → ADD CONSTRAINT ... NOT VALID, then VALIDATE CONSTRAINT.","context":{"Table size":"40M rows","Constraint":"Zero downtime"}},
    {"level":2,"diff":2,"scenario":2,"q":"You're adding an index to a live production table with 8M rows and continuous writes. Which command prevents blocking writes during creation?","opts":["ALTER TABLE orders ADD INDEX (user_id) CONCURRENTLY","CREATE INDEX idx_orders_user ON orders(user_id)","VACUUM ANALYZE orders","BEGIN; CREATE INDEX idx_orders_user ON orders(user_id); COMMIT;","CREATE INDEX CONCURRENTLY idx_orders_user ON orders(user_id)"],"ans":4,"fb":"CREATE INDEX CONCURRENTLY builds without a lock that blocks writes. It takes longer and cannot run inside a transaction block.","context":{"Table":"8M rows","Write load":"Continuous","Constraint":"No write blocking during build"}},
    {"level":2,"diff":2,"scenario":3,"q":"You have a composite index on (account_id, status, created_at). Which query uses this index most efficiently?","opts":["SELECT * FROM txns WHERE account_id=123 AND status='pending'","SELECT * FROM txns WHERE status='pending'","SELECT * FROM txns ORDER BY created_at DESC","SELECT * FROM txns WHERE created_at > '2024-01-01'","SELECT * FROM txns WHERE status='pending' AND created_at > '2024-01-01'"],"ans":0,"fb":"Composite indexes work left-to-right. Queries starting with the leading column (account_id) can use the index. Skipping account_id bypasses it entirely."},
    {"level":2,"diff":3,"scenario":4,"q":"Two transactions both read balance=500, both deduct 200, both write 300. Final balance is 300 instead of 100. Which isolation level prevents this lost update?","opts":["Any isolation level prevents lost updates automatically","READ UNCOMMITTED","SNAPSHOT ISOLATION (not available in PostgreSQL)","READ COMMITTED (the PostgreSQL default)","REPEATABLE READ or SERIALIZABLE"],"ans":4,"fb":"READ COMMITTED allows lost updates — the second write silently overwrites the first. REPEATABLE READ detects the write conflict and aborts the second transaction with a serialization error."},
    {"level":2,"diff":3,"scenario":2,"q":"A colleague shares a Liquibase migration guide warning that 'adding a column with a non-null default rewrites the entire table'. The guide was written for PostgreSQL 10. Your system runs PostgreSQL 16. How does this behave differently?","opts":["PostgreSQL 16 requires CONCURRENTLY keyword to avoid the rewrite: ALTER TABLE ... ADD COLUMN ... DEFAULT x CONCURRENTLY","Since PostgreSQL 11, adding a column with a non-null constant default is instant","The behaviour is identical","The guide is correct","PostgreSQL 16 still rewrites the table but uses parallel workers to reduce lock duration"],"ans":1,"fb":"PostgreSQL 11 changed this behaviour: adding a column with a non-null constant default is now instant — the default is stored in pg_attribute and returned for existing rows without touching them. On PostgreSQL 16 this is safe. The old rewrite behaviour is important historical context when reviewing migration guides or Liquibase changelogs written for older versions.","context":{"PostgreSQL":"16 (fixed since 11)","Table":"30M rows","Operation":"ADD COLUMN with non-null DEFAULT"}},
    {"level":2,"diff":3,"scenario":4,"q":"pg_stat_activity shows many connections in \"idle in transaction\" state for over 10 minutes. What is the primary risk?","opts":["These connections consume excess memory but don't affect query performance","Cloud SQL automatically kills these connections after 30 minutes","They hold locks on any rows touched during the transaction","They indicate the application is handling long-running batch jobs correctly","This is expected Spring @Transactional behaviour for read-heavy workloads"],"ans":2,"fb":"Idle-in-transaction connections hold any locks acquired and occupy HikariCP pool slots, starving other requests. Set idle_in_transaction_session_timeout on Cloud SQL to auto-kill them."},
    {"level":3,"diff":1,"scenario":3,"q":"A payments table has 200M rows. 90% of queries filter status='pending' but only 0.1% of rows are pending. Which index is best?","opts":["A standard B-tree index on (status)", "A GIN index on status", "A BRIN index on status", "A partial index: CREATE INDEX ON payments(id)", "A composite index on (id, status, amount)"],"ans":3,"fb":"A partial index covers only the matching subset — it's tiny and fast. A full B-tree on a low-cardinality column is rarely selective enough. BRIN is for naturally ordered data (timestamps), not categorical columns.","context":{"Table":"200M rows","Pending rows":"0.1%"}},
    {"level":3,"diff":1,"scenario":0,"q":"Your domain requires an immutable financial audit trail — once a payment event is recorded, it must never be modified or deleted. Which schema pattern best enforces this at the database level?","opts":["Use an append-only events table with UPDATE and DELETE privileges revoked from the application role","Encrypt rows at the application level and store the encrypted blob in a TEXT column","Use UNLOGGED tables which can't be modified without special privileges","Use an UPDATE trigger that logs all changes to a shadow table","Use PostgreSQL's built-in row versioning to store history automatically"],"ans":0,"fb":"Revoke UPDATE/DELETE from the application's database role — don't rely solely on application logic. Append-only event tables with no write-back permissions are the correct pattern for immutable audit trails."},
    {"level":3,"diff":1,"scenario":0,"q":"A query filters on account_id=123 AND created_at BETWEEN '2024-01-01' AND '2024-03-31' on a 500M row transactions table. Which index design is best?","opts":["Two separate indexes: one on account_id, one on created_at","A GiST index on (account_id, created_at) for range queries","A composite index on (account_id, created_at)","A composite index on (created_at, account_id)","A partial index WHERE account_id IS NOT NULL"],"ans":2,"fb":"Put the equality predicate (account_id) first — it eliminates most rows immediately. The range predicate (created_at) then filters the small remainder.","context":{"Table":"500M rows","Query":"Equality + range"}},
    {"level":3,"diff":2,"scenario":1,"q":"After a large batch job a DBA mentions \"table bloat\" and schedules VACUUM. What causes table bloat?","opts":["MVCC keeps dead row versions after UPDATE/DELETE","Transaction log files accumulate in pg_wal","Connection pool exhaustion causes partial writes that leave orphaned rows","Disk fragmentation from frequent writes","PostgreSQL duplicates rows across replicas for fault tolerance"],"ans":0,"fb":"PostgreSQL's MVCC writes new row versions on every UPDATE/DELETE. Dead tuples accumulate until VACUUM reclaims them. Without regular vacuuming, tables bloat physically and transaction ID wraparound risk grows."},
    {"level":3,"diff":2,"scenario":3,"q":"You need row-level security so each service can only read its own tenant's data, enforced at the database level regardless of what SQL the application sends. Which approach is most robust?","opts":["Add WHERE tenant_id=? to every query in the application","Create a separate Cloud SQL instance per tenant","Enforce tenant isolation at the API Gateway layer only","Enable Row Level Security (RLS) with a policy bound to a session variable set at the start of each transaction","Use separate PostgreSQL schemas per tenant with identical table structures"],"ans":3,"fb":"RLS policies are enforced by the database — a bug in application code that omits the WHERE clause cannot bypass them. This is the correct defence-in-depth approach for a multi-tenant BaaS platform."},
    {"level":3,"diff":2,"scenario":1,"q":"autovacuum hasn't run on a table for 3 weeks. pg_stat_user_tables shows n_dead_tup=12,000,000. If this continues, what are the consequences?","opts":["No consequences","Reads slow slightly but writes are unaffected","PostgreSQL pauses new writes until vacuum catches up","Cloud SQL will automatically compact the table during its next maintenance window","Table bloat degrades query plans, inflates seq scan cost, and transaction ID wraparound risk grows"],"ans":4,"fb":"Dead tuples inflate physical table size, causing seq scans to read more pages. Most critically: XID wraparound can cause PostgreSQL to enter safety mode and refuse all writes.","context":{"Dead tuples":"12,000,000","Vacuum gap":"3 weeks"}},
    {"level":3,"diff":3,"scenario":2,"q":"You need to add a UNIQUE constraint on (user_id, event_type) to a live table without downtime. What is the correct sequence?","opts":["Drop the table, add the constraint, reload from backup","CREATE UNIQUE INDEX CONCURRENTLY on (user_id,event_type), then ALTER TABLE ..","Use Liquibase addUniqueConstraint","ALTER TABLE events ADD CONSTRAINT uq UNIQUE(user_id,event_type)","Set lock_timeout=0 to prevent blocking, then run ALTER TABLE normally"],"ans":1,"fb":"CREATE INDEX CONCURRENTLY builds without a write-blocking lock. ALTER TABLE ... ADD CONSTRAINT ... USING INDEX then promotes the pre-built index with only a brief metadata lock."},
    {"level":3,"diff":3,"scenario":2,"q":"You need to rename column amount to amount_cents on a live table. A rolling deploy means both old and new app code run simultaneously. What is the correct sequence?","opts":["Use a view to alias the column, then rename the underlying column","Rename the column and update all app code in a single atomic deployment","Add amount_cents, dual-write from both app versions, backfill, switch reads, remove amount in a later deployment","Add amount_cents, copy data in one UPDATE, rename amount to amount_legacy in the same deploy","ALTER TABLE payments RENAME COLUMN amount TO amount_cents"],"ans":2,"fb":"Renaming a column immediately breaks any code still referencing the old name. Expand-contract: add new column → deploy code that writes both → backfill → switch reads → remove old column."},
    {"level":3,"diff":3,"scenario":4,"q":"pg_stat_activity shows one query has held an ExclusiveLock for 12 minutes, blocking 40 connections. You consider pg_terminate_backend(pid). What should you verify first?","opts":["Whether the connection pool has capacity to handle reconnection", "Nothing — always terminate blocking queries immediately to restore service", "Whether terminating it will cause PostgreSQL to restart", "Whether the blocking query is a long-running migration", "That the lock is ExclusiveLock and not ShareLock,"],"ans":3,"fb":"Terminating a running migration rolls back potentially hours of progress. First: read the query column in pg_stat_activity to understand what it's doing.","context":{"Lock held":"12 minutes","Blocked":"40 connections"}},
    {"level":4,"diff":1,"scenario":1,"q":"Cloud SQL has read replicas. An analytics service wants to run heavy reporting queries. What is the correct approach and key risk?","opts":["Route analytics to a read replica, monitoring replication lag","Route analytics to the primary","Analytics must always use BigQuery","Use a read replica but disable lag monitoring to reduce overhead","Create a separate Cloud SQL instance and sync via a nightly Cloud Function"],"ans":0,"fb":"Read replicas offload heavy reads from the primary. The key design decision: define the acceptable lag tolerance explicitly with the analytics team."},
    {"level":4,"diff":1,"scenario":0,"q":"A payments table has 300M rows and queries frequently filter on created_at for time windows (last 7 days, last 30 days). Queries are getting slower as the table grows. Which partitioning strategy fits best?","opts":["No partitioning","Range partitioning on created_at","List partitioning on status","Hash partitioning on account_id for cache efficiency","Hash partitioning on payment_id"],"ans":1,"fb":"Range partitioning on created_at enables partition pruning — queries for the last 7 days touch only 1-2 recent partitions instead of scanning 300M rows.","context":{"Table":"300M rows","Query pattern":"Time-window filters"}},
    {"level":4,"diff":1,"scenario":1,"q":"Cloud SQL HA is enabled with a standby in a different zone. The primary zone fails. What is the expected behaviour?","opts":["Applications connected via Cloud SQL Auth Proxy are immune","Manual intervention is required","Zero downtime","Failover takes 5-10 minutes while the standby synchronises remaining WAL","Automatic failover occurs"],"ans":4,"fb":"Cloud SQL HA uses synchronous replication. Automatic failover takes ~30-60s. Existing connections break during this window — the application must handle connection errors with retry logic."},
    {"level":4,"diff":2,"scenario":2,"q":"HikariCP max-pool-size=10, 5 pods, Cloud SQL max_connections=100. You plan to scale to 20 pods. What happens?","opts":["Reduce max-pool-size to 1 to stay under the limit","20 pods × 10 connections = 200, exceeding max_connections=100. Introduce PgBouncer in transaction mode","Nothing — HikariCP manages scaling automatically without exceeding limits","HikariCP queues requests above the limit without throwing errors","Cloud SQL Auth Proxy absorbs excess connections automatically"],"ans":1,"fb":"Connection count = pods × pool size. At 20 pods you need 200, hitting max_connections=100. PgBouncer in transaction mode multiplexes many app connections onto fewer server connections.","context":{"Pool size":"10/pod","Current pods":"5 → 20","Max connections":"100"}},
    {"level":4,"diff":2,"scenario":4,"q":"You want to test whether increasing work_mem from 4MB to 64MB improves a sort-heavy query on Cloud SQL without risking production stability. What is the safest approach?","opts":["Ask Cloud SQL support to apply the change temporarily via a maintenance window","Apply to staging and extrapolate","Change work_mem at session level in production: SET work_mem='64MB' for the affected query only","Create a Cloud SQL clone, apply the change there, run benchmark queries against representative data","Change work_mem on production during off-peak hours and monitor for 48 hours"],"ans":3,"fb":"A Cloud SQL clone is an exact copy of production data — test with realistic scale before promoting changes. Staging data is rarely representative enough for memory-tuning decisions.","context":{"Parameter":"work_mem","Current":"4 MB","Target":"64 MB","Test method":"Cloud SQL clone with production data"}},
    {"level":4,"diff":2,"scenario":4,"q":"Cloud SQL metrics show blks_hit is consistently low (cache hit rate ~60%) on a 16GB RAM instance. What is the most likely fix?","opts":["Increase effective_cache_size","Upgrade storage","Increase shared_buffers","Run VACUUM ANALYZE","The instance tier needs more memory"],"ans":4,"fb":"On Cloud SQL, shared_buffers is managed by the instance tier (~25% of RAM). A 60% hit rate indicates the working set exceeds the buffer pool. Note: effective_cache_size is a planner hint, it doesn't allocate memory.","context":{"Instance RAM":"16 GB","Cache hit rate":"~60%"}},
    {"level":4,"diff":3,"scenario":4,"q":"Cloud SQL CPU is at 90% but individual query times are normal and no slow queries appear in Query Insights. What is the most likely cause?","opts":["High connection overhead","CPU and per-query execution time are unrelated metrics","Replication lag is causing CPU spikes on the primary","Query Insights only shows slow queries","Autovacuum is consuming CPU during table bloat cleanup"],"ans":0,"fb":"When CPU is high but per-query time is normal, the overhead is usually connection lifecycle — TLS handshakes, session initialisation, auth. PgBouncer eliminates this by maintaining persistent server connections."},
    {"level":4,"diff":3,"scenario":3,"q":"A compliance audit asks how database encryption at rest is implemented. Your Cloud SQL instances use CMEK. What does this mean and what does it protect?","opts":["CMEK means Cloud SQL uses its own Google-managed key by default","CMEK provides field-level encryption for specific sensitive columns","Customer-Managed Encryption Keys via Cloud KMS: you control the key lifecycle","CMEK encrypts network traffic between the application and Cloud SQL","CMEK encrypts only backups stored in Cloud Storage, not live data"],"ans":2,"fb":"CMEK gives you control over key lifecycle in Cloud KMS. Revoking the key renders all data inaccessible. This is critical for compliance scenarios requiring provable data destruction."},
    {"level":4,"diff":3,"scenario":2,"q":"During a planned Cloud SQL failover test, the application throws connection errors for 90 seconds. HikariCP has connectionTimeout=30000ms and maximumPoolSize=10. Where do you focus to reduce this window?","opts":["Increase maximumPoolSize","Set minimumIdle=0 so HikariCP closes idle connections before the failover window","Tune HikariCP keepaliveTime to detect broken connections faster","Switch from Auth Proxy to direct private IP","Increase connectionTimeout"],"ans":2,"fb":"During failover, HikariCP needs keepaliveTime to detect stale connections and evict them. Application-level retry with backoff handles the transient failure window."},
    {"level":5,"diff":1,"scenario":2,"q":"You need to migrate a 500GB active table to a new Cloud SQL instance with under 5 minutes of downtime. What is the best strategy?","opts":["pg_dump and restore", "Use logical replication (or Database", "Rename the old instance", "Export to Cloud Storage and import", "Use Cross-Region Replica promotion"],"ans":1,"fb":"Logical replication keeps the target in sync while the source stays live. When lag approaches zero, pause writes briefly, confirm sync, flip the connection string.","context":{"Table":"500 GB","Max downtime":"5 minutes"}},
    {"level":5,"diff":1,"scenario":1,"q":"An analytics team wants to run 5-10 minute aggregation queries on your primary BaaS database. What architecture best protects production?","opts":["Require all analytics to use BigQuery with Cloud SQL federated queries","Promote a read replica to primary every 24 hours so analytics gets fresh data","Add a query_timeout of 30 seconds to reject analytics queries automatically","Use PgBouncer to limit analytics to 1 concurrent connection","Route analytics to a dedicated read replica with a documented and agreed replication lag SLA"],"ans":4,"fb":"A dedicated read replica isolates analytics workload. The key design decision is documenting the acceptable lag tolerance — analytics teams almost always accept minutes-old data."},
    {"level":5,"diff":1,"scenario":0,"q":"Service A handles PCI-DSS card data. Service B handles non-sensitive notifications. They propose sharing a Cloud SQL instance to save costs. Should they share?","opts":["No — sharing infrastructure between in-scope and out-of-scope systems extends the PCI compliance boundary to Service B","No — all services must have dedicated Cloud SQL instances per the platform standard","Yes — Cloud SQL supports schema-level isolation that satisfies PCI-DSS","Yes — use Row Level Security to isolate the services' data","Yes, but only if Service B uses a read replica and Service A uses the primary"],"ans":0,"fb":"PCI-DSS scope is contagious — any system sharing infrastructure with in-scope data becomes in-scope. Service B would inherit the full PCI compliance burden."},
    {"level":5,"diff":2,"scenario":3,"q":"The query planner chooses a sequential scan despite a relevant index. ANALYZE was run recently. What is the next diagnostic step?","opts":["The index is corrupt","The query has too many JOINs","Restart the Cloud SQL instance to clear the planner cache","Check planner cost constants (random_page_cost","The index is the wrong type"],"ans":3,"fb":"Miscalibrated cost constants (random_page_cost set too high for SSD storage) or poor selectivity estimates in pg_stats cause the planner to undervalue the index. On Cloud SQL SSDs, random_page_cost can be lowered from 4 to ~1.1."},
    {"level":5,"diff":2,"scenario":3,"q":"A team proposes SERIAL as the primary key type for all tables in your platform standards. What is your recommendation?","opts":["Primary key type has no performance impact","Recommend SMALLSERIAL","SERIAL is fine","Recommend BIGSERIAL or UUID v7","Recommend VARCHAR PKs for human readability and debuggability"],"ans":3,"fb":"SERIAL = INTEGER = 32-bit = max ~2.1 billion rows. High-volume financial tables can reach this. Setting this in a platform standard prevents expensive PK migrations later."},
    {"level":5,"diff":2,"scenario":3,"q":"A query WHERE email ILIKE '%@acme.com' on 10M rows is slow despite an index on email. What explains this, and what is the correct fix?","opts":["Partition the table by email domain to enable partition pruning on @acme.com","The index was created with default collation","The ILIKE operator requires a special index type","Switch to LIKE","The leading wildcard prevents B-tree index use regardless of operator"],"ans":4,"fb":"A leading wildcard (%) disables B-tree index use. pg_trgm breaks text into 3-character sequences and indexes all of them, making any substring search fast."},
    {"level":5,"diff":3,"scenario":0,"q":"A team proposes using JSONB columns for \"flexible\" domain attributes on a core financial table. When is this acceptable vs a red flag?","opts":["Acceptable for genuinely dynamic/unknown-structure data (user metadata, feature flags)","Acceptable only for non-indexed columns","JSONB is always acceptable","JSONB is never acceptable in a regulated financial environment","Acceptable if the team commits to typed columns within 6 months"],"ans":0,"fb":"JSONB is a legitimate tool for truly schemaless data. It's an anti-pattern when it hides domain logic. Platform standard: known attributes get typed columns; dynamic attributes may use JSONB with documented rationale."},
    {"level":5,"diff":3,"scenario":4,"q":"Cloud SQL storage costs have tripled in 6 months with no significant data growth. What are the most likely causes?","opts":["Table partitioning multiplies storage due to partition overhead","Storage auto-increase added capacity that cannot auto-reduce","Cloud SQL billing has a bug","Replication lag is causing the primary to retain extra WAL files indefinitely","CMEK triples storage consumption due to encryption overhead"],"ans":1,"fb":"Cloud SQL storage only auto-increases, never auto-decreases. WAL retained for replicas accumulates. Backup retention multiplied by snapshot count accumulates."},
    {"level":5,"diff":3,"scenario":0,"q":"Service A proposes directly querying Service B's database tables for performance reasons. What is your recommendation as the senior database engineer?","opts":["Allow read-only access via GRANT SELECT","Allow it with a formal SLA agreement documenting which tables may be read","Reject it — direct cross-service DB access couples schemas","Allow it with Row Level Security policies restricting which rows Service A can read","Allow it only if both services are owned by the same team"],"ans":2,"fb":"Direct DB sharing couples schemas permanently — Service B can never safely rename a column or reorganise a table that Service A queries. The correct approach: Service A calls Service B's API, or uses event-driven projections."},
    {"level":6,"diff":1,"scenario":0,"q":"You're asked to lead an evaluation of Cloud SQL PostgreSQL vs AlloyDB for a new high-throughput service. What dimensions structure the decision?","opts":["AlloyDB's Google endorsement makes it the default choice without further analysis","Workload fit (OLTP vs analytics), operational maturity, migration risk","Price per GB is the primary deciding factor","Feature count","AlloyDB is always better for any high-throughput use case"],"ans":1,"fb":"Multi-dimensional analysis: does AlloyDB's columnar engine benefit your read patterns? Is the team operationally ready for a newer product? Neither is universally better — the right answer depends on the specific workload."},
    {"level":6,"diff":1,"scenario":0,"q":"Your organisation is considering moving from Cloud SQL to self-managed PostgreSQL on GKE to reduce costs. You're asked to lead the evaluation. What framework do you use?","opts":["TCO analysis: infrastructure cost vs operational burden (SRE hours for patching, HA, backups","Evaluate licensing costs only","Run a proof-of-concept on GKE and if it works, migrate all instances","Compare only monthly infrastructure costs","Self-managed PostgreSQL is never appropriate for a regulated banking environment"],"ans":0,"fb":"Cloud SQL's managed overhead has real value. Self-managed requires a Kubernetes operator, storage management, backup strategy, and SRE capacity. Total cost is rarely cheaper once engineering time is counted."},
    {"level":6,"diff":1,"scenario":4,"q":"A team wants Redis as a read-through cache for account balance queries running at 10,000 req/s. You're asked for an architecture review. What are the non-negotiable risks to address before approval?","opts":["Redis is not permitted in financial systems","Require the team to use Cloud Memorystore (managed Redis) rather than self-hosted before approving","Cache invalidation strategy and consistency guarantees under failure: how does a balance write invalidate the cache?","The only concern is Redis memory sizing","Redis is a good fit"],"ans":2,"fb":"Account balances have strong consistency requirements. Cache invalidation is the critical question: what's the acceptable staleness? What happens if Redis fails? Stale balance reads can have regulatory consequences.","context":{"Load":"10,000 req/s","Data":"Account balances"}},
    {"level":6,"diff":2,"scenario":1,"q":"A regional outage takes down your Cloud SQL primary. The failover replica is in the same region. What does this reveal?","opts":["This is a Cloud SQL limitation","Move the entire data tier to Firestore for global multi-region availability","Acceptable","Cloud SQL HA protects against zone failures","Same-region replicas don't protect against regional outages"],"ans":4,"fb":"Cloud SQL HA = zone-level protection only. True regional resilience requires cross-region replicas with tested promotion runbooks, or graceful degradation design."},
    {"level":6,"diff":2,"scenario":3,"q":"You're designing the database architecture for a new PCI-DSS scoped service processing card transaction data. Which controls are non-negotiable at the database layer?","opts":["Encrypted backups and a dedicated Cloud SQL instance for the PCI scope","PCI-DSS is an application-layer concern","Row Level Security and encrypted columns for card numbers only","Private IP with no public endpoint, IAM auth via Auth Proxy, CMEK via Cloud KMS","SSL/TLS in transit and password-based authentication with strong passwords"],"ans":3,"fb":"PCI-DSS requires defence in depth at the database layer: no public IP, IAM-based auth via Auth Proxy, CMEK for encryption at rest including backups, Cloud Audit Logs with retention, and documented data deletion procedures."},
    {"level":6,"diff":2,"scenario":2,"q":"Cloud SQL storage auto-increased to 10TB over two years. You want to right-size it. Cloud SQL storage cannot auto-decrease. What are your options?","opts":["Export data to Cloud Storage, delete and recreate the instance at the","Open a GCP support ticket to request a manual storage decrease","Enable storage auto-decrease in Cloud SQL settings","Use Cloud SQL clones","Promote a read replica (which has lower storage) to primary"],"ans":0,"fb":"Cloud SQL storage cannot decrease — this is a hard platform limitation. The only path is export → delete → recreate → import. Document this limitation in platform standards to prevent over-allocation.","context":{"Current storage":"10 TB","Growth driver":"Auto-increase (irreversible)","Goal":"Right-size the instance","Platform limitation":"Storage cannot decrease"}},
    {"level":6,"diff":3,"scenario":4,"q":"A service team says 'our service uses LISTEN/NOTIFY and server-side prepared statements — PgBouncer in transaction mode breaks this.' How do you respond?","opts":["Override the team","They are correct. Platform policy should define session mode as a documented exception for services with","Tell them to remove LISTEN/NOTIFY","Use PgBouncer statement mode","Create a separate PgBouncer instance just for this service without updating platform policy"],"ans":1,"fb":"Transaction-mode pooling breaks LISTEN/NOTIFY and server-side prepared statements. A mature platform policy acknowledges exceptions: document session-mode for affected services with the trade-off."},
    {"level":6,"diff":3,"scenario":4,"q":"A production migration failed halfway through, leaving the schema in an inconsistent state. A postmortem is held. Which platform-level practices would prevent this class of failure?","opts":["Add a migration dry-run step in CI that connects to production read-only to verify syntax","Run migrations inside a database transaction","Enforce expand-contract migration policy, validate migrations on a Cloud SQL clone before production","Switch from Liquibase to Flyway","Require all migrations to be run manually by a DBA to reduce automation risk"],"ans":2,"fb":"Root causes: no validation on real data scale, no expand-contract discipline, and no tested rollback path. A Cloud SQL clone with production data is the only reliable pre-production validation."},
    {"level":6,"diff":3,"scenario":3,"q":"You're establishing the Cloud SQL platform standard across all teams. What are the 5 most critical items to standardise first?","opts":["Instance tier sizing, number of replicas, backup retention, maintenance window, and alert thresholds","Database version, storage auto-increase settings, CMEK provider, connection pool library, and PR approval for schema changes","Naming conventions, character encoding, timezone, backup frequency, and connection string format","Private IP only (no public endpoint), IAM auth via Auth Proxy, CMEK for all instances, HikariCP + PgBouncer connection pooling policy, and mandatory expand-contract migration practice","Index naming conventions, partitioning strategy, Liquibase version, test database policy, and query timeout defaults"],"ans":3,"fb":"The most critical standards address security posture (private IP, IAM auth, CMEK), reliability (connection pooling), and operational safety (expand-contract migrations). These compound across every team on the platform."},
    {"level":1,"diff":1,"scenario":0,"q":"You need to list all orders placed by customers in a specific region. The `orders` table has a `customer_id` column and the `customers` table has a `region` column. Which query correctly retrieves order IDs for customers in the 'EMEA' region?","opts":["SELECT o.id FROM orders o LEFT JOIN customers c ON o.customer_id = c.id WHERE c.region = 'EMEA'","SELECT o.id FROM orders o JOIN customers c WHERE c.region = 'EMEA'","SELECT o.id FROM orders o CROSS JOIN customers c ON o.customer_id = c.id WHERE c.region = 'EMEA'","SELECT o.id FROM orders o, customers c WHERE c.region = 'EMEA'","SELECT o.id FROM orders o JOIN customers c ON o.customer_id = c.id WHERE c.region = 'EMEA'"],"ans":4,"fb":"Option A is correct: it uses an explicit INNER JOIN with the correct ON condition linking orders to customers, then filters by region. Option B is a Cartesian product (implicit join) missing the join predicate — it would return every order paired with every EMEA customer. Option C is invalid SQL — JOIN without ON is a syntax error in PostgreSQL. Option D (LEFT JOIN) would include orders whose customer_id has no match in customers, where c.region would be NULL and the WHERE clause would then exclude them anyway — but semantically it's misleading and can hide data integrity problems. Option E is invalid: CROSS JOIN does not accept an ON clause.","context":{"Table: orders":"id, customer_id, amount, created_at","Table: customers":"id, name, region","Goal":"Return order IDs for EMEA customers only"}},
    {"level":1,"diff":1,"scenario":0,"q":"A colleague's query returns duplicate rows when joining `invoices` to `line_items`. The `line_items` table has a foreign key `invoice_id`. What is the most likely cause of the duplicates?","opts":["The SELECT clause should use DISTINCT on the primary key","The JOIN is on a non-unique column","PostgreSQL does not support one-to-many JOINs without GROUP BY","The WHERE clause is missing, so all rows are returned","The foreign key constraint is not enforced so orphan rows appear"],"ans":1,"fb":"When you JOIN a parent table to a child table in a one-to-many relationship, each parent row appears once for every matching child row — that is the correct and expected behaviour of a JOIN. The result is not a bug; it reflects the data. Adding DISTINCT (option C) would hide the problem rather than fix it and would break aggregations. Option B is wrong because a missing WHERE clause returns all rows but does not create duplicates from a join. Option D is false — PostgreSQL fully supports one-to-many joins. Option E is a red herring; orphan rows would produce fewer rows, not more."},
    {"level":1,"diff":1,"scenario":1,"q":"A Spring Boot entity class `Payment` is annotated with `@Table(name = \"payment_records\")` and has a field `tenantId` annotated with `@Column(name = \"tenant_id\")`. When you query the database directly, which column name should you use in your SQL WHERE clause?","opts":["tenantId","TENANT_ID","TenantId","tenant_id","payment_records_tenant_id"],"ans":3,"fb":"The `@Column(name = \"tenant_id\")` annotation explicitly maps the Java field `tenantId` to the database column `tenant_id`. PostgreSQL column names are case-insensitive unless quoted, but the physical name stored in the catalog is lowercase `tenant_id`. When writing SQL directly, use `tenant_id`. The Java camelCase name `tenantId` is only meaningful in Java code and JPQL — it does not exist as a column name. `TENANT_ID` would work in unquoted SQL since PostgreSQL folds identifiers to lowercase, but `tenant_id` is the conventional and explicit form."},
    {"level":1,"diff":1,"scenario":1,"q":"Your JPA entity has a `@ManyToOne` relationship to a `Tenant` entity. How does Hibernate typically store this relationship in the database?","opts":["As a JSON column embedding the Tenant object","As a separate join table with two foreign key columns","As a foreign key column in the owning entity's table pointing to the Tenant primary key","As a column in the Tenant table pointing back to the owning entity","As a stored procedure that resolves the relationship at query time"],"ans":2,"fb":"A `@ManyToOne` maps to a foreign key column in the owning table. By default, Hibernate names this column `tenant_id` (derived from the field name) and stores the referenced entity's primary key. A separate join table (option B) is the default for `@ManyToMany`. A JSON column (option C) is not standard JPA behaviour. Option D reverses the direction — the FK lives in the owning side, not the referenced side. Option E describes a pattern that does not exist in standard relational mapping."},
    {"level":1,"diff":1,"scenario":2,"q":"A Spring Boot service loads a list of 50 `Account` objects and then accesses `account.getOwner()` on each one in a loop. The `owner` field is a `@ManyToOne` with `fetch = FetchType.LAZY`. How many SQL queries does Hibernate typically execute?","opts":["50 — one query per account including its owner","1 — Hibernate batches all owner lookups into a single query","2 — one for accounts and one for all owners using an IN clause","0 — lazy loading defers all queries until the transaction commits","51 — one to load all accounts, then one per account to load each owner"],"ans":4,"fb":"This is the classic N+1 problem. With LAZY fetching, Hibernate issues one query to load the 50 Account rows, then issues one additional SELECT for each individual owner access inside the loop — totalling 51 queries. Option B (single batched query) only happens if you explicitly configure `@BatchSize` or use a JOIN FETCH in the JPQL. Option C is wrong — lazy loading does not include the owner in the initial query. Option D describes the behaviour of batch fetching, which is not enabled by default. Option E is wrong — lazy proxies execute SQL at the point of access, not at commit."},
    {"level":1,"diff":1,"scenario":3,"q":"A junior developer is trying to connect a Spring Boot app running in GKE to a Cloud SQL PostgreSQL instance. They set the JDBC URL to the Cloud SQL instance's public IP directly. What is the primary security concern with this approach?","opts":["The connection bypasses Cloud SQL Auth Proxy, so traffic is not encrypted by default and credentials may be exposed","Public IPs are not routable from within GKE pods","Spring Boot does not support direct IP addresses in JDBC URLs","Cloud SQL does not support JDBC connections over public IP","The connection will work but will have higher latency than using a private IP"],"ans":0,"fb":"Connecting directly to a Cloud SQL public IP without the Auth Proxy means the application must manage its own TLS configuration and Cloud SQL authorised networks. The Auth Proxy handles mutual TLS authentication automatically, making it significantly harder to misconfigure security. Option B is false — public IPs are routable from GKE pods if the instance allows it. Option C is false — Cloud SQL does accept JDBC over public IP. Option D is partially true (latency may differ) but is not the primary security concern. Option E is false — JDBC URLs accept IP addresses."},
    {"level":1,"diff":1,"scenario":3,"q":"The Cloud SQL Auth Proxy is configured as a sidecar container in a GKE pod. What port does the Spring Boot application typically connect to when using the proxy?","opts":["443 on the Cloud SQL instance's private IP","8080 on the Cloud SQL Auth Proxy container's service IP","3306 on localhost","5432 on the Cloud SQL instance's public IP","5432 on localhost (127.0.0.1)"],"ans":4,"fb":"The Cloud SQL Auth Proxy sidecar listens on `127.0.0.1:5432` within the pod. The Spring Boot application connects to `localhost:5432` just as if PostgreSQL were running locally. The proxy intercepts the connection, establishes an encrypted tunnel to Cloud SQL, and forwards traffic. Option B (public IP direct) bypasses the proxy. Option C (443) is not the standard proxy port. Option D (3306) is the MySQL default port. Option E describes a Kubernetes service, not the sidecar pattern."},
    {"level":1,"diff":1,"scenario":4,"q":"A colleague says, 'We added an index on the `email` column but queries are still slow.' After checking, you notice the query is `SELECT * FROM users WHERE LOWER(email) = LOWER($1)`. Why does the index on `email` not help?","opts":["The index is too new and has not been built yet","LOWER() is not a valid PostgreSQL function","The index is on the raw column value but the query applies a","Indexes on text columns are never used by PostgreSQL","SELECT * forces a sequential scan regardless of indexes"],"ans":2,"fb":"A standard B-tree index on `email` stores the original values. When a function like `LOWER()` is applied in the WHERE clause, PostgreSQL cannot match the index entries to the transformed values and falls back to a sequential scan. The fix is to create a functional index: `CREATE INDEX ON users (LOWER(email))`. Option B is false — PostgreSQL uses indexes on text columns routinely. Option C is false — indexes are available immediately after creation. Option D is false — PostgreSQL can use indexes even with SELECT *. Option E is false — `LOWER()` is a standard PostgreSQL function."},
    {"level":1,"diff":1,"scenario":4,"q":"What does it mean when a transaction is said to be 'atomic'?","opts":["Either all statements in the transaction succeed and are committed, or none of them are","Only one transaction can run at a time in the database","The transaction executes faster","The transaction is stored in memory and never written to disk","The transaction cannot be rolled back once started"],"ans":0,"fb":"Atomicity is the 'A' in ACID. It guarantees that a transaction is treated as a single unit of work: either all its changes are applied (commit) or none of them are (rollback). This protects against partial updates that would leave the database in an inconsistent state — for example, debiting one account without crediting another. The other options describe performance, concurrency, or durability concepts that are unrelated to atomicity."},
    {"level":1,"diff":2,"scenario":0,"q":"You need to find all tenants who have at least one active subscription but have never made a payment. The relevant tables are `tenants`, `subscriptions` (with a `status` column), and `payments`. Which query structure is correct?","opts":["SELECT t.id FROM tenants t LEFT JOIN payments p ON t.id = p.tenant_id WHERE p.tenant_id IS NULL","SELECT t.id FROM tenants t JOIN subscriptions s ON t.id = s.tenant_id WHERE s.status = 'active' AND t.id NOT IN (SELECT tenant_id FROM payments)","SELECT t.id FROM tenants t JOIN subscriptions s ON t.id = s.tenant_id WHERE s.status != 'inactive' AND payments.tenant_id IS NULL","SELECT t.id FROM tenants t WHERE NOT EXISTS (SELECT 1 FROM subscriptions WHERE tenant_id = t.id AND status = 'active')","SELECT t.id FROM tenants t JOIN subscriptions s ON t.id = s.tenant_id WHERE s.status = 'active' AND t.id NOT IN (SELECT id FROM payments)"],"ans":1,"fb":"Option A correctly joins tenants to active subscriptions and then excludes tenants who have any row in the payments table using NOT IN with the correct column `tenant_id`. Option B has a bug: `SELECT id FROM payments` selects the payment's own primary key, not the tenant_id — so the NOT IN comparison is meaningless. Option C finds tenants with no payments but ignores the active subscription requirement. Option D inverts the logic — it finds tenants WITHOUT active subscriptions. Option E references `payments.tenant_id` without a proper join, which is invalid SQL.","context":{"Table: tenants":"id, name","Table: subscriptions":"id, tenant_id, status","Table: payments":"id, tenant_id, amount, paid_at"}},
    {"level":1,"diff":2,"scenario":0,"q":"A query joins three tables — `orders`, `order_items`, and `products` — and uses a WHERE clause to filter by `products.category = 'electronics'`. The query returns 0 rows even though you can see matching products and orders exist separately. What is the most likely cause?","opts":["INNER JOIN requires all three tables to have the same number of rows","PostgreSQL does not support three-table JOINs","The WHERE clause must come before the JOIN clauses","One of the JOINs uses the wrong column, causing no rows to match the join condition","The category column contains trailing whitespace in the data"],"ans":3,"fb":"When a multi-table JOIN returns 0 rows despite data existing in each table individually, the most likely cause is an incorrect join condition — for example, joining `order_items.product_id` to `products.order_id` instead of `products.id`. This produces an empty set. Option B is false — PostgreSQL supports arbitrarily many joins. Option C is false — WHERE clause placement after JOINs is correct SQL syntax. Option D (trailing whitespace) would cause partial mismatches, not zero rows universally. Option E is false — INNER JOIN works regardless of row count differences between tables."},
    {"level":1,"diff":2,"scenario":1,"q":"A Liquibase migration creates a table called `UserProfile` using that exact casing. A developer then runs `SELECT * FROM userprofile` in psql and gets an error. Why?","opts":["The table name exceeds PostgreSQL's 32-character identifier limit","PostgreSQL folds unquoted identifiers to lowercase","PostgreSQL converts all table names to uppercase at creation time","Liquibase automatically adds a schema prefix that must be included","psql does not support lowercase queries"],"ans":1,"fb":"PostgreSQL folds unquoted identifiers to lowercase. If the migration used a quoted identifier like `CREATE TABLE \"UserProfile\"`, the table name is stored exactly as `UserProfile` (mixed case) in the catalog. Querying without quotes — `SELECT * FROM userprofile` — looks for a table named `userprofile` (all lowercase) which does not exist. The fix is `SELECT * FROM \"UserProfile\"`. Best practice in Liquibase is to use snake_case (`user_profile`) and never quote identifiers. Option B is false — PostgreSQL folds to lowercase, not uppercase. Options C, D, E are all false."},
    {"level":1,"diff":2,"scenario":1,"q":"Your team stores customer addresses in a `customers` table with columns `street`, `city`, `postcode`, and `country`. A new requirement asks you to support multiple addresses per customer (billing, shipping, etc.). Which data model change best reflects this relationship?","opts":["Add `billing_street`, `billing_city`, `shipping_street`, `shipping_city` columns to `customers`","Store all addresses as a JSON array in a single `addresses` column on `customers`","Create two separate tables: `billing_addresses` and `shipping_addresses`, each with a `customer_id`","Add an `address_type` enum column to `customers` and duplicate the row for each address type","Create a separate `addresses` table with a foreign key `customer_id` and an `address_type` column"],"ans":4,"fb":"A separate `addresses` table with `customer_id` FK and `address_type` column is the standard normalised approach. It avoids column proliferation (option A), keeps data queryable without JSON parsing (option C), avoids redundant tables with near-identical schemas (option D), and avoids row duplication on the parent entity (option E). This pattern also makes it easy to add more address types in future without schema changes.","context":{"Current table":"customers(id, name, street, city, postcode, country)","New requirement":"Support billing and shipping addresses per customer","Constraint":"Addresses must be independently queryable"}},
    {"level":1,"diff":2,"scenario":2,"q":"You're reviewing a Spring Boot service and notice that a REST endpoint loads a `Contract` entity which has a `@OneToMany(fetch = FetchType.LAZY)` collection of `Clause` objects. The endpoint serialises the full contract including clauses to JSON. What problem will likely occur in production?","opts":["LazyInitializationException when the JSON serialiser accesses the clauses collection","Cloud SQL Auth Proxy will timeout","The JSON serialiser will skip the clauses field","The endpoint will return an empty clauses list","Hibernate will load all clauses eagerly regardless of the FetchType setting"],"ans":0,"fb":"When the transaction ends (typically at the service or repository method boundary in Spring), the Hibernate session closes. If the Jackson serialiser then tries to access the lazy-loaded `clauses` collection outside the session, Hibernate throws `LazyInitializationException`. This is a very common Spring Boot pitfall. Option B is wrong — lazy loading does execute when accessed within a session. Option C is wrong — FetchType.LAZY is respected by Hibernate. Option D is wrong — Jackson serialises collections. Option E is wrong — this is an application-level Hibernate error, not a connection timeout."},
    {"level":1,"diff":2,"scenario":2,"q":"A service method fetches a list of 100 `Invoice` entities and then calls `invoice.getLineItems().size()` on each one in a loop. The `lineItems` field uses default LAZY fetching. What SQL pattern will you observe in the application logs?","opts":["A single SELECT with a JOIN that retrieves all invoices and their line items together","100 parallel asynchronous SELECTs issued concurrently by Hibernate","A single SELECT using an IN clause to retrieve all line items at once","One SELECT for invoices followed by 100 individual SELECT statements for line items","No SQL at all"],"ans":3,"fb":"This is the N+1 query problem in practice. One query loads the 100 Invoice rows. Then, for each invoice, accessing `getLineItems()` triggers a separate SELECT for that invoice's line items — 100 more queries. Total: 101 queries. Option B (JOIN fetch) only happens if you use `JOIN FETCH` in JPQL or a query annotation. Option C is false — Hibernate is single-threaded per request. Option D (IN clause) requires `@BatchSize` configuration. Option E is false — Hibernate's first-level cache is per-session and would not persist across requests.","context":{"Entity":"Invoice with @OneToMany(fetch = LAZY) List<LineItem> lineItems","Loop":"invoices.forEach(i -> total += i.getLineItems().size())","Log pattern":"select * from invoices; select * from line_items where invoice_id=1; select * from line_items where invoice_id=2; ..."}},
    {"level":1,"diff":2,"scenario":3,"q":"A developer is deploying a new Spring Boot microservice to GKE. The pod starts successfully but the application logs show `Connection refused` when attempting to connect to Cloud SQL. The Auth Proxy sidecar is defined in the pod spec. What is the most likely cause?","opts":["The Cloud SQL instance is in a different GCP project and cannot be reached","The JDBC URL is using the wrong database name","The Auth Proxy container takes a few seconds to become ready","The Auth Proxy does not support PostgreSQL 16","HikariCP does not support Cloud SQL Auth Proxy connections"],"ans":2,"fb":"In Kubernetes, all containers in a pod start concurrently. The Spring Boot app may attempt its first JDBC connection before the Auth Proxy sidecar has finished initialising and is ready to accept connections. The fix is to add a readiness check or startup delay, or to configure HikariCP with retry logic (`initializationFailTimeout`). Option B is false — Auth Proxy supports all PostgreSQL versions. Option C would cause an authentication error, not connection refused. Option D would cause a network error at a different stage. Option E is false — HikariCP connects via standard JDBC."},
