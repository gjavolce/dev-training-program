    {"level":1,"diff":2,"scenario":4,"q":"A table `events` has no indexes except on the primary key `id`. A query `SELECT * FROM events WHERE tenant_id = $1 AND event_type = 'LOGIN' ORDER BY created_at DESC LIMIT 20` is slow. Which index would most directly improve this query?","opts":["CREATE INDEX ON events (created_at DESC)","CREATE INDEX ON events (event_type)","CREATE INDEX ON events (id, tenant_id)","CREATE INDEX ON events (tenant_id) INCLUDE (event_type)","CREATE INDEX ON events (tenant_id, event_type, created_at DESC)"],"ans":4,"fb":"The query filters on both `tenant_id` and `event_type` (equality predicates) and then sorts by `created_at DESC`. A composite index on `(tenant_id, event_type, created_at DESC)` allows PostgreSQL to satisfy the equality filters and serve the ORDER BY from the index in order, enabling an efficient index scan without a separate sort step. Option B only covers the sort — it would require scanning all rows first. Option C only covers `event_type`. Option D includes `id` which adds no benefit since the primary key is already indexed. Option E (INCLUDE) only covers the filter but not the sort direction."},
    {"level":1,"diff":2,"scenario":4,"q":"A developer wraps two INSERT statements in a transaction, but the second INSERT violates a NOT NULL constraint. What happens to the first INSERT?","opts":["The first INSERT is committed immediately","PostgreSQL retries the second INSERT with a NULL value substituted","PostgreSQL commits the first INSERT and skips the second","The entire transaction is rolled back","The first INSERT remains pending until the developer manually rolls back"],"ans":3,"fb":"PostgreSQL follows ACID atomicity: when any statement in a transaction causes an error (such as a constraint violation), the transaction enters an aborted state. All subsequent statements in that transaction block fail with 'ERROR: current transaction is aborted'. When the transaction is rolled back (explicitly or at session end), all changes including the first INSERT are undone. The first INSERT is not committed independently. Option B is the most common misconception. Options C, D, and E do not reflect PostgreSQL's transaction error handling."},
    {"level":1,"diff":3,"scenario":0,"q":"You need to produce a report of all customers along with their most recent order date, including customers who have never placed an order (showing NULL for the order date). Which query is correct?","opts":["SELECT c.id, MAX(o.created_at) FROM orders o RIGHT JOIN customers c ON o.customer_id = c.id","SELECT c.id, MAX(o.created_at) FROM customers c LEFT JOIN orders o ON c.id = o.customer_id GROUP BY c.id","SELECT c.id, MAX(o.created_at) FROM customers c JOIN orders o ON c.id = o.customer_id GROUP BY c.id","SELECT c.id, COALESCE(MAX(o.created_at), 'never') FROM customers c LEFT JOIN orders o ON c.id = o.customer_id","SELECT c.id, o.created_at FROM customers c LEFT JOIN orders o ON c.id = o.customer_id ORDER BY o.created_at DESC"],"ans":1,"fb":"Option A is correct: LEFT JOIN ensures customers with no orders appear (with NULL joined columns), and MAX(created_at) aggregates per customer with GROUP BY. Customers with no orders get MAX(NULL) = NULL. Option B uses INNER JOIN which excludes customers with no orders. Option C returns one row per order, not one row per customer, and without aggregation a customer with many orders appears many times. Option D (RIGHT JOIN without GROUP BY) is missing the GROUP BY and would fail. Option E uses COALESCE correctly to replace NULL, but comparing a timestamp to the string 'never' causes a type error in PostgreSQL — COALESCE requires matching types."},
    {"level":1,"diff":3,"scenario":0,"q":"A query uses `WHERE status IN ('active', 'pending') AND deleted_at IS NULL`. The table has a composite index on `(status, deleted_at)`. You run EXPLAIN and see a Seq Scan instead of an Index Scan. The table has 10 million rows and 60% have status 'active' or 'pending'. Why did PostgreSQL choose a sequential scan?","opts":["The index is corrupted and needs to be rebuilt with REINDEX","IN clauses are never index-eligible in PostgreSQL","The query matches 60% of the table","PostgreSQL does not support IS NULL predicates in index scans","The composite index ordering is wrong"],"ans":2,"fb":"PostgreSQL's query planner compares the estimated cost of using an index versus a sequential scan. For very selective queries (few rows returned), an index scan wins because it avoids reading most of the table. But when a query matches a large fraction of rows (60% in this case), random I/O to fetch those rows via the index is slower than a single sequential pass through the table. The planner made the correct decision. Option B is false — PostgreSQL can use indexes with IS NULL. Option C is false — the leading column should be the most selective equality predicate. Option D is false — IN clauses are index-eligible. Option E is a last resort diagnosis with no evidence here."},
    {"level":1,"diff":3,"scenario":1,"q":"A Hibernate entity `Order` has a field `BigDecimal totalAmount` mapped to a column `total_amount`. A developer reports that saving an Order with `totalAmount = 99.999` and reading it back gives `100.00`. What is the most likely cause?","opts":["The column is defined as NUMERIC(10,2) which rounds to 2 decimal places on storage","PostgreSQL converts all decimal values to float8 internally","The Cloud SQL Auth Proxy truncates numeric precision in transit","Hibernate rounds all BigDecimal values to 2 places before sending them to the database","BigDecimal cannot represent 99.999 exactly in Java"],"ans":0,"fb":"PostgreSQL's NUMERIC(p,s) type stores exactly `s` decimal digits. A column defined as `NUMERIC(10,2)` stores at most 2 fractional digits — so 99.999 is rounded to 100.00 at the database level. This is a schema definition problem, not a Java, Hibernate, or network issue. Option B is wrong — BigDecimal can represent 99.999 exactly. Option C is wrong — Hibernate passes the exact BigDecimal value to the JDBC driver. Option D is wrong — PostgreSQL NUMERIC is arbitrary precision and is not stored as float8. Option E is wrong — the proxy is a transparent TCP tunnel."},
    {"level":1,"diff":3,"scenario":1,"q":"A developer creates a Hibernate entity with `@GeneratedValue(strategy = GenerationType.AUTO)`. In production on PostgreSQL 16, the app creates a table called `hibernate_sequence` and increments it for every INSERT. Performance degrades significantly under load. What is the root cause and the correct fix?","opts":["The hibernate_sequence table needs an index on its value column","GenerationType.AUTO creates a UUID for each row, which is slower than integer IDs","GenerationType.AUTO on PostgreSQL uses a single shared sequence table by default in older","PostgreSQL 16 deprecated sequence tables and requires UUIDs for primary keys","The fix is to switch to GenerationType.IDENTITY which uses PostgreSQL SERIAL"],"ans":2,"fb":"In older Hibernate versions, `GenerationType.AUTO` on PostgreSQL defaults to a table-based sequence (`hibernate_sequence`) rather than a native PostgreSQL sequence. This table requires an UPDATE and SELECT for every INSERT, and under concurrent load becomes a severe bottleneck due to row-level locking. The correct fix is `GenerationType.SEQUENCE` with `@SequenceGenerator(allocationSize = 50)`, which pre-allocates IDs in batches and uses a native PostgreSQL sequence — a far more scalable approach. Option B is wrong — AUTO with Hibernate does not use UUIDs. Option C adding an index does not help the locking problem. Option D is false — PostgreSQL 16 has not deprecated sequences. Option E (IDENTITY) works but fetches the ID after each INSERT and cannot pre-allocate, so it is less efficient than batched SEQUENCE."},
    {"level":1,"diff":3,"scenario":2,"q":"A Spring Boot service fetches `Payment` entities with a `@OneToMany` to `AuditEvent` using `JOIN FETCH` in JPQL. The method has `@Transactional(readOnly = true)`. In production, you observe that the same payment appears multiple times in the result list when it has multiple audit events. What is happening?","opts":["readOnly transactions prevent Hibernate from deduplicating entities","HikariCP is routing the query to multiple read replicas and merging duplicate results","JPQL does not support JOIN FETCH with @Transactional","JOIN FETCH in JPQL produces a Cartesian product on the collection side","The database is returning duplicate rows due to a bug in PostgreSQL 16"],"ans":3,"fb":"When JPQL uses JOIN FETCH on a collection, the SQL JOIN produces one result row per child entity. Hibernate maps these back to the parent entity, but the List result contains one Payment reference per AuditEvent — so a Payment with 3 audit events appears 3 times. Solutions include using `SELECT DISTINCT p` in JPQL, returning a `Set<Payment>`, or using `@QueryHints` with Hibernate's pass-distinct-through hint. Option B is false — readOnly only affects flushing and connection hints. Option C is false — JOIN FETCH is fully supported in @Transactional methods. Option D is false — this is a JPQL result mapping behaviour, not a PostgreSQL bug. Option E is false."},
    {"level":1,"diff":3,"scenario":3,"q":"Your Cloud SQL Auth Proxy sidecar is running, and the Spring Boot app connects successfully during startup. After about 30 minutes in production, all new database requests fail with `SSL connection has been closed unexpectedly`. Existing HikariCP connections in the pool start failing too. What is the most likely cause?","opts":["The Auth Proxy rotates its mTLS certificates periodically and closes old connections","The GKE node lost connectivity to Google's Certificate Authority","The Cloud SQL instance ran out of storage and closed all connections","HikariCP's maxLifetime is set to 30 minutes and is evicting connections at the wrong time","Cloud SQL has a hard 30-minute session timeout for all connections"],"ans":0,"fb":"The Cloud SQL Auth Proxy periodically rotates its mTLS client certificates (approximately every hour by default, but the timing can vary). When rotation occurs, the proxy closes and re-establishes the underlying connection to Cloud SQL, which can cause existing application connections to receive an unexpected SSL closure. HikariCP needs to be configured with `connectionTestQuery` or `keepaliveTime` to detect and evict dead connections before they are returned to the application. Option B is false — Cloud SQL does not have a fixed 30-minute session timeout. Option C and D are plausible but not the primary cause. Option E would show storage-related errors, not SSL errors."},
    {"level":1,"diff":3,"scenario":3,"q":"A GKE pod running a Spring Boot app with a Cloud SQL Auth Proxy sidecar is being terminated due to a rolling deployment. Inflight database transactions are being interrupted mid-way. What Kubernetes configuration would allow in-flight transactions to complete before the pod is fully stopped?","opts":["Configure Cloud SQL Auth Proxy with `--max-connections=0` to drain connections","Add a `preStop` hook that sleeps indefinitely to block pod termination","Set the HikariCP `connectionTimeout` to 0 to allow unlimited wait time","Use a PodDisruptionBudget to prevent rolling deployments from occurring","Set `terminationGracePeriodSeconds` on the pod to a value longer than the maximum expected"],"ans":4,"fb":"When Kubernetes terminates a pod, it sends SIGTERM and then waits for `terminationGracePeriodSeconds` before sending SIGKILL. If the Spring Boot app handles SIGTERM by stopping new request acceptance and the grace period is long enough for in-flight transactions to complete, they will finish cleanly. This is the correct approach for graceful shutdown. Option B (connectionTimeout=0) controls how long to wait for a connection from the pool — it does not affect termination. Option C (indefinite sleep) is dangerous and would block deployments forever. Option D (PDB) controls disruption budgets but does not fix the transaction interruption problem. Option E is not a valid Auth Proxy flag."},
    {"level":1,"diff":3,"scenario":3,"q":"A developer reports that their Spring Boot application can connect to Cloud SQL directly using a JDBC URL with the IP address, but the connection fails when the Cloud SQL Auth Proxy is running on localhost. The error is `Connection refused` on port 5432. What is the most likely cause?","opts":["The service account attached to the GKE pod does not have the `cloudsql.instances.connect` IAM permission","The JDBC URL still points to the Cloud SQL public IP instead of `127.0.0.1:5432`","The Cloud SQL Auth Proxy requires mTLS certificates to be placed in the application classpath","The `spring.datasource.url` must use `jdbc:postgresql` rather than `jdbc:postgresql+ssl`","The Cloud SQL Auth Proxy is not compatible with PostgreSQL 16 and must be downgraded"],"ans":1,"fb":"The Auth Proxy listens on localhost (127.0.0.1) on a configured port (default 5432). If the JDBC URL still points to the Cloud SQL public IP, the application bypasses the proxy entirely — and may fail due to IP allowlist restrictions or SSL requirements. The IAM permission issue (option C) would produce an authentication error from the proxy, not `Connection refused`. Options A and D are incorrect: the proxy handles TLS transparently, and it supports all PostgreSQL versions.","context":{"Auth Proxy port":"127.0.0.1:5432 (default)","Error observed":"Connection refused on localhost:5432","JDBC URL in use":"jdbc:postgresql://<public-ip>:5432/mydb"}},
    {"level":1,"diff":3,"scenario":4,"q":"Two concurrent transactions both execute `UPDATE accounts SET balance = balance - 100 WHERE id = 5` at the same time under READ COMMITTED isolation. What does PostgreSQL guarantee about the outcome?","opts":["PostgreSQL raises a serialization error and aborts one of the transactions","The second UPDATE waits for the first to commit, then re-evaluates the row and applies its change to the committed value","The second transaction reads the pre-update balance and both deductions are lost","Both transactions apply their changes simultaneously, potentially resulting in only one deduction of 100","READ COMMITTED prevents any concurrent modifications to the same row"],"ans":1,"fb":"Under READ COMMITTED, PostgreSQL uses row-level locking for UPDATE statements. The first UPDATE acquires a row lock. The second UPDATE blocks until the first commits. After the first commits, the second UPDATE re-evaluates the WHERE clause against the newly committed row (this is the key READ COMMITTED behaviour for updates) and then applies its change. Result: balance is reduced by 200 total. Option B describes a lost update, which does not happen because of row locking. Option C (serialization error) only occurs under SERIALIZABLE isolation with a conflict. Option D is wrong — READ COMMITTED re-reads the committed row for updates. Option E is false — READ COMMITTED still allows concurrent access."},
    {"level":2,"diff":1,"scenario":0,"q":"You are designing a schema to store multi-tenant payment records. Each payment belongs to exactly one tenant and one customer. Which schema correctly enforces these relationships?","opts":["payments table with a single `owner_json` JSONB column containing both tenant and customer IDs","A separate join table `tenant_customer_payments` linking all three entities","Use a single `owner_id` column with a `type` column to distinguish between tenants and customers","payments table with tenant_id and customer_id foreign keys referencing tenants(id) and customers(id) respectively","Store tenant_id as a VARCHAR tag without a foreign key constraint to avoid join overhead"],"ans":3,"fb":"Option A is correct: normalised foreign keys with NOT NULL constraints enforce referential integrity at the database level — every payment must belong to a valid tenant and customer. Option B (JSONB) loses referential integrity, makes foreign key enforcement impossible, and complicates queries. Option C (join table) is the pattern for many-to-many relationships, not one-to-many. Option D (VARCHAR tag) sacrifices referential integrity for minimal performance gain. Option E (polymorphic ID) is an anti-pattern called polymorphic associations — it makes foreign keys impossible and complicates queries."},
    {"level":2,"diff":1,"scenario":0,"q":"Which data type should you use in PostgreSQL 16 to store a monetary amount that requires exact decimal arithmetic with no rounding errors, such as a payment total?","opts":["FLOAT8 (double precision)","BIGINT storing the amount in cents","REAL (float4)","MONEY","NUMERIC(12, 4)"],"ans":4,"fb":"NUMERIC (also called DECIMAL) is the correct choice for exact monetary values. It stores numbers with arbitrary precision and no rounding errors. FLOAT8 and REAL use IEEE 754 floating-point representation, which cannot represent all decimal fractions exactly and will introduce rounding errors — unsuitable for financial data. The PostgreSQL MONEY type is locale-dependent (formatting varies by `lc_monetary` setting) and is generally discouraged for portable applications. BIGINT storing cents (option E) is a valid pattern, but NUMERIC(12,4) is a more direct answer when sub-cent precision is required."},
    {"level":2,"diff":1,"scenario":0,"q":"You are designing a schema for a SaaS invoicing feature. Each invoice belongs to one tenant and has multiple line items. Each line item references a product from a shared product catalogue. Which schema design correctly models these relationships?","opts":["invoices(id, tenant_id, total) → line_items(id, invoice_id, quantity, price) → products(id, name, price)","invoices(id, tenant_id, product_id, quantity) with one row per product per invoice","invoices(id, tenant_id, line_items JSONB) with product details embedded in each JSONB entry","invoices(id, tenant_id, product_ids TEXT) storing comma-separated product IDs","line_items(id, tenant_id, invoice_id, product_id, quantity) with no FK to invoices"],"ans":0,"fb":"Option A uses proper normalisation: invoices owns the header, line_items is a child table with FK to invoice_id, and products is a shared catalogue referenced by FK from line_items. This keeps data consistent, queryable, and correctly reflects the one-to-many and many-to-one relationships. JSONB embedding (B) makes individual line items hard to query and update. Comma-separated IDs (C) violate first normal form. Missing FK (D) breaks referential integrity. Flattening to one row per product per invoice (E) duplicates invoice header data.","context":{"Relationship":"Tenant → Invoices (1:many), Invoice → LineItems (1:many), LineItem → Product (many:1)","Shared catalogue":"Products are not tenant-specific","Compliance note":"Each line item price must be captured at time of invoice creation"}},
    {"level":2,"diff":1,"scenario":1,"q":"You run `EXPLAIN ANALYZE SELECT * FROM orders WHERE tenant_id = 1 AND status = 'pending'` and see `Seq Scan on orders (cost=0.00..45231.00 rows=3 width=128) (actual rows=3 loops=1)`. What does this output tell you?","opts":["The query took 45,231 milliseconds to execute","The planner estimated 3 rows and found exactly 3","PostgreSQL scanned the entire table sequentially to find 3 rows","The query is already optimal","The table has exactly 45,231 rows"],"ans":2,"fb":"The `Seq Scan` node means PostgreSQL read every page of the table to find the 3 matching rows. The `cost=0.00..45231.00` is the planner's estimated cost in arbitrary cost units (not milliseconds or row counts). `rows=3` is the estimated row count (which matches actual=3, so statistics are accurate, but that is not the primary insight). The key takeaway is that a sequential scan to return 3 rows from a large table is inefficient — an index on `(tenant_id, status)` would allow an index scan returning only the 3 matching rows. Option B is wrong — the method matters, not just the result count. Option C is wrong — cost is not row count. Option D is wrong — cost is not time."},
    {"level":2,"diff":1,"scenario":1,"q":"EXPLAIN ANALYZE shows a `Sort` node with `Sort Method: external merge Disk: 128MB`. What does this mean and why is it a problem?","opts":["PostgreSQL is using a temporary file as a cache to improve sort performance","The table has 128MB of data that must always be read from disk for this query","External merge sort is PostgreSQL's fastest sort algorithm","The sort operation exceeded available work_mem and spilled to disk","The sort is complete and the 128MB file will be deleted automatically"],"ans":3,"fb":"When a sort operation requires more memory than `work_mem` allows, PostgreSQL spills the sorted data to a temporary file on disk and uses an external merge sort. This is significantly slower than an in-memory sort. The `Disk: 128MB` means 128MB was written to and read back from disk. Solutions: increase `work_mem` for the session (or globally if safe), add an index that returns data in the required sort order (eliminating the sort node entirely), or optimise the query to reduce the result set before sorting."},
    {"level":2,"diff":1,"scenario":2,"q":"A Liquibase migration needs to rename a column from `user_ref` to `user_id` in a table that is actively serving production traffic. Which approach is safest for zero downtime?","opts":["Rename the column during a maintenance window to avoid any risk","Create a view that maps user_ref to user_id so the old name still works","Add the new column user_id, copy data from user_ref","Use ALTER TABLE ... RENAME COLUMN directly","Drop user_ref and add user_id in a single migration inside a transaction"],"ans":2,"fb":"Option A follows the expand-contract pattern for zero-downtime migrations. Adding a new column is non-blocking. You then run both columns in parallel, deploy the application code that uses the new column, and only drop the old column after confirming the deployment is stable. Option B is technically correct that RENAME COLUMN takes a brief lock, but it requires all application code to be updated atomically — impossible in a rolling deployment where some pods may still reference the old name. Options C and D do not solve the rolling deployment problem. Option E (maintenance window) has downtime."},
    {"level":2,"diff":1,"scenario":3,"q":"A table `audit_logs` has millions of rows and is queried almost exclusively by `SELECT ... WHERE tenant_id = $1 AND logged_at > $2`. There is already a single-column index on `tenant_id`. Would adding a separate index on `logged_at` improve this query?","opts":["Yes — two separate indexes can be combined by the planner using Bitmap AND","Yes — an index on logged_at will allow the planner to avoid reading old rows","No — the existing tenant_id index is sufficient for all queries","No — TIMESTAMP columns cannot be indexed in PostgreSQL","Not significantly"],"ans":4,"fb":"A composite index on `(tenant_id, logged_at)` is ideal for this query pattern. It first narrows to the specific tenant (equality on the leading column), then applies the range filter on `logged_at` using the index's sorted order — all in a single index scan. Option B (Bitmap AND) is technically possible and can help in some cases, but it is less efficient than a single composite index scan for this pattern. Option C is misleading — a separate `logged_at` index cannot efficiently combine with tenant filtering. Option D is wrong — the single-column tenant_id index still requires scanning all rows for that tenant. Option E is false — all B-tree-compatible types including TIMESTAMP can be indexed."},
    {"level":2,"diff":1,"scenario":3,"q":"A query on a `payments` table returns rows correctly but runs for 8 seconds. The table has 5 million rows. You add an index on the `status` column (which has only 4 distinct values). After re-running, the query is no more than 100ms faster. Why?","opts":["Low-cardinality columns like `status` (4 values) produce poor index selectivity, so PostgreSQL prefers a sequential scan","PostgreSQL requires a VACUUM ANALYZE to be run before a new index is used","The index needs to be a UNIQUE index to be used by the query planner","The index was created with CONCURRENTLY and is not yet fully built","The index is not compatible with the `WHERE status = ?` predicate syntax used by Hibernate"],"ans":0,"fb":"An index on a column with only 4 distinct values has very low selectivity. If each value appears in 25% of rows, the planner often prefers a sequential scan because accessing 1.25M index entries and corresponding heap pages costs more than reading the table sequentially. A VACUUM ANALYZE (option D) updates statistics and is recommended after large changes, but it won't fix low cardinality. The solution is either a partial index (`WHERE status = 'PENDING'`) if the query targets rare values, or a composite index with a more selective leading column.","context":{"Table rows":"5,000,000","Distinct status values":"PENDING, PROCESSING, COMPLETED, FAILED","Distribution":"~90% COMPLETED, ~8% FAILED, ~2% PENDING/PROCESSING"}},
    {"level":2,"diff":1,"scenario":4,"q":"A developer reads that PostgreSQL uses READ COMMITTED isolation by default. What does this mean for a long-running report query that takes 5 seconds to execute?","opts":["The query sees a consistent snapshot of the database as it was at the moment the query started","Each row returned by the query reflects the committed state at the time that row was read","The query is automatically retried if another transaction modifies data during execution","No other transactions can modify the rows being read until the query finishes","READ COMMITTED prevents phantom reads during report queries"],"ans":1,"fb":"Under READ COMMITTED, PostgreSQL takes a new snapshot at the start of each individual statement (not the transaction). This means a long-running query can see different committed states for different rows — rows committed by other transactions during the 5-second execution may or may not be included depending on timing. This is sometimes called a 'non-repeatable read' at the query level. Option B describes SNAPSHOT isolation (Repeatable Read in PostgreSQL). Option C is wrong — READ COMMITTED does not block other writers. Option D is wrong — there is no automatic retry. Option E is wrong — READ COMMITTED does not prevent phantom reads."},
    {"level":2,"diff":2,"scenario":0,"q":"You are designing a schema for a feature that tracks which users have accepted which versions of a terms-of-service document. A user can accept the same document version only once, but can accept multiple different versions. Which schema design is correct?","opts":["A `user_document_acceptances` table with (user_id, document_version_id) as a composite primary key, plus created_at and accepted_by columns","Add an `accepted_versions` JSONB array column to the users table","Store acceptance as a boolean flag on the document_versions table with a user_id column","A `users_documents` join table with separate unique indexes on user_id and document_version_id independently","A `document_acceptances` table with a single auto-increment primary key and no unique constraint on (user_id, document_version_id)"],"ans":0,"fb":"Option A is correct: a junction table with a composite primary key on `(user_id, document_version_id)` naturally enforces the uniqueness constraint — a user cannot accept the same version twice. The additional columns `created_at` and `accepted_by` store the acceptance metadata. Option B (JSONB array) loses referential integrity and makes querying which users accepted which versions much harder. Option C is a common mistake — without a unique constraint, duplicate acceptances are possible. Option D is wrong — separate unique indexes on each column independently do not prevent duplicate (user_id, document_version_id) pairs. Option E forces a one-to-one relationship between document versions and users, which doesn't scale."},
    {"level":2,"diff":2,"scenario":0,"q":"Your team is designing a schema for a multi-tenant platform where each tenant has their own set of `products`. A product's `sku` (stock-keeping unit) must be unique within a tenant but two different tenants can have products with the same SKU. How do you enforce this constraint at the database level?","opts":["Enforce uniqueness only in the application layer with a query before INSERT","Add a CHECK constraint that queries another row to verify uniqueness","Use a trigger that checks for duplicate SKUs before each INSERT","Create a unique constraint on the sku column alone","Create a unique constraint on (tenant_id, sku) on the products table"],"ans":4,"fb":"A composite unique constraint on `(tenant_id, sku)` correctly models the business rule: the combination must be unique, but each column alone need not be. PostgreSQL enforces this at the database level, preventing duplicates even under concurrent inserts. Option B (unique on sku alone) would prevent different tenants from sharing a SKU, violating the business requirement. Option C (CHECK constraint with a subquery) is not supported in PostgreSQL — CHECK constraints cannot contain subqueries. Option D (application-layer check) is vulnerable to race conditions under concurrent requests. Option E (trigger) can work but is fragile and harder to maintain than a declarative constraint."},
    {"level":2,"diff":2,"scenario":0,"q":"You are designing a schema for a multi-tenant permissions system. Each tenant has roles, each role has permissions, and users can have multiple roles within a tenant. A query that lists all permissions for a given user in a given tenant is performance-critical. Which schema design supports this most effectively?","opts":["users(id, tenant_id, roles JSONB) storing role and permission data as nested JSON","users(id), roles(id, tenant_id), permissions(id, role_id), user_roles(user_id, role_id","user_permissions(user_id, tenant_id, permission_ids TEXT) storing a comma-separated list","roles(id, tenant_id, user_ids JSONB, permission_ids JSONB) storing arrays on the role row","permissions(id, user_id, tenant_id, permission_name) with one row per user-permission pair"],"ans":1,"fb":"The normalised schema with a `user_roles` junction table and appropriate indexes supports efficient lookups: joining users → user_roles → permissions with index scans on `(user_id, tenant_id)`. JSONB nesting (B) makes set-based queries slow and updates complex. Flattening to one row per permission (C) creates enormous tables and makes role-level changes difficult. Comma-separated IDs (D) cannot be indexed or joined. Storing arrays on roles (E) requires array unnesting and prevents efficient permission enumeration.","context":{"Query pattern":"SELECT permissions WHERE user_id = ? AND tenant_id = ?","Scale":"~500 users per tenant, ~50 roles, ~200 permissions","Update pattern":"Role assignments change frequently"}},
    {"level":2,"diff":2,"scenario":1,"q":"EXPLAIN ANALYZE shows the following for a query: `Index Scan using idx_orders_tenant on orders (cost=0.56..8.58 rows=1 width=200) (actual time=0.521..125.432 rows=1 loops=1)`. The estimated cost is low but actual time is 125ms. What is the most likely cause?","opts":["125ms is acceptable for a production query and no action is needed","The statistics are wrong and the row count estimate is too low","The cost model underestimates I/O latency in Cloud SQL","The index scan found only 1 row but that row required fetching a large number","The index is corrupt and needs to be rebuilt"],"ans":3,"fb":"When an index scan takes far longer than its cost estimate suggests, the most common cause is that the table heap pages containing the actual row data are not in the buffer cache (cold cache) or are heavily fragmented. The index correctly identifies 1 row, but fetching the heap tuple requires reading one or more disk pages. In a bloated table, the row may require reading pages that are only partially filled. This is sometimes called 'index scan overhead' or a 'heap fetch' cost. Option B (corrupt index) would cause errors or wrong results, not slowness. Option C (stale stats) is ruled out because actual=1 matches estimated=1. Option D ignores a 125x cost overrun. Option E is partly true but not the root cause to diagnose."},
    {"level":2,"diff":2,"scenario":2,"q":"A Liquibase changeset adds a new NOT NULL column `notification_channel` (VARCHAR) to the `subscriptions` table which has 5 million rows in production. The changeset does not include a DEFAULT. What will happen when this migration runs?","opts":["The migration adds the column as nullable and then sets it NOT NULL in a second step automatically","PostgreSQL 16 allows adding NOT NULL columns without a DEFAULT and uses 'unknown' as the implicit default","The migration fails with 'column cannot be defined as NOT NULL with no default value'","The migration succeeds but all existing rows have NULL in the column, violating the constraint silently","All existing rows will have the column set to an empty string"],"ans":2,"fb":"When you add a NOT NULL column without a DEFAULT, PostgreSQL must assign a value to all existing rows. Since no default is provided, it cannot satisfy the NOT NULL constraint for those rows and fails immediately. In PostgreSQL 11+, adding a NOT NULL column WITH a constant DEFAULT is instantaneous (metadata only, no table rewrite), making it safe to add with a default and then update rows in batches later. Option B is not something PostgreSQL does automatically. Option C and E describe non-existent implicit defaults. Option D is wrong — PostgreSQL does not silently violate NOT NULL constraints."},
    {"level":2,"diff":2,"scenario":3,"q":"A table `transactions` stores financial records for multiple tenants. The most common query pattern is `WHERE tenant_id = $1 AND transaction_date BETWEEN $2 AND $3 AND status = $4`. You have a composite index on `(tenant_id, transaction_date)`. A colleague suggests adding `status` to the index. How should you evaluate this suggestion?","opts":["Composite indexes cannot contain more than 2 columns in PostgreSQL", "Add status as the first column in the index", "Always add all WHERE clause columns to the index for maximum performance", "Check the selectivity of `status`", "Status columns should never be indexed"],"ans":3,"fb":"Low-cardinality columns like `status` (with 3-5 distinct values) typically do not make good leading index columns because each value matches a large fraction of rows. However, adding `status` as an INCLUDE column (a covering index feature) means the value can be returned from the index without fetching the heap page — useful if SELECT includes `status`. Adding it as a third key column `(tenant_id, transaction_date, status)` can help when `status` significantly filters the result after the first two columns. The right answer requires measuring, not assuming. Option B (always add all columns) leads to bloated indexes. Option C is an oversimplification. Option D is wrong — selectivity order for composite indexes. Option E is false — PostgreSQL supports up to 32 columns in a composite index."},
    {"level":2,"diff":2,"scenario":3,"q":"A reporting query joins `orders` and `order_items` filtering on `orders.tenant_id`, `orders.created_at`, and `order_items.product_id`. EXPLAIN ANALYZE shows a hash join with a sequential scan on `orders`. Which index strategy is most likely to improve this query?","opts":["Add a partial index on `order_items` where `product_id IS NOT NULL`","Create a B-tree index on `orders.tenant_id` alone","Create a composite B-tree index on `orders(tenant_id, created_at)` and ensure `order_items.order_id` is indexed","Create an index on `order_items.product_id` and rely on the planner to resolve the join","Create a GIN index on `orders.created_at` for range queries"],"ans":2,"fb":"A composite index on `(tenant_id, created_at)` allows the planner to use an index scan that satisfies both the equality predicate on `tenant_id` and the range predicate on `created_at`, dramatically reducing rows examined. Separately, ensuring `order_items.order_id` is indexed allows an efficient nested loop or merge join from the orders result set. A single-column index on `tenant_id` (A) misses the date range benefit. GIN (C) is for full-text or JSONB, not date ranges. Indexing only `product_id` (D) doesn't address the scan on `orders`. The partial index (E) is irrelevant to the bottleneck.","context":{"Query filter":"tenant_id = ? AND created_at BETWEEN ? AND ? JOIN order_items ON orders.id = order_items.order_id WHERE product_id = ?","EXPLAIN output":"Seq Scan on orders (cost=0..95000 rows=210000)","Rows after filter":"~3,000 orders matching tenant + date range"}},
    {"level":2,"diff":2,"scenario":4,"q":"A background job reads a batch of payment records with `SELECT ... FOR UPDATE`, processes each one, and updates it. Payments are processed one at a time in a loop within a single long transaction. A developer notices the job occasionally deadlocks with the main application. What is the most likely cause and fix?","opts":["The fix is to increase the lock_timeout to give transactions more time to wait","The background job and application acquire row locks in different orders","The background job should use READ COMMITTED instead of locking rows","FOR UPDATE locks the entire table, blocking all application queries","Deadlocks in PostgreSQL always indicate a bug in the connection pool configuration"],"ans":1,"fb":"Deadlocks occur when transaction A holds a lock that B wants, and B holds a lock that A wants. If the background job processes payments in one order and the application locks payments in a different order (e.g., the app processes them by tenant, the background job processes them by date), they can deadlock. The standard fix is to always acquire locks in a consistent global order. Option B is wrong — `FOR UPDATE` locks individual rows, not the entire table. Option C is wrong — changing isolation level does not fix lock order issues. Option D is wrong — deadlocks are a logic problem, not a pool configuration problem. Option E (lock_timeout) would make the deadlock fail faster, not prevent it."},
    {"level":2,"diff":3,"scenario":0,"q":"You are designing a schema for a SOX-compliant financial platform. The requirement states that the original value of every field in the `journal_entries` table must be preserved if updated, and an audit trail must show who changed what and when. Which schema design best meets this requirement?","opts":["Enable PostgreSQL's built-in audit log feature which captures all DML automatically","Create a `journal_entries_history` table that stores only changed columns as JSONB diffs","Use a soft-delete pattern with a `deleted_at` column to preserve original records","Add `updated_at` and `updated_by` columns to `journal_entries` and overwrite the row on change","An append-only `journal_entries` table where records are never updated or deleted"],"ans":4,"fb":"SOX compliance requires an immutable audit trail — original values must be preserved and changes must be attributable to a specific actor at a specific time. An append-only table where rows are never updated or deleted, combined with a dedicated audit log table populated by a trigger on any attempted change, provides a tamper-evident record. Option B (overwriting rows) destroys the original value, violating the requirement. Option C (JSONB diffs) preserves changes but makes reconstructing the full historical state complex. Option D (soft-delete) only addresses deletions, not updates. Option E is false — PostgreSQL does not have a built-in DML audit feature; pgaudit logs SQL statements but does not preserve original row values in a queryable form."},
    {"level":2,"diff":3,"scenario":0,"q":"You are designing a schema for time-series billing data where each tenant generates approximately 500K records per month and queries typically filter by `tenant_id` and a date range spanning 1-3 months. The data older than 12 months is rarely queried and can be archived. Which schema feature would most effectively address both query performance and data lifecycle management?","opts":["Table partitioning by `created_month` (range partitioning on created_at) with local indexes","Sharding the table by tenant_id into separate physical tables per tenant","A single table with a composite index on (tenant_id, created_at)","Storing rows older than 12 months in a JSONB archive column on a summary table","Using a TimescaleDB hypertable instead of PostgreSQL native partitioning"],"ans":0,"fb":"Range partitioning on `created_at` (e.g., monthly partitions) combined with local indexes on `tenant_id` per partition allows partition pruning — queries for a 1-3 month window only scan the relevant partitions. Archiving old data is a metadata operation (DETACH PARTITION) that is instantaneous and non-blocking. Option B (single table with composite index) works at moderate scale but becomes inefficient as the table grows to hundreds of millions of rows — index scans become slower and maintenance (VACUUM, bloat) becomes harder. Option C (per-tenant sharding) is complex to manage and unbalanced if tenant sizes vary. Option D (TimescaleDB) is a valid extension but introduces an external dependency not in the stated stack. Option E (JSONB archive) is an anti-pattern that destroys queryability."},
    {"level":2,"diff":3,"scenario":0,"q":"Your team needs to store financial transaction records for multiple tenants. Each transaction must reference an account, include an amount and currency, and be queryable by tenant, account, date range, and status. At 10 million rows per year and 50 tenants, what schema design decision has the greatest impact on long-term query performance?","opts":["Store all tenants in one table and rely on a composite index on (tenant_id, account_id, created_at)","Partition the table by tenant_id using PostgreSQL list partitioning","Store transactions in a JSONB column to allow flexible querying across tenants","Use a materialized view per tenant that is refreshed nightly to support reporting queries","Use a separate schema per tenant so that each tenant's data is physically isolated"],"ans":0,"fb":"At 10M rows/year × 50 tenants = 500M rows over 10 years, a composite index on (tenant_id, account_id, created_at) gives the planner efficient index scans for the primary query patterns. List partitioning by tenant_id (B) can help with partition pruning but adds operational complexity and only benefits if tenants are queried independently — the index approach is simpler and effective. Separate schemas (C) create a schema management nightmare and don't help query performance. JSONB (D) loses index efficiency. Nightly materialised views (E) mean stale data and high storage overhead.","context":{"Table size projection":"500M rows over 10 years","Primary query":"SELECT * FROM transactions WHERE tenant_id=? AND account_id=? AND created_at BETWEEN ? AND ?","Index candidate":"(tenant_id, account_id, created_at)"}},
    {"level":2,"diff":3,"scenario":1,"q":"EXPLAIN ANALYZE shows a Hash Join between `orders` (10M rows) and `customers` (50K rows) with `Hash Batches: 32`. The query is running slowly. What does `Hash Batches: 32` mean and what should you investigate?","opts":["PostgreSQL ran the join 32 times in parallel across 32 workers","The hash join required 32 network round trips to Cloud SQL","32 batches is optimal for a hash join between tables of this size","The hash table for the smaller relation did not fit in work_mem and was split","Hash Batches: 32 means the query used 32MB of hash table memory"],"ans":3,"fb":"In a hash join, PostgreSQL builds a hash table from the smaller relation (customers) and probes it for each row of the larger relation. `Hash Batches > 1` means the hash table did not fit entirely in `work_mem` and was divided into batches — each batch requires writing to disk and reading back, causing significant I/O overhead. `Hash Batches: 32` means 32 disk passes. Increasing `work_mem` (either globally or per-session with `SET work_mem`) reduces batches and can make the entire hash table fit in memory (`Hash Batches: 1`). Option B (parallel workers) would show in the plan as Parallel Hash Join with `Workers Launched`. Option C and D are wrong. Option E is wrong — minimising batches is always better."},
    {"level":2,"diff":3,"scenario":2,"q":"A zero-downtime migration needs to add a foreign key constraint `REFERENCES customers(id)` to the `orders` table which has 20 million rows. The naive approach locks the table during validation. What is the PostgreSQL 16 technique to add this constraint without blocking reads or writes?","opts":["Foreign key constraints in PostgreSQL 16 are always added without locks","Create a partial index that simulates the foreign key check without a constraint","Use `ALTER TABLE orders ADD CONSTRAINT fk_customer FOREIGN KEY (customer_id) REFERENCES","Use a Liquibase `validCheckSum` to skip constraint validation","Add the foreign key as a deferred constraint with `INITIALLY DEFERRED`"],"ans":2,"fb":"The `NOT VALID` option adds the constraint definition to the catalog without scanning existing rows — this takes only a brief metadata lock. New inserts and updates are immediately checked against the constraint. The separate `VALIDATE CONSTRAINT` command then scans existing rows to verify they satisfy the constraint; this scan only takes a `SHARE UPDATE EXCLUSIVE` lock which does not block reads or DML. This two-step approach is the standard PostgreSQL pattern for adding constraints to large tables with zero downtime. Option B is false — by default, FK addition takes an `ACCESS EXCLUSIVE` lock and scans the table. Option C (validCheckSum) is a Liquibase feature for changeset checksums, unrelated to constraint validation. Option D (INITIALLY DEFERRED) changes when the FK is checked, not how it is added. Option E (partial index) does not enforce referential integrity."},
    {"level":2,"diff":3,"scenario":2,"q":"Your team needs to backfill a new `external_ref` VARCHAR(64) column across 15 million rows in the `payments` table. The backfill runs as a single UPDATE in a Liquibase migration. What problem does this cause and what is the correct approach?","opts":["A single large UPDATE is more efficient","The migration will pause automatically if it detects too many rows and ask for confirmation","The UPDATE will fail","Liquibase cannot execute UPDATE statements in changesets","A single UPDATE on 15M rows holds an exclusive lock on the table for the entire duration (potentially"],"ans":4,"fb":"A single UPDATE that modifies 15 million rows acquires a row-level write lock on every row it touches and holds the associated transaction open for the entire duration. This can take minutes and causes massive table bloat (all old row versions remain until VACUUM). More critically, it holds an `ACCESS SHARE` level conflict with some DDL and can cause lock queues that block other queries. The correct approach is batched updates: `UPDATE payments SET external_ref = ... WHERE id BETWEEN $batch_start AND $batch_end` committed in small chunks, which keeps individual transaction durations short and allows VACUUM to reclaim dead tuples incrementally. Option B is false — Liquibase supports SQL. Option C is false. Option D is wrong — efficiency must be balanced against operational impact. Option E is false."},
    {"level":2,"diff":3,"scenario":3,"q":"A GIN index on a `tags` TEXT[] column is used by queries like `WHERE 'billing' = ANY(tags)`. After adding 500K new rows with many new tags, queries using this index become slower. EXPLAIN shows the index is still being used. What PostgreSQL maintenance operation most directly addresses GIN index performance degradation from many insertions?","opts":["Increase gin_fuzzy_search_limit to improve GIN scan performance","Run `VACUUM` on the table","Run ANALYZE to update statistics so the planner makes better decisions","Switch to a GiST index which handles large volumes better than GIN","Rebuild the index with REINDEX CONCURRENTLY to compact it"],"ans":1,"fb":"GIN indexes use a 'pending list' to accumulate new entries quickly — insertions append to the list rather than immediately merging into the main B-tree structure. Over time, a large pending list requires a linear scan at query time before the main index is searched, degrading performance. `VACUUM` flushes the pending list into the main index. This is controlled by `gin_pending_list_limit`. `VACUUM` (or auto-vacuum) resolves this transparently in steady state. Option B (REINDEX) rebuilds the entire index, which takes longer and is more disruptive than VACUUM. Option C (ANALYZE) updates statistics but does not fix the pending list. Option D (gin_fuzzy_search_limit) is for similarity searches, unrelated to this scenario. Option E (GiST) is a different tradeoff and not the right diagnostic step here."},
    {"level":2,"diff":3,"scenario":3,"q":"A senior engineer suggests replacing three separate B-tree indexes on `(tenant_id)`, `(created_at)`, and `(status)` with a single composite index on `(tenant_id, status, created_at)`. The most common queries filter by `tenant_id` and `created_at` range, but rarely filter by `status`. What is the most important trade-off to consider?","opts":["The composite index will cause write amplification on every INSERT and UPDATE to the table","PostgreSQL cannot use a composite index for range predicates","The composite index cannot be used for queries that filter by `tenant_id` and `created_at` without also specifying `status`","Composite indexes always perform worse than individual indexes","The index will be unusable once the table exceeds 100 million rows"],"ans":2,"fb":"In a B-tree composite index, a range predicate on an intermediate column prevents the index from being used for columns after it. With `(tenant_id, status, created_at)`, a query filtering `tenant_id = ? AND created_at BETWEEN ?` cannot efficiently use the `created_at` part because `status` is in between and not constrained. The better order for the common query pattern would be `(tenant_id, created_at, status)`. Option B is wrong: composite indexes are often more efficient. Option C (write amplification) is a real concern but not the most important trade-off here. Option D is incorrect: range predicates work on the last key column of a B-tree index.","context":{"Current indexes":"3 separate B-tree indexes","Common query pattern":"WHERE tenant_id = ? AND created_at BETWEEN ? AND ?","Rare query pattern":"WHERE tenant_id = ? AND status = ?"}},
    {"level":2,"diff":3,"scenario":4,"q":"Two concurrent transactions execute the following sequence: T1 reads balance (100), T2 reads balance (100), T1 writes balance = 100 - 30 = 70 and commits, T2 writes balance = 100 - 40 = 60 and commits. The final balance is 60 instead of 30. What anomaly is this and how does PostgreSQL's default isolation level handle it?","opts":["This is a write skew","READ COMMITTED cannot prevent lost updates","This is a phantom read","This is a dirty read","This is a lost update anomaly"],"ans":4,"fb":"This scenario describes a lost update: both transactions read the same value (100), each computes a new value independently, and the second write overwrites the first, losing T1's update. In PostgreSQL, `UPDATE` statements acquire row-level locks. Under READ COMMITTED, T2's UPDATE blocks when it tries to lock the row that T1 has locked. When T1 commits, T2 re-evaluates the WHERE clause against the new value (70) and then applies its change: 70 - 40 = 30. This is correct behaviour and lost updates are automatically prevented by row-level locking in PostgreSQL for UPDATE statements. Option B (dirty read) is a different anomaly. Option C (phantom read) involves new rows appearing. Option D (write skew) involves decisions based on read data that is then modified by another transaction. Option E is wrong — row locking in UPDATE already handles this."},
    {"level":3,"diff":1,"scenario":0,"q":"Your team is building a ledger table for a PCI-DSS-compliant payment platform. A junior engineer proposes storing the running balance as a column that gets updated on each transaction. What is the primary design risk with this approach?","opts":["Mutable balances break auditability","Running balance columns require a UNIQUE constraint that slows inserts.","PostgreSQL does not support decimal arithmetic accurately enough for financial values.","The column will cause table bloat","Cloud SQL does not allow UPDATE on columns named 'balance'."],"ans":0,"fb":"A ledger in a regulated domain must be append-only. Storing a mutable running balance means you lose the ability to reconstruct the balance at any past point in time if data is ever corrected or if bugs are found. The correct pattern is to store immutable debit/credit rows and compute the balance as SUM. Dead tuples from UPDATEs are a real cost but are not the primary design risk — auditability is. PostgreSQL's NUMERIC type handles financial arithmetic correctly."},
    {"level":3,"diff":1,"scenario":0,"q":"You are designing an audit log table for a SOX-compliant platform. Which column set best satisfies temporal audit requirements?","opts":["id, sql_statement TEXT, changed_at TIMESTAMP","id, table_name, old_value, new_value, changed_at","id, table_name, row_count INT, changed_at TIMESTAMPTZ","id, entity_id, entity_type, old_data JSONB, new_data JSONB","id, entity_id, changed_at DATE, summary TEXT"],"ans":3,"fb":"SOX audit tables need: what changed (old/new data as JSONB for flexibility), who changed it (changed_by), when (TIMESTAMPTZ preserves timezone), what operation (I/U/D). Option A lacks the actor identity. Option C stores raw SQL which is fragile and doesn't capture the before-state. Option D loses the actual data delta. Option E is an aggregate, not a row-level audit. TIMESTAMPTZ is preferred over TIMESTAMP because it stores UTC and avoids timezone ambiguity."},
    {"level":3,"diff":1,"scenario":0,"q":"A team asks whether to use a trigger-based audit log or application-layer audit logging for a regulated financial service. What is the main advantage of trigger-based audit logging?","opts":["Triggers run faster than application code so audit writes have lower latency.","Triggers capture changes made directly to the database outside the application, closing audit gaps.","Triggers can write to external systems like Kafka without application involvement.","Triggers automatically compress old audit rows to save storage.","Triggers are easier to test and maintain than application-layer code."],"ans":1,"fb":"The critical advantage of trigger-based auditing is completeness: any write to the table — whether from the application, a migration script, a DBA console, or an emergency hotfix — gets audited. Application-layer logging only audits traffic that flows through the app. For PCI-DSS and SOX, this gap is a compliance risk. Triggers do not have inherently lower latency (they add overhead), cannot write to Kafka without extensions, and are generally harder to test than application code."},
    {"level":3,"diff":1,"scenario":1,"q":"A DBA reports that a table's pg_relation_size is significantly larger than expected given the number of live rows. Which PostgreSQL view should you query first to understand the bloat situation?","opts":["pg_stat_user_tables","pg_stat_bgwriter","pg_stat_database","pg_stat_replication","pg_stat_user_indexes"],"ans":0,"fb":"pg_stat_user_tables exposes n_live_tup and n_dead_tup which directly show the ratio of live to dead rows, the primary indicator of table bloat. A large gap between live and dead tuples confirms autovacuum is not keeping up. pg_stat_bgwriter shows background writer activity, not per-table bloat. pg_stat_replication is for replica lag. pg_stat_database is aggregate-level. pg_stat_user_indexes helps find index bloat separately."},
    {"level":3,"diff":1,"scenario":1,"q":"Your team observes that autovacuum has not run on a high-write table for several hours despite activity. Which configuration parameter is most likely throttling autovacuum too aggressively?","opts":["wal_level set to minimal, disabling autovacuum","checkpoint_completion_target set too high, blocking autovacuum writes","autovacuum_vacuum_scale_factor set too high, requiring too many dead tuples before triggering","max_connections set too high, starving autovacuum of connections","shared_buffers set too low, preventing autovacuum from reading pages"],"ans":2,"fb":"autovacuum_vacuum_scale_factor (default 0.2 = 20%) means autovacuum only triggers when dead tuples exceed 20% of live rows. On a large table with millions of rows, this threshold can be very high in absolute terms, causing long delays. The fix is to lower scale_factor or set autovacuum_vacuum_threshold per-table. shared_buffers affects caching, not vacuum triggering. max_connections does not affect autovacuum workers (controlled by autovacuum_max_workers). wal_level=minimal is not valid for replicated Cloud SQL instances."},
    {"level":3,"diff":1,"scenario":2,"q":"You need to add a NOT NULL column with a default value to a table with 50 million rows in a live production system. What is the safest approach in PostgreSQL 16?","opts":["Take the table offline, add the column, then restore service.","Use pg_repack to add the column without locking.","Create a new table with the column, copy all data, then rename.","Add the column as nullable first, backfill in batches, then add the NOT NULL constraint.","ALTER TABLE t ADD COLUMN new_col INT NOT NULL DEFAULT 0"],"ans":4,"fb":"Since PostgreSQL 11, adding a NOT NULL column with a constant default no longer rewrites the table. PostgreSQL stores the default in the catalog and serves it for existing rows without touching the heap. In PostgreSQL 16, this optimization is well established. The column add is nearly instant even on 50M-row tables. Option B (nullable then backfill) was the pre-PG11 pattern and is no longer necessary for constant defaults. Options C and D cause unnecessary downtime. pg_repack is for reclaiming bloat, not adding columns."},
    {"level":3,"diff":1,"scenario":2,"q":"A Liquibase migration needs to rename a column on a table that is actively read by the application. What is the risk of running ALTER TABLE t RENAME COLUMN old TO new directly?","opts":["RENAME COLUMN triggers autovacuum immediately, causing I/O spikes.","RENAME COLUMN automatically drops any CHECK constraints on the column.","RENAME COLUMN will corrupt indexes on the column.","RENAME COLUMN acquires an ACCESS EXCLUSIVE lock, blocking all reads and writes for the duration.","RENAME COLUMN is not supported in PostgreSQL 16."],"ans":3,"fb":"ALTER TABLE ... RENAME COLUMN acquires ACCESS EXCLUSIVE lock, which blocks all concurrent reads and writes. On a busy production table this causes visible downtime even if the operation itself is fast. The zero-downtime approach is to keep the old column, add the new column with a trigger to dual-write, update the application to read the new name, then drop the old column after deployment. PostgreSQL 16 fully supports RENAME COLUMN. Indexes are updated automatically. CHECK constraints are preserved."},
    {"level":3,"diff":1,"scenario":3,"q":"You are enabling Row Level Security on a multi-tenant table. After running ALTER TABLE orders ENABLE ROW LEVEL SECURITY, your application queries return zero rows. What is the most likely cause?","opts":["RLS is only effective when ssl_mode is set to require.","The table owner bypasses RLS by default and the app runs as the table owner.","Cloud SQL does not support RLS on tables with more than 1 million rows.","The application connection does not have the SELECT privilege on the table.","RLS requires a primary key to be defined before it can be enabled."],"ans":1,"fb":"When RLS is enabled and NO policies exist, non-owner roles see zero rows (default-deny). However, the table owner and superusers bypass RLS by default. If the application runs as the table owner, it will see all rows. But if the app runs as a different role and no permissive policy exists, it sees nothing. The fix is to create a permissive policy: CREATE POLICY tenant_isolation ON orders USING (tenant_id = current_setting('app.tenant_id')::UUID). RLS has no row-count limit, no SSL dependency, and no PK requirement."},
    {"level":3,"diff":1,"scenario":4,"q":"An on-call engineer reports that a deployment is stalled because a Liquibase migration appears to be hanging. Which query would most directly show if the migration is blocked waiting for a lock?","opts":["SELECT pid, wait_event_type, wait_event, query FROM pg_stat_activity WHERE wait_event_type = 'Lock'","SELECT * FROM pg_stat_replication","SELECT relname, n_dead_tup FROM pg_stat_user_tables ORDER BY n_dead_tup DESC","SELECT * FROM pg_stat_bgwriter","SELECT * FROM pg_locks WHERE granted = true"],"ans":0,"fb":"pg_stat_activity with wait_event_type = 'Lock' shows processes currently blocked waiting for a lock, including the query text so you can confirm it is the migration. This is the fastest first step. pg_locks WHERE granted = true shows currently held locks, not waiters. pg_stat_bgwriter and pg_stat_replication are unrelated to lock waits. pg_stat_user_tables shows bloat, not locking."},
    {"level":3,"diff":2,"scenario":0,"q":"You are designing a temporal pricing table for a regulated platform where historical prices must be reconstructed for any past date. A colleague suggests using updated_at and deleted_at columns. Why is this insufficient for true bi-temporal auditability?","opts":["The approach works fine for SOX compliance without additional columns.","updated_at and deleted_at only cover the transaction time dimension","updated_at and deleted_at require triggers which are not supported on Cloud SQL.","PostgreSQL 16 removed support for nullable timestamp columns.","These columns cannot be indexed, making historical queries too slow."],"ans":1,"fb":"Bi-temporal tables track two independent time axes: transaction time (when was this row recorded/changed in the DB) and valid time (when was this fact true in the business world). A price might be backdated — recorded on Monday but effective from last Friday. updated_at only captures when the DB row was last touched, not the business validity period. For regulated domains requiring retrospective reconstruction, you need valid_from and valid_to (or valid_at TSTZRANGE) plus system_period for transaction time. Cloud SQL fully supports triggers and nullable timestamps."},
    {"level":3,"diff":2,"scenario":0,"q":"Your platform stores financial transactions that are immutable by policy. A product requirement arrives: users must be able to 'cancel' a transaction. How should this be modelled in a ledger-compliant schema?","opts":["Add a status column to the transactions table and UPDATE it to 'cancelled'.","Archive the original row to a cold storage table and replace it with a placeholder.","Soft-delete the row using a deleted_at column and adjust the balance calculation to exclude it.","DELETE the original row and INSERT a cancellation record in a separate audit table.","INSERT a new reversal transaction with the opposite amount, linked to the original via a reference column."],"ans":4,"fb":"In a ledger-compliant model, rows are immutable — you never UPDATE or DELETE them. A cancellation is modelled as a compensating/reversal entry: a new row with the negated amount and a reference back to the original transaction ID. This preserves the full audit trail, allows regulators to see both the original transaction and the reversal, and keeps the ledger mathematically correct. Soft-deletes (deleted_at) still mutate the row's visibility. Archiving to another table breaks the continuous audit trail."},
    {"level":3,"diff":2,"scenario":1,"q":"After a high-traffic weekend, you notice query performance has degraded on a table that had VACUUM run successfully. pg_stat_user_tables shows low n_dead_tup. What else could explain index bloat causing slow index scans?","opts":["Index bloat only occurs on tables with more than 10 million rows.","pg_stat_user_tables accurately reports both heap and index bloat.","B-tree indexes in PostgreSQL 16 are self-compacting and never bloat.","VACUUM reclaims heap space but does not reclaim space inside B-tree index pages","VACUUM always removes index bloat automatically so the issue must be a missing index."],"ans":3,"fb":"VACUUM reclaims dead tuple space in the heap and marks index entries as dead, but it does not physically compact B-tree index pages. Over time, especially after bulk deletes or updates, B-tree pages fill with deleted entries that occupy space but are not reused efficiently. This is index bloat. To reclaim it, use REINDEX CONCURRENTLY (PG12+, available on Cloud SQL) or pg_repack. pg_stat_user_tables only reports heap dead tuples, not index bloat. B-trees are not self-compacting."},
    {"level":3,"diff":2,"scenario":1,"q":"A table has autovacuum_vacuum_cost_delay set to 20ms (the default). After a high-delete batch job, autovacuum is running but taking many hours to clean up 200M dead tuples, causing ongoing query degradation. What is the most targeted fix?","opts":["Increase shared_buffers to speed up autovacuum page reads.","Disable autovacuum and schedule manual VACUUM jobs via cron.","Lower autovacuum_vacuum_cost_delay for this specific table using ALTER TABLE to","Run VACUUM FREEZE to force immediate cleanup of all dead tuples.","Increase max_connections to give autovacuum more database connections."],"ans":2,"fb":"autovacuum_vacuum_cost_delay throttles autovacuum to avoid starving the workload. After a large batch delete, you want to temporarily reduce this delay (e.g. to 2ms) so autovacuum can catch up quickly. ALTER TABLE t SET (autovacuum_vacuum_cost_delay = 2) applies only to this table without affecting the global setting. VACUUM FREEZE is for transaction ID wraparound prevention, not bloat cleanup (and it takes an exclusive lock strategy not suitable here). Disabling autovacuum is dangerous as it risks XID wraparound."},
    {"level":3,"diff":2,"scenario":2,"q":"A Liquibase migration needs to add a foreign key constraint between two large tables in production. The straightforward ALTER TABLE ... ADD CONSTRAINT approach would lock both tables. What is the zero-downtime approach?","opts":["Add the constraint during a maintenance window", "Foreign key constraints cannot be added without locking in PostgreSQL 16.", "Use ALTER TABLE ... ADD CONSTRAINT ... NOT VALID to skip the validation scan", "Use a trigger to enforce referential integrity instead of a native FK.", "Partition both tables first, then add the FK per partition to reduce lock scope."],"ans":2,"fb":"PostgreSQL supports a two-phase FK addition. First, ALTER TABLE child ADD CONSTRAINT fk_name FOREIGN KEY (col) REFERENCES parent(id) NOT VALID — this creates the constraint but does not validate existing rows, taking only a brief lock. New writes are immediately checked. Then ALTER TABLE child VALIDATE CONSTRAINT fk_name scans existing rows but only holds a ShareUpdateExclusiveLock, which allows concurrent reads and writes. This is the standard zero-downtime pattern. Triggers are fragile substitutes and miss edge cases. Partitioning does not help with FK locking."},
    {"level":3,"diff":2,"scenario":3,"q":"Your multi-tenant application sets the tenant context using SET LOCAL app.tenant_id = $1 within each transaction. A code review finds a code path that executes a query outside a transaction block. What is the security risk?","opts":["SET LOCAL causes connection pool contamination","The risk is performance only","Queries outside transactions bypass RLS entirely regardless of tenant settings.","SET LOCAL only persists for the duration of the current transaction","SET LOCAL is not supported in PostgreSQL 16"],"ans":3,"fb":"SET LOCAL sets a parameter for the duration of the current transaction only. If called outside a transaction (i.e. in autocommit mode), the setting takes effect but is immediately discarded after the single statement. Any subsequent query in the same connection will read an empty or stale value from current_setting('app.tenant_id'). If the RLS USING clause calls current_setting with raise_exception=false, it may return NULL, causing the policy to match no rows or, worse, use a previous session's value. Use SET SESSION in combination with connection validation, or always wrap in explicit transactions."},
    {"level":3,"diff":2,"scenario":3,"q":"You are reviewing an RLS policy intended to isolate tenant data. The policy is: CREATE POLICY tenant_iso ON orders USING (tenant_id = current_setting('app.tenant_id', TRUE)::UUID). A penetration tester reports they can read another tenant's orders by sending a crafted request. What is the most likely vulnerability?","opts":["The policy name 'tenant_iso' conflicts with a reserved keyword.","The USING clause should be replaced with a WITH CHECK clause for SELECT queries.","RLS policies are disabled for connections coming through Cloud SQL Auth Proxy.","current_setting does not support UUID casting in PostgreSQL 16.","The TRUE flag in current_setting suppresses errors when the setting is missing, returning NULL"],"ans":4,"fb":"When current_setting('app.tenant_id', TRUE) is called and the setting is not defined, it returns NULL. NULL::UUID = any_value evaluates to NULL, not FALSE. In a USING clause, NULL is treated as FALSE (row not visible), which sounds safe. However, if there is also a permissive policy with a broader condition, rows could be exposed. The real risk is application code that sometimes fails to call SET and relies on the policy for isolation — when the parameter is absent, no policy matches correctly. The fix is to use current_setting('app.tenant_id', FALSE) (raises error if unset) to make misconfiguration loudly visible."},
    {"level":3,"diff":2,"scenario":4,"q":"Production alerts show intermittent timeout errors on a specific endpoint. You query pg_stat_activity and see a long-running UPDATE on table payments is blocking 12 other sessions. The blocking query is from a background batch job. What is the most appropriate immediate mitigation while preserving data integrity?","opts":["Kill the PostgreSQL process using SIGKILL to immediately free the lock.","Use SELECT pg_cancel_backend(pid) to send a cancellation signal to the blocking UPDATE","Increase lock_timeout on the waiting sessions to give the UPDATE more time.","Restart the Cloud SQL instance to clear all locks.","Drop and recreate the index on the payments table to clear the lock."],"ans":1,"fb":"pg_cancel_backend sends a SIGINT to the backend, which causes the query to be cancelled and the transaction rolled back cleanly — locks are released and waiting sessions can proceed. This is safe because PostgreSQL handles the rollback gracefully. pg_terminate_backend (SIGTERM) is more forceful and should be a second step if cancellation doesn't work. SIGKILL bypasses cleanup and risks corruption. Restarting Cloud SQL is a drastic last resort. Increasing lock_timeout makes waiters time out sooner, not later. Dropping indexes does not release row-level locks."},
    {"level":3,"diff":2,"scenario":4,"q":"During a peak processing window, a monitoring alert fires showing that a batch job processing payment settlements is taking 10× longer than normal. You pull the active queries and see dozens of sessions waiting on `relation lock` for the `settlements` table. The batch job runs `UPDATE settlements SET status='SETTLED' WHERE id IN (SELECT id FROM settlements WHERE status='PENDING' LIMIT 1000)`. What is most likely causing the contention?","opts":["Multiple batch job instances are running concurrently and competing for locks on the same PENDING rows","The UPDATE statement is acquiring an ACCESS EXCLUSIVE lock on the table, blocking all concurrent reads","HikariCP is exhausting the connection pool, causing sessions to queue and appear as lock waits","The subquery is taking too long","The `LIMIT 1000` clause is incompatible with concurrent transactions and causes a serialisation error"],"ans":0,"fb":"When multiple instances of the batch job run the same subquery to find PENDING rows, they all see the same set of rows and try to update the same rows. This causes row-level lock contention as each UPDATE waits for the others to release locks. The fix is `SELECT id FROM settlements WHERE status='PENDING' LIMIT 1000 FOR UPDATE SKIP LOCKED`, which allows each job instance to claim a non-overlapping set of rows atomically. An UPDATE acquires row-level locks, not ACCESS EXCLUSIVE (option C). The symptoms are lock waits, not connection pool exhaustion (option D)."},
    {"level":3,"diff":3,"scenario":0,"q":"You are designing a PCI-DSS compliant schema for storing card-present transaction events. Legal requires that raw PAN data must never appear in the audit log, but the audit log must record enough information to reconstruct what was authorized. How should you structure the audit schema?","opts":["Store the PAN in a separate encrypted column in the audit table with column-level encryption managed by the application.","Store the PAN hash (SHA-256) in the audit log to allow lookups without exposing raw data.","Store the full PAN in the audit log encrypted with AES-256 and a separate key management service.","Exclude payment data from the audit log entirely to avoid compliance risk.","Store a tokenized or masked representation (e.g. last 4 digits + BIN) in the audit log, and record the token vault reference"],"ans":4,"fb":"PCI-DSS Requirement 3 prohibits storing sensitive authentication data after authorization and restricts PAN storage. The audit log should contain enough to reconstruct the authorization decision without storing or hashing the PAN itself. A token reference (pointing to the token vault), last 4 digits, BIN, amount, merchant, and auth code satisfies both auditability and compliance. Encrypting the PAN in the audit log still means PAN is stored in scope, expanding the CDE. SHA-256 of PAN is considered protected storage under PCI but is still PAN in scope. Excluding payment data from audit logs fails SOX/PCI audit requirements."},
    {"level":3,"diff":3,"scenario":0,"q":"A SOX audit finding requires your team to prove that no row in the financial_events table has ever been deleted or retroactively modified. Your current schema has no controls preventing DELETE. What combination of controls satisfies this requirement with the least operational overhead?","opts":["Enable Row Level Security with a policy that returns false for all DELETE operations.","Create a trigger that raises an exception on DELETE and log all attempts.","Revoke DELETE and TRUNCATE privileges from the application role","Schedule a nightly job that verifies row counts have not decreased and alerts on discrepancy.","Add a deleted_at column and train developers not to use DELETE."],"ans":2,"fb":"The strongest control is privilege revocation — if the application role has no DELETE/TRUNCATE privilege, it is technically impossible for application code to delete rows regardless of bugs or compromises. Logical replication (or Cloud SQL's transaction log export) provides an independent immutable record of all changes for auditors. Triggers can be disabled by a sufficiently privileged role. RLS cannot prevent deletes by the table owner. A deleted_at column relies on developer discipline. Nightly row count checks detect deletions after the fact but don't prevent them."},
    {"level":3,"diff":3,"scenario":1,"q":"A Cloud SQL instance shows increasing query latency over several weeks despite stable load. EXPLAIN ANALYZE shows a sequential scan on a table with a valid index. pg_stat_user_tables shows n_live_tup is accurate. What PostgreSQL mechanism is most likely causing the planner to ignore the index?","opts":["The table statistics are stale","PostgreSQL 16 changed the default cost model to prefer sequential scans.","The index has become corrupt and PostgreSQL silently falls back to sequential scans.","The query contains a LIKE clause which always prevents index usage.","Cloud SQL disables index scans on tables with more than 100M rows."],"ans":0,"fb":"The query planner relies on pg_statistic (populated by ANALYZE) to estimate row counts and selectivity. If a large INSERT or DELETE occurs and ANALYZE has not run, the planner uses outdated statistics. If it believes the filter will return many rows, it chooses a seq scan (lower startup cost). Running ANALYZE manually or tuning autovacuum to analyze more frequently fixes this. Index corruption is rare and would show errors, not silent fallback. Cloud SQL has no row-count limit for index use. LIKE with a leading wildcard prevents index use but that's a specific query pattern, not a general degradation."},
    {"level":3,"diff":3,"scenario":2,"q":"You need to migrate a 500GB live production table from a BIGINT primary key to a UUID primary key as part of a multi-tenant refactor. The table receives ~2,000 writes per second. Outline the safest zero-downtime sequence. Which approach correctly handles all dependencies?","opts":["Use pg_repack to atomically swap the primary key type with zero downtime.","Add the UUID column, use a trigger to keep it in sync with BIGINT, then run a cutover migration.","Drop the BIGINT PK, add UUID PK in one ALTER TABLE statement during a low-traffic window.","Add uuid_col UUID DEFAULT gen_random_uuid() NOT NULL, backfill in batches","Export the table to CSV, recreate with UUID PK, import, and redirect traffic."],"ans":3,"fb":"The zero-downtime PK migration requires multiple phases: (1) add uuid_col with DEFAULT gen_random_uuid() — PG11+ handles this without table rewrite; (2) backfill existing rows in batches of 10k-50k to avoid lock escalation; (3) create a UNIQUE INDEX CONCURRENTLY on uuid_col; (4) update all foreign keys in child tables using NOT VALID to avoid full scans; (5) deploy application changes to write uuid as the join key; (6) VALIDATE CONSTRAINT in background; (7) drop old PK; (8) promote UUID to PK. Dropping and adding PK in one step causes full lock for minutes. pg_repack handles bloat not PK type changes. CSV export causes extended downtime."},
    {"level":3,"diff":3,"scenario":2,"q":"During a zero-downtime migration, you run ALTER TABLE large_table DROP COLUMN legacy_col. The column contains a TEXT field with average 2KB per row and the table has 80M rows. What happens to storage immediately after the DROP?","opts":["The column data is moved to a pg_recycle_bin and freed after 7 days.","PostgreSQL marks the column as dropped in the catalog but does NOT reclaim disk space","DROP COLUMN immediately rewrites the table and reclaims all disk space.","Cloud SQL immediately reclaims disk space by compacting the tablespace.","DROP COLUMN on a TEXT column triggers an autovacuum to free TOAST storage."],"ans":1,"fb":"In PostgreSQL, DROP COLUMN is a metadata-only operation. The column is marked as pg_attribute.attisdropped = true but the data remains in the heap pages until the table is rewritten. This means disk usage does not decrease immediately. To reclaim space, you need to run VACUUM FULL (takes ACCESS EXCLUSIVE lock, not suitable for live systems) or use pg_repack to rebuild the table online. This is important to communicate to stakeholders who expect immediate storage savings. For TOAST data, the VACUUM process will eventually clean orphaned TOAST tuples."},
