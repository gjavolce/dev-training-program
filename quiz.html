    {"level":3,"diff":3,"scenario":3,"q":"Your RLS implementation uses current_setting('app.tenant_id') set via HikariCP's connectionInitSql. A load test reveals that under high concurrency, some requests occasionally read data from the wrong tenant. What is the most likely root cause?","opts":["connectionInitSql runs once when the connection is created, not on each borrow","RLS policies are not evaluated under concurrent load due to a PostgreSQL lock optimization.","Cloud SQL Auth Proxy strips custom session parameters before forwarding to PostgreSQL.","HikariCP does not support connectionInitSql on Cloud SQL connections.","current_setting is not thread-safe in PostgreSQL 16."],"ans":0,"fb":"connectionInitSql runs exactly once when the physical connection is first established in the pool. It does not re-execute on each logical borrow. If the application sets app.tenant_id during a request using SET SESSION, that value persists on the connection when it is returned to the pool. The next borrower inherits the previous tenant's ID if the application does not reset it first. The correct patterns are: (1) use SET LOCAL inside an explicit transaction (resets on commit), (2) use a HikariCP connection listener to set/reset the parameter on borrow/return, or (3) validate the parameter at the start of each request. This is a real multi-tenancy security bug."},
    {"level":3,"diff":3,"scenario":4,"q":"Production shows a deadlock between two services. Service A updates table orders then accounts. Service B updates accounts then orders. Both services use Spring's @Transactional. The deadlocks appear every few minutes under load. What is the correct long-term fix?","opts":["Reduce the transaction isolation level to READ COMMITTED to prevent deadlocks.","Wrap both operations in SAVEPOINT blocks so deadlocks can be retried without full rollback.","Increase deadlock_timeout to give transactions more time to wait before PostgreSQL resolves the deadlock.","Enforce a consistent lock ordering across all services: always acquire locks in the same table order (e.g","Add FOR UPDATE SKIP LOCKED to all UPDATE statements to avoid blocking."],"ans":3,"fb":"Deadlocks occur when two transactions acquire locks in opposite orders. The definitive fix is to enforce a consistent acquisition order across all code paths — both services must always lock the same resource first (e.g., always update accounts before orders, or always lock by ascending entity ID). This eliminates the circular dependency. Increasing deadlock_timeout just delays detection and increases the impact window. SAVEPOINTs allow retry but don't prevent the deadlock. SKIP LOCKED is for queue patterns, not general locking. READ COMMITTED does not prevent deadlocks — it affects visibility of committed rows, not lock ordering."},
    {"level":3,"diff":3,"scenario":4,"q":"A service uses SELECT FOR UPDATE to lock a row before updating it. Under high concurrency, this causes severe lock queuing. A team proposes using optimistic locking with a version column instead. What must the application correctly handle for optimistic locking to maintain data integrity?","opts":["The version column must be of type BIGINT GENERATED ALWAYS AS IDENTITY.","The UPDATE must include WHERE version = :expectedVersion and check that exactly 1 row was","SELECT FOR UPDATE and optimistic locking can be used together without conflict.","Optimistic locking requires a trigger to increment the version column automatically","Optimistic locking only works with SERIALIZABLE isolation level in PostgreSQL 16."],"ans":1,"fb":"Optimistic locking requires the UPDATE to include a WHERE clause checking the version number: UPDATE t SET col = $1, version = version + 1 WHERE id = $2 AND version = $3. The application must then verify rowsAffected == 1. If 0 rows were updated, another transaction has already modified the row (version mismatch) and the current transaction must fetch fresh data and retry. Failing to check affected rows results in silent lost updates — the classic optimistic locking bug. Triggers can increment version but aren't required. SERIALIZABLE isolation is not required; READ COMMITTED works with optimistic locking. The version column type is flexible."},
    {"level":3,"diff":3,"scenario":4,"q":"A production incident shows that a long-running analytics query on the `transactions` table is blocking a critical payment INSERT. The analytics query has been running for 45 minutes. `pg_stat_activity` shows the INSERT is waiting on `relation: transactions` with `lock_type: tuple`. What is the safest immediate mitigation that avoids data loss?","opts":["Set `statement_timeout = '1s'` globally so the analytics query is auto-killed","Run `VACUUM FULL transactions` to clear the lock contention caused by dead tuples","Restart the PostgreSQL instance to clear all locks immediately","Increase `lock_timeout` on the INSERT connection so it waits longer before failing","Terminate the analytics query session using `pg_terminate_backend` so the INSERT can proceed"],"ans":4,"fb":"Using `pg_terminate_backend` on the analytics session terminates that specific connection and releases its locks, unblocking the INSERT without data loss. The analytics query was a read (SELECT) so terminating it loses only that query's work — it can be re-run. Restarting the instance (A) unblocks the INSERT but causes downtime for all clients. Increasing `lock_timeout` (C) only makes the INSERT wait longer before it fails — it doesn't resolve the contention. `VACUUM FULL` (D) acquires ACCESS EXCLUSIVE lock itself and would worsen the situation. Setting a global `statement_timeout` (E) affects all queries and is a configuration change, not an immediate mitigation."},
    {"level":4,"diff":1,"scenario":0,"q":"Your team is designing a partitioned table for an events log that will grow to 500GB per year. Queries almost always filter by a date range (e.g. last 7 days, last 30 days). Which partitioning strategy is most appropriate?","opts":["RANGE partitioning on tenant_id to isolate tenant data.","No partitioning","RANGE partitioning on the event_timestamp column, with monthly or weekly partitions.","LIST partitioning on event_type to group events by category.","HASH partitioning on event_id to distribute rows evenly across 16 partitions."],"ans":2,"fb":"RANGE partitioning on timestamp aligns with the query access pattern. PostgreSQL's partition pruning eliminates partitions outside the query's date range, making time-bounded queries dramatically faster. Monthly or weekly partitions balance partition count against pruning granularity. HASH partitioning distributes evenly but does not prune on date queries — all partitions must be scanned. LIST on event_type only helps when filtering by type, not time. A composite index on an unpartitioned table becomes enormous and still scans the full index for date ranges at this data volume."},
    {"level":4,"diff":1,"scenario":0,"q":"A partitioned table uses monthly RANGE partitions on created_at. A query filter is WHERE created_at::DATE = '2025-03-15'. An engineer claims partition pruning will not work. Are they correct?","opts":["No — but only if the partition key is also cast to DATE in the partition definition.","No — PostgreSQL 16 automatically detects the cast and applies partition pruning.","Yes — partition pruning only works with TIMESTAMPTZ columns, not DATE.","Yes — casting created_at to DATE prevents the planner from performing partition pruning","No — partition pruning works on any expression, including casts."],"ans":3,"fb":"Partition pruning requires the WHERE clause to reference the partition key column directly, without wrapping it in a function or cast. created_at::DATE wraps the column in an implicit function call, making it opaque to the planner's partition elimination logic. The planner cannot reverse the cast to determine which partition to scan. The correct form is WHERE created_at >= '2025-03-15' AND created_at < '2025-03-16'. This is a common mistake that causes full partition scans on large partitioned tables."},
    {"level":4,"diff":1,"scenario":0,"q":"A `payments` table is growing at 50 million rows per month. Most queries filter by `created_at` for recent months. You decide to implement range partitioning by `created_at`. Which statement about PostgreSQL range partitioning is correct?","opts":["Queries filtering on `created_at` will use partition pruning to scan only relevant partitions, provided the filter is a constant or stable expression","Range partitioning by `created_at` requires a UNIQUE constraint on `created_at` across all partitions","Partitioned tables cannot have foreign keys referencing them from other tables","Each partition must be on a separate tablespace","PostgreSQL automatically creates new monthly partitions as data is inserted beyond the last partition boundary"],"ans":0,"fb":"PostgreSQL's partition pruning eliminates partitions whose range cannot contain rows matching the WHERE clause. For range partitioning on `created_at`, a filter like `WHERE created_at >= '2025-01-01' AND created_at < '2025-02-01'` will cause the planner to scan only the January partition. Partitions are NOT created automatically (A) — a DBA must create them in advance (commonly via a cron job or Liquibase migration). UNIQUE constraints (C) are not required for range partitioning. FK references to partitioned tables (D) are supported since PostgreSQL 11. Tablespace separation (E) is optional."},
    {"level":4,"diff":1,"scenario":1,"q":"A Cloud SQL High Availability instance performs a failover during a deployment. Your Spring Boot application's HikariCP connection pool begins throwing connection errors for 30 seconds before recovering. What is the most likely cause?","opts":["The Cloud SQL Auth Proxy must be restarted after each failover.","HikariCP is holding stale connections from the primary that were invalidated by the failover","Cloud SQL HA changes the instance IP address during failover, requiring DNS reconfiguration.","HikariCP does not support PostgreSQL HA configurations.","Spring Boot must be restarted after any Cloud SQL failover event."],"ans":1,"fb":"During a Cloud SQL HA failover, the primary instance becomes unavailable for 30-60 seconds while the standby is promoted. Existing TCP connections to the old primary become dead. HikariCP's idle connections are stale and will fail when used. HikariCP detects this through connection validation (testOnBorrow or keepaliveTime) and eventually evicts stale connections, but recovery takes time proportional to the pool's validation interval. Cloud SQL Auth Proxy handles DNS/IP transparently — the endpoint doesn't change. Spring Boot restart is not required. Auth Proxy reconnects automatically."},
    {"level":4,"diff":1,"scenario":2,"q":"Your application shows intermittent HikariCP connection timeout errors under moderate load. The Cloud SQL instance shows low CPU and query times under 5ms. What should you check first?","opts":["Check whether the application's GKE pod has sufficient CPU to process responses.","Check whether the Cloud SQL Auth Proxy has a connection limit configured.","Check HikariCP maximumPoolSize","Check Cloud SQL storage","Check whether PostgreSQL log_min_duration_statement is enabled."],"ans":2,"fb":"HikariCP connection timeouts under low DB load almost always indicate pool exhaustion: more concurrent request threads want a connection than the pool can provide. The requests queue, and if connectionTimeout (default 30s) elapses, the exception is thrown. The fix is to profile concurrency (how many threads need DB connections simultaneously) and size maximumPoolSize accordingly, while being careful not to exceed Cloud SQL's max_connections. Cloud SQL storage affects write performance, not connection establishment. Auth Proxy has no default connection limit. log_min_duration_statement is a monitoring concern, not a cause of timeouts."},
    {"level":4,"diff":1,"scenario":3,"q":"A compliance officer asks whether data stored in Cloud SQL is encrypted at rest by default. What is the correct answer for Cloud SQL on GCP?","opts":["Yes — but only for data in the primary instance","No — Cloud SQL relies on GKE node-level encryption, not instance-level encryption.","Yes — but only for instances with the Enterprise Plus edition.","No — encryption at rest must be explicitly enabled in the Cloud SQL instance settings.","Yes — Cloud SQL encrypts all data at rest by default using Google-managed encryption keys"],"ans":4,"fb":"All Cloud SQL data is encrypted at rest by default using Google-managed encryption keys (AES-256). This applies to backups, logs, and replicas as well. No configuration is required to enable this. Customer-Managed Encryption Keys (CMEK) via Cloud KMS is an additional layer that gives the customer control over key rotation and revocation, which is required by some compliance frameworks (PCI-DSS for certain data types). CMEK is not the default — it must be explicitly configured at instance creation."},
    {"level":4,"diff":1,"scenario":3,"q":"Your organisation must comply with PCI-DSS and SOX. An auditor asks how you ensure that sensitive cardholder data in Cloud SQL is encrypted using keys that your organisation controls. Which GCP feature directly addresses this requirement?","opts":["Enabling SSL/TLS for connections to Cloud SQL ensures cardholder data is encrypted under customer-controlled keys","Transparent Data Encryption (TDE) must be enabled in postgresql.conf to satisfy PCI-DSS at-rest encryption requirements","Customer-Managed Encryption Keys (CMEK) via Cloud KMS allow your organisation to control, rotate, and revoke the encryption keys used by Cloud SQL","VPC Service Controls around Cloud SQL prevent data exfiltration and satisfy PCI-DSS key management controls","Cloud SQL's default encryption at rest using Google-managed keys satisfies PCI-DSS key management requirements"],"ans":2,"fb":"CMEK (Customer-Managed Encryption Keys) via Cloud KMS gives your organisation control over the key lifecycle — including creation, rotation, and revocation. If a key is revoked, Cloud SQL cannot decrypt the data, giving you direct control over data accessibility. Google-managed keys (A) do encrypt data at rest but PCI-DSS requirements for key management typically require customer control. SSL/TLS (C) is transport encryption, not at-rest. VPC Service Controls (D) address network perimeter, not encryption key management. PostgreSQL does not have TDE (E) — encryption is handled at the storage layer by Cloud SQL."},
    {"level":4,"diff":1,"scenario":4,"q":"After enabling pg_stat_statements on Cloud SQL, you want to find the queries consuming the most total I/O time. Which column should you sort by?","opts":["calls DESC (most frequently called queries)","rows DESC (queries returning the most rows)","total_exec_time DESC (total execution time regardless of I/O vs CPU)","mean_exec_time DESC (average execution time per call)","blk_read_time + blk_write_time DESC (total block I/O time in milliseconds)"],"ans":4,"fb":"blk_read_time and blk_write_time in pg_stat_statements (requires track_io_timing = on) directly measure time spent in block I/O. Summing them identifies queries that are I/O-bound, which is the most common performance bottleneck in database-heavy workloads. total_exec_time includes CPU time and is broader; a query could have high total_exec_time due to sorting, not I/O. calls DESC finds frequently executed queries but not necessarily expensive ones. rows DESC finds chatty queries. mean_exec_time finds slow queries but not necessarily I/O-bound ones."},
    {"level":4,"diff":2,"scenario":0,"q":"A multi-tenant SaaS table has 2 billion rows partitioned by tenant_id using HASH(tenant_id) with 64 partitions. A new requirement asks for efficient time-range queries across a single tenant's data. What is the limitation of the current design and the recommended solution?","opts":["HASH partitioning distributes rows evenly but does not support pruning on non-partition-key predicates","HASH partitioning is incompatible with time-range queries","HASH partitioning prevents adding indexes, so time-range queries are always sequential scans.","The solution is to add a partial index on (tenant_id, created_at) on each partition.","HASH partitioning with 64 partitions exceeds PostgreSQL 16's partition limit of 32."],"ans":0,"fb":"HASH partitioning prunes based on the exact partition key value. A query WHERE tenant_id = $1 AND created_at BETWEEN $2 AND $3 will prune to the single partition for that tenant (using hash pruning) but cannot prune within that partition by time. Sub-partitioning (partition by HASH on tenant_id, sub-partition by RANGE on created_at) allows both dimensions of pruning. PostgreSQL 16 supports multi-level partitioning. PostgreSQL 16 supports far more than 32 partitions. Indexes can be created on partitioned tables. Migrating to RANGE would lose tenant isolation benefits."},
    {"level":4,"diff":2,"scenario":0,"q":"You are partitioning an existing 800GB unpartitioned table using RANGE by month. You need to migrate the data with minimal downtime. What is the correct sequence?","opts":["Dump and restore the table using pg_dump with the --partition flag.","Create the partitioned table with partitions, use INSERT INTO ... SELECT to copy data in time-ordered batches","Run ALTER TABLE old_table PARTITION BY RANGE (created_at) to convert it in-place.","Use pg_repack to convert the table to a partitioned layout automatically.","Rename the old table, create the partitioned table with the same name, and use a trigger to redirect writes."],"ans":1,"fb":"PostgreSQL does not support converting an existing unpartitioned table to a partitioned table in-place. The migration requires creating a new partitioned table, copying data in batches (to avoid long-running transactions and lock pressure), and swapping at cutover. The rename swap (old → old_backup, new → old) requires a brief exclusive lock window for the rename but minimises total downtime. pg_repack handles bloat and clustering, not partitioning conversion. There is no pg_dump --partition flag. Triggers-based approach is complex and error-prone for this scale."},
    {"level":4,"diff":2,"scenario":0,"q":"You are migrating a 2 billion-row `events` table to range partitioning by `tenant_id` hash + `created_at` range (composite partitioning). The table is in production and cannot have extended downtime. What is the safest migration approach?","opts":["Run ALTER TABLE events PARTITION BY RANGE (created_at) in a single transaction during a maintenance window","Add a check constraint per partition range to the existing table and let the planner use constraint exclusion instead of true partitioning","Use pg_partman to convert the existing table to a partitioned table in-place without downtime","Create a new partitioned table, backfill data in batches using a background worker, swap via view or application-level routing, then drop the old table","Export all data to Cloud Storage, truncate the table, re-create as partitioned, and re-import"],"ans":3,"fb":"PostgreSQL cannot convert an existing table to a partitioned table in-place — `ALTER TABLE ... PARTITION BY` is not a supported operation. The standard zero-downtime approach is: create a new partitioned table, backfill data in batches (avoiding long lock windows), use a trigger or dual-write to keep it in sync, then cut over by renaming tables or updating the application routing. pg_partman (C) manages partition creation and maintenance but cannot convert existing tables. Constraint exclusion (D) is a legacy approach that is less capable than true partitioning and has been superseded. Truncate-and-reimport (E) causes extended downtime.","context":{"Table size":"2 billion rows","Current state":"Single unpartitioned table","Downtime budget":"< 30 seconds at cutover"}},
    {"level":4,"diff":2,"scenario":1,"q":"A Cloud SQL HA instance fails over during peak traffic. After the failover, the application reconnects successfully but you observe a 10-minute period of elevated query latency. What is the most likely cause?","opts":["PostgreSQL runs a full VACUUM ANALYZE after every failover to rebuild statistics.","Cloud SQL applies schema migrations automatically during failover, causing lock contention.","The new primary (former standby) starts with a cold buffer cache","The Cloud SQL Auth Proxy needs to re-authenticate after failover, adding latency to each query.","HikariCP re-validates all idle connections after failover, causing connection overhead."],"ans":2,"fb":"The standby instance that is promoted to primary during failover has not been serving queries and its shared_buffers buffer cache is cold. All pages that the old primary had warm in memory must now be fetched from disk, causing elevated read I/O and query latency until the cache warms to the steady-state working set. This typically takes 5-15 minutes depending on working set size and disk I/O capacity. Cloud SQL does not run migrations or VACUUM during failover. Auth Proxy reconnects transparently without per-query overhead. HikariCP connection validation is fast and does not cause sustained latency."},
    {"level":4,"diff":2,"scenario":1,"q":"You want to test Cloud SQL HA failover behaviour in a staging environment before a production incident forces it. What is the safest method to initiate a manual failover?","opts":["Temporarily set max_connections = 0 to force all connections to fail and trigger automatic failover.","Use the Cloud SQL Admin API or gcloud sql instances failover command to trigger a controlled failover to the standby replica.","Suspend the primary instance's GKE node to simulate a zone failure.","Delete and recreate the Cloud SQL instance to test full recovery.","Kill the Cloud SQL primary process using the GCP Console VM terminal."],"ans":1,"fb":"Cloud SQL provides a first-class API for manual failover: gcloud sql instances failover INSTANCE_NAME or the Admin API. This initiates a controlled failover to the HA standby, allowing you to test application behaviour during the ~30-60 second switchover window. Killing the process or terminating the VM is uncontrolled and may corrupt state. Setting max_connections = 0 triggers connection refusal, not a true failover. Deleting and recreating is data-destructive. Cloud SQL runs on Google-managed infrastructure, not GKE nodes."},
    {"level":4,"diff":2,"scenario":2,"q":"HikariCP is configured with maximumPoolSize=20 per pod, and you have 15 pods. Cloud SQL is configured with max_connections=100. What happens when all pods are running under full load?","opts":["HikariCP automatically negotiates with Cloud SQL to stay within the max_connections limit.","Cloud SQL queues connection requests above max_connections and serves them in order.","The Cloud SQL Auth Proxy enforces the max_connections limit and rejects excess connections before they reach PostgreSQL.","PostgreSQL silently drops connections above max_connections without error.","Total potential connections = 20 × 15 = 300, exceeding Cloud SQL's max_connections=100"],"ans":4,"fb":"PostgreSQL enforces max_connections as a hard limit. When all slots are occupied, new connection attempts receive a FATAL error. 20 connections × 15 pods = 300 potential connections, which is 3× the 100-connection limit. As pods scale up or all become active simultaneously, connection errors will occur. The fix is to either increase max_connections (within Cloud SQL tier limits) or reduce pool size per pod. A better architectural approach is to use a connection pooler like PgBouncer in session or transaction mode between the pods and Cloud SQL. HikariCP does not auto-negotiate. Auth Proxy does not enforce max_connections."},
    {"level":4,"diff":2,"scenario":3,"q":"A PCI-DSS audit requires you to provide evidence that access to the cardholder data environment database is logged, including failed login attempts. How do you enable this on Cloud SQL for PostgreSQL?","opts":["Enable the pgaudit extension and configure pgaudit.log = 'all' or","Enable Cloud SQL Data Access audit logs in the GCP IAM audit log settings.","Configure log_connections = on in pg_hba.conf.","Enable Cloud SQL binary logging, which captures all connection events.","Install a custom Cloud Function trigger on Cloud SQL connection events."],"ans":0,"fb":"pgaudit is the standard PostgreSQL audit extension, supported on Cloud SQL. It provides fine-grained logging of sessions, objects, and DML. Setting pgaudit.log = 'connection' captures successful and failed connections. Cloud SQL exports PostgreSQL logs to Cloud Logging automatically, providing the tamper-evident log trail required by PCI-DSS. Binary logging (used for MySQL replication) is not a PostgreSQL feature. pg_hba.conf is not user-accessible on Cloud SQL — use Cloud SQL flags instead. Cloud Functions cannot intercept DB connections. Cloud IAM audit logs capture Cloud SQL API calls, not database-level connections."},
    {"level":4,"diff":2,"scenario":3,"q":"Your SOX compliance team requires a complete, tamper-evident audit log of all changes to financial records in the `ledger_entries` table. A developer suggests using PostgreSQL triggers to write to an `audit_log` table in the same database. What is the most significant risk with this approach?","opts":["Triggers do not capture the database user or application user performing the change, making the log incomplete","Triggers in PostgreSQL cannot capture the old row values for UPDATE statements, so pre-change state is lost","The trigger will fire on each row change, causing the audit table to grow faster than Cloud SQL storage can handle","A trigger-based audit log in the same database can be modified or deleted by any user with WRITE access to the audit table, undermining tamper-evidence","PostgreSQL triggers are too slow for high-volume tables and will cause write latency exceeding SLOs"],"ans":3,"fb":"For SOX compliance, tamper-evidence is critical. An audit log in the same PostgreSQL instance can be modified or deleted by a sufficiently privileged database user, or by a compromised application. A SOX-compliant audit trail should be written to an immutable or append-only store that is access-controlled separately — for example, Cloud Logging, BigQuery with DML restrictions, or an audit service with its own IAM controls. Option C is incorrect: PostgreSQL triggers expose `OLD` record values for UPDATE. Option E is addressable by setting `app.current_user` as a session variable and capturing it in the trigger."},
    {"level":4,"diff":2,"scenario":4,"q":"A Cloud SQL instance serving a Spring Boot application shows high CPU utilization despite query times appearing normal in application logs. pg_stat_statements shows many queries with high calls but low mean_exec_time. What is the most likely root cause?","opts":["Cloud SQL CPU includes background maintenance tasks that inflate CPU metrics unrelated to query load.","The Spring Boot application's JPA is generating excessively complex SQL that PostgreSQL must parse.","Cloud SQL is performing automatic backups, which consume CPU.","Query volume (calls) is very high","High CPU is always caused by missing indexes"],"ans":3,"fb":"High query volume with low individual latency is the classic symptom of a 'chatty' application — typically caused by N+1 query patterns, eager loading misconfigurations in Hibernate, or missing query result caching. PostgreSQL must parse, plan, and execute each query even if it completes in under 1ms. At 10,000 queries/second, this generates substantial CPU overhead per second. The fix is to identify N+1 patterns (enable hibernate.show_sql or use OpenTelemetry spans), batch queries, use projections, or introduce caching. High calls + low mean_exec_time is diagnostic, not a symptom of missing indexes or backup overhead."},
    {"level":4,"diff":3,"scenario":0,"q":"A partition maintenance job needs to automatically create next month's partition and detach last year's partition for archival. The job runs in a cron-triggered Cloud Run job. What failure mode must the job handle, and how?","opts":["Partition creation and detachment both require ACCESS EXCLUSIVE locks","CREATE TABLE for a new partition does not require any locks and is always instant.","Cloud Run jobs cannot connect to Cloud SQL directly","Partition detachment is irreversible and must be approved by a DBA before the job runs.","Detaching a partition automatically migrates all rows to the parent table first."],"ans":0,"fb":"ATTACH PARTITION and DETACH PARTITION require ACCESS EXCLUSIVE locks on the parent partitioned table. PostgreSQL 16 introduced DETACH PARTITION ... CONCURRENTLY which avoids the exclusive lock for detachment. However, CREATE TABLE (for the new partition) and ATTACH PARTITION still need brief locks. On a busy system, these locks can queue behind long-running queries, causing the maintenance job to wait indefinitely. The job must SET lock_timeout = '5s' before each DDL operation and implement retry logic. PostgreSQL 16's DETACH CONCURRENTLY is the right tool for production detachment. Cloud Run can connect via Cloud SQL Auth Proxy."},
    {"level":4,"diff":3,"scenario":0,"q":"Your partitioned `transactions` table uses monthly range partitions on `created_at`. A query joining `transactions` with `accounts` on `account_id` covering the last 12 months is performing a sequential scan on all 12 partitions despite a `created_at` range filter. `EXPLAIN` shows `Partition Pruning: disabled`. What is most likely causing this?","opts":["Range partitions require a BRIN index on `created_at` for partition pruning to activate","The `enable_partition_pruning` GUC is set to `off` either at session, database, or server level","The `created_at` filter is being passed as a bind parameter from Hibernate, and the planner cannot prune partitions at plan time with parameters of unknown type","The planner disables partition pruning when the query involves a join with a non-partitioned table","Partition pruning is only available in PostgreSQL 13 and above"],"ans":1,"fb":"The `EXPLAIN` output shows `Partition Pruning: disabled`, which is the direct indicator that `enable_partition_pruning` is off. This GUC controls whether the planner attempts partition pruning at all. It can be set at session level (`SET enable_partition_pruning = on`), database level, or in `postgresql.conf`. Option B is a subtlety: with bind parameters, pruning may happen at execution time rather than plan time, but it is still performed — the EXPLAIN output would show `Partition Pruning: runtime` not `disabled`. Option A is incorrect: joins with non-partitioned tables do not disable pruning. BRIN indexes (D) are not required for partition pruning."},
    {"level":4,"diff":3,"scenario":1,"q":"After a Cloud SQL HA failover, your application recovers but 3 hours later Grafana shows a gradual increase in connection pool wait times trending toward exhaustion. No new deployments occurred. What is the most likely explanation?","opts":["The Cloud SQL Auth Proxy accumulates connection state after failover and must be restarted every 3 hours.","Cloud SQL reduces max_connections after failover as a protective measure.","HikariCP's connection leak detection is not enabled, causing pool exhaustion from unclosed connections.","GKE pod autoscaling added pods after the failover, increasing pool demand beyond Cloud SQL capacity.","After failover, some application connections may have entered an 'idle in transaction' state"],"ans":4,"fb":"Idle-in-transaction connections are a common post-failover trap. When the old primary became unavailable, some in-flight requests may have caught an exception mid-transaction and failed to call rollback(), leaving the connection in an open transaction state when returned to the pool. HikariCP sees the connection as available, but PostgreSQL sees it as holding an open transaction. These connections hold locks and do not accept new work. Over time, more connections accumulate in this state, progressively exhausting the pool. Fix: enable HikariCP's leakDetectionThreshold, configure statement_timeout and idle_in_transaction_session_timeout in PostgreSQL, and ensure all exception paths call rollback()."},
    {"level":4,"diff":3,"scenario":2,"q":"You are diagnosing why HikariCP pool wait times spike every hour for exactly 2 minutes. During these spikes, active connections are at maximum but no application traffic increase is visible. What should you investigate first?","opts":["HikariCP's connection eviction runs every hour and temporarily removes all connections.","GKE horizontal pod autoscaler scaling down pods every hour, reducing available pool capacity.","A recurring background job or scheduled task that opens long-running transactions and holds connections for the duration","PostgreSQL autovacuum running every hour and consuming all connections during its run.","Cloud SQL automated backups running on an hourly schedule and blocking connections."],"ans":2,"fb":"A regular 2-minute spike at hourly intervals with no traffic change is a strong pattern signature of a scheduled job. Common culprits: Spring's @Scheduled tasks, Quartz jobs, Kafka consumer batch commits, or external batch triggers (e.g., a Cloud Scheduler job). These jobs may open transactions that hold connections for their full duration, leaving other requests queued. Investigation: correlate the spike time with application logs, Spring task executor metrics, and Kafka consumer commit logs. Autovacuum does not consume all connections. Cloud SQL backups are I/O-bound, not connection-bound. HikariCP eviction recycles idle connections, not active ones."},
    {"level":4,"diff":3,"scenario":2,"q":"Your Cloud SQL instance serves 8 Spring Boot services, each with a HikariCP pool of 10 connections (80 total). You observe that during incident response, a single service's connection pool becomes saturated while others are idle, yet the overall connection count is well below max_connections. What architectural pattern would prevent one service from monopolizing connections during an incident?","opts":["Reduce each service's maximumPoolSize to 5 to ensure no single service can take more than 5 connections.","Deploy a separate Cloud SQL instance per service to ensure complete isolation.","Implement a connection pooler (e.g. PgBouncer) with per-service connection limits","Enable HikariCP's connection fair-queue mode, which distributes connections evenly across all services.","Configure Cloud SQL to distribute connections equally across all connecting users."],"ans":2,"fb":"The problem is that per-service pools are independent — a saturated service holds its 10 connections regardless of whether other services are idle. A connection pooler like PgBouncer deployed as a shared proxy can enforce per-user or per-database connection limits (pool_size per user) and dynamically allocate unused connections to services that need them. In transaction mode, connections are returned to the pool after each transaction, dramatically increasing effective concurrency. HikariCP has no fair-queue mode — it manages a single service's pool. Cloud SQL has no per-user connection distribution. Separate instances per service is an expensive isolation strategy that doesn't solve shared capacity management."},
    {"level":4,"diff":3,"scenario":3,"q":"A SOX audit requires a 7-year retention policy for financial transaction records stored in Cloud SQL. The records are immutable by policy and the database is currently 4TB growing at 600GB/year. What is the most operationally sustainable architecture?","opts":["Partition the transactions table by year. After the active period","Keep all 7 years of data in Cloud SQL and increase the instance tier to accommodate growth.","Truncate data older than 2 years from Cloud SQL and rely on daily Cloud SQL exports for compliance.","Enable Cloud SQL point-in-time recovery for 7 years, which automatically satisfies retention requirements.","Use Cloud SQL read replicas as the archive tier, replicating old data to cheaper replica instances."],"ans":0,"fb":"Keeping 7 years of financial data in an active Cloud SQL instance is expensive and operationally unsustainable. The right approach is tiered storage: RANGE-partition by year so old partitions can be detached without affecting current data, then export detached partitions to Cloud Storage as Parquet for long-term immutable retention. For rare audit queries, BigQuery can query Cloud Storage directly via external tables. Cloud SQL PITR retention is limited to 7 days, not 7 years. Truncating data violates the SOX 7-year retention requirement. Read replicas replicate the live dataset, not a historical archive."},
    {"level":4,"diff":3,"scenario":3,"q":"You need to implement a data retention policy that deletes customer PII from Cloud SQL after 7 years to comply with GDPR while retaining financial transaction records indefinitely for SOX. Both PII fields and financial data exist in the same `transactions` table. What is the most compliant and operationally safe approach?","opts":["Run a nightly DELETE job on the `transactions` table that removes rows older than 7 years","Set `autovacuum` to aggressively reclaim storage after PII data expires, which physically removes the data","Encrypt PII columns with a per-customer key","Separate PII fields into a `customer_pii` table linked by `customer_id`","Use Cloud SQL point-in-time recovery to restore the database to a state before PII was ingested"],"ans":3,"fb":"Separating PII from financial records allows each to be retained according to its own policy. Deleting the `customer_pii` row satisfies GDPR erasure requirements while the `transactions` row (containing amounts, dates, references) remains for SOX. Deleting entire transaction rows (A) would violate SOX retention requirements. Autovacuum (C) reclaims space from dead tuples but cannot be configured as a retention policy. PITR (D) is for recovery, not forward deletion. Key revocation (E) is an advanced approach that may satisfy GDPR's right to erasure in some interpretations, but physical deletion is cleaner and more universally accepted.","context":{"GDPR":"Right to erasure of PII after 7 years on customer request or policy expiry","SOX":"Financial transaction records must be retained indefinitely","Conflict":"PII and financial data currently in the same table row"}},
    {"level":4,"diff":3,"scenario":4,"q":"You are tuning a Cloud SQL PostgreSQL instance that serves mixed OLTP and analytical queries. The OLTP queries are suffering high latency when analytical queries run. You have already separated reads to a read replica. Which PostgreSQL parameter change would most directly limit the resources a single analytical query can consume on the OLTP instance?","opts":["Increase shared_buffers to give analytical queries more cache, reducing I/O competition.","SET work_mem to a lower value for the analytical workload role","Set max_parallel_workers_per_gather = 0 to disable parallel query and reduce CPU contention.","Enable pg_prewarm to keep OLTP table pages in cache so analytical queries cannot evict them.","Set random_page_cost = 1.0 to encourage index scans over sequential scans for analytical queries."],"ans":1,"fb":"work_mem controls the memory allocated per sort or hash operation per query. Analytical queries typically involve large sorts and hash joins. By setting a lower work_mem for the analytical role (ALTER ROLE analytics_role SET work_mem = '16MB'), you limit how much RAM these queries consume per operation, reducing their impact on OLTP. They will spill to disk more often (slower for analytics but protective of OLTP). Disabling parallel workers (option C) is also effective for CPU reduction but hurts analytical query completeness. Increasing shared_buffers helps both but doesn't protect OLTP from analytical resource consumption. pg_prewarm cannot pin pages against eviction."},
    {"level":4,"diff":3,"scenario":4,"q":"A PostgreSQL 16 instance on Cloud SQL shows checkpoint_completion_target=0.5 (default). Your Grafana dashboard shows write latency spikes every ~5 minutes coinciding with checkpoint activity. What is the most targeted parameter change to reduce these spikes?","opts":["Increase shared_buffers to reduce the number of dirty pages that need to be checkpointed.","Decrease checkpoint_timeout from 5m to 1m to make checkpoints more frequent and shorter.","Increase max_wal_size to allow larger WAL segments before a checkpoint is forced.","Set synchronous_commit = off to avoid fsync on every commit, reducing checkpoint pressure.","Increase checkpoint_completion_target to 0.9, spreading dirty page writes over 90% of the checkpoint"],"ans":4,"fb":"checkpoint_completion_target controls how much of the checkpoint interval PostgreSQL uses to spread dirty page writes. At 0.5, it writes all dirty pages in 50% of the interval, then is idle for 50%, causing I/O bursts. Setting it to 0.9 spreads writes over 90% of the interval, dramatically smoothing the I/O pattern. This is the standard fix for checkpoint-related write latency spikes. Decreasing checkpoint_timeout makes checkpoints more frequent (more overhead). Increasing max_wal_size only delays forced checkpoints but doesn't smooth I/O within them. synchronous_commit=off risks data loss on crash. shared_buffers increases cache but doesn't address write-back IO distribution."},
    {"level":5,"diff":1,"scenario":0,"q":"Your platform serves 40 microservice teams, each owning their own Cloud SQL instance. Engineering leadership wants a unified approach to schema versioning across the platform. You are asked to lead the decision. Which approach best balances team autonomy with platform consistency?","opts":["Use Infrastructure-as-Code (Terraform) to manage all schema changes centrally","Let each team choose any migration tool they prefer and document their approach in a README","Mandate Liquibase (or Flyway) as the approved tool, require changelogs to live in the service repo","Require all DDL changes to be approved by a central DBA team before being applied","Mandate Liquibase with a shared corporate changelog file that all teams contribute to"],"ans":2,"fb":"Mandating the toolset (Liquibase or Flyway) while keeping changelogs in the service repo preserves team autonomy and CI/CD ownership, while the platform standard ensures consistency in naming, ordering, and rollback. A single shared changelog file (A) creates a merge bottleneck. Free choice of tools (C) fragments operational knowledge and incident response. Terraform (D) is for infrastructure provisioning, not row-level schema migrations. Central DBA approval (E) creates a bottleneck that kills team velocity at platform scale.","context":{"Teams":"40 microservices, each with a Cloud SQL instance","Goal":"Consistent schema versioning without a central bottleneck","Current state":"Mixed — some use Flyway, some Liquibase, some ad-hoc SQL scripts"}},
    {"level":5,"diff":1,"scenario":0,"q":"Two engineering teams disagree about whether to use a shared PostgreSQL schema with row-level security or separate schemas per tenant for data isolation. You are facilitating the decision. Which factor most directly drives the architectural choice between these two patterns?","opts":["The choice of ORM: Hibernate requires separate schemas, while JDBC supports row-level security","The number of tenants: row-level security works for up to 10 tenants, separate schemas for more","The compliance requirements: PCI-DSS and SOX mandate physically separate schemas per tenant","The operational complexity tolerance and whether tenant data must be provably isolated at the database layer versus the application layer","The version of PostgreSQL: separate schemas require PostgreSQL 14 or later"],"ans":3,"fb":"The core trade-off is operational complexity vs. isolation guarantee. Separate schemas make per-tenant backup, restore, and audit straightforward but multiply migration complexity. Row-level security provides logical isolation within a shared schema with lower operational overhead but requires careful policy design and application-level tenant context injection. Tenant count (A) is not the deciding factor — RLS works at any scale. PCI-DSS and SOX (B) do not mandate physical schema separation — they require demonstrable isolation, which RLS can satisfy with proper policy auditing. PostgreSQL version (D) is irrelevant to this choice. Hibernate (E) supports both patterns.","context":{"Compliance":"PCI-DSS, SOX","Tenant count":"~80 tenants, growing","Teams involved":"Platform, Security, 3 product teams"}},
    {"level":5,"diff":1,"scenario":1,"q":"A platform team wants to introduce read replicas to offload reporting queries from the primary Cloud SQL instance. A developer asks: at what isolation level does a PostgreSQL read replica operate, and what does that mean for queries sent there?","opts":["Read replicas use REPEATABLE READ isolation and buffer writes locally before applying them","Read replicas operate in READ UNCOMMITTED mode, so they may return dirty reads from in-flight transactions","Read replicas use the same isolation level as the primary and are always perfectly in sync","Read replicas use SERIALIZABLE isolation, so queries always see a perfectly consistent snapshot","Read replicas operate in READ COMMITTED mode and may serve slightly stale data due to replication lag"],"ans":4,"fb":"PostgreSQL logical and physical replicas apply WAL in the background, so they can lag behind the primary by milliseconds to seconds. Queries on a replica run in READ COMMITTED and will see the replica's current committed state, which may be slightly behind the primary. SERIALIZABLE on replicas (A) is not how PostgreSQL streaming replication works. READ UNCOMMITTED (B) does not exist in PostgreSQL — it silently upgrades to READ COMMITTED. Replicas do not buffer writes locally (D). Replicas are not guaranteed to be in sync with the primary at the instant a query runs (E)."},
    {"level":5,"diff":1,"scenario":2,"q":"You are planning a large-scale migration that adds a NOT NULL column with a DEFAULT to a table that has 200 million rows in production. What is the safest approach to avoid a multi-hour table lock?","opts":["Run ALTER TABLE ... ADD COLUMN col TEXT NOT NULL DEFAULT 'value' during a maintenance window","Add the column as nullable with no default, backfill values in batches","Increase max_locks_per_transaction and run the ALTER TABLE during off-peak hours","Add the column with a DEFAULT expression that reads from a separate lookup table","Use pg_repack to rebuild the table with the new column schema without locking"],"ans":1,"fb":"In PostgreSQL 11+, adding a column with a non-volatile DEFAULT no longer rewrites the table. However, for very large tables with complex defaults or NOT NULL constraints involving validation, the safest zero-downtime pattern is: add the column as nullable, batch-backfill in small transactions, then add the NOT NULL constraint with NOT VALID (which skips scanning existing rows), and finally run VALIDATE CONSTRAINT in a separate transaction (which takes a weaker ShareUpdateExclusiveLock). A maintenance window with a full lock (A) is unsafe at 200M rows. pg_repack (C) rebuilds the table but still requires triggers and does not avoid all lock concerns during swap. A lookup-table DEFAULT (D) is a volatile function and would trigger a table rewrite. Increasing max_locks_per_transaction (E) is irrelevant to lock duration.","context":{"Table size":"200 million rows, ~180 GB","PostgreSQL version":"16","Constraint":"Zero-downtime migration required"}},
    {"level":5,"diff":1,"scenario":2,"q":"A senior engineer proposes running a Liquibase migration that renames a heavily-used column during peak traffic. What is the safest way to rename a column on a live production table without downtime?","opts":["Add the new column, dual-write from the application to both columns, backfill old data, switch reads to the new column","Create a view with the new column name aliased over the old one and update all queries to use the view","Use pg_repack to rename the column atomically without locking","Use ALTER TABLE ... RENAME COLUMN inside a short transaction during off-peak hours","Use Liquibase's renameColumn changeset, which handles the dual-write automatically"],"ans":0,"fb":"Renaming a column is a breaking change for any code that references the old name. The safe zero-downtime pattern is: (1) add the new column, (2) deploy a version of the app that writes to both columns, (3) backfill historical data, (4) deploy a version that reads from the new column and stops writing to the old one, (5) drop the old column. This is an expand-contract (parallel-change) pattern. A direct RENAME (A) is a single DDL statement but breaks all running application code that uses the old name. pg_repack (C) rebuilds tables, it does not rename columns atomically. A view alias (D) is a workaround but adds a layer of indirection and doesn't help when ORM models reference the column directly. Liquibase renameColumn (E) is a DDL wrapper — it does not orchestrate dual-write logic.","context":{"Column":"user_ref renamed to tenant_user_id","Table":"350M rows, accessed by 8 services","Constraint":"Zero downtime required"}},
    {"level":5,"diff":1,"scenario":3,"q":"A developer asks why the query planner sometimes ignores an index on a low-cardinality boolean column even when EXPLAIN ANALYZE shows most rows are FALSE. What is the correct explanation?","opts":["The index statistics are stale and need to be rebuilt with REINDEX","The planner uses a sequential scan when the estimated cost of a seq scan is lower than the","PostgreSQL does not support indexes on boolean columns","Boolean columns require a partial index to be recognised by the planner","The planner always prefers hash joins over index scans on boolean predicates"],"ans":1,"fb":"The PostgreSQL planner compares estimated costs. When a boolean column has very low cardinality (e.g. 95% FALSE), a predicate on FALSE would visit almost all rows, making a sequential scan cheaper than a random-access index scan due to lower I/O cost per page. The planner is behaving correctly. PostgreSQL does support indexes on boolean columns (A is false). Stale statistics (C) could affect cardinality estimates but the question states the planner correctly sees most rows are FALSE. A partial index (D) would help for the minority value (TRUE) but is not required for the planner to use a standard index. Hash joins (E) are a join algorithm, not a scan method.","context":{"Column":"is_deleted BOOLEAN, ~3% TRUE","Query":"SELECT * FROM orders WHERE is_deleted = FALSE","Observation":"Planner chooses Seq Scan despite index existing"}},
    {"level":5,"diff":1,"scenario":3,"q":"You are setting a platform-wide standard for statistics targets in PostgreSQL. The default statistics target is 100. When should teams increase it for a specific column?","opts":["Increase it whenever a column has more than 1,000 distinct values","Never change the default","Increase it for columns used in range predicates or joins where the planner consistently produces bad row estimates","Always increase it to 500 for all indexed columns to improve planner accuracy","Increase it for all primary key columns to speed up lookup queries"],"ans":2,"fb":"ALTER TABLE ... ALTER COLUMN ... SET STATISTICS N increases the number of histogram buckets and MCV (most common values) entries collected by ANALYZE for that column. This improves row estimates for columns with complex distributions used in range predicates or multi-column joins. A blanket increase for all indexed columns (A) wastes memory in pg_statistic and slows ANALYZE. The 1,000 distinct value threshold (C) is not a PostgreSQL rule. Primary key columns (D) have unique values and benefit little from higher statistics. PostgreSQL does not self-tune statistics targets (E) — they must be set explicitly.","context":{"Default statistics target":"100","Symptom":"Planner underestimates rows for a date range column, causing bad join order","Platform standard":"Being defined for all teams"}},
    {"level":5,"diff":1,"scenario":4,"q":"Your team is reviewing Cloud SQL instance sizing for a service that has grown from 10 to 80 active tenants. CPU utilisation is consistently 30%, but you receive alerts about connection exhaustion. What is the most cost-effective first action?","opts":["Review HikariCP pool sizing across all pods and reduce pool size per pod to stay within the instance max_connections budget","Immediately upgrade to a larger Cloud SQL tier to increase the max_connections limit","Switch from Cloud SQL Auth Proxy to direct SSL connections to reduce overhead","Add a read replica to split the connection load between primary and replica","Enable Cloud SQL connection multiplexing by upgrading to Enterprise Plus tier"],"ans":0,"fb":"Connection exhaustion with low CPU utilisation is a classic sign of over-provisioned connection pools. Each GKE pod opens its own HikariCP pool, and as pods scale out, total connections multiply. Reviewing and reducing the per-pod pool size (e.g., from 10 to 3-5) is free and often resolves the issue immediately. Upgrading the instance tier (A) increases cost and max_connections but does not fix the root cause of over-provisioned pools. Enterprise Plus (C) adds cost and is aimed at performance, not connection management. Switching from Auth Proxy (D) increases security risk and is irrelevant to connection count. Adding a read replica (E) only helps if read queries are the source of connections, which is not indicated.","context":{"CPU utilisation":"30% average","Alert":"max_connections approached (95% of limit)","Deployment":"20 GKE pods, each with HikariCP pool size 10"}},
    {"level":5,"diff":1,"scenario":4,"q":"Cloud SQL storage automatically grows but does not shrink. A team reports their instance storage grew rapidly after a bulk delete of 50 million rows. What explains this and what is the correct action?","opts":["The storage grew","Cloud SQL has a bug where storage does not reclaim space","The growth is caused by increased WAL generation during the bulk delete","The rows are permanently deleted and storage grows","PostgreSQL marks deleted rows as dead tuples"],"ans":4,"fb":"PostgreSQL uses MVCC (multi-version concurrency control). Deleted rows become dead tuples that occupy disk space until VACUUM reclaims the pages. On Cloud SQL, autovacuum runs by default but may lag behind a sudden bulk delete. Running VACUUM (VERBOSE) on the table after a large delete will reclaim the pages, making them available for reuse within the table. However, PostgreSQL does not return file space to the OS (and therefore to Cloud SQL storage) unless VACUUM FULL is run, which rewrites the table. Metadata charges (A) are not how PostgreSQL storage works. There is no Cloud SQL bug (C). WAL level does not directly cause table bloat (D). Cloud SQL PITR uses transaction logs, not shadow copies (E).","context":{"Rows deleted":"50 million in a single transaction","Post-delete storage":"Increased by 40 GB and has not decreased","Autovacuum":"Enabled, but scale factor default (0.2)"}},
    {"level":5,"diff":2,"scenario":0,"q":"You are leading an architecture review for a new feature that requires querying tenant data across 80 schemas. The proposed design joins a cross-tenant aggregation view to per-tenant tables using dynamic SQL at runtime. What is your primary concern with this approach and what would you recommend instead?","opts":["The approach is architecturally sound but needs connection pooling in front of each schema","Cross-schema joins are blocked by Cloud SQL IAM policies","Dynamic SQL prevents Liquibase from managing the schema changes","The approach will generate 80 separate query plans that the planner cannot optimise as a single unit","Dynamic SQL is not supported in PostgreSQL views"],"ans":3,"fb":"Querying 80 schemas with dynamic SQL means the planner sees each schema query independently, cannot build a single optimised plan across all tenants, and the code complexity grows linearly with tenant count. A dedicated aggregation table (materialised view, or a table maintained by triggers or Kafka events) keeps the cross-tenant query to a single efficient SELECT and separates write-path from read-path concerns. Dynamic SQL is valid PostgreSQL syntax (A is wrong). Cloud SQL IAM does not block cross-schema joins within the same database (C is wrong). Connection pooling per schema (D) does not address the query plan fragmentation problem. Liquibase supports dynamic SQL (E is a non-issue).","context":{"Tenants":"80 schemas in one Cloud SQL instance","Feature":"Platform-wide reporting dashboard","Query complexity":"Aggregating 5 tables per tenant"}},
    {"level":5,"diff":2,"scenario":0,"q":"You are facilitating a cross-team architecture decision about whether to use database-level foreign keys or application-level referential integrity across a set of microservices. A team argues foreign keys hurt write throughput. How should you frame the decision?","opts":["Foreign keys should be replaced by Kafka events that verify referential integrity asynchronously","Always use foreign keys","Foreign keys are appropriate within a single service's bounded context","Foreign keys should only be used for PCI-DSS compliance and removed for non-regulated tables","Never use foreign keys in microservices"],"ans":2,"fb":"The correct framing is: foreign keys enforce integrity within a bounded context (single service, single database) and are almost always worth the marginal write overhead, which is typically single-digit milliseconds. Across service boundaries, a foreign key is impossible (each service owns its data), so application-level or event-driven compensating logic is the appropriate pattern. The throughput concern (A's implicit opposite) should be measured, not assumed. Blanket removal (B) leads to data integrity bugs that are very expensive to find and fix. Kafka events (D) introduce asynchronous lag and do not provide the same synchronous integrity guarantee. Limiting to PCI-DSS tables (E) is an arbitrary rule with no technical basis."},
    {"level":5,"diff":2,"scenario":1,"q":"You have set up a Cloud SQL read replica for a reporting service. Under load testing, you observe that queries on the replica have significantly higher p99 latency than on the primary, even though the replica has lower CPU utilisation. What is the most likely cause?","opts":["The replica is running an older minor version of PostgreSQL and lacks performance improvements","The replica's autovacuum is disabled, causing dead tuple accumulation that slows scans","Cloud SQL replicas use a smaller storage tier by default, causing more I/O wait","WAL replay on the replica holds ShareLock on affected pages","The replica's pg_stat_statements extension is disabled, preventing query optimisation"],"ans":3,"fb":"In PostgreSQL streaming replication, WAL replay on the replica must acquire brief locks on pages it modifies. Under high write throughput from the primary, the WAL replay process can cause read queries on the replica to wait for these locks, increasing latency without necessarily raising CPU. This is called 'recovery conflict' and can be tuned with hot_standby_feedback and max_standby_streaming_delay. Minor version differences (A) are not the cause described. pg_stat_statements (B) is a monitoring extension, not an optimiser. Autovacuum on replicas (D) does not run directly — dead tuples are cleaned by the replica applying VACUUM WAL records from the primary. Cloud SQL replica storage tier (E) matches the primary by default.","context":{"Primary write rate":"8,000 TPS","Replica CPU":"18%","Observed":"p99 query latency 3× higher on replica vs primary"}},
    {"level":5,"diff":2,"scenario":1,"q":"You are designing a query routing strategy for a platform with a primary Cloud SQL instance and two read replicas. Some queries must read from the primary (e.g., immediately after a write), while others can tolerate slight staleness. How should the application layer implement this routing?","opts":["Configure two DataSource beans in Spring Boot: one pointing to the primary (used by transactional write paths and reads requiring","Use the Cloud SQL Auth Proxy with a single connection string that automatically routes reads to replicas","Configure all queries to use the primary and add a replica only for backup purposes","Use a round-robin load balancer across all three instances for all queries","Use a single DataSource and set the transaction isolation level to SERIALIZABLE to ensure replicas return current data"],"ans":0,"fb":"The standard pattern in Spring Boot is to define two DataSource beans (primary and replica), configure a routing DataSource that inspects whether the current transaction is read-only (@Transactional(readOnly=true)), and route accordingly. This gives explicit, code-level control over routing without relying on opaque infrastructure behaviour. Round-robin (A) may route reads to a replica immediately after a write, causing stale reads on the same request. SERIALIZABLE isolation (C) does not force a replica to return primary-level data — it only tightens the isolation model on whatever instance you're connected to. The Auth Proxy does not perform query routing (D) — it is a connection proxy, not a query router. Using only the primary (E) defeats the purpose of replicas.","context":{"Framework":"Spring Boot 3, HikariCP","Replicas":"2 read replicas on Cloud SQL","Requirement":"Post-write reads must be consistent; reporting reads can be slightly stale"}},
    {"level":5,"diff":2,"scenario":1,"q":"Three engineering teams are proposing different read replica strategies for their services. Team A wants a dedicated read replica per service. Team B wants all reporting queries to route to a shared read replica. Team C wants to use Cloud SQL's built-in read replica for cross-region failover only. As the platform architect, what is the most important technical concern to raise about Team B's proposal?","opts":["Read replicas in Cloud SQL cannot serve queries from multiple services simultaneously due to connection limits","Replication lag on the shared replica will cause all teams to receive stale data, violating consistency requirements","Cloud SQL read replicas do not support PostgreSQL 16 extensions, limiting Team B's reporting queries","Cloud SQL read replicas do not support connection pooling via PgBouncer, making a shared replica unscalable","A shared read replica becomes a single point of contention: one team's expensive reporting query can saturate CPU or I/O and degrade"],"ans":4,"fb":"A shared read replica creates a noisy-neighbour problem: one team's heavy reporting workload can exhaust CPU or disk throughput, causing query latency spikes for all other services. Dedicated replicas (Team A) provide isolation at the cost of more instances. The right architecture depends on workload characteristics, isolation requirements, and cost. The concern is not a hard technical limit (option C is incorrect — connection limits are a configuration concern, not a binary constraint). Replication lag (D) is real but affects all replica strategies equally. PgBouncer is deployable in front of read replicas (E is incorrect)."},
    {"level":5,"diff":2,"scenario":2,"q":"You are overseeing a migration that needs to add a foreign key constraint to a 400-million-row table referencing a parent table. The constraint must be enforced at the database layer. How do you add this constraint without a prolonged lock on the table?","opts":["Use ALTER TABLE ... ADD CONSTRAINT ... FOREIGN KEY ..., which in PostgreSQL 16 is non-blocking by default","Add the foreign key constraint with NOT VALID, which skips scanning existing rows, then run ALTER TABLE ..","Use a trigger to enforce the relationship instead of a declarative foreign key","Partition the table first, then add the foreign key per partition to reduce lock scope","Set session_replication_role = replica to bypass constraint enforcement during migration"],"ans":1,"fb":"PostgreSQL allows adding a foreign key with NOT VALID, which takes only a short ACCESS SHARE lock to register the constraint without scanning all rows. Existing rows are not validated immediately. A subsequent ALTER TABLE ... VALIDATE CONSTRAINT scans the table with a weaker ShareUpdateExclusiveLock (which does not block reads or most writes), validating existing rows without a full AccessExclusiveLock. This is the standard zero-downtime pattern. Adding a foreign key without NOT VALID (A) takes an AccessExclusiveLock for the full scan duration — not non-blocking. A trigger (C) adds runtime overhead and is harder to enforce consistently. Partitioning (D) does not help with foreign key locks and adds complexity. Setting session_replication_role (E) disables the constraint entirely, leaving data unvalidated.","context":{"Table size":"400 million rows","Constraint":"FK to tenants table","Requirement":"Zero-downtime, constraint enforced at DB layer"}},
    {"level":5,"diff":2,"scenario":2,"q":"Your team is planning a migration to split a 500GB monolithic Cloud SQL database into two separate Cloud SQL instances for different service domains. The migration must have less than 5 minutes of downtime. Which approach provides the highest confidence of success with the lowest risk?","opts":["Create the target instances with the new schemas, use Datastream or a logical replication approach to sync data continuously, then cut over with a brief write-stop","Use `pg_dump` and `pg_restore` during a maintenance window","Run `CREATE DATABASE new_db` on the same instance and use `INSERT INTO new_db.table SELECT * FROM old_db.table` to copy data live","Use Cloud SQL's clone feature to create an exact copy of the database, then delete the tables belonging to each domain","Stop the application, use Cloud SQL export to GCS, import into the new instances, then restart"],"ans":0,"fb":"For a 500GB database with a 5-minute downtime budget, the only viable approach is continuous replication: set up logical replication or Datastream to sync data to the target instances while the source continues to serve traffic, then perform a brief write-stop-and-cutover. `pg_dump` of 500GB (A) takes hours, far exceeding the 5-minute window. Clone (C) clones the entire database — you'd still need to delete large amounts of data on each copy, which takes time and doesn't help separation. Cross-database INSERT (D) is not valid PostgreSQL syntax and would also be slow. Export/import (E) has the same time problem as pg_dump."},
    {"level":5,"diff":2,"scenario":3,"q":"After upgrading from PostgreSQL 14 to 16, a team reports that a previously fast query now runs 4× slower. EXPLAIN ANALYZE shows the planner switched from an index scan to a hash join. pg_stat_user_tables shows the table was not re-analyzed after upgrade. What is the correct first action?","opts":["Increase work_mem to give the hash join more memory and improve its performance","Add a query hint to force the index scan using pg_hint_plan","Downgrade to PostgreSQL 14 until the planner regression is patched","Run ANALYZE on the affected tables to update statistics with the new PostgreSQL 16 planner's","Set enable_hashjoin = off globally to restore the previous plan"],"ans":3,"fb":"When upgrading PostgreSQL major versions, statistics should always be refreshed with ANALYZE (or VACUUM ANALYZE) because the planner's cost model and internal statistics format may change between versions. Stale statistics from PostgreSQL 14 may cause poor plan choices in PostgreSQL 16. Running ANALYZE is the correct, low-risk first step. Downgrading (A) avoids the problem without solving it. pg_hint_plan (B) is a workaround that masks the root cause. Setting enable_hashjoin = off (D) is a global setting that disables an entire join strategy and should never be used in production as a fix. Increasing work_mem (E) would make the hash join faster but does not address whether the planner is choosing the wrong plan.","context":{"Upgrade":"PostgreSQL 14 → 16","Symptom":"Query regressed 4× in latency","EXPLAIN observation":"Planner switched from index scan to hash join"}},
    {"level":5,"diff":2,"scenario":4,"q":"A Cloud SQL instance tier upgrade is being proposed to handle peak load. Before approving the spend, you want to verify whether the bottleneck is actually CPU or something else. Which Cloud Monitoring metric combination best identifies whether an upgrade would help?","opts":["Check database/memory/utilization only","Check cloudsql.googleapis.com/database/disk/read_ops_count only","Check database/cpu/utilization alongside","Check only pg_stat_activity in the database","Check database/network/received_bytes_count"],"ans":2,"fb":"To justify a tier upgrade for CPU, you need to confirm that CPU utilisation is actually saturated during the performance problems AND that the transaction rate justifies the load. Pairing cpu/utilization with transaction_count gives you throughput context. Also checking deadlock_count rules out lock contention as the real cause. Disk reads alone (A) indicate I/O pressure, not CPU. Memory utilisation (C) is relevant for buffer cache sizing but is not a direct justification for a CPU tier upgrade. Network bytes (D) are largely irrelevant for sizing decisions. pg_stat_activity (E) is useful for live diagnosis but Cloud Monitoring provides the historical trend data needed to justify a spending decision.","context":{"Metric namespace":"cloudsql.googleapis.com","Current tier":"db-custom-8-32768","Proposed":"db-custom-16-65536 (2× cost)"}},
    {"level":5,"diff":2,"scenario":4,"q":"You review a Cloud SQL cost report and notice that one service is responsible for 45% of Cloud SQL storage costs despite having only 8% of the tenant base. Investigation shows the table has a large number of JSONB columns with deeply nested structures. What is the most impactful cost and performance recommendation?","opts":["Increase the Cloud SQL instance storage to accommodate growth and move on","Normalise frequently-queried JSONB fields into typed columns, archive or compress infrequently-accessed nested data","Compress the JSONB columns using PostgreSQL's built-in JSONB compression, which reduces storage by 80%","Enable Cloud SQL automatic storage increase and set a budget alert to monitor growth","Migrate the JSONB data to a document database such as Firestore to eliminate Cloud SQL storage costs entirely"],"ans":1,"fb":"Large JSONB values are stored using PostgreSQL's TOAST mechanism (inline for small values, compressed and stored out-of-line for large ones). The default TOAST compression is pglz; PostgreSQL 16 also supports lz4. Normalising frequently-queried fields into typed columns enables efficient indexing and reduces JSONB bloat. Archiving rarely-accessed nested data (e.g., to Cloud Storage) and tuning TOAST compression thresholds (ALTER TABLE ... ALTER COLUMN ... SET STORAGE) are the right tools. PostgreSQL does not have a separate 'JSONB compression' feature (A is misleading). Migrating to Firestore (B) is a major architecture change that may not be justified. Increasing storage (D) treats the symptom. Budget alerts (E) are monitoring, not cost reduction.","context":{"Storage used":"2.1 TB for this service","JSONB columns":"avg document size 48 KB","Cloud SQL storage cost":"$0.17/GB/month (Cloud SQL SSD)"}},
    {"level":5,"diff":3,"scenario":0,"q":"Three teams are debating schema ownership. Team A owns a tenants table. Team B needs to add a column to support a new product feature. Team C needs to add a different column for analytics. You are asked to resolve this and establish a platform-wide governance model. What is the most scalable approach?","opts":["Let Team A (the owning team) own the schema and require Teams B and C to submit PRs to Team A's repository for any changes to the tenants table, with a defined SLA for review","Duplicate the tenants table into team-specific copies that each team maintains independently","Use JSONB columns to allow Teams B and C to add arbitrary fields without a schema change","Assign a central DBA team as the single owner of all shared tables and route all changes through them","Create a separate tenants_extensions table per team to hold their additional columns, linked by foreign key, so each team controls their own schema without modifying the shared table"],"ans":4,"fb":"The scalable governance pattern for shared tables in a multi-team platform is the 'extension table' pattern: the owning team controls the core schema; dependent teams own extension tables (tenant_id FK + their columns). This preserves clear ownership, avoids PR merge conflicts on the shared table, and scales to many teams without creating a central DBA bottleneck. A central DBA (A) creates a bottleneck. PR-to-owner (B) is better than a central DBA but still requires Team A to review and merge every schema change for Teams B and C, which slows delivery as teams scale. JSONB (D) loses type safety, indexability, and is hard to validate with NOT NULL or CHECK constraints. Duplicating the table (E) causes data consistency nightmares.","context":{"Shared table":"tenants (core entity, 80+ columns)","Teams":"12 teams need to extend the tenants schema","Constraint":"No central DBA team"}},
    {"level":5,"diff":3,"scenario":1,"q":"A read replica is lagging up to 30 seconds behind the primary during peak hours. The replica is used for reporting queries. You have already ruled out network bottlenecks. What is the most likely cause and the most targeted remediation?","opts":["The replica's PostgreSQL version is lagging behind the primary","Restart the Cloud SQL replica instance to reset the WAL receiver process","The replica's disk IOPS are saturated by WAL replay","The primary has too many concurrent transactions and should be scaled down","Enable synchronous replication to eliminate replication lag"],"ans":2,"fb":"When long-running queries on a replica conflict with WAL replay (because WAL replay needs to invalidate a page that the query is reading), PostgreSQL pauses WAL replay for max_standby_streaming_delay (default 30 seconds) before cancelling the conflicting query. This causes observable replication lag during peak reporting. The fix involves: setting max_standby_streaming_delay = -1 (infinite) and hot_standby_feedback = on (so the primary delays VACUUM of rows visible to the replica's active queries), OR using a second replica dedicated to analytics. Synchronous replication (D) would increase primary latency — it does not reduce replica lag, it eliminates it by making the primary wait for the replica to confirm receipt, which is the opposite of what's needed. Restarting the replica (E) would reset the receiver but not address the root cause.","context":{"Replica lag":"Up to 30s during peak reporting window","WAL throughput":"Primary generates ~500 MB/s WAL during peak","Query type on replica":"Long-running aggregation queries (30-120 seconds)"}},
    {"level":5,"diff":3,"scenario":1,"q":"You are designing the query routing strategy for a platform that has a primary Cloud SQL instance and two read replicas. The replicas have a typical lag of 50-200ms. A service performs: (1) a write to update order status, (2) an immediate read to return the updated order to the API caller. What is the safest routing approach for this pattern?","opts":["Route both the write and the immediate read to the primary, then route subsequent reads within the same request to replicas","Route the write to the primary and the immediate read to a replica, relying on replica lag being under 200ms","Route the read to the replica and use `pg_sleep(0.2)` on the replica connection to wait for replication","Use a distributed transaction across primary and replica to ensure the write and read see the same snapshot","Add a 500ms sleep between the write and the read to ensure the replica has caught up before routing"],"ans":0,"fb":"The read-your-writes consistency pattern requires that a read immediately following a write from the same session sees the write. On a replica with 50-200ms lag, this is not guaranteed. The correct approach is to route the write and the subsequent consistency-required read to the primary, and only send reads where stale data is acceptable (e.g., analytics) to replicas. Sleeping (D and E) is fragile: lag can exceed any fixed delay under load. A distributed transaction (C) is not applicable here — replicas are read-only streaming replicas, not participants in distributed transactions.","context":{"Pattern":"Write then immediate read (read-your-writes)","Replica lag":"50-200ms typical, can spike to seconds under load","API contract":"Response must include the updated order state"}},
    {"level":5,"diff":3,"scenario":2,"q":"You are owning an end-to-end migration plan for splitting a monolithic 600 GB PostgreSQL database into two separate Cloud SQL instances (one for payments, one for identity). The application must remain live throughout. What is the critical risk that must be addressed first in the migration plan?","opts":["GKE pods cannot connect to more than one Cloud SQL instance due to IAM restrictions","PostgreSQL 16 does not support logical replication for tables with TOAST columns","Liquibase cannot manage migrations across two separate databases","The Cloud SQL Auth Proxy cannot handle connections to two instances simultaneously","Cross-database foreign keys will need to be dropped"],"ans":4,"fb":"When splitting a database, any operations that previously relied on a single database transaction spanning payment and identity tables will no longer be atomic. Foreign keys across the new boundary must be dropped. The application must be redesigned to use eventual consistency, sagas (compensating transactions), or outbox patterns for operations that span the two databases. This is the most fundamental correctness risk. The Auth Proxy handles multiple instance connections via multiple socket paths (A is false). Liquibase can manage multiple databases with separate changelog files (C is false). PostgreSQL 16 supports logical replication for TOAST columns (D is false). GKE IAM allows multiple Cloud SQL connections per pod (E is false — IAM is per-instance, not per-pod-count).","context":{"Current database":"600 GB monolith, 2 logical domains: payments, identity","Cross-domain FKs":"14 foreign keys span the two domains","Requirement":"Zero-downtime split"}},
