      {"level": 2, "diff": 1, "scenario": 3, "q": "In Cloud Trace, a span shows a 2-second gap between receiving a request and starting to process it. What does this typically indicate?", "opts": ["The service was waiting for a thread or resource", "The trace data was sampled and is incomplete", "Network latency between services", "The request was retried once before succeeding", "Cloud Trace timestamps are inaccurate"], "ans": 0, "fb": "A gap at the start of a span before work begins typically indicates the request waited in a queue — for a thread pool slot, a database connection, or a lock. This points to resource contention rather than slow processing code."},
      {"level": 2, "diff": 2, "scenario": 3, "q": "A distributed trace shows an HTTP call from service A to service B, but service B's span is missing from the trace. What is the likely cause?", "opts": ["The HTTP call is using gRPC instead of REST", "Service A is using a different tracing backend", "Service B is down", "Cloud Trace dropped the span due to quota limits", "Service B is not propagating or accepting the trace context header"], "ans": 4, "fb": "If service B does not extract the traceparent header from the incoming request, it creates a new root span with a different traceId, making it invisible in service A's trace. Tracing libraries must be configured to extract context on ingress."},
      {"level": 2, "diff": 2, "scenario": 3, "q": "You are using Grafana Tempo for distributed tracing. A trace shows the total request time as 800ms, but individual spans sum to only 400ms. What could explain the remaining 400ms?", "opts": ["Some operations in the request path are not instrumented and produce no spans", "Tempo is adding artificial latency to spans", "The trace was captured at 50% sampling rate", "Network serialization overhead between services", "Grafana Tempo rounds span durations to the nearest 100ms"], "ans": 0, "fb": "Gaps in traces are almost always uninstrumented code — middleware, filters, connection acquisition, or third-party libraries that don't emit spans. The time is real; it's just invisible in the trace because no span covers it."},
      {"level": 2, "diff": 3, "scenario": 3, "q": "Tracing shows a database span taking 1.5s, but Cloud SQL dashboards show no slow queries in that window. How do you reconcile this?", "opts": ["The span includes connection acquisition time from HikariCP, not just query execution", "Cloud SQL dashboards have a 5-minute delay", "The trace is incorrect and should be ignored", "The span timing is inflated by GKE network overhead", "The query ran on a read replica not shown in Cloud SQL metrics"], "ans": 0, "fb": "HikariCP connection acquisition time is included in the database span when the pool is under pressure. Cloud SQL sees a fast query, but the application waited a long time to get a connection. This is a common source of discrepancy between trace spans and database-side metrics."},
      {"level": 2, "diff": 3, "scenario": 3, "q": "A service's traces show consistent 50ms latency, but users report 500ms response times. What is the most likely explanation?", "opts": ["The trace does not include client-side rendering time", "The service has multiple versions deployed simultaneously", "Users are on slow internet connections", "Tracing is sampled and only captures the fast requests", "Cloud Trace is aggregating spans incorrectly"], "ans": 3, "fb": "Head-based sampling at a fixed rate preferentially captures shorter requests if slow requests overlap more sampling intervals. Tail-based sampling or 100% sampling for error/slow requests is needed to observe tail latency accurately."},
      {"level": 2, "diff": 1, "scenario": 4, "q": "When defining a Cloud Monitoring alert, what is the purpose of the 'alignment period'?", "opts": ["The window over which metric data is aggregated", "The delay before a notification is sent", "The time the alert stays active after firing", "The cooldown period between repeated alerts", "The retention period for alert history"], "ans": 0, "fb": "The alignment period groups raw data points into a single aggregated value (mean, max, sum) before the condition is evaluated. Too short an alignment period makes alerts noisy; too long can delay detection."},
      {"level": 2, "diff": 1, "scenario": 4, "q": "An alert runbook link returns 404 during an incident. What is the most important corrective action after the incident?", "opts": ["Update the runbook link in the alert configuration and verify it works", "Mark the alert as low priority since the issue was resolved anyway", "Delete and recreate the alert with no runbook", "Add a comment in the alert description instead", "Remove the runbook requirement from alerts"], "ans": 0, "fb": "Runbook links are the first thing responders check under pressure. A broken link adds incident duration and stress. Fixing and verifying the link after the incident is a mandatory post-incident action."},
      {"level": 2, "diff": 2, "scenario": 4, "q": "An alert fires and resolves multiple times per day (flapping). What is the most appropriate fix?", "opts": ["Add alert duration conditions so it only fires when the", "Increase the metric scrape frequency", "Lower the alert threshold to prevent it from firing", "Disable the alert to reduce noise", "Create a separate alert for each flap event"], "ans": 0, "fb": "Flapping alerts are almost always caused by a threshold being on the edge of normal behavior. Adding a duration condition (e.g., 'condition must be true for 5 minutes') prevents transient spikes from firing alerts while still catching sustained problems."},
      {"level": 2, "diff": 2, "scenario": 4, "q": "You are setting an alert threshold for Cloud SQL CPU. Normal CPU is 20-40%. What threshold and duration is most appropriate?", "opts": ["> 95% for 1 minute", "> 30% for 1 minute", "> 80% for 5 minutes", "> 60% for 10 minutes", "> 50% for 30 seconds"], "ans": 2, "fb": "A threshold at 80% for 5 minutes gives significant headroom above normal (40%) and requires the condition to be sustained before alerting. This avoids false positives from short spikes while catching genuine resource exhaustion early enough to act."},
      {"level": 2, "diff": 3, "scenario": 4, "q": "An alert for 'API error rate > 1%' fires 50 times a day, mostly for 30-second windows. Engineering is tuning it out. What is the deeper risk of this situation?", "opts": ["The alert is consuming too many Cloud Monitoring resources", "Too many notifications will cause Cloud Monitoring to throttle alerts", "The alert is measuring the wrong metric", "Alert fatigue means a real sustained incident may be missed", "The 1% threshold is too strict for any production service"], "ans": 3, "fb": "Alert fatigue is one of the most dangerous operational conditions. When noisy alerts are ignored habitually, a real incident blends into the noise and is missed or responded to slowly. Fixing noisy alerts is a safety issue, not just a comfort issue."},
      {"level": 2, "diff": 3, "scenario": 4, "q": "A team wants to alert on 'any 5xx response'. After enabling this, they get 200 alerts per day mostly from expected client errors being mis-classified. What is a better alert design?", "opts": ["Alert only on 503 status codes", "Alert on 5xx rate as a percentage of total traffic, sustained over 5 minutes", "Alert only during business hours", "Alert on every 5xx individually to ensure nothing is missed", "Remove error rate alerting entirely"], "ans": 1, "fb": "Rate-based alerting (e.g., >1% of requests returning 5xx for 5 minutes) focuses on impact and eliminates noise from isolated errors. Raw count alerts fire too easily in high-traffic services and cause the alert fatigue they are trying to prevent."},
      {"level": 3, "diff": 1, "scenario": 0, "q": "A trace shows service A calling service B with 200ms latency, but service B's own trace shows 10ms processing time. Where is the missing 190ms most likely spent?", "opts": ["In network transit, serialization, or connection establishment between A and B", "In service A's response parsing code", "In the Cloud Trace aggregation pipeline", "In a middleware filter on service B not covered by the trace", "In the GKE sidecar proxy (if using a service mesh)"], "ans": 0, "fb": "The gap between caller-side span duration and callee-side span duration represents time outside the callee's control: network round-trip, connection setup, TLS handshake, or serialization. Sidecar proxies add additional latency that appears in this gap."},
      {"level": 3, "diff": 1, "scenario": 0, "q": "Grafana shows p99 latency spiking every 2 minutes for about 500ms. Cloud SQL metrics show no anomaly. What should you check next?", "opts": ["Check GC pause duration metrics", "Review recent deployments for code changes", "Increase Cloud SQL tier", "Increase the number of pod replicas", "Check Kafka consumer lag"], "ans": 0, "fb": "Regular latency spikes at fixed intervals with no database anomaly are a classic JVM GC signature. G1GC major collections or ZGC pauses can add hundreds of milliseconds of latency periodically. GC pause metrics confirm or rule this out quickly."},
      {"level": 3, "diff": 1, "scenario": 0, "q": "You have a trace and a Grafana dashboard open for the same incident. The trace shows a slow database span. Which metric on the dashboard best confirms this is a database-side problem versus a connection pool problem?", "opts": ["Pod CPU utilization", "HikariCP active connections", "Cloud SQL storage IOPS", "JVM heap usage", "HTTP request duration p99"], "ans": 1, "fb": "HikariCP metrics showing pending threads (waiting for a connection) indicate connection pool exhaustion — a pool problem, not a database problem. If pending threads are zero and the span is still slow, the database itself is slow."},
      {"level": 3, "diff": 2, "scenario": 0, "q": "A trace shows service A making 47 database calls for a single API request. Metrics show high database RPS during the same window. What is the issue and how do you confirm it?", "opts": ["The database index is missing — confirm with EXPLAIN ANALYZE", "The service is retrying failed queries — check error rate metrics", "A connection pool is leaking — check HikariCP pending threads", "An N+1 query pattern", "A Kafka consumer is triggering extra DB lookups — check consumer lag"], "ans": 3, "fb": "47 database calls for one API request is a classic N+1 symptom. Confirming that the call count grows proportionally with the number of entities returned proves the ORM is issuing one query per entity instead of a join. This is confirmed by varying the result set size."},
      {"level": 3, "diff": 2, "scenario": 0, "q": "Grafana shows p99 latency increasing gradually over 6 hours with no change in traffic or deployments. Which combination of metrics would best help diagnose this?", "opts": ["Cloud SQL storage and replication lag", "JVM heap usage trend, GC pause frequency, and", "HTTP status codes and pod restart count", "Number of active pods and node CPU usage", "Kafka consumer lag and pod CPU usage"], "ans": 1, "fb": "Gradual latency increase without a clear trigger points to resource exhaustion building over time. JVM heap growth suggests a memory leak increasing GC pressure; rising HikariCP wait times suggest connection pool pressure. Together they pinpoint whether the bottleneck is JVM or database-side."},
      {"level": 3, "diff": 2, "scenario": 0, "q": "A Cloud Trace shows a request with 8 sequential database spans averaging 20ms each. Total DB time is 160ms. Latency SLO is 200ms. Which fix has the highest impact?", "opts": ["Increase the HikariCP pool size", "Cache the results of all 8 queries", "Reduce each query execution time by optimizing indexes", "Parallelize independent queries to reduce total wall-clock time", "Add a read replica for read queries"], "ans": 3, "fb": "If the 8 queries are independent, running them in parallel reduces total DB time from 160ms to ~20ms (the longest single query). Index optimization reduces individual query time but still runs sequentially. Parallelism is the highest-leverage structural change."},
      {"level": 3, "diff": 3, "scenario": 0, "q": "Traces show one specific tenant's requests taking 3x longer than all others. Metrics show no overall service degradation. What should you investigate?", "opts": ["An incorrect traceId being associated with that tenant's requests", "A tenant-specific feature flag enabling a slower code path", "Tenant-specific data volume or query patterns causing different execution plans", "A misconfigured HPA not scaling for that tenant's load", "A GKE node assigned exclusively to that tenant's pods"], "ans": 2, "fb": "Tenant-specific latency in a shared service almost always comes from that tenant having more data, a different data shape, or query patterns that produce different execution plans. Check query plans with that tenant's actual data volume rather than assuming a code bug."},
      {"level": 3, "diff": 3, "scenario": 0, "q": "Grafana shows a sudden 10x increase in database query count with no increase in API traffic. Traces show hundreds of short queries per request. What is the most likely cause?", "opts": ["A caching layer failed and all cache misses are hitting the database", "A misconfigured connection pool is reconnecting frequently", "A new index caused queries to split into subqueries", "The HPA scaled up many new pods simultaneously", "A Kafka topic backlog is being drained"], "ans": 0, "fb": "A sudden query count explosion with flat traffic is the classic cache stampede or cache invalidation failure signature. When a cache fails or is cleared, every request that was previously served from cache now hits the database. Confirming cache hit rate metrics makes this diagnosis definitive."},
      {"level": 3, "diff": 1, "scenario": 1, "q": "A GKE node shows 'NotReady' status. What is the most likely immediate impact on workloads running on that node?", "opts": ["Pods on the node stop receiving traffic", "The cluster autoscaler immediately adds a new node", "Pods on the node are gracefully migrated immediately", "All pods in the cluster restart", "Cloud SQL loses its connection proxy"], "ans": 0, "fb": "When a node goes NotReady, the pods on it are marked Unreachable and removed from service endpoints. After the node-unreachable timeout (default 5 minutes), Kubernetes evicts and reschedules those pods. There is a gap where those pods serve no traffic."},
      {"level": 3, "diff": 1, "scenario": 1, "q": "You suspect a GKE pod is being CPU throttled. Which metric should you check?", "opts": ["container/cpu/request_utilization", "container/cpu/throttled_time", "container/uptime", "node/cpu/total_cores", "container/memory/limit_utilization"], "ans": 1, "fb": "container/cpu/throttled_time measures the time a container was throttled by the Linux CFS scheduler due to exceeding its CPU limit. High values here directly confirm CPU throttling as a latency source."},
      {"level": 3, "diff": 2, "scenario": 1, "q": "Multiple pods on the same GKE node are experiencing latency spikes simultaneously, but other nodes are unaffected. What is the most likely cause?", "opts": ["The node's Cloud SQL Auth Proxy sidecar is failing", "A shared Kafka topic is causing backpressure", "A misconfigured HPA is overloading that node", "The node has a hardware issue, noisy neighbor, or is CPU-constrained", "A GKE node upgrade is in progress"], "ans": 3, "fb": "Correlated latency across all pods on a single node, while other nodes are fine, is a node-level problem: hardware degradation, CPU steal from a noisy neighbor VM, or the node being oversubscribed. Node-level CPU and memory metrics will show the issue."},
      {"level": 3, "diff": 2, "scenario": 1, "q": "A pod's containers show normal CPU and memory, but 'kubectl describe node' shows the node is under memory pressure. What is the risk?", "opts": ["The pod's network bandwidth will be capped", "Cloud SQL connections from the pod will be dropped", "The pod will be throttled on CPU", "The pod's readiness probe will fail", "The pod may be evicted if it is a lower-priority workload"], "ans": 4, "fb": "When a node is under memory pressure, Kubernetes evicts lower-priority or best-effort pods to reclaim memory, even if those pods are within their own limits. Pod Priority and resource guarantees determine eviction order."},
      {"level": 3, "diff": 2, "scenario": 1, "q": "GKE pods are stuck in 'Pending' despite available node capacity. 'kubectl describe pod' shows 'Insufficient cpu'. What is the most likely explanation?", "opts": ["The pod has a node affinity rule that no node satisfies", "The HPA scaled down the node pool", "The CPU limit is set too high", "The pod's image is too large to pull", "CPU requests are high but actual node allocatable CPU is lower"], "ans": 4, "fb": "GKE nodes reserve CPU for system and kubelet processes, reducing allocatable CPU below the total. If all pods on a node have high CPU requests, the allocatable budget is exhausted even if actual usage is low. Requests determine scheduling, not actual usage."},
      {"level": 3, "diff": 3, "scenario": 1, "q": "A GKE node pool is running at 95% CPU across all nodes. New pods are being scheduled slowly. Autoscaler is enabled but not scaling. What should you check?", "opts": ["Whether the HPA has reached its maxReplicas limit", "Whether the cluster autoscaler has a max node count configured and has reached it", "Whether the node pool uses preemptible VMs that are all taken", "Whether the new pods have resource requests set to zero", "Whether Kubernetes scheduler is backed up with pending pods"], "ans": 1, "fb": "Cluster autoscaler respects a maximum node count configuration. If that limit is reached, autoscaler stops adding nodes even under high load. This is a common misconfiguration that surfaces at scale when teams forget to update the max as the service grows."},
      {"level": 3, "diff": 3, "scenario": 1, "q": "A GKE node is showing high CPU usage but no individual pod reports high CPU. What is a possible explanation?", "opts": ["System-level processes", "A cloud provider maintenance task is using VM CPU", "The CPU metric aggregation is broken on that node", "The kubelet agent itself is consuming the CPU", "The node has a hyperthreading configuration issue"], "ans": 0, "fb": "DaemonSets like Fluentd, node-exporter, and kube-proxy run on every node and consume CPU that is not attributed to application pods. Under high log volume or network activity, these system processes can consume surprising amounts of CPU."},
      {"level": 3, "diff": 1, "scenario": 2, "q": "What is the purpose of setting a sampling rate in OpenTelemetry rather than tracing 100% of requests?", "opts": ["To reduce the volume and cost of trace data while retaining", "To comply with GDPR data minimization requirements", "To limit the number of spans per request", "To prevent trace data from being correlated with logs", "To avoid overwhelming Grafana Tempo with data"], "ans": 0, "fb": "At high traffic volumes, tracing every request generates enormous data volumes and cost. Sampling at 10% or 1% still provides statistically representative latency distributions for normal traffic, reserving 100% capture for errors and slow requests."},
      {"level": 3, "diff": 1, "scenario": 2, "q": "What is a 'noisy span' in OpenTelemetry context?", "opts": ["A span that contains PII in its attributes", "A span that has high latency and needs investigation", "A span that is dropped by the OTel collector due to an error", "A span emitted very frequently for low-value operations that", "A span that propagates incorrectly to child services"], "ans": 3, "fb": "Noisy spans are frequent, low-value spans — e.g., health check pings, cache heartbeats, or internal framework calls — that add volume without helping with production diagnosis. Filtering these at the collector reduces costs and makes traces easier to read."},
      {"level": 3, "diff": 2, "scenario": 2, "q": "You want to ensure 100% of error traces are captured while sampling normal traffic at 5%. Which OpenTelemetry sampling strategy should you use?", "opts": ["Probabilistic sampling at 5%", "Remote-controlled sampling via Cloud Trace", "Parent-based sampling at 5%", "Head-based sampling at 100%", "Tail-based sampling with rules: errors=100%, otherwise 5%"], "ans": 4, "fb": "Tail-based sampling evaluates completed traces before deciding whether to keep them, allowing rules like 'always keep errors'. Head-based and probabilistic sampling decide at trace start before the outcome is known, so errors can be dropped."},
      {"level": 3, "diff": 2, "scenario": 2, "q": "An OTel collector is dropping spans intermittently under load. What configuration change would most directly address this?", "opts": ["Switch from gRPC to HTTP export protocol", "Increase the collector's queue size and add a batch processor to buffer spans", "Increase the sampling rate to generate fewer spans", "Reduce the number of attributes on each span", "Disable tail-based sampling to reduce collector processing load"], "ans": 1, "fb": "Span drops under load occur when the export queue is full and new spans are rejected. Increasing queue capacity and using batch processors to efficiently export accumulated spans prevents drops at traffic peaks."},
      {"level": 3, "diff": 2, "scenario": 2, "q": "A team adds a 'request.body' attribute to every span. Cloud Trace costs triple. What is the underlying problem and fix?", "opts": ["The attribute is causing the collector to buffer more spans", "Large attribute values increase span data size", "Cloud Trace charges per attribute rather than per span", "request.body is a reserved attribute name — rename it", "The OTel SDK is duplicating spans when body attributes are present"], "ans": 1, "fb": "Span attributes are stored per-span. Adding a large payload like a request body to every span dramatically increases data volume. The fix is to remove the attribute from spans and log the body to Cloud Logging instead if needed for debugging."},
      {"level": 3, "diff": 3, "scenario": 2, "q": "OTel instrumentation is adding 15ms of overhead per request in production. What is the most likely cause?", "opts": ["The tracing backend is too far away geographically", "The OTel SDK version is outdated", "Synchronous span export is blocking the request thread", "The OTel collector is on a different GKE node", "Too many spans are being created per request"], "ans": 2, "fb": "Synchronous exporters block the application thread until the span is sent to the backend. This adds network latency to every instrumented request. Async batch exporters send spans in background threads, making the overhead negligible."},
      {"level": 3, "diff": 3, "scenario": 2, "q": "Traces in Grafana Tempo are mostly complete but occasionally show orphaned root spans with no children. What does this indicate?", "opts": ["The child spans are in Cloud Trace instead of Tempo", "The parent service is restarting mid-request", "Some traces are partially sampled", "Grafana Tempo has a bug in span assembly", "The child services are not instrumented"], "ans": 2, "fb": "Partial traces occur when different services use inconsistent sampling decisions or when spans are dropped by collectors in child services. Tail-based sampling with consistent trace-level decisions prevents partial traces."},
      {"level": 3, "diff": 1, "scenario": 3, "q": "What are the four golden signals for monitoring a service?", "opts": ["Throughput, concurrency, error rate, uptime", "Latency, traffic, errors, saturation", "Requests, responses, connections, threads", "Availability, reliability, performance, security", "CPU, memory, disk, network"], "ans": 1, "fb": "The four golden signals (from Google SRE) are latency, traffic, errors, and saturation. Together they cover user experience (latency, errors), load (traffic), and resource headroom (saturation). They are the minimum viable observability for any production service."},
      {"level": 3, "diff": 1, "scenario": 3, "q": "A golden-signals dashboard for a payment processing service should prioritize which metric for user impact?", "opts": ["Payment transaction error rate", "Kafka consumer group offset", "JVM heap usage", "Cloud SQL storage usage", "Pod replica count"], "ans": 0, "fb": "Error rate for business-critical operations (failed payments) directly represents user impact and SLO compliance. Infrastructure metrics like heap and storage are supporting signals that help diagnose root cause after user impact is detected."},
      {"level": 3, "diff": 2, "scenario": 3, "q": "You are building a golden-signals dashboard for an API gateway. Which panel best represents 'saturation'?", "opts": ["p99 request latency", "HTTP 5xx error rate", "Requests per second", "GKE pod restart count", "Active connection count"], "ans": 4, "fb": "Saturation measures how close a resource is to its maximum capacity. Active connections vs maximum limit shows how much headroom remains before the service is overwhelmed. Error rate and latency show symptoms; saturation shows the approaching limit."},
      {"level": 3, "diff": 2, "scenario": 3, "q": "A golden-signals dashboard shows traffic doubled but errors stayed flat and latency increased by 20%. What does this indicate?", "opts": ["The service is failing silently and errors are not being captured", "The latency increase is within normal variance and needs no action", "The service should be restarted to clear accumulated state", "The traffic spike is a data anomaly and can be ignored", "The service is handling load but approaching a saturation point"], "ans": 4, "fb": "Doubled traffic with flat errors and modest latency increase means the service is scaling, but the latency trend indicates resource pressure building. This is a proactive signal to watch — not an incident yet, but a warning to act before it becomes one."},
      {"level": 3, "diff": 3, "scenario": 3, "q": "A golden-signals dashboard shows all four signals normal, but users are reporting failures for a specific multi-step business flow. What is missing from the dashboard?", "opts": ["Additional Kafka consumer lag panels", "Database query count per second", "More granular resource metrics per pod", "Per-tenant latency breakdown", "Business-level transaction success metrics"], "ans": 4, "fb": "Infrastructure golden signals measure service health but don't capture business flow completeness. A payment flow that partially completes may show 200 HTTP responses (no errors) but fail the user. Business outcome metrics (transaction completed, enrollment successful) are needed alongside infrastructure signals."},
      {"level": 3, "diff": 3, "scenario": 3, "q": "You build a golden-signals dashboard and set static alert thresholds. Six months later, traffic has grown 5x and the thresholds are constantly triggering. What is the better long-term approach?", "opts": ["Use percentage-of-capacity or rate-based thresholds that scale with traffic", "Alert only on absolute numbers during business hours", "Create separate dashboards for different traffic levels", "Raise all thresholds by 5x and monitor again", "Disable alerts and rely on user reports"], "ans": 0, "fb": "Static thresholds become stale as services grow. Rate-based thresholds (error rate as % of traffic, latency at a given percentile, saturation as % of capacity) remain valid regardless of absolute traffic volume and require much less maintenance."},
      {"level": 3, "diff": 1, "scenario": 4, "q": "In Terraform, what is the purpose of 'terraform plan' before 'terraform apply'?", "opts": ["To run integration tests against the infrastructure", "To generate Terraform documentation automatically", "To preview the changes that will be made to", "To lock the state file so no one else can apply", "To validate Terraform is installed correctly"], "ans": 2, "fb": "terraform plan shows a diff of what will be created, modified, or destroyed without making any changes. Reviewing the plan before apply is a critical safety step — especially for production infrastructure where unexpected changes can cause outages."},
      {"level": 3, "diff": 1, "scenario": 4, "q": "A Terraform module for a GKE node pool has a variable 'min_node_count'. You need to increase it from 3 to 5. Where do you make this change?", "opts": ["In the Terraform provider configuration", "In the GKE cluster resource, not the node pool module", "In the .tfvars file or the module instantiation that sets the", "Directly in the node pool resource in the GCP Console", "In the Kubernetes ConfigMap for the cluster autoscaler"], "ans": 2, "fb": "Terraform module variables are set at the point of module instantiation (in the calling .tf file or a .tfvars file), not inside the module itself. Changing the value in the console is bypassed by Terraform state and will be reverted on the next apply."},
      {"level": 3, "diff": 2, "scenario": 4, "q": "A Terraform apply fails mid-way with an error creating a Cloud SQL resource. What is the state of the infrastructure?", "opts": ["All changes are rolled back to the last successful apply", "Terraform rolls back all changes automatically", "The state file is corrupted and needs manual repair", "Some resources may be created, others not", "The partial apply is invisible to GCP — nothing was changed"], "ans": 3, "fb": "Terraform does not have atomic transactions. Resources created before the failure exist in GCP and are tracked in state. Resources after the failure do not exist. Re-running apply after fixing the error creates only the missing resources."},
      {"level": 3, "diff": 2, "scenario": 4, "q": "You need to add a maintenance window to an existing Cloud SQL instance managed by Terraform. Where do you add this configuration?", "opts": ["In the google_sql_database_instance resource block in the relevant .tf file", "In the Cloud SQL Admin Console (Terraform will sync it automatically)", "In a separate google_sql_maintenance_window resource", "In the provider.tf file under cloud_sql settings", "In a Kubernetes ConfigMap that the Cloud SQL proxy reads"], "ans": 0, "fb": "Cloud SQL maintenance windows are configured within the google_sql_database_instance resource as a maintenance_window block. Changes made in the console will be overwritten on the next Terraform apply if not also reflected in the .tf files."},
      {"level": 3, "diff": 3, "scenario": 4, "q": "A colleague runs 'terraform apply' on the production Terraform workspace directly from their laptop without a plan review. What process change would prevent this?", "opts": ["Add a confirmation prompt to the apply command", "Run Terraform through a CI/CD pipeline that requires plan", "Use Terraform workspaces to separate dev and prod state", "Disable local Terraform CLI access for all engineers", "Require all Terraform runs to be done by the team lead"], "ans": 1, "fb": "Running Terraform through a CI/CD pipeline (e.g., Atlantis, GitHub Actions, Terraform Cloud) enforces a plan-review-approve-apply workflow and provides an audit trail. Local laptop applies to production are ungoverned and a significant operational risk."},
      {"level": 3, "diff": 3, "scenario": 4, "q": "Terraform shows that applying a change to a Cloud SQL instance will cause it to be destroyed and recreated. What is the correct action?", "opts": ["Investigate why recreation is triggered", "Proceed with the apply — Cloud SQL recreations are instant", "Increase the Cloud SQL backup retention before applying", "Use terraform taint to force recreation on a schedule", "Cancel and make the change in the GCP Console instead"], "ans": 0, "fb": "Cloud SQL recreation means dropping and recreating the instance, which destroys all data unless a backup is restored. Understanding why Terraform is planning recreation (a forced-replacement field changed) and finding an alternative (lifecycle rules, manual steps) is essential before proceeding."}
    ]
  }

};

</script>
<script>
(function() {
  'use strict';

  /* ═══════════════════════════════════════════
     STATE
  ═══════════════════════════════════════════ */
  var selectedTrack = null;  // set when user picks a track
  var levels = [];
  var allQuestions = [];

  /* ═══════════════════════════════════════════
     TRACK SELECTOR
  ═══════════════════════════════════════════ */
  function renderTrackGrid() {
    var grid = document.getElementById('track-grid');
    var ids = ['database', 'jvm', 'design', 'cloud'];
    grid.innerHTML = '';
    ids.forEach(function(id) {
      var t = TRACKS[id];
      var qCount = t.questions.length;
      var hasQuestions = qCount > 0;
      var card = document.createElement('div');
      card.className = 'track-card' + (hasQuestions ? '' : ' disabled');
      card.onclick = hasQuestions ? function() { selectTrack(id); } : null;
      card.innerHTML =
        '<div class="track-card-icon ' + t.icon + '"></div>' +
        '<div class="track-card-name">' + t.label + '</div>' +
        '<div class="track-card-desc">' + t.desc + '</div>' +
        (hasQuestions
          ? '<span class="track-card-count">' + qCount + ' questions</span>'
          : '<div class="track-card-empty">Coming soon</div>');
      grid.appendChild(card);
    });
  }

  function selectTrack(trackId) {
    selectedTrack = TRACKS[trackId];
    levels = selectedTrack.levels;
    allQuestions = selectedTrack.questions;
    startQuiz();
  }

  // Render on load
  renderTrackGrid();

  // ── Engine configuration ── tweak these to adjust adaptive behaviour ──
  var ENGINE_CONFIG = {
    // ASSESS phase
    streakToExplore: 2,        // correct streak before trying next level
    demotionMinAsked: 3,       // min questions asked before demotion check
    demotionWrongMin: 2,       // min wrong answers to trigger demotion
    demotionWrongRatio: 2,     // wrong >= correct * this → demote
    // EXPLORE phase
    exploreQuestions: 3,       // questions asked at next level
    exploreMaxWrong: 1,        // wrong ≤ this → promote
    // CONFIRM phase
    confirmQuestions: 3,       // questions to confirm settled level
    confirmMaxWrong: 1,        // wrong ≤ this → confirmed (else cascade down)
    // MAP phase
    mapMinQuestions: 4,        // min questions at settled level for coverage
    mapStreakToExplore: 2,     // streak to trigger second-chance explore
    mapReExploreLimit: 6,      // don't re-explore if already asked this many at next level
    // Needle weights per difficulty
    needleWeightCorrect: 6,    // base correct nudge
    needleWeightWrong: 8,      // base wrong nudge (negative)
    needleDiffMult: { 1: 0.8, 2: 1.0, 3: 1.3 },  // diff multiplier
    // Finish conditions
    hardMax: 60,               // absolute question ceiling
    minAnswersAtLevel: 6,      // min answers at settled level for confidence finish
    minConfidence: 0.72,       // proportion correct to count as confident
    // Calibration start (ask 2 L2 questions before main engine)
    calibrateQuestions: 2,     // how many calibration questions
    calibrateLevel: 1,         // level index to calibrate at (1 = L2, the second level)
    calibratePassAll: true,    // need ALL calibration correct to start at that level
  };

  var state = {
    /*  The circle always shows `displayLevel`.
        `confirmedLevel` is the highest level we're confident about.
        We track a per-level score to decide transitions. */
    confirmedLevel: 0,       // highest level index fully passed
    displayLevel: 0,         // what the circle currently shows (may be exploring ahead)
    phase: 'calibrate',      // 'calibrate' | 'assess' | 'explore' | 'bonus' | 'confirm' | 'map'

    questionsAsked: [],      // full history
    usedQuestionIndices: [],
    totalAsked: 0,

    // Per-level tracking: keyed by level index
    levelStats: {},          // { [lvlIdx]: { asked, correct, wrong, streak } }

    // Explore state
    exploreTarget: null,     // level index being explored

    // Calibration state
    calibrateAsked: 0,
    calibrateCorrect: 0,

    // Needle: 0–100, 50=center.  Smooth, never hard-reset.
    needlePos: 50,

    // Current question tracking for select/submit flow
    currentQIdx: null,
    pendingChoice: null
  };

  function getLevelStats(lvlIdx) {
    if (!state.levelStats[lvlIdx]) {
      state.levelStats[lvlIdx] = { asked: 0, correct: 0, wrong: 0, streak: 0 };
    }
    return state.levelStats[lvlIdx];
  }

  /* ═══════════════════════════════════════════
     QUESTION POOL
  ═══════════════════════════════════════════ */
  function pickQuestion(levelNum, excludeIndices) {
    var pool = [];
    allQuestions.forEach(function(q, idx) {
      if (q.level === levelNum && excludeIndices.indexOf(idx) === -1) {
        pool.push({ q: q, idx: idx });
      }
    });
    if (pool.length === 0) return null;

    // Try to cover varying difficulties and scenarios
    var askedAtLevel = state.questionsAsked.filter(function(a) { return a.level === levelNum; });
    var askedDiffs = askedAtLevel.map(function(a) { return a.diff; });
    var askedScenarios = askedAtLevel.map(function(a) { return a.scenario; });

    // Priority 1: unasked difficulty
    var diffs = [1, 2, 3];
    for (var d = 0; d < diffs.length; d++) {
      if (askedDiffs.indexOf(diffs[d]) === -1) {
        var subset = pool.filter(function(p) { return p.q.diff === diffs[d]; });
        if (subset.length > 0) {
          // Within that diff, prefer unasked scenarios
          var scenarioPref = subset.filter(function(p) { return askedScenarios.indexOf(p.q.scenario) === -1; });
          if (scenarioPref.length > 0) return scenarioPref[Math.floor(Math.random() * scenarioPref.length)];
          return subset[Math.floor(Math.random() * subset.length)];
        }
      }
    }

    // Priority 2: unasked scenario
    var scenarioPref = pool.filter(function(p) { return askedScenarios.indexOf(p.q.scenario) === -1; });
    if (scenarioPref.length > 0) return scenarioPref[Math.floor(Math.random() * scenarioPref.length)];

    // Fallback: any remaining
    return pool[Math.floor(Math.random() * pool.length)];
  }

  /* ═══════════════════════════════════════════
     COMPASS UI
  ═══════════════════════════════════════════ */
  function updateCompass() {
    var lvl = state.displayLevel;
    var level = levels[lvl];

    document.getElementById('circle-num').textContent = level.num;
    document.getElementById('circle-name').textContent = level.name;

    var prevEl = document.getElementById('prev-neighbor');
    var arrowL = document.getElementById('arrow-left');
    if (lvl > 0) {
      prevEl.classList.remove('hidden');
      arrowL.classList.remove('hidden');
      document.getElementById('prev-name').textContent = levels[lvl - 1].name;
      document.getElementById('prev-num').textContent = 'Level ' + levels[lvl - 1].num;
    } else {
      prevEl.classList.add('hidden');
      arrowL.classList.add('hidden');
    }

    var nextEl = document.getElementById('next-neighbor');
    var arrowR = document.getElementById('arrow-right');
    if (lvl < levels.length - 1) {
      nextEl.classList.remove('hidden');
      arrowR.classList.remove('hidden');
      document.getElementById('next-name').textContent = levels[lvl + 1].name;
      document.getElementById('next-num').textContent = 'Level ' + levels[lvl + 1].num;
    } else {
      nextEl.classList.add('hidden');
      arrowR.classList.add('hidden');
    }

    arrowL.classList.remove('pulse');
    arrowR.classList.remove('pulse');
    if (state.needlePos > 60) arrowR.classList.add('pulse');
    if (state.needlePos < 40) arrowL.classList.add('pulse');
  }

  function setNeedle(pos) {
    state.needlePos = Math.max(12, Math.min(88, pos));
    document.getElementById('needle').style.left = state.needlePos + '%';
    updateCompass();
  }

  // Smooth needle: ease toward a target, never jump
  function easeNeedle(target) {
    var current = state.needlePos;
    var next = current + (target - current) * 0.5;
    setNeedle(next);
  }

  function nudgeNeedle(isCorrect, diffNum) {
    var mult = ENGINE_CONFIG.needleDiffMult[diffNum] || 1.0;
    var delta = isCorrect
      ? (ENGINE_CONFIG.needleWeightCorrect * mult)
      : -(ENGINE_CONFIG.needleWeightWrong * mult);
    setNeedle(state.needlePos + delta);
  }

  /* ═══════════════════════════════════════════
     PROGRESS DOTS
  ═══════════════════════════════════════════ */
  function updateProgressDots() {
    var container = document.getElementById('progress-dots');
    container.innerHTML = '';
    var total = state.questionsAsked.length + 1;
    // Cap visible dots at 20 to keep it clean
    var showFrom = Math.max(0, total - 18);
    for (var i = showFrom; i < total; i++) {
      var dot = document.createElement('div');
      dot.className = 'p-dot';
      if (i < state.questionsAsked.length) dot.className += ' done';
      else dot.className += ' active';
      container.appendChild(dot);
    }
  }

  /* ═══════════════════════════════════════════
     STATUS MESSAGES
  ═══════════════════════════════════════════ */
  function setStatus(text, type) {
    var area = document.getElementById('status-area');
    if (!text) { area.innerHTML = ''; return; }
    area.innerHTML = '<div class="status-msg ' + (type || 'info') + '">' + text + '</div>';
  }

  /* ═══════════════════════════════════════════
     RENDER QUESTION
  ═══════════════════════════════════════════ */
  function renderQuestion(qData, qIdx) {
    state.currentQIdx = qIdx;
    state.pendingChoice = null;
    var area = document.getElementById('question-area');
    var level = levels.find(function(l) { return l.num === qData.level; });
    var diffLabel = qData.diff === 1 ? 'Foundational' : qData.diff === 2 ? 'Applied' : 'Challenging';

    var html = '<div class="q-card" id="active-q">';

    // Left column — meta, question text
    html += '<div class="q-col-left">';
    html += '<div class="q-meta">';
    html += '<span class="q-badge q-badge-level">' + level.name + '</span>';
    html += '<span class="q-badge q-badge-diff">' + diffLabel + '</span>';
    html += '</div>';
    html += '<div class="q-label">Scenario</div>';
    html += '<div class="q-text">' + escapeHtml(qData.q) + '</div>';
    html += '</div>';

    // Right column — options + submit
    html += '<div class="q-col-right">';
    html += '<div class="q-opts" id="q-opts">';
    for (var i = 0; i < qData.opts.length; i++) {
      var hint = (window.__testMode && i === qData.ans) ? ' ✦' : '';
      html += '<button class="q-opt" data-idx="' + i + '" onclick="selectOption(this,' + i + ')">' + escapeHtml(qData.opts[i]) + (hint ? '<span style="color:var(--green);margin-left:6px;font-size:11px">' + hint + '</span>' : '') + '</button>';
    }
    html += '</div>';
    html += '<div class="q-submit-wrap"><button class="q-next" id="q-submit" disabled onclick="submitAnswer()">Submit →</button></div>';
    html += '</div>';

    // Context row — spans full width, only rendered if context exists
    if (qData.context && Object.keys(qData.context).length > 0) {
      html += '<div class="q-context-row">';
      var keys = Object.keys(qData.context);
      for (var k = 0; k < keys.length; k++) {
        html += '<div class="q-ctx-item">';
        html += '<div class="q-ctx-k">' + escapeHtml(keys[k]) + '</div>';
        html += '<div class="q-ctx-v">' + escapeHtml(qData.context[keys[k]]) + '</div>';
        html += '</div>';
      }
      html += '</div>';
    }

    html += '</div>';

    area.innerHTML = html;
    updateProgressDots();
  }

  /* ═══════════════════════════════════════════
     SELECT OPTION / SUBMIT ANSWER
  ═══════════════════════════════════════════ */
  window.selectOption = function(el, idx) {
    var opts = document.querySelectorAll('.q-opt');
    opts.forEach(function(o) { o.classList.remove('selected'); });
    el.classList.add('selected');
    state.pendingChoice = idx;
    var submitBtn = document.getElementById('q-submit');
    if (submitBtn) submitBtn.disabled = false;
  };

  window.submitAnswer = function() {
    var chosen = state.pendingChoice;
    if (chosen === null || chosen === undefined) return;

    var qData = allQuestions[state.currentQIdx];
    var correct = qData.ans;
    var isCorrect = chosen === correct;
    var lvlIdx = levels.findIndex(function(l) { return l.num === qData.level; });

    // Disable options after submit
    var opts = document.querySelectorAll('.q-opt');
    opts.forEach(function(o) { o.classList.add('disabled'); });
    document.getElementById('q-submit').disabled = true;

    // Record
    state.questionsAsked.push({
      level: qData.level,
      diff: qData.diff,
      scenario: qData.scenario,
      correct: isCorrect,
      chosen: chosen,
      qIdx: state.currentQIdx
    });
    state.usedQuestionIndices.push(state.currentQIdx);
    state.totalAsked++;

    // Update per-level stats
    var stats = getLevelStats(lvlIdx);
    stats.asked++;
    if (isCorrect) {
      stats.correct++;
      stats.streak++;
    } else {
      stats.wrong++;
      stats.streak = 0;
    }

    nudgeNeedle(isCorrect, qData.diff);

    // Show correct/wrong on options
    var allOpts = document.querySelectorAll('.q-opt');
    allOpts[chosen].classList.add(isCorrect ? 'correct-reveal' : 'wrong-pick');
    if (!isCorrect) {
      allOpts[correct].classList.add('correct-reveal');
    }

    // Swap Submit → Next
    var submitBtn = document.getElementById('q-submit');
    submitBtn.textContent = 'Next →';
    submitBtn.disabled = false;
    submitBtn.onclick = function() { nextStep(); };

    state.pendingChoice = null;
  };

  /* ═══════════════════════════════════════════════
     NEXT STEP — redesigned adaptive engine

     Core philosophy:
     ───────────────
     The engine is a DISCOVERY tool, not a test.
     It accumulates evidence per-level and uses
     simple rules to decide when to explore up,
     when to settle, and when enough data exists.

     Decision rules:
     ───────────────
     ASSESS (initial phase at a level):
       - Ask questions at displayLevel
       - If streak >= 2 at this level → explore up
       - If asked >= 3 AND wrong >= 2 AND wrong >= 2×correct → struggling,
         drop to level below and CONFIRM (can cascade down)
       - Otherwise keep asking (up to pool exhaustion)

     EXPLORE (probing the next level):
       - Ask 3 questions at displayLevel+1
       - 0-1 wrong → PASS: promote confirmedLevel, continue assessing
       - 2 wrong → BONUS: one more chance
       - 3 wrong → FAIL: settle back

     BONUS (one extra chance):
       - 1 question at explore target
       - Correct → promote with "stretch" note
       - Wrong → settle back, go to CONFIRM

     CONFIRM (verify settled level after downgrade):
       - 3 questions at confirmedLevel
       - 0-1 wrong → pass, go to MAP
       - 2+ wrong AND level > 0 → drop one more level, re-CONFIRM
       - Can cascade all the way down to Foundations
       - Then → MAP

     MAP (gather scenario coverage data):
       - Keep asking at confirmedLevel until we have
         good scenario coverage (≥ 4 questions) or
         questions run out
       - If streak >= 2, can explore up again (second chance)

     FINISH triggers:
       - Ran out of questions at target level
       - totalAsked >= ENGINE_CONFIG.hardMax
       - MAP phase has enough data (≥ 4 answers at settled level)
       - Reached top level and passed

  ═══════════════════════════════════════════════ */
  window.nextStep = function() {
    var last = state.questionsAsked[state.questionsAsked.length - 1];

    // Hard stop
    if (state.totalAsked >= ENGINE_CONFIG.hardMax) {
      finishQuiz(state.confirmedLevel);
      return;
    }

    // ─── CALIBRATE: 2 warm-up questions at L2 before main engine ───
    if (state.phase === 'calibrate') {
      state.calibrateAsked++;
      if (last && last.correct) state.calibrateCorrect++;

      if (state.calibrateAsked >= ENGINE_CONFIG.calibrateQuestions) {
        // All correct → start assess at calibrate level; else start at L1
        var passedCalibration = ENGINE_CONFIG.calibratePassAll
          ? state.calibrateCorrect === ENGINE_CONFIG.calibrateQuestions
          : state.calibrateCorrect > 0;
        state.phase = 'assess';
        if (passedCalibration) {
          state.confirmedLevel = ENGINE_CONFIG.calibrateLevel;
          state.displayLevel = ENGINE_CONFIG.calibrateLevel;
          updateCompass();
          setStatus('Good start — continuing from ' + levels[ENGINE_CONFIG.calibrateLevel].name + '.', 'good');
        } else {
          setStatus('Let\'s start from the foundations.', 'info');
        }
        askNext();
        return;
      }
      // Still calibrating
      askNext();
      return;
    }

    // ─── ASSESS: initial questions at current display level ───
    if (state.phase === 'assess') {
      var stats = getLevelStats(state.displayLevel);

      // Strong signal: streak → explore up
      if (stats.streak >= ENGINE_CONFIG.streakToExplore && state.displayLevel < levels.length - 1) {
        state.phase = 'explore';
        state.exploreTarget = state.displayLevel + 1;
        state.displayLevel = state.exploreTarget;
        if (!state.levelStats[state.exploreTarget]) getLevelStats(state.exploreTarget);
        easeNeedle(58);
        setStatus('Nice — let\'s see how you do with some ' + levels[state.exploreTarget].name + ' scenarios.', 'good');
        updateCompass();
        askNext();
        return;
      }

      // Struggling signal: asked enough and wrong dominates
      if (stats.asked >= ENGINE_CONFIG.demotionMinAsked &&
          stats.wrong >= ENGINE_CONFIG.demotionWrongMin &&
          stats.wrong >= stats.correct * ENGINE_CONFIG.demotionWrongRatio &&
          state.displayLevel > 0) {
        state.confirmedLevel = Math.max(0, state.displayLevel - 1);
        state.displayLevel = state.confirmedLevel;
        state.phase = 'confirm';
        state.confirmAsked = 0;
        easeNeedle(42);
        setStatus('Let\'s check how you feel at ' + levels[state.confirmedLevel].name + '.', 'info');
        updateCompass();
        askNext();
        return;
      }

      // At top level with good results
      if (state.displayLevel === levels.length - 1 && stats.correct >= ENGINE_CONFIG.streakToExplore) {
        state.confirmedLevel = state.displayLevel;
        finishQuiz(state.confirmedLevel);
        return;
      }

      askNext();
      return;
    }

    // ─── EXPLORE: probing the next level ───
    if (state.phase === 'explore') {
      var eStats = getLevelStats(state.exploreTarget);
      var eAsked = eStats.asked;
      var eWrong = eStats.wrong;

      if (eAsked >= ENGINE_CONFIG.exploreQuestions) {
        if (eWrong <= ENGINE_CONFIG.exploreMaxWrong) {
          state.confirmedLevel = state.exploreTarget;
          state.phase = 'assess';
          easeNeedle(52);
          setStatus('You\'re showing strong ' + levels[state.confirmedLevel].name + ' instincts. Let\'s keep exploring.', 'good');
          updateCompass();
          askNext();
          return;
        } else if (eWrong === ENGINE_CONFIG.exploreMaxWrong + 1) {
          state.phase = 'bonus';
          easeNeedle(42);
          setStatus('Let\'s try one more ' + levels[state.exploreTarget].name + ' scenario to get a clearer read.', 'warm');
          askNext();
          return;
        } else {
          state.phase = 'confirm';
          state.displayLevel = state.confirmedLevel;
          state.confirmAsked = 0;
          easeNeedle(45);
          setStatus('Let\'s confirm your footing at ' + levels[state.confirmedLevel].name + ' with a few more scenarios.', 'info');
          updateCompass();
          askNext();
          return;
        }
      }

      askNext();
      return;
    }

    // ─── BONUS: one more chance at the explore level ───
    if (state.phase === 'bonus') {
      if (last.correct) {
        state.confirmedLevel = state.exploreTarget;
        state.displayLevel = state.confirmedLevel;
        state.phase = 'assess';
        easeNeedle(53);
        setStatus(levels[state.confirmedLevel].name + ' is within reach — the training will help solidify this.', 'good');
        updateCompass();
        askNext();
        return;
      } else {
        state.displayLevel = state.confirmedLevel;
        state.phase = 'confirm';
        state.confirmAsked = 0;
        easeNeedle(45);
        setStatus('Let\'s confirm your footing at ' + levels[state.confirmedLevel].name + ' with a few more scenarios.', 'info');
        updateCompass();
        askNext();
        return;
      }
    }

    // ─── CONFIRM: verify settled level (cascades down on 2+ wrong) ───
    if (state.phase === 'confirm') {
      state.confirmAsked = (state.confirmAsked || 0) + 1;

      if (state.confirmAsked >= ENGINE_CONFIG.confirmQuestions) {
        var recentAtLevel = state.questionsAsked.filter(function(a) {
          return a.level === levels[state.confirmedLevel].num;
        });
        var confirmSlice = recentAtLevel.slice(-state.confirmAsked);
        var confirmWrong = confirmSlice.filter(function(a) { return !a.correct; }).length;

        if (confirmWrong > ENGINE_CONFIG.confirmMaxWrong && state.confirmedLevel > 0) {
          state.confirmedLevel = state.confirmedLevel - 1;
          state.displayLevel = state.confirmedLevel;
          state.confirmAsked = 0;
          easeNeedle(45);
          setStatus('Let\'s check how you feel at ' + levels[state.confirmedLevel].name + '.', 'info');
          updateCompass();
          askNext();
          return;
        }

        state.phase = 'map';
        setStatus('Your strongest zone is ' + levels[state.confirmedLevel].name + '. Let\'s fill out the picture.', 'info');
        easeNeedle(50);
        askNextOrFinish();
        return;
      }

      askNext();
      return;
    }

    // ─── MAP: gather scenario coverage, allow second-chance explore ───
    if (state.phase === 'map') {
      var mStats = getLevelStats(state.confirmedLevel);

      if (mStats.streak >= ENGINE_CONFIG.mapStreakToExplore && state.confirmedLevel < levels.length - 1) {
        var prevExploreAttempts = state.questionsAsked.filter(function(a) {
          return a.level === levels[state.confirmedLevel + 1].num;
        }).length;
        if (prevExploreAttempts < ENGINE_CONFIG.mapReExploreLimit) {
          state.phase = 'explore';
          state.exploreTarget = state.confirmedLevel + 1;
          state.displayLevel = state.exploreTarget;
          var eStats = getLevelStats(state.exploreTarget);
          eStats.streak = 0;
          easeNeedle(56);
          setStatus('Interesting — let\'s peek at some ' + levels[state.exploreTarget].name + ' scenarios.', 'good');
          updateCompass();
          askNext();
          return;
        }
      }

      askNextOrFinish();
      return;
    }
  };

  // Confidence-based finish: enough answers + high enough accuracy, or hard max
  function hasEnoughConfidence() {
    var mStats = getLevelStats(state.confirmedLevel);
    if (mStats.asked < ENGINE_CONFIG.minAnswersAtLevel) return false;
    var total = mStats.correct + mStats.wrong;
    if (total === 0) return false;
    var confidence = mStats.correct / total;
    return confidence >= ENGINE_CONFIG.minConfidence || state.totalAsked >= ENGINE_CONFIG.hardMax;
  }

  function askNextOrFinish() {
    var mStats = getLevelStats(state.confirmedLevel);
    // Finish if: hit min questions threshold AND (confident OR at hard max)
    if (mStats.asked >= ENGINE_CONFIG.mapMinQuestions && hasEnoughConfidence()) {
      finishQuiz(state.confirmedLevel);
      return;
    }
    // Also finish if we've definitely gathered enough questions even without confidence
    if (mStats.asked >= ENGINE_CONFIG.mapMinQuestions * 2) {
      finishQuiz(state.confirmedLevel);
      return;
    }
    askNext();
  }

  function askNext() {
    var targetLevelNum;
    if (state.phase === 'calibrate') {
      targetLevelNum = levels[ENGINE_CONFIG.calibrateLevel].num;
    } else if (state.phase === 'explore' || state.phase === 'bonus') {
      targetLevelNum = levels[state.exploreTarget].num;
    } else {
      targetLevelNum = levels[state.displayLevel].num;
    }

    var picked = pickQuestion(targetLevelNum, state.usedQuestionIndices);
    if (!picked) {
      // Ran out of questions at target level
      if (state.phase === 'explore' || state.phase === 'bonus') {
        // Can't explore further — check what we have
        var eStats = getLevelStats(state.exploreTarget);
        if (eStats.correct > eStats.wrong) {
          // More right than wrong — give benefit of doubt
          state.confirmedLevel = state.exploreTarget;
        }
        state.displayLevel = state.confirmedLevel;
        updateCompass();
      }
      finishQuiz(state.confirmedLevel);
      return;
    }

    renderQuestion(picked.q, picked.idx);
  }

  /* ═══════════════════════════════════════════
     FINISH & RESULTS
  ═══════════════════════════════════════════ */
  function finishQuiz(levelIdx) {
    state.settledLevel = levelIdx;
    var level = levels[levelIdx];

    document.getElementById('screen-quiz').classList.add('hidden');
    var resultEl = document.getElementById('screen-result');
    resultEl.classList.remove('hidden');

    // Compute scenario strengths at settled level
    var answeredAtLevel = state.questionsAsked.filter(function(a) {
      return a.level === level.num;
    });
    var scenarioResults = {};
    answeredAtLevel.forEach(function(a) {
      if (!scenarioResults[a.scenario]) {
        scenarioResults[a.scenario] = { correct: 0, total: 0 };
      }
      scenarioResults[a.scenario].total++;
      if (a.correct) scenarioResults[a.scenario].correct++;
    });

    // Exploring level answers for "stretch" / "dig deeper"
    var stretchAnswers = [];
    if (levelIdx < levels.length - 1) {
      stretchAnswers = state.questionsAsked.filter(function(a) {
        return a.level === levels[levelIdx + 1].num;
      });
    }

    var strong = [];
    var grow = [];
    var deeper = []; // blue tags — scenarios from the next level to explore
    level.scenarios.forEach(function(s, idx) {
      if (scenarioResults[idx]) {
        if (scenarioResults[idx].correct >= scenarioResults[idx].total * 0.5) {
          strong.push(s);
        } else {
          grow.push(s);
        }
      }
    });

    // Stretch level: correct answers → dig deeper, wrong → grow areas
    if (stretchAnswers.length > 0 && levelIdx < levels.length - 1) {
      var nextLevel = levels[levelIdx + 1];
      stretchAnswers.forEach(function(a) {
        if (nextLevel.scenarios[a.scenario]) {
          if (a.correct) {
            deeper.push(nextLevel.scenarios[a.scenario]);
          }
        }
      });
    }

    // If not enough data from scenario mapping, fill from all answers
    if (strong.length === 0 && grow.length === 0) {
      state.questionsAsked.forEach(function(a) {
        var lv = levels.find(function(l) { return l.num === a.level; });
        if (lv && lv.scenarios[a.scenario]) {
          if (a.correct) strong.push(lv.scenarios[a.scenario]);
          else grow.push(lv.scenarios[a.scenario]);
        }
      });
    }

    // Deduplicate
    strong = unique(strong);
    grow = unique(grow);
    deeper = unique(deeper);

    // Build recommendation text
    var recText;
    var RAMP_TRACKS = [
      { from: 1, to: 2 },
      { from: 2, to: 3 },
      { from: 3, to: 4 }
    ];
    var ramp = RAMP_TRACKS.find(function(r) { return r.from === level.num; });
    if (ramp) {
      var nextLevelName = levels.find(function(l) { return l.num === ramp.to; }).name;
      recText = 'We\'re confident your level is <strong>' + level.name + '</strong>. We\'d recommend joining the <strong>' + level.name + ' → ' + nextLevelName + '</strong> ramp-up track to build on your current foundations and progress to the next level.';
    } else {
      recText = 'We\'re confident your level is <strong>' + level.name + '</strong>. At this level, we\'d love for you to help <strong>facilitate</strong> the training sessions — your experience will be invaluable for the team members who are still ramping up.';
    }

    // Build per-question detail — question + dot visible; answers + explanation collapsed
    var detailHtml = '';
    state.questionsAsked.forEach(function(a, idx) {
      var q = allQuestions[a.qIdx];
      var lv = levels.find(function(l) { return l.num === a.level; });
      var dotClass = a.correct ? 'g' : 'r';
      var colId = 'qcol-' + idx;

      var collapsedHtml = '';
      if (a.correct) {
        collapsedHtml += '<div class="result-ans-row"><span class="result-ans-label yours ok">Yours</span><span class="result-ans-text">' + escapeHtml(q.opts[a.chosen]) + '</span></div>';
      } else {
        collapsedHtml += '<div class="result-ans-row"><span class="result-ans-label yours">Yours</span><span class="result-ans-text">' + escapeHtml(q.opts[a.chosen]) + '</span></div>';
        collapsedHtml += '<div class="result-ans-row"><span class="result-ans-label correct">Correct</span><span class="result-ans-text">' + escapeHtml(q.opts[q.ans]) + '</span></div>';
      }
      if (q.fb) {
        collapsedHtml += '<div class="result-fb">' + escapeHtml(q.fb) + '</div>';
      }

      detailHtml += '<div class="result-detail-row">';
      detailHtml += '<span class="result-dot ' + dotClass + '"></span>';
      detailHtml += '<div style="flex:1;min-width:0">';
      detailHtml += '<div style="display:flex;align-items:flex-start;gap:8px">';
      detailHtml += '<span class="result-q-level">' + lv.name + '</span>';
      detailHtml += '<span class="result-q-text">' + escapeHtml(q.q) + '</span>';
      detailHtml += '</div>';
      detailHtml += '<button class="result-expand-btn" onclick="toggleResultRow(this,\'' + colId + '\')">';
      detailHtml += '<span class="chevron"></span><span>See answer &amp; explanation</span>';
      detailHtml += '</button>';
      detailHtml += '<div id="' + colId + '" class="result-collapsible">';
      detailHtml += '<div class="result-answers">' + collapsedHtml + '</div>';
      detailHtml += '</div>';
      detailHtml += '</div>';
      detailHtml += '</div>';
    });

    var html = '<div class="result">';
    html += '<div class="result-header">';
    html += '<p class="result-eyebrow">' + escapeHtml(selectedTrack.label) + '</p>';
    html += '<h2 class="result-title">Your result</h2>';
    html += '<p class="result-sub">Based on ' + state.totalAsked + ' scenarios across ' + countLevelsTouched() + ' levels</p>';
    html += '</div>';

    html += '<div class="result-circle-wrap">';
    if (ramp) {
      var targetLevel = levels.find(function(l) { return l.num === ramp.to; });
      html += '<div class="result-circle">';
      html += '<div class="result-num">' + level.num + '</div>';
      html += '<div class="result-name">' + escapeHtml(level.name) + '</div>';
      html += '</div>';
      html += '<div class="result-ramp-arrow">';
      html += '<div class="result-ramp-label">ramp up</div>';
      html += '<div class="result-ramp-line"><div class="result-ramp-shaft"></div><div class="result-ramp-head"></div></div>';
      html += '</div>';
      html += '<div class="result-circle target">';
      html += '<div class="result-num">' + targetLevel.num + '</div>';
      html += '<div class="result-name">' + escapeHtml(targetLevel.name) + '</div>';
      html += '</div>';
    } else {
      html += '<div class="result-circle">';
      html += '<div class="result-num">' + level.num + '</div>';
      html += '<div class="result-name">' + escapeHtml(level.name) + '</div>';
      html += '</div>';
    }
    html += '</div>';

    html += '<div class="result-rec">' + recText + '</div>';

    if (strong.length > 0) {
      html += '<div class="result-section">';
      html += '<div class="result-section-title">Areas of confidence</div>';
      html += '<div class="result-tags">';
      strong.forEach(function(s) {
        html += '<span class="result-tag strong">' + escapeHtml(s) + '</span>';
      });
      html += '</div></div>';
    }

    if (deeper.length > 0) {
      html += '<div class="result-section">';
      html += '<div class="result-section-title">Worth digging deeper into</div>';
      html += '<div class="result-tags">';
      deeper.forEach(function(s) {
        html += '<span class="result-tag deeper">' + escapeHtml(s) + '</span>';
      });
      html += '</div></div>';
    }

    if (grow.length > 0) {
      html += '<div class="result-section">';
      html += '<div class="result-section-title">Where the training will help most</div>';
      html += '<div class="result-tags">';
      grow.forEach(function(s) {
        html += '<span class="result-tag grow">' + escapeHtml(s) + '</span>';
      });
      html += '</div></div>';
    }

    html += '<div class="result-detail">';
    html += '<div class="result-detail-title">Question breakdown</div>';
    html += detailHtml;
    html += '</div>';

    html += '<button class="result-restart" onclick="resetQuiz()">Take the quiz again</button>';
    html += '</div>';

    resultEl.innerHTML = html;
  }

  window.toggleResultRow = function(btn, colId) {
    var col = document.getElementById(colId);
    var open = col.classList.toggle('open');
    btn.classList.toggle('open', open);
    var label = btn.querySelector('span:last-child');
    label.textContent = open ? 'Hide answer & explanation' : 'See answer & explanation';
  };

  /* ═══════════════════════════════════════════
     START / RESET
  ═══════════════════════════════════════════ */
  window.startQuiz = function() {
    document.getElementById('screen-start').classList.add('hidden');
    document.getElementById('screen-quiz').classList.remove('hidden');

    // Find the lowest level index that actually has questions
    var startLevel = 0;
    for (var i = 0; i < levels.length; i++) {
      if (allQuestions.some(function(q) { return q.level === levels[i].num; })) {
        startLevel = i;
        break;
      }
    }

    state.confirmedLevel = startLevel;
    state.displayLevel = startLevel;
    state.phase = 'calibrate';
    state.questionsAsked = [];
    state.usedQuestionIndices = [];
    state.totalAsked = 0;
    state.levelStats = {};
    state.exploreTarget = null;
    state.needlePos = 50;
    state.confirmAsked = 0;
    state.calibrateAsked = 0;
    state.calibrateCorrect = 0;
    state.currentQIdx = null;
    state.pendingChoice = null;

    setNeedle(50);
    updateCompass();
    setStatus('Let\'s start with a couple of warm-up questions.', 'info');

    // Calibration: ask questions at ENGINE_CONFIG.calibrateLevel (L2)
    // But only if that level has questions; else skip straight to assess
    var calLevelNum = levels[ENGINE_CONFIG.calibrateLevel] && levels[ENGINE_CONFIG.calibrateLevel].num;
    var hasCalibrationQs = calLevelNum && allQuestions.some(function(q) { return q.level === calLevelNum; });
    if (!hasCalibrationQs || ENGINE_CONFIG.calibrateLevel >= levels.length) {
      state.phase = 'assess';
      setStatus('');
    }
    askNext();
  };

  window.resetQuiz = function() {
    document.getElementById('screen-result').classList.add('hidden');
    document.getElementById('screen-result').innerHTML = '';
    document.getElementById('screen-start').classList.remove('hidden');
    document.getElementById('screen-start').style.animation = 'none';
    void document.getElementById('screen-start').offsetWidth;
    document.getElementById('screen-start').style.animation = '';
    document.getElementById('screen-start').classList.add('fade-up');
    document.getElementById('question-area').innerHTML = '';
    document.getElementById('status-area').innerHTML = '';
    document.getElementById('progress-dots').innerHTML = '';
  };

  /* ═══════════════════════════════════════════
     UTILITIES
  ═══════════════════════════════════════════ */
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function truncate(str, n) {
    return str.length > n ? str.substring(0, n) + '…' : str;
  }

  function unique(arr) {
    var seen = {};
    return arr.filter(function(item) {
      if (seen[item]) return false;
      seen[item] = true;
      return true;
    });
  }

  function countLevelsTouched() {
    var lvls = {};
    state.questionsAsked.forEach(function(a) { lvls[a.level] = true; });
    return Object.keys(lvls).length;
  }

})();
</script>
