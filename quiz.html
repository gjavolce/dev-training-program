      {"level":5,"diff":3,"scenario":0,"q":"You identify that two teams have independently solved idempotent Kafka consumer processing in incompatible ways: Team A stores a processed-event ID in the same PostgreSQL transaction as the business write; Team B checks a Redis cache before processing and relies on cache TTL for deduplication. A new compliance requirement demands that duplicate event processing must never result in double financial postings, with an auditable guarantee. Which response best represents Expert-level architectural leadership?","opts": ["Mandate Team B's approach", "Ask each team to add compensating transactions so either approach can recover from duplicates", "Mandate Team A's approach platform-wide", "Treat this as an unsolved problem and recommend a third-party exactly-once framework", "Evaluate both approaches against the compliance requirement: transactional deduplication provides durable"], "ans": 4,"fb":"Expert-level leadership means mapping the technical differences to the compliance requirement precisely. Transactional deduplication (Team A) provides a durable, crash-safe guarantee because the idempotency record and business write commit atomically — this is auditable. Redis TTL (Team B) has a gap: cache eviction or a Redis restart before the TTL expires allows reprocessing. For financial postings under PCI-DSS/SOX, that gap is unacceptable. Mandating Team A without explaining the compliance rationale (A) is correct but incomplete as leadership. Compensating transactions (D) add complexity without addressing the root guarantee gap. A third-party framework (E) avoids the decision.","context":{}},
      {"level":5,"diff":3,"scenario":0,"q":"You discover that teams across the platform have adopted four different strategies for inter-service authentication: mutual TLS, JWT bearer tokens validated locally, JWT tokens validated via a central auth service on every request, and API keys stored in Kubernetes secrets. A security review is imminent. As the Expert responsible for driving standards, you need to decide how to handle this divergence. What is the most defensible approach?","opts": ["Accept all four approaches as long as each team can demonstrate they passed their last security review", "Standardise on JWT bearer tokens with local validation", "Mandate mTLS for all inter-service calls", "Ask the security team to pick a standard and enforce it through CI gates", "Conduct a threat model for each authentication pattern against your platform's actual attack surface"], "ans": 4,"fb":"Divergent authentication patterns require a threat-model-driven assessment, not a blanket mandate. mTLS (A) is strong but operationally expensive and may not be the right trade-off for all service-to-service calls on GKE where Workload Identity is available. Accepting all approaches if they passed prior reviews (B) ignores cumulative risk. Deferring to the security team (D) abdicates the Expert's role in translating security requirements into architectural decisions. Mandating stateless JWT (E) is reasonable but the right answer requires evaluating the actual attack surface. The Expert produces a risk-tiered decision with a migration plan, not a one-size-fits-all mandate.","context":{}},
      {"level":5,"diff":1,"scenario":4,"q":"You are tasked with defining the Solution Design curriculum for a multi-team engineering organisation. Which of the following best describes the first step?","opts": ["Run a series of ADR workshops and use attendance to gauge interest areas", "Ask each tech lead what topics their team wants to learn", "Copy the curriculum from a well-known tech company's engineering blog and adapt the titles", "Write a reading list of architecture books and distribute it to all engineers", "Assess the current level distribution across teams using the placement quiz, then map curriculum"], "ans": 4,"fb":"A curriculum should be grounded in evidence of where engineers currently are and what gaps exist. The placement quiz provides structured level data; mapping curriculum to those gaps ensures the investment targets real needs. A reading list (A) is an output, not a starting point. Tech lead input (C) is useful but subjective and does not replace data. Workshop attendance (D) measures engagement, not skill gaps. Copying an external curriculum (E) ignores your platform's specific technology and compliance context.","context":{}},
      {"level":5,"diff":1,"scenario":4,"q":"When designing a learning module on 'Designing multi-service interactions' for Level 2 engineers, which format is most likely to build durable applied judgment rather than surface familiarity?","opts": ["A quiz on REST vs Kafka trade-offs with multiple-choice questions", "A structured exercise where engineers design a real feature from a simplified version of the", "A written case study where engineers read about a design decision another team made", "A recorded talk by an external speaker on microservice patterns", "A 45-minute lecture covering the theory of synchronous vs asynchronous communication"], "ans": 1,"fb":"Durable judgment is built through practice with feedback, not passive exposure. A structured design exercise on a realistic platform scenario — followed by defence and critique — mirrors how engineers actually make decisions and reveals gaps that lectures and quizzes cannot. Lectures (A) and talks (E) build awareness but not application skill. Case studies (B) are useful but passive. MCQ quizzes (D) assess recall, not judgment. The Expert's role in curriculum design is choosing formats that match the competency being developed.","context":{}},
      {"level":5,"diff":2,"scenario":4,"q":"You notice that after three months of running design workshops, engineers can articulate trade-offs confidently in workshop settings but still produce weak ADRs in their actual PRs. What does this tell you about the curriculum design, and what should you change?","opts": ["There is a transfer gap: the learning context", "The curriculum is working", "Add a separate ADR-writing module at the end of the curriculum to address the gap", "The ADR template is too complex", "The engineers are not engaged enough"], "ans": 0,"fb":"When performance in training does not transfer to work, the curriculum has a context gap. Engineers learn in an artificial setting and the skills do not activate in the real setting. The fix is to embed learning in real work: review actual ADRs in PRs, pair engineers with a more senior reviewer on their next real design decision, or run critique sessions on ADRs they wrote for live features. Making workshops mandatory (A) increases dose without fixing the gap. Adding a separate module (E) still separates learning from application. Simplifying the template (D) addresses form, not skill. Claiming it will come (B) ignores the evidence.","context":{}},
      {"level":5,"diff":2,"scenario":4,"q":"You are designing the Level 3 curriculum module on sagas and compensation patterns. Two engineers on your review panel disagree: one argues engineers should learn orchestration-based sagas first because they are easier to reason about; the other argues choreography-based sagas should come first because the platform uses them more. How do you resolve this?","opts": ["Survey the team and teach whichever pattern the majority prefer", "Teach orchestration first", "Teach choreography first", "Defer to the more senior engineer on the panel", "Design the module to start with the problem being solved"], "ans": 4,"fb":"The sequencing debate is a distraction from the real question: what mental model do engineers need first? Starting with the problem — what goes wrong in distributed transactions, what compensation means — gives engineers the 'why' before the 'how'. Presenting both patterns in contrast against a real scenario lets them understand trade-offs rather than memorising one approach. Deferring to seniority (A) or external references (B) treats the curriculum as a political or citation problem rather than a pedagogical one. Survey-driven curriculum (D) conflates preference with learning effectiveness.","context":{}},
      {"level":5,"diff":2,"scenario":4,"q":"You are asked to decide whether to include a module on 'Designing for PCI-DSS compliance' in the Level 3 Solution Design curriculum, or to leave compliance topics to a separate programme run by the security team. What is the Expert's reasoning?","opts": ["Include compliance only for engineers working in the payments team", "Leave it to the security team", "Include a design-focused module that covers how compliance shapes specific design decisions such as audit event", "Include a full compliance certification module so engineers understand all PCI-DSS requirements", "Add compliance as an optional reading list item so engineers can self-study if interested"], "ans": 2,"fb":"PCI-DSS compliance profoundly shapes design decisions on a BaaS platform — audit schemas, tenant data isolation, retention — and engineers need to understand those design implications to do Level 3 work. The Expert's curriculum decision is to teach compliance as a design constraint, not as a legal checklist, and to coordinate with the security team to avoid redundancy. Leaving it out entirely (A) creates engineers who make non-compliant design choices. A full certification module (B) is out of scope for a design curriculum. Optional reading (D) does not build reliable competency. Restricting it to payments (E) ignores cross-cutting concerns on a multi-tenant BaaS platform.","context":{}},
      {"level":5,"diff":3,"scenario":4,"q":"Six months after launching the Solution Design curriculum, quiz placement data shows engineers are advancing from Level 2 to Level 3 at roughly the expected rate, but almost none are reaching Level 4. The Level 3 modules have high satisfaction scores. What is the most likely explanation and what should you investigate first?","opts": ["The Level 3 satisfaction scores indicate the content is too easy", "The placement quiz is miscalibrated at the Level 3 and Level 4 boundary", "Add more Level 3 modules to give engineers longer at that level before attempting Level 4", "Level 4 is genuinely very hard and the plateau is expected", "Investigate whether the Level 3 curriculum covers the competencies that actually gate Level 4"], "ans": 4,"fb":"High satisfaction at Level 3 with a plateau at Level 4 is a classic sign that the curriculum is teaching the content of Level 3 but not developing the behaviours needed for Level 4. Level 4 competencies — leading cross-team design sessions, identifying systemic risk, proposing consolidation — require opportunities to practise in real work; they cannot be developed in a classroom alone. The Expert investigates whether those opportunities exist and whether the Level 3 curriculum bridges to them. Quiz miscalibration (C) is worth checking but is a secondary hypothesis. Adding more Level 3 content (E) deepens where engineers already are rather than bridging the gap. Treating the plateau as expected (A) dismisses evidence without investigation.","context":{}},
      {"level":5,"diff":3,"scenario":4,"q":"You have built a Solution Design curriculum and run it for a year. A VP of Engineering asks you to demonstrate its ROI. You have placement quiz data, workshop attendance records, and satisfaction scores. Which approach best demonstrates meaningful impact?","opts": ["Show the average satisfaction score across all modules (4.3 out of 5.0) and the number of engineers who completed the programme", "Show a graph of placement level distribution before and after the programme, correlated with a reduction in architecture-related incidents and", "Ask engineers to self-report whether the curriculum improved their design confidence and present the results", "Count the number of ADRs written by engineers who attended the curriculum versus those who did not", "Show that the curriculum cost less per engineer than comparable external training providers"], "ans": 1,"fb":"ROI for a skills programme requires connecting learning outcomes to business outcomes. Level distribution movement from placement data is a leading indicator; reduced architecture-related incidents and rework from post-mortems are lagging indicators that connect skill improvement to real impact. Satisfaction scores (A) measure engagement, not learning or impact. ADR count (C) measures activity, not quality. Self-reported confidence (D) is subjective and susceptible to the Dunning-Kruger effect. Cost comparison (E) measures efficiency, not value. The Expert frames impact in terms the VP cares about: the quality of engineering decisions and their downstream effects.","context":{}},
      {"level":6,"diff":1,"scenario":2,"q":"A PCI-DSS auditor asks your team to produce a data flow diagram showing how cardholder data moves through the platform. Which artifact best satisfies this requirement?","opts": ["A Kafka topic map showing all producers and consumers", "An OpenAPI specification for each service that handles payment data", "A system-level data flow diagram annotated with trust boundaries", "A sequence diagram showing every internal API call between microservices", "A network topology diagram showing GKE pod-to-pod communication"], "ans": 2,"fb":"PCI-DSS Requirement 1 mandates network diagrams and data flow diagrams that show all cardholder data flows, including trust boundaries and controls at each boundary. An annotated system-level DFD with encryption status and storage classification directly addresses this. Sequence diagrams are too granular and implementation-focused. OpenAPI specs describe interfaces, not data movement. Network topology and Kafka maps are partial views that miss the end-to-end cardholder data scope auditors require.","context":{"PCI-DSS Req 1.2.4":"Maintain accurate network diagrams that show all connections to cardholder data environment","PCI-DSS Req 1.2.1":"Document all services, protocols, and ports including business justification"}},
      {"level":6,"diff":1,"scenario":2,"q":"During a SOX audit, the auditor asks how your platform ensures that no single engineer can both approve and deploy a change to a financial calculation service. Which design control directly addresses this segregation-of-duties requirement?","opts": ["Requiring separate individuals to hold the 'approve PR' and 'trigger production deployment' roles", "Requiring all financial service changes to include an ADR signed off by an architect", "Running automated test suites on every PR to validate financial calculation correctness", "Enforcing a minimum PR approval count of two reviewers in GitHub branch protection rules", "Storing all deployment audit logs in Cloud Logging with a 7-year retention policy"], "ans": 0,"fb":"Segregation of duties (SOD) for SOX requires that approval and execution of a control are performed by different individuals, enforced by a system control rather than convention. Separating the 'approve' and 'deploy' roles in RBAC, enforced by the pipeline, is the canonical SOD control. Two reviewers alone does not prevent the same person from approving and deploying if they hold deployment rights. Automated tests, ADRs, and audit logs are good complementary controls but do not enforce SOD by themselves.","context":{"SOX Section 404":"Management must assess internal controls over financial reporting","SOD principle":"No single individual should control all phases of a transaction"}},
      {"level":6,"diff":2,"scenario":2,"q":"A regulator requests evidence that your multi-tenant platform correctly isolates one tenant's financial data from another in the event of a code defect. You have row-level security (RLS) in PostgreSQL and tenant context propagated via a Spring interceptor. What is the most compelling evidence package to produce?","opts": ["A penetration test report from an accredited third party demonstrating failed cross-tenant data access attempts", "Database query logs showing that all queries include a tenant_id predicate", "An architecture diagram showing the RLS layer between the application and the database", "The OpenAPI specifications for all tenant-scoped endpoints, annotated with the tenant ID parameter", "A description of the Spring interceptor code that sets the tenant context on every request"], "ans": 0,"fb":"Regulators require evidence that controls are effective, not just that they exist. A penetration test from an accredited party provides independent validation of the isolation claim. Combined with RLS policy definitions (the control design) and integration tests (continuous verification), this constitutes a defence-in-depth evidence package. OpenAPI specs and architecture diagrams describe intent, not effectiveness. Query logs are incomplete without proof they are exhaustive. Spring interceptor code shows one layer but not the database-level enforcement that prevents bypassed application code from leaking data.","context":{"Control design vs. operating effectiveness":"Auditors assess both whether a control is designed correctly and whether it actually operates","Defence in depth":"Multiple independent controls are more credible than a single mechanism"}},
      {"level":6,"diff":2,"scenario":2,"q":"Your platform processes payment events via Kafka. An auditor asks: what happens to a payment event if the consumer crashes after committing the Kafka offset but before persisting the database record? How should you document this failure mode for a regulatory response?","opts": ["State that Kafka's at-least-once delivery guarantees the message will not be lost", "State that the platform uses transactions, so either both the offset commit and the database write succeed or neither does", "Describe the Kafka consumer group rebalancing mechanism and how it assigns partitions to healthy consumers", "Acknowledge the at-most-once loss window, document the compensating control", "State that Cloud SQL's ACID guarantees prevent data loss once a record is written"], "ans": 3,"fb":"This is the classic at-most-once loss scenario: offset committed, application crashed, message not persisted. The honest and correct regulatory response acknowledges the gap exists, then documents the compensating controls that bound and detect it. Idempotency keys and reconciliation jobs are the standard mitigation pair. Quantifying the maximum exposure window (commit interval) shows the risk is understood and bounded. Option A is wrong — at-least-once means the broker will re-deliver uncommitted offsets, not committed ones. Option C is irrelevant to the Kafka commit/DB write ordering problem. Option D describes recovery mechanics, not the failure mode. Option E describes a 2-phase commit that the question explicitly rules out by the scenario.","context":{"Commit interval":"If offset is committed before DB write, a crash in between loses the event","Reconciliation":"A batch job that compares expected sequence against persisted records can detect gaps"}},
      {"level":6,"diff":2,"scenario":2,"q":"A PCI-DSS QSA asks you to demonstrate how your system detects and alerts on anomalous access to cardholder data — for example, an internal service suddenly querying 10x more records than its baseline. Which design best satisfies this requirement?","opts": ["Implement application-level logging that records every query a service executes, stored in the service's own database", "A combination of Cloud SQL data access audit logs ingested into a SIEM, with anomaly detection rules that alert when per-service query", "Enable Cloud SQL audit logs and store them in Cloud Logging with a long retention policy", "Require all engineers to review Cloud SQL audit logs weekly and sign off that no anomalies were found", "Configure Cloud Monitoring alerts on total Cloud SQL connection count spikes"], "ans": 1,"fb":"PCI-DSS Requirement 10 requires automated log review and alerting on anomalies — manual weekly review does not satisfy automated detection. A SIEM with anomaly detection rules on per-service access volume directly meets the spirit and letter of the requirement. Storing logs without alerting satisfies retention but not detection. Total connection count is too coarse a signal to detect per-service data over-access. Application-level logs in the service's own database create a conflict of interest and are not independent audit evidence. The SIEM approach provides independent evidence and automated detection.","context":{"PCI-DSS Req 10.7":"Detect and alert on failures of critical security controls","PCI-DSS Req 10.6":"Review logs and security events to identify anomalies"}},
      {"level":6,"diff":3,"scenario":2,"q":"During preparation for a regulatory examination, counsel asks you to produce a written response explaining how the system handles a scenario where a Kafka consumer processes a payment event, the downstream bank rejects the payment, but the rejection message is lost before the platform records it. The regulator's concern is undetected financial exposure. What is the architecturally correct response?","opts": ["Explain that Kafka's durable log means the rejection message can always be replayed from the broker", "Describe the end-to-end idempotency design: the payment is held in a PENDING state", "Describe the retry policy on the Kafka consumer and the exponential backoff configuration", "Explain that the platform's at-least-once Kafka delivery guarantees the rejection will eventually arrive", "State that TLS encryption in transit prevents messages from being lost between the bank and the platform"], "ans": 1,"fb":"The failure mode here is that the external bank's rejection response is lost before the platform receives or persists it — this is outside Kafka's delivery guarantees, which only apply to the internal broker. The correct architectural response is a reconciliation loop against the authoritative external source (the bank's status API), combined with a PENDING state that forces explicit resolution. Quantifying the SLA window bounds the maximum exposure period. Options A and B misapply Kafka guarantees to a channel external to the broker. TLS prevents eavesdropping but not message loss. Retry policy addresses internal consumer retries, not external response loss. A regulator will specifically probe whether the platform detects unprompted failures — reconciliation is the answer.","context":{"External channel reliability":"Kafka guarantees apply only within the broker; external HTTP responses are a separate reliability domain","PENDING state pattern":"Holds a transaction in an unresolved state until positive confirmation or timeout-triggered reconciliation"}},
      {"level":6,"diff":3,"scenario":2,"q":"Your engineering leadership is asked by a regulator to provide a formal written response to the question: 'How does your platform ensure that a change to a financial calculation cannot be deployed to production without a complete audit trail from code commit to live service?' You must write a response that is both technically accurate and audit-defensible. Which response is strongest?","opts": ["State that all production deployments are logged in Cloud Logging with timestamps and deployer identity", "Provide a control narrative describing the end-to-end chain: signed commits linked to a PR with required approvals", "Describe the Git branching strategy and explain that all changes go through pull requests", "Reference the company's change management policy document and state that all changes follow this policy", "Describe the automated test suite that runs on every PR and the code coverage thresholds required for merge"], "ans": 1,"fb":"An audit-defensible response must demonstrate a verifiable, tamper-resistant chain of custody from source code to production — not just describe process or point to a policy. The strongest response narrates the technical control chain (signed commits to approved PR to provenance attestation to signed image to admission control) with evidence retention and periodic control testing. This satisfies the auditor's need to see both control design and operating effectiveness. A branching strategy and policy document describe intent. Deployment logs provide partial evidence but not the full chain. Test coverage addresses quality, not integrity of the deployment chain. SLSA-based provenance is increasingly the standard regulators expect for software supply chain integrity.","context":{"SLSA":"Supply-chain Levels for Software Artifacts — a framework for attestation of build provenance","Control narrative":"A written description of who does what, when, and how evidence is retained — required for audit responses"}},
      {"level":6,"diff":1,"scenario":3,"q":"You are asked to lead a technical debt assessment across the platform. What is the correct first step before scoring or sequencing any remediation work?","opts": ["Establish a consistent taxonomy for classifying technical debt", "Run static analysis tools across all repositories and sort findings by severity", "Identify the three highest-traffic services and focus the assessment on those", "Interview senior engineers about which parts of the codebase they are most afraid to change", "Ask each team to estimate story points for rewriting their most painful services"], "ans": 0,"fb":"A structured assessment requires a shared language before any scoring or sequencing can be meaningful. Without a consistent taxonomy, teams will report debt in incomparable terms — one team's 'high' is another's 'medium', and architectural drift cannot be compared with test coverage gaps. Establishing a taxonomy first ensures the assessment produces a comparable, actionable dataset. Story point estimates and static analysis are useful inputs but cannot be compared across teams without a shared framework. Engineer interviews surface valuable signal but are anecdotal without structure. Focusing only on high-traffic services produces an incomplete picture and misses high-risk low-traffic paths such as compliance-critical flows.","context":{"Debt taxonomy":"Common categories: architecture, design, code, test, documentation, operational, dependency","Comparability":"Assessments that lack a shared scale cannot produce a defensible prioritisation"}},
      {"level":6,"diff":1,"scenario":3,"q":"When sequencing a technical debt remediation roadmap, which factor most strongly justifies placing a debt item early in the sequence — ahead of items with higher remediation cost?","opts": ["The debt item was introduced the longest time ago", "The debt item was raised by the most senior engineer on the team", "The debt item has the most comments in the codebase explaining its problems", "The debt item is a blocking dependency for multiple higher-priority improvements", "The debt item is in the service with the largest team headcount"], "ans": 3,"fb":"Sequencing a roadmap requires understanding dependency chains, not just individual item cost or age. A blocking dependency that gates multiple downstream improvements has a multiplier effect: its deferral delays not just its own resolution but everything that depends on it. This is the classic 'pebble in the stream' pattern — small foundational changes that unlock large subsequent value. Age, team size, seniority of the raiser, and comment volume are all weak signals with no necessary relationship to remediation sequencing logic.","context":{"Critical path":"The sequence of dependencies that determines the minimum project duration","Opportunity cost":"Deferring a blocking item delays all dependent improvements simultaneously"}},
      {"level":6,"diff":2,"scenario":3,"q":"You are producing a technical debt assessment for a platform that has accumulated significant schema coupling — multiple services share the same PostgreSQL schema and write directly to each other's tables. How should you represent this in the roadmap to make the business case for remediation?","opts": ["Describe the schema coupling technically and ask engineering managers to assess its priority", "List each shared table as a separate debt item with an estimated refactoring cost in developer-days", "Frame the debt as an incident risk multiplier: show historical incidents where schema coupling caused cascading", "Add the schema coupling to a backlog and flag it for consideration in the next planning cycle", "Recommend that all services be rewritten to use separate databases immediately"], "ans": 2,"fb":"To make a credible business case at authority level, technical debt must be expressed in terms leadership can act on: risk, cost, and expected value of remediation. Framing coupling as an incident risk multiplier — with historical evidence, blast radius modelling, and a cost comparison — converts an abstract technical concern into a decision with quantified stakes. Listing tables as individual items fragments the narrative and loses the systemic risk picture. Recommending immediate full rewrites lacks a phased approach and will not be funded. Delegating priority assessment to managers without a structured framing abdicates the authority responsibility. Backlog-and-defer is the pattern that created the debt in the first place.","context":{"Schema coupling blast radius":"A migration on a shared schema can break all services writing to it simultaneously","Cost of delay":"Debt that increases incident frequency has a compounding cost that can be quantified"}},
      {"level":6,"diff":2,"scenario":3,"q":"Your technical debt roadmap proposes decomposing a large monolithic Spring Boot service into smaller services over 18 months. Leadership asks how you will ensure the platform does not degrade during the transition. What sequencing principle should anchor the roadmap?","opts": ["Run the monolith and new services simultaneously indefinitely to reduce risk", "Freeze feature development on the monolith while the decomposition is in progress to avoid moving targets", "Extract the simplest services first to build team confidence before tackling core domains", "Extract the highest-traffic endpoints first to maximise early performance gains", "Sequence extractions so that each phase leaves the system in a fully operational, independently deployable state"], "ans": 4,"fb":"The strangler fig pattern with incremental cut-overs is the canonical approach to safe decomposition: each extraction leaves the system shippable, no phase produces a half-migrated state that blocks production. Feature flags allow parallel running with rollback, and parallel-run validation confirms correctness before traffic switches. Extracting high-traffic endpoints first optimises for performance but ignores correctness risk. Extracting simple services first is a reasonable heuristic but insufficient as a sequencing principle — it does not guarantee operational continuity. Freezing feature development for 18 months is commercially unacceptable. Running both indefinitely is not a transition strategy; it doubles operational complexity.","context":{"Strangler fig":"Incrementally replace components by routing traffic to new implementations while the old one still runs","Parallel run":"Both old and new implementations process the same requests; outputs are compared before cutover"}},
      {"level":6,"diff":2,"scenario":3,"q":"A technical debt assessment identifies that 40% of the platform's Kafka consumers lack idempotency guards, creating a risk of duplicate financial records during rebalancing. How should you scope and sequence the remediation in the roadmap?","opts": ["Triage consumers by financial impact: address consumers that write financial records first with idempotency keys and deduplication logic", "Ask each team owning a consumer to prioritise the fix in their own backlog", "Accept the risk as a known limitation and document it in the architecture decision record", "Schedule a single 2-week sprint to add idempotency keys to all consumers simultaneously", "Recommend switching to exactly-once Kafka semantics (EOS) as a platform-wide fix that avoids consumer-level changes"], "ans": 0,"fb":"Risk-based sequencing is the correct approach: financial record consumers carry the highest regulatory and financial exposure and must be remediated first. Gating each phase with integration tests that inject duplicate events confirms the control is working before moving on — this is the kind of evidence trail that supports both operational confidence and potential audit inquiries. A single sprint for all consumers creates a large parallel change risk with many untested interactions. Platform-wide EOS is a valid long-term goal but is a significant infrastructure change that does not address existing consumers quickly. Accepting the risk for financial data is not defensible under PCI-DSS/SOX. Delegating to individual team backlogs without a coordinated roadmap means the highest-risk items may never be addressed.","context":{"Idempotency key pattern":"Store the event ID; reject or ignore re-insertions of the same ID","EOS (exactly-once semantics)":"Kafka's transactional producer/consumer API — eliminates duplicates but requires infrastructure and code changes"}},
      {"level":6,"diff":3,"scenario":3,"q":"You present a technical debt roadmap to the CTO. The roadmap recommends 6 months of primarily debt remediation with limited new feature work. The CTO pushes back, arguing that the business cannot afford 6 months without feature delivery. How should you respond to maintain the integrity of the assessment while accommodating the business constraint?","opts": ["Propose an interleaved model: each sprint allocates a fixed percentage of capacity to debt remediation", "Reduce the roadmap to 3 months by cutting the lower-priority debt items and accepting the residual risk", "Escalate the disagreement to the board, framing it as a risk management decision", "Propose that the debt roadmap is handed to a separate 'platform team' so the product teams can continue feature work uninterrupted", "Agree to defer all debt work until after the next major release to avoid conflict with the CTO"], "ans": 0,"fb":"The authority-level skill here is bridging technical integrity with business reality. An interleaved model with a fixed capacity allocation is the canonical resolution: it does not abandon the debt work (which would leave the risk unaddressed) but makes it compatible with continued feature delivery. Showing how reduced debt improves future velocity reframes remediation as investment, not cost — which is the persuasive framing for a CTO. Cutting items to fit a timeline ignores the risk rationale that justified their inclusion. Deferring all debt work perpetuates the cycle that created the problem. Escalating to the board is disproportionate for this decision. A separate platform team can work for some categories of debt but is not a universal answer and often creates coordination overhead that slows both tracks.","context":{"Debt remediation capacity model":"A sustained 20-30% allocation compounds into significant debt reduction over quarters without blocking features","Velocity impact of debt":"Studies consistently show that unaddressed architectural debt reduces feature delivery speed over time"}},
      {"level":6,"diff":3,"scenario":3,"q":"You are finalising a structured technical debt assessment for the platform. The document will be reviewed by engineering leadership, product leadership, and the board's risk committee. Which structure makes the document most effective across all three audiences?","opts": ["Separate documents for each audience with no shared structure, written independently", "An executive summary with risk and cost framing, a prioritised roadmap with business justification for each phase, and a technical", "A slide deck with one slide per debt item, sorted by team ownership", "A spreadsheet with debt items scored on a 1-5 scale for severity, effort, and risk, shared with all audiences", "A single detailed technical appendix with code examples and architectural diagrams, presented in full to all audiences"], "ans": 1,"fb":"A well-structured assessment for a mixed audience requires layered communication: the executive summary speaks to risk and investment in terms the board's risk committee and product leadership can act on; the prioritised roadmap with business justification bridges technical and product leadership; the technical appendix gives engineering leadership the depth to challenge and validate the analysis. Cross-references allow any reader to drill into detail without wading through it. A single technical document is inaccessible to non-engineers. A per-item slide deck fragments the systemic narrative. A spreadsheet conveys scores but not reasoning. Separate independent documents create inconsistency and prevent cross-audience alignment, which is critical when seeking board-level approval for remediation investment.","context":{"Layered documentation":"Executive summary then decision-maker narrative then technical evidence — each layer self-contained but linked","Risk committee framing":"Boards respond to quantified risk, not technical descriptions; frame debt as likelihood times impact"}},
      {"level":1,"diff":1,"scenario":0,"q":"An OpenAPI spec marks a query parameter as required. Your Spring Boot controller receives a request without it. What HTTP status should the API return?","opts": ["404 Not Found", "422 Unprocessable Entity", "400 Bad Request", "200 with a default value applied", "500 Internal Server Error"], "ans": 2,"fb":"A missing required parameter is a client error — the request is malformed. 400 Bad Request is the correct response. 422 is for semantically invalid payloads that pass structural validation. 404 implies the resource doesn't exist, which is unrelated. Never swallow it as 200.","context":{"HTTP spec":"400 = client sent a bad request","422":"Used when structure is valid but content is semantically wrong"}},
      {"level":1,"diff":1,"scenario":0,"q":"You're integrating against an external API. The OpenAPI spec shows a field as nullable. What does that mean for your integration code?","opts": ["The field has a default value when null", "The field may be present with a null value and", "The field is optional in requests only", "The field is deprecated and will be removed", "The field will never appear in responses"], "ans": 1,"fb":"Nullable means the field can appear in the response with an explicit null value. Your code must handle both the absent case and the null case. Treating nullable as 'always present' or 'has a default' leads to NullPointerExceptions in production.","context":{"OpenAPI nullable":"nullable: true means the field value may be null, not that the field is absent"}},
      {"level":1,"diff":2,"scenario":0,"q":"The OpenAPI spec for a partner API uses `oneOf` with a discriminator field. Your code receives a type it doesn't recognise. What is the safest approach?","opts": ["Map it to the closest known type", "Throw an exception immediately", "Log and discard the message silently", "Treat it as an unknown variant and handle", "Return an error to the caller"], "ans": 3,"fb":"APIs evolve and new discriminator values are added. Crashing on unknown variants breaks forward compatibility. The safest approach is to handle unknown variants gracefully — log them, skip or store raw — so your service doesn't break when the API adds new types.","context":{"Postel's law":"Be conservative in what you send, liberal in what you accept"}},
      {"level":1,"diff":2,"scenario":0,"q":"A partner's API returns an optional `metadata` object that sometimes contains a `correlationId` field and sometimes doesn't. How should you model this in your integration?","opts": ["Model metadata as a required field with correlationId always present", "Throw a deserialization error when correlationId is missing", "Model metadata as optional and correlationId as optional within it", "Require the field and fail if absent", "Hard-code a default correlationId value"], "ans": 2,"fb":"Both the wrapper object and the field inside it are optional, so both must be modelled as such. Requiring either will cause failures when the partner omits them, which is valid per their contract.","context":{}},
      {"level":1,"diff":3,"scenario":0,"q":"An external API spec says a field is `deprecated: true` but still returns it in responses. Your team's code depends on it. What is the right action?","opts": ["Keep using it — deprecated doesn't mean removed", "Ask the partner to un-deprecate it", "Raise a ticket to migrate off the deprecated field and track it", "Duplicate the field under a new name in your own model", "Remove the dependency immediately"], "ans": 2,"fb":"Deprecated means removal is planned. Ignoring it creates future breakage risk. The right response is to acknowledge the dependency, plan migration to the replacement field, and track it — not to ignore it or act with false urgency.","context":{"Risk":"Deprecated fields can be removed without a major version bump in some APIs"}},
      {"level":1,"diff":3,"scenario":0,"q":"You're integrating with an API that uses HTTP Basic Auth per the OpenAPI spec, but your team's standard is OAuth2 bearer tokens. What should you do?","opts": ["Use OAuth2 regardless of what the spec says", "Raise the security concern with your tech lead before", "Implement Basic Auth as specified", "Refuse to integrate until they support OAuth2", "Store the Basic Auth credentials in the codebase"], "ans": 1,"fb":"Implementing Basic Auth without raising the concern silently introduces a security risk. The right move is to flag it — your tech lead or security team may have a wrapper, vault integration, or escalation path. Never store credentials in code.","context":{"PCI-DSS":"Credential storage in source code is a compliance violation"}},
      {"level":1,"diff":1,"scenario":1,"q":"Your team is in a design meeting. The lead engineer says 'we're choosing sync HTTP here because we need the response immediately.' What trade-off is being made?","opts": ["Speed vs correctness", "Availability coupling vs latency", "Cost vs reliability", "Security vs performance", "Simplicity vs scalability"], "ans": 1,"fb":"Synchronous HTTP couples the caller's availability to the callee's. If the downstream is slow or down, the caller is affected. This is the core trade-off being accepted: immediate response at the cost of tighter availability coupling.","context":{}},
      {"level":1,"diff":1,"scenario":1,"q":"In a design review, a senior engineer says 'this is an eventually consistent design.' What does that mean for users of the system?","opts": ["Data is always up-to-date on every read", "Consistency is guaranteed within a single service only", "After a write, reads may temporarily return stale data", "Writes are lost if a node fails", "The system is unavailable during updates"], "ans": 2,"fb":"Eventually consistent means the system will converge to the correct state, but not necessarily immediately. Reads shortly after a write may return stale data. This is a deliberate trade-off, typically for higher availability or lower latency.","context":{}},
      {"level":1,"diff":2,"scenario":1,"q":"A design discussion proposes using a shared database between two services to avoid API calls. What is the main concern with this approach?","opts": ["It will be slower than REST calls", "Shared databases are not supported on Cloud SQL", "It will cause data duplication", "It creates tight coupling and makes independent", "It prevents horizontal scaling"], "ans": 3,"fb":"Sharing a database couples two services to the same schema, meaning a schema change in one service requires coordinated deployment of both. This breaks independent deployability — a key property of service-oriented design.","context":{}},
      {"level":1,"diff":2,"scenario":1,"q":"The team is debating whether a new feature needs a Kafka topic or a new REST endpoint. The feature sends a notification after a payment succeeds. Which factor most suggests Kafka?","opts": ["Multiple downstream systems need to react to the payment event", "The notification must be sent immediately", "The payment service has a REST API already", "The notification service is in the same GKE namespace", "The notification contains sensitive PCI data"], "ans": 0,"fb":"When multiple consumers need to react to an event independently, a pub/sub model like Kafka is a natural fit. It decouples producers from consumers and avoids the payment service needing to know about every notification target.","context":{}},
      {"level":1,"diff":3,"scenario":1,"q":"A senior engineer proposes a design. You disagree with one of the trade-offs but aren't sure if you've missed something. What is the most appropriate response?","opts": ["Reject the proposal and suggest your own", "Stay silent — the senior engineer knows best", "Escalate to the engineering manager", "Implement your preferred approach without raising it", "Ask a clarifying question about the trade-off you're"], "ans": 4,"fb":"Asking clarifying questions is how good design decisions get made. Senior engineers can miss things, and asking 'have we considered X?' surfaces assumptions. Staying silent or going rogue both lead to worse outcomes.","context":{}},
      {"level":1,"diff":3,"scenario":1,"q":"A design doc you're reviewing says 'we'll handle retries at the application layer.' What risk should you raise?","opts": ["Application retries are too slow compared to infrastructure retries", "Application-layer retries are always wrong", "Retries may cause duplicate processing if the downstream isn't idempotent", "The design should use circuit breakers instead", "Retries will exhaust the connection pool"], "ans": 2,"fb":"Retries without idempotency guarantees on the downstream can result in duplicate side effects — double payments, duplicate records. This is a critical correctness risk that must be explicitly addressed in the design.","context":{}},
      {"level":1,"diff":1,"scenario":2,"q":"A new business requirement adds a field to an existing entity. The entity is stored in a database and exposed via a REST API. What is the minimal set of changes needed?","opts": ["New Kafka topic only", "Schema migration only", "New API endpoint only", "Schema migration, domain", "API response update only"], "ans": 3,"fb":"Adding a field requires the database schema to store it, the domain model to represent it, and the API to expose it. Missing any layer means the data is either not stored or not accessible.","context":{}},
      {"level":1,"diff":1,"scenario":2,"q":"A product manager asks to 'add a button to retry a failed payment.' What change does this most likely require in the backend?","opts": ["A change to the payment gateway configuration", "A new REST endpoint that triggers a payment retry", "A schema migration to add a retry count column", "A new Kafka topic", "A new microservice for retry logic"], "ans": 1,"fb":"A UI action that triggers backend behaviour typically maps to a new or existing REST endpoint. While a schema change may also be needed (e.g., to track retry count), the direct backend change is exposing the retry operation via an endpoint.","context":{}},
      {"level":1,"diff":2,"scenario":2,"q":"A requirement is to 'notify all active tenants when a platform feature is enabled.' What design approach best fits this?","opts": ["A database flag each tenant reads on next login", "A batch job that queries all tenants and calls each one synchronously", "A webhook called sequentially for each tenant", "A Kafka event published once that each tenant's service consumes", "A REST endpoint that each tenant polls"], "ans": 3,"fb":"Publishing a single event to Kafka lets each tenant's consumer react independently and asynchronously. Sequential HTTP calls or batch jobs create availability coupling and scale poorly with tenant count.","context":{}},
      {"level":1,"diff":2,"scenario":2,"q":"A feature request says 'let users filter payments by status.' What backend change does this primarily require?","opts": ["A schema migration to add a status table", "A new Kafka consumer", "A new microservice", "A query parameter on the existing payments endpoint", "A new event type"], "ans": 3,"fb":"Filtering is a read concern that typically maps to a query parameter on an existing GET endpoint. The status field likely already exists; the change is exposing it as a filter. Adding a microservice or new table for this would be over-engineering.","context":{}},
      {"level":1,"diff":3,"scenario":2,"q":"A requirement says 'when a subscription is cancelled, immediately revoke API access for that tenant.' What design concern does this raise?","opts": ["Revocation should be done by a nightly batch job", "Access revocation is an infrastructure concern, not a design concern", "The subscription service shouldn't know about API access", "Revocation should be done via a Kafka event to avoid coupling", "The revocation must be synchronous to avoid a window where access is still valid"], "ans": 4,"fb":"Security-critical operations like access revocation often need to be synchronous to eliminate the window between cancellation and revocation. Async designs can leave a gap. This is a correctness and compliance concern that must be explicitly designed for.","context":{"Security":"Async revocation creates a window of unauthorised access"}},
      {"level":1,"diff":3,"scenario":2,"q":"The team needs to add a 'soft delete' feature so records are hidden from users but retained for compliance. This requires changes across multiple layers. What is the highest-risk omission?","opts": ["Forgetting to filter soft-deleted records in", "Not writing a migration rollback script", "Forgetting to update the UI", "Not adding the feature to the OpenAPI spec", "Not indexing the deleted_at column"], "ans": 0,"fb":"The most dangerous omission is any query that doesn't filter out soft-deleted records. These records will leak into API responses, reports, or aggregations. Every read path must be updated — missing even one creates a data correctness bug.","context":{}},
      {"level":1,"diff":1,"scenario":3,"q":"An Architecture Decision Record (ADR) has a section called 'Context.' What should this section contain?","opts": ["The implementation timeline", "The list of people who approved it", "Links to related tickets", "The chosen solution", "The problem being solved and the"], "ans": 4,"fb":"The Context section explains why the decision was needed — the problem, constraints, and pressures that made a choice necessary. Without it, future readers can't understand why the decision was made or when it should be revisited.","context":{}},
      {"level":1,"diff":1,"scenario":3,"q":"An ADR has the status 'Superseded.' What does this mean?","opts": ["The decision was never implemented", "A newer ADR has replaced this one", "The decision is still under review", "The decision was rejected", "The ADR was written by someone who left the team"], "ans": 1,"fb":"Superseded means a later ADR changed the direction. The original ADR is kept for historical context — it explains what was decided and why at the time. Deleting old ADRs loses the reasoning history.","context":{}},
      {"level":1,"diff":2,"scenario":3,"q":"You find an ADR that was written two years ago recommending a specific caching strategy. The system has since scaled 10x. What is the correct interpretation?","opts": ["The ADR is wrong and should be deleted", "ADRs don't apply to performance decisions", "The ADR documents what was decided at the time", "The caching strategy is correct", "The decision should still be followed exactly"], "ans": 2,"fb":"ADRs capture decisions in context. A 10x scale change is exactly the kind of new context that should trigger a review. The ADR isn't wrong — it was right given the original constraints. Now you write a new ADR that supersedes it with updated reasoning.","context":{}},
      {"level":1,"diff":2,"scenario":3,"q":"An ADR you're reading doesn't list any alternatives considered. Why is this a problem?","opts": ["Alternatives are only needed for infrastructure decisions", "It suggests the decision wasn't approved", "It makes the ADR too short", "Without alternatives, future readers can't understand what", "ADRs must list at least five alternatives to be valid"], "ans": 3,"fb":"The value of an ADR is in the reasoning, not just the conclusion. Without alternatives, future engineers don't know what was rejected and why — which means they can't tell whether circumstances have changed enough to revisit the choice.","context":{}},
      {"level":1,"diff":3,"scenario":3,"q":"Your team is about to make a significant change to how multi-tenancy is implemented. A junior engineer asks if you need an ADR. How do you decide?","opts": ["Only write one if the tech lead requests it", "Only write an ADR if the change affects the database", "Write one if the decision is significant, affects multiple", "ADRs are only needed for new services", "ADRs are only required by architects"], "ans": 2,"fb":"Multi-tenancy implementation affects security, data isolation, and every team that builds on the platform. A change to it is significant and hard to reverse — exactly the kind of decision that benefits from an ADR so future engineers understand the reasoning.","context":{}},
      {"level":1,"diff":3,"scenario":3,"q":"You read an ADR that says 'we decided to use Kafka for all inter-service communication.' Six months later your team needs a simple synchronous request-response call. What should you do?","opts": ["Use HTTP and say nothing", "Delete the old ADR and rewrite it", "Use Kafka anyway to comply with the ADR", "Ask the original ADR author for permission", "Use HTTP and write a new ADR documenting the"], "ans": 4,"fb":"ADRs are guidance, not immutable law. When context changes or an exception makes sense, the right move is to document it — write a new ADR explaining why this case is different. Silently diverging undermines the architecture record.","context":{}},
      {"level":1,"diff":1,"scenario":4,"q":"A button in the UI submits a payment form. The user clicks it twice quickly due to a slow response. What design property prevents a duplicate charge?","opts": ["Idempotency", "Rate limiting", "Authentication", "Caching", "Pagination"], "ans": 0,"fb":"Idempotency means the same operation can be applied multiple times without additional effect. A payment endpoint with idempotency keys will process the first request and ignore the duplicate, preventing double charges.","context":{}},
      {"level":1,"diff":1,"scenario":4,"q":"A bug report says 'the invoice total is sometimes wrong.' After investigation, the calculation logic is correct but the data feeding it isn't. This is best described as:","opts": ["A network timeout issue", "A missing index", "A performance bug", "A UI rendering bug", "A design problem"], "ans": 4,"fb":"When correct logic produces wrong results because the data feeding it is inconsistent, the root cause is a design problem — the system doesn't enforce the invariant at the right level. The fix is in the design, not in adding more calculation logic.","context":{}},
      {"level":1,"diff":2,"scenario":4,"q":"A service exposes a `GET /users/{id}` endpoint. A bug is reported: deleted users still appear in search results but not in direct lookups. This is most likely a design problem with:","opts": ["The pagination implementation", "The HTTP method choice", "The database index configuration", "Inconsistent soft-delete filtering", "The API authentication layer"], "ans": 3,"fb":"When direct lookup and search behave differently for the same data, it points to inconsistent filtering logic — the soft-delete filter is applied in one place but not the other. This is a design problem: the filtering rule isn't applied uniformly.","context":{}},
      {"level":1,"diff":2,"scenario":4,"q":"A feature works correctly in isolation but fails when two users trigger it simultaneously. The bug disappears under sequential load testing. What design issue does this point to?","opts": ["A missing retry mechanism", "A misconfigured load balancer", "A race condition or missing", "An incorrect HTTP status code", "A memory leak"], "ans": 2,"fb":"A bug that only appears under concurrent use and disappears under sequential testing is a classic race condition. The design doesn't account for concurrent access to shared state. The fix is at the design level — locks, optimistic concurrency, or idempotent writes.","context":{}},
      {"level":1,"diff":3,"scenario":4,"q":"A recurring bug keeps resurfacing in the same area of code despite being fixed multiple times. What does this suggest about the root cause?","opts": ["The test coverage is insufficient", "The code needs to be rewritten from scratch", "The engineers fixing it are not skilled enough", "Each fix addresses symptoms rather than the", "The bug is in a third-party library"], "ans": 3,"fb":"Recurring bugs in the same area usually signal a design problem that keeps creating the conditions for the bug to re-emerge. The correct response is to step back and understand why this area keeps breaking, then fix the structural cause.","context":{}},
      {"level":1,"diff":3,"scenario":4,"q":"A payment processing bug only affects tenants who have both a subscription and a pay-as-you-go account. What type of design problem is this most likely to indicate?","opts": ["Implicit assumptions about tenant account types", "A missing feature flag", "An API version mismatch", "A misconfigured Kafka consumer group", "A database connection pool exhaustion issue"], "ans": 0,"fb":"When a bug is triggered by a specific combination of state, it often means the model doesn't explicitly represent that combination as a valid case with its own rules. The design assumed tenants have one account type, and reality is more complex — that assumption needs to be made explicit.","context":{}},
      {"level":2,"diff":1,"scenario":0,"q":"You're designing a new endpoint to create a resource. Two teams disagree on whether it should be `POST /orders` or `PUT /orders/{id}`. What is the key distinction?","opts": ["POST is faster than PUT", "POST requires authentication", "POST creates server-assigned IDs", "They are equivalent — it's a style preference", "PUT is only for updates, never creation"], "ans": 2,"fb":"POST conventionally creates a resource with a server-assigned ID. PUT creates or replaces at a client-specified ID. For order creation where the server assigns the order ID, POST is correct. PUT is appropriate when the client controls the identifier.","context":{}},
      {"level":2,"diff":1,"scenario":0,"q":"A REST endpoint returns a list of payments. The response currently returns all records. What is the standard mechanism for handling large result sets?","opts": ["Filtering", "Compression", "Caching", "Pagination", "Streaming"], "ans": 3,"fb":"Pagination (cursor-based or offset-based) is the standard mechanism. Returning all records in a single response is unsafe at scale — it risks memory exhaustion, slow responses, and timeouts. Pagination gives callers control over page size.","context":{}},
      {"level":2,"diff":2,"scenario":0,"q":"Your API currently returns `200 OK` for both successful operations and business-rule rejections (e.g., 'insufficient balance'). Why is this a design problem?","opts": ["HTTP status codes are not meaningful in REST APIs", "It causes Kafka consumers to skip the message", "200 is only valid for GET requests", "Business errors should always return 500", "It prevents clients from distinguishing success from"], "ans": 4,"fb":"Overloading 200 for both success and failure forces clients to parse the response body to know if the operation succeeded. Using proper status codes (e.g., 422 for business rule violations) lets clients handle errors generically without business logic in the HTTP layer.","context":{}},
      {"level":2,"diff":2,"scenario":0,"q":"You're designing an API to expose payment transactions. A consumer needs to filter by date range and status. What is the correct approach?","opts": ["Require consumers to download all data and filter client-side", "Create separate endpoints per filter combination", "Accept filter criteria in the request body of a GET", "Use query parameters for optional filters on the existing GET endpoint", "Create a POST endpoint that accepts a filter object"], "ans": 3,"fb":"Query parameters are the idiomatic mechanism for optional filtering on GET endpoints. They're cacheable, bookmarkable, and self-documenting in OpenAPI specs. Separate endpoints per filter combination explode the API surface. Request bodies on GET are non-standard.","context":{}},
      {"level":2,"diff":3,"scenario":0,"q":"You need to add a bulk-delete operation to your API. A colleague suggests `DELETE /payments` with a request body listing IDs. What is the concern with this approach?","opts": ["Bulk deletes should always use POST", "Many HTTP clients, proxies, and caches drop or reject", "DELETE endpoints require admin authentication", "DELETE requests cannot have a body per HTTP spec", "The IDs should be path parameters instead"], "ans": 1,"fb":"While HTTP spec doesn't forbid DELETE with a body, many clients, proxies, and servers treat DELETE bodies as undefined behaviour and may strip them. A safer design is `POST /payments/bulk-delete` with a body, or `DELETE /payments?ids=1,2,3` for small sets.","context":{}},
      {"level":2,"diff":3,"scenario":0,"q":"Your team is designing a public API and needs to support partial updates. One engineer wants `PUT` everywhere; another wants `PATCH`. When does `PATCH` matter?","opts": ["PUT and PATCH behave identically in Spring Boot", "PATCH is only needed for large payloads", "PATCH matters when clients should only send fields they", "PATCH is required for compliance with REST standards", "PATCH is always safer than PUT"], "ans": 2,"fb":"PUT replaces the entire resource, so a client that sends a partial payload will overwrite omitted fields with nulls. PATCH allows partial updates where only provided fields are modified. For resources with many fields, PATCH prevents accidental data loss.","context":{}},
      {"level":2,"diff":1,"scenario":1,"q":"You're writing an ADR for a decision to adopt Kafka for async communication. What must the 'Decision' section contain?","opts": ["A clear statement of what was decided and why", "The implementation plan", "A list of stakeholders", "The names of engineers who will implement it", "A comparison table of all options"], "ans": 0,"fb":"The Decision section must state unambiguously what was chosen and the primary reason. Vague decisions like 'we will use async messaging where appropriate' are not actionable. Future readers should be able to understand the choice without reading the whole document.","context":{}},
      {"level":2,"diff":1,"scenario":1,"q":"An ADR lists three alternatives but the 'Consequences' section only describes benefits. What is missing?","opts": ["A rollback plan", "A link to the implementation PR", "Sign-off from the architecture team", "The downsides and trade-offs of the", "Cost estimates"], "ans": 3,"fb":"A complete Consequences section includes both the benefits and the trade-offs or costs of the decision. Listing only benefits makes the ADR look like advocacy, not analysis. Future engineers need to know what they're accepting along with the choice.","context":{}},
      {"level":2,"diff":2,"scenario":1,"q":"Your team adopted an ADR six months ago to use optimistic locking for concurrency control. Load has since grown 5x and you're seeing significant retry storms. How should you handle this?","opts": ["Write a new ADR that supersedes the original with updated context", "Ignore it — the ADR is still valid", "Update the existing ADR in place", "Quietly change to pessimistic locking without documentation", "Revert to the original implementation"], "ans": 0,"fb":"When circumstances change enough to invalidate a previous decision, the right action is to write a new ADR that references the original, explains what changed, and documents the new decision. Updating an ADR in place loses the history of what was decided and why at each point.","context":{}},
      {"level":2,"diff":2,"scenario":1,"q":"A colleague writes an ADR for a purely internal implementation detail that only affects one service. Should it be an ADR?","opts": ["Yes, but only if it's over 100 lines of code", "Only if the tech lead approves", "Yes — all decisions should be ADRs", "No — ADRs are for significant, cross-cutting, or", "Only if it involves a database change"], "ans": 3,"fb":"ADRs are most valuable for decisions that are significant, affect multiple teams or systems, or are hard to reverse. Internal implementation details that can be changed freely don't need the overhead of an ADR — over-documentation dilutes the value of real ADRs.","context":{}},
      {"level":2,"diff":3,"scenario":1,"q":"You're reviewing an ADR that recommends a complex event-driven architecture for a feature that could be built as a simple synchronous call. What is the key question to raise?","opts": ["Is the author experienced enough?", "Is there an ADR template we should be following?", "Will this require more engineers to implement?", "Does the complexity solve a real problem we have today", "Does the tech lead agree with it?"], "ans": 3,"fb":"Over-engineering is a real risk. The right challenge is: does the added complexity address a demonstrated need, or is it premature? An ADR should explain the current problem, not justify complexity for its own sake.","context":{}},
      {"level":2,"diff":3,"scenario":1,"q":"An ADR was written by an engineer who has since left the team. The decision is now causing friction, but the reasoning isn't clear from the document. What is the appropriate first step?","opts": ["Ask the engineering manager to overrule it", "Try to reconstruct the context from git history, tickets, or colleagues", "Ignore the ADR and do what makes sense now", "Delete the ADR", "Keep the ADR unchanged out of respect for the original author"], "ans": 1,"fb":"Before reversing a decision, understand why it was made. Git history, linked tickets, or colleagues who were present can recover context. Once you understand the original reasoning, you can write a new ADR with updated context — either confirming, modifying, or superseding the original.","context":{}},
      {"level":2,"diff":1,"scenario":2,"q":"Your API currently returns a `total` field in the payment summary. You need to rename it to `totalAmount`. What is the safest approach?","opts": ["Ask all consumers to update at the same time", "Rename it immediately in the next release", "Keep `total` and never rename it", "Add `totalAmount` and keep `total` as deprecated for a transition period", "Remove `total` and add `totalAmount` in the same release"], "ans": 3,"fb":"Removing a field immediately is a breaking change. The safe approach is to add the new field alongside the old one, mark the old one deprecated, give consumers time to migrate, and remove it in a later release after confirming no active usage.","context":{}},
      {"level":2,"diff":1,"scenario":2,"q":"A consumer reports that your API sometimes returns `amountCents` as an integer and sometimes as a string. What is the root cause?","opts": ["A database column type mismatch", "Inconsistent serialization in the service", "A Kafka serialization issue", "An OpenAPI spec version conflict", "The consumer is parsing it incorrectly"], "ans": 1,"fb":"Type inconsistency in API responses is a serialization problem — the service isn't enforcing a consistent type. This is a design gap: the contract (OpenAPI spec) and the implementation diverge. Strong typing in the response model prevents this.","context":{}},
      {"level":2,"diff":2,"scenario":2,"q":"You need to add a required field to an existing REST request body. Three external teams consume this endpoint. What is the migration approach?","opts": ["Add it as optional first, coordinate with consumers, then make it", "Add a default value so consumers don't need to change", "Create a new endpoint and deprecate the old one", "Add it as required and send a Slack message to the teams", "Make it required immediately"], "ans": 0,"fb":"Adding a required field to an existing endpoint is a breaking change. The safe path is to add it as optional initially, work with consumers to adopt it, then either enforce it via a versioned endpoint or coordinate a cutover. Unilateral breaking changes break production systems.","context":{}},
      {"level":2,"diff":2,"scenario":2,"q":"You discover an API endpoint returns 200 with an empty array when no records match a filter, but returns 404 when the resource ID in the path doesn't exist. Is this correct?","opts": ["Yes — 404 means the resource doesn't exist", "No — empty results should always return 404", "No — empty results should return 204", "Yes, but only if the OpenAPI spec documents it", "No — both should return 404 for consistency"], "ans": 0,"fb":"This is correct behaviour. 404 means the resource identified by the path doesn't exist. An empty result set for a valid resource (e.g., /users/123/payments with no payments) is a normal 200 with an empty array. Conflating these confuses clients about whether the parent resource exists.","context":{}},
      {"level":2,"diff":3,"scenario":2,"q":"A service exposes both a `GET /invoices/{id}` and a `GET /invoices` endpoint. The single-resource endpoint returns more fields than the list endpoint. Is this a design problem?","opts": ["No — only if the OpenAPI spec documents the difference", "Yes — it should be fixed by adding all fields to the list response", "Yes — all endpoints for the same resource must return identical fields", "No — list endpoints commonly return summary representations while detail endpoints", "Yes — it will confuse consumers"], "ans": 3,"fb":"This is a common and valid pattern. List endpoints return lightweight summaries to keep responses manageable; detail endpoints return full representations. What matters is that both are documented clearly in the OpenAPI spec so consumers know what to expect from each.","context":{}},
      {"level":2,"diff":3,"scenario":2,"q":"Your service has both `GET /reports` and `POST /reports/search`. The POST endpoint exists because the filter criteria are too complex for query parameters. What design risk does this dual pattern create?","opts": ["POST endpoints require authentication that GET endpoints don't", "It prevents load balancers from routing correctly", "POST /search endpoints are invalid REST", "Consumers may cache POST responses, causing stale data", "It creates confusion about which endpoint to use and why, risking"], "ans": 4,"fb":"Having two endpoints for the same resource with different interaction models creates confusion. Teams may implement the wrong one, duplicate logic emerges, and documentation becomes harder to maintain. If both must exist, the intent and guidance on when to use each must be explicit and documented.","context":{}},
      {"level":2,"diff":1,"scenario":3,"q":"A service manages both `Order` and `OrderLineItem` objects. Updates to line items always happen within the context of an order. What does this suggest about the aggregate design?","opts": ["Order and OrderLineItem should be separate aggregates", "They should be merged into a single table", "Order is the aggregate root and owns OrderLineItem", "Line items should be exposed via a separate service", "OrderLineItem should be the aggregate root"], "ans": 2,"fb":"When one entity only makes sense in the context of another, and operations on it are always scoped to the parent, the parent is the aggregate root. Order owns its line items — creating, updating, or removing line items is done through the Order aggregate.","context":{}},
      {"level":2,"diff":1,"scenario":3,"q":"Two services need to share `Customer` data. Service A owns it; Service B needs read access. What is the correct approach?","opts": ["Service B calls Service A's API to read customer data", "Give Service B direct read access to Service A's database", "Create a shared database that both services use", "Copy the customer table to Service B's database", "Both services read from a central cache"], "ans": 0,"fb":"The owning service exposes data through its API — that's the contract. Direct database access creates tight coupling between services. Service B should call Service A's API, accepting that this introduces a runtime dependency but preserving the ownership boundary.","context":{}},
      {"level":2,"diff":2,"scenario":3,"q":"A payment aggregate enforces that its total must equal the sum of its line items. A developer bypasses the aggregate and updates a line item directly in the database to fix a data issue. What is the risk?","opts": ["The migration will fail on next deploy", "Database performance will degrade", "The audit log will not be written", "The ORM cache will become stale", "The aggregate invariant is violated"], "ans": 4,"fb":"Aggregate roots exist to enforce invariants. Bypassing the aggregate root and writing directly to the database breaks those invariants without triggering the business rules that maintain consistency. The total field is now incorrect, and the system has no way to detect it.","context":{}},
      {"level":2,"diff":2,"scenario":3,"q":"Service A needs to update its own state and call Service B in the same operation. Both must succeed or both must fail. What design problem does this create?","opts": ["It requires a new Kafka topic", "It creates a distributed transaction problem", "It violates the single responsibility principle", "It is impossible to implement correctly", "It requires database-level locking across services"], "ans": 1,"fb":"There is no atomic commit across service boundaries. If Service A succeeds but Service B fails (or vice versa), you're in an inconsistent state. This is the distributed transaction problem. Solutions include sagas, outbox patterns, or accepting eventual consistency — each with different trade-offs.","context":{}},
      {"level":2,"diff":3,"scenario":3,"q":"Two services have drifted to represent `Account` differently — one includes billing address, the other doesn't. A new feature needs to join these views. What is the design risk?","opts": ["The services should be merged into one", "The feature will be slow due to the extra JOIN", "This is normal and the feature should pick whichever model is more convenient", "The billing address should always be duplicated for performance", "The divergence signals unclear ownership"], "ans": 4,"fb":"Model divergence signals ownership ambiguity. Before building a feature that depends on both models, the team needs to clarify which service owns the authoritative definition of `Account`. Building on top of the ambiguity bakes in the inconsistency further.","context":{}},
      {"level":2,"diff":3,"scenario":3,"q":"A domain model has a `Payment` entity with 40 fields. New business requirements keep adding fields. What design smell does this indicate?","opts": ["The fields should be moved to a configuration table", "The entity should use inheritance instead", "The entity is likely conflating multiple concepts or", "The entity needs to be split across microservices", "The database needs more indexes"], "ans": 2,"fb":"A large, growing entity often conflates multiple concepts. Fields related to billing, fraud, status, and metadata are all different concerns. Identifying and extracting value objects (e.g., `BillingDetails`, `PaymentStatus`) improves cohesion and makes the model more expressive.","context":{}},
      {"level":2,"diff":1,"scenario":4,"q":"In a PR review, a method returns `null` to indicate 'not found.' What design feedback should you give?","opts": ["Add a null check in the caller", "Convert the method to return a boolean", "Use an Optional or throw a domain-specific", "Return -1 instead of null", "It's fine — null is standard Java"], "ans": 2,"fb":"Returning null for 'not found' hides the possibility of absence from callers, who may forget to check and get a NullPointerException. Using `Optional<T>` or a domain exception makes the contract explicit in the type signature and forces the caller to handle it.","context":{}},
      {"level":2,"diff":1,"scenario":4,"q":"A PR adds a catch block that catches `Exception` and logs 'An error occurred' with no other handling. What is the design concern?","opts": ["The catch block should rethrow the exception", "Catching all exceptions silently hides failures, making bugs invisible in production", "The method should throw checked exceptions instead", "The log message is too short", "Exception handling should be in a global handler, not in business logic"], "ans": 1,"fb":"Swallowing exceptions hides failures. The operation appeared to succeed to the caller, but something went wrong. In a payment system, this can mean silent data loss or incorrect state. Exceptions should be either handled meaningfully or propagated.","context":{}},
      {"level":2,"diff":2,"scenario":4,"q":"A PR introduces a `boolean isPremium` flag on the `Customer` entity. What design smell should you flag?","opts": ["Boolean fields are not indexable in PostgreSQL", "It will cause serialization issues in the API response", "Boolean flags grow into complex conditional logic and are", "The field name doesn't follow naming conventions", "It should be a string field for extensibility"], "ans": 2,"fb":"Boolean flags tend to multiply — `isPremium`, `isTrialing`, `isSuspended`. Each adds a branch everywhere the customer is used. An explicit `CustomerType` enum or state machine is more expressive, easier to extend, and avoids the combinatorial explosion of boolean conditions.","context":{}},
      {"level":2,"diff":2,"scenario":4,"q":"A PR changes a method from 50 lines to 200 lines while adding a new feature. What is the most useful design feedback?","opts": ["Ask them to add more comments", "The method has grown too large", "Suggest they use a design pattern like Strategy or Factory", "200 lines is fine if the method is well-tested", "Ask them to split it into two files"], "ans": 1,"fb":"A 200-line method is hard to read, test, and reason about. The feedback should focus on identifying the distinct responsibilities within the method and extracting them into well-named private methods. The goal is readability and testability, not line count for its own sake.","context":{}},
      {"level":2,"diff":3,"scenario":4,"q":"A PR adds a new service that queries three other services in its constructor to build its initial state. What is the design concern?","opts": ["The queries should be moved to a @PostConstruct method", "Three queries is too many for a constructor", "Constructors should only accept primitive parameters", "Constructors should not contain business logic or I/O", "The service should use dependency injection instead"], "ans": 3,"fb":"Constructors with I/O (HTTP calls, database queries) are fragile — they make the service impossible to instantiate in tests without live dependencies, and a failure in any downstream service will prevent the service from starting. I/O should be deferred to explicit initialisation methods or lazy loading.","context":{}},
