      {"level":1,"diff":2,"scenario":3,"q":"You've followed a runbook for 20 minutes and cannot resolve the issue. What information should you include when escalating to the senior engineer?","opts":["Include your personal assessment of what the root cause is, even if you are not certain", "Send a link to the Grafana dashboard and wait", "Only send the error message from the logs", "Just say 'the service is down' and let the senior engineer investigate from scratch", "Include: which alert fired, what the runbook steps were and their outcomes"],"ans":4,"fb":"Effective escalation transfers your investigation context — the senior shouldn't repeat work you've done. Include: the alert, what the runbook showed, current observable symptoms, what you ruled out, and what you couldn't explain. A structured escalation like 'Alert X fired at 03:00. Pods healthy, Cloud SQL healthy, but error rate is 8% on payment POST endpoints, started at 02:47. Runbook steps 1-3 completed, step 4 inconclusive' saves 10 minutes versus 'service is broken'."},
      {"level":1,"diff":2,"scenario":3,"q":"A runbook step says 'check Cloud SQL connection count'. You find it at 195 out of 200 max connections. What do you do?","opts":["This is a database problem", "Restart all application pods to force connection pool drain", "Immediately increase Cloud SQL max_connections to 500", "This is within limits", "Flag this as a likely contributing factor"],"ans":4,"fb":"195/200 connections is a near-saturated pool — likely contributing to the issue but not a definitive root cause until correlated. Note it as evidence and check if the alert symptom (e.g. connection timeout errors) aligns with this. Runbook steps build a picture together. Escalate with this finding included."},
      {"level":1,"diff":3,"scenario":3,"q":"The runbook tells you to run `gcloud sql instances describe <instance>` but you don't have the gcloud CLI configured. What should you do?","opts":["Give up and escalate immediately", "Skip this runbook step and proceed to the next one", "Restart the Cloud SQL instance from the GCP Console as a workaround", "Install gcloud CLI on the production pod and run it from there", "Use the GCP Console Cloud SQL page to check the instance status"],"ans":4,"fb":"Runbooks should be accessible to all on-call engineers. When a tool isn't available, use an equivalent — Cloud SQL status is visible in the GCP Console. The important thing is completing the diagnostic step, not the specific tool. After the incident, suggest a runbook improvement to add console-based alternatives for common CLI steps."},
      {"level":1,"diff":1,"scenario":4,"q":"The Cloud SQL dashboard shows CPU at 85% for the last 30 minutes. What is the most appropriate first action?","opts":["Disable all non-critical services to reduce database load", "CPU at 85% is normal for production", "Restart the Cloud SQL instance to clear the CPU usage", "Check which queries are running with `pg_stat_activity` or look for a", "Immediately upgrade the Cloud SQL instance to a larger tier"],"ans":3,"fb":"CPU spikes are often caused by a specific query or workload event. Before scaling, investigate root cause: check `pg_stat_activity` for long-running queries, correlate the spike with recent deployments or scheduled jobs, and check if a specific query plan changed. Scaling without understanding the cause may be wasteful and won't fix a query problem."},
      {"level":1,"diff":2,"scenario":4,"q":"The Cloud SQL dashboard shows active connections jumping from 20 to 190 in 5 minutes. The application just scaled from 2 to 8 pods. Is this expected?","opts":["No — HikariCP never opens more than 10 connections per pod", "Yes — more pods always means more connections, and this is fine regardless of the number", "No — Cloud SQL should handle connection pooling automatically regardless of pod count", "No — a jump to 190 connections indicates a connection leak", "Yes — if each pod has a HikariCP minimumIdle of about 24, scaling from 2 to 8 pods would add ~144"],"ans":4,"fb":"Connection count scales with pod count when using per-pod connection pools (HikariCP). If minimumIdle is set, each new pod immediately opens connections to fill the idle pool. 8 pods × ~24 minimumIdle ≈ 192 connections, consistent with the observed jump. Verify the pool configuration and ensure max connections across all pods stay safely below Cloud SQL's `max_connections` limit."},
      {"level":1,"diff":2,"scenario":4,"q":"Cloud SQL storage is at 78%. Auto-resize is disabled. What action do you take?","opts":["Restart the database to reclaim storage space", "No action needed", "Enable auto-resize immediately via `gcloud sql instances patch`", "Delete old tables to free up space immediately", "Create a ticket to proactively resize storage before it fills"],"ans":4,"fb":"78% with auto-resize disabled is close to the 80% alert threshold. Proactive action: resize storage now (storage can be increased but not decreased on Cloud SQL), investigate what's consuming space (table bloat, WAL, log tables), and enable auto-resize as a safety net. Cloud SQL becomes read-only at 100% storage — don't wait."},
      {"level":1,"diff":3,"scenario":4,"q":"The Cloud SQL dashboard shows CPU at 5% but active connections are 0. The application is deployed and pods are Running. What is wrong?","opts":["Zero connections means HikariCP is using lazy initialization", "Cloud SQL reports 0 active connections during maintenance windows", "CPU at 5% confirms the database is fine", "This is healthy", "Zero active connections with running pods is abnormal"],"ans":4,"fb":"Running pods should always have some connections to the database (at minimum, HikariCP minimumIdle connections). Zero connections with running pods means connection establishment is failing. Check pod logs for JDBC errors, verify the Cloud SQL Auth Proxy sidecar is running (`kubectl describe pod`), confirm the service account has Cloud SQL Client IAM role, and check network policies allow pod-to-proxy traffic."},
      {"level":2,"diff":1,"scenario":0,"q":"A Spring Boot service has no resource requests set on its GKE deployment. What is the impact?","opts":["No impact — Kubernetes manages resource allocation automatically without requests", "Resource requests only affect billing", "Without requests, the pod gets the highest priority on the node", "Resource requests are optional for non-production services only", "Without requests, the pod may be placed on an overloaded node"],"ans":4,"fb":"Resource requests tell the Kubernetes scheduler how much CPU/memory the pod needs. Without them: (1) pods get QoS class BestEffort — first evicted under node pressure, (2) the scheduler may pack too many pods on one node, (3) HPA cannot calculate utilization percentages. Always set requests based on observed usage from Grafana."},
      {"level":2,"diff":1,"scenario":0,"q":"In Cloud Monitoring, you want to verify a GKE service is up and responding. What is the simplest approach?","opts":["Uptime checks are only available for Cloud SQL, not GKE services", "Use kubectl to check pod status periodically from a CronJob", "SSH into a pod and run curl every minute", "Deploy a separate GKE pod that curl-checks the service every 30 seconds", "Create a Cloud Monitoring uptime check targeting the service's external URL"],"ans":4,"fb":"Cloud Monitoring uptime checks send HTTP(S) requests from multiple Google locations and alert if the endpoint becomes unreachable or returns errors. Target the service's load balancer IP or domain with the /health/readiness path. This is simpler and more reliable than self-monitoring pods."},
      {"level":2,"diff":2,"scenario":0,"q":"A pod's CPU request is 100m but it consistently uses 800m during normal load. What are the consequences?","opts":["The pod uses more CPU than requested. HPA calculates utilization as actual/request", "The pod will be evicted immediately for exceeding its CPU request", "No consequences", "Cloud Monitoring will show a critical alert for CPU over-utilization", "CPU requests cap actual usage"],"ans":0,"fb":"CPU requests define the scheduler's placement decision, not a hard cap. The pod can use more CPU (up to the limit or node capacity). The problem: (1) HPA calculates utilization as actual/request — 800m/100m = 800%, which may trigger unnecessary scale-out, (2) on a loaded node, the pod's CPU may be throttled. Fix: set requests based on p95 actual usage from Grafana metrics."},
      {"level":2,"diff":2,"scenario":0,"q":"You set CPU limit to 500m and CPU request to 500m. Under load, the pod's response time doubles. Grafana shows CPU usage hitting exactly 500m. What is happening?","opts":["Cloud Monitoring is showing incorrect CPU data", "The pod is CPU-throttled. When a container hits its CPU", "The pod needs more replicas", "500m CPU is always enough for a Spring Boot service", "The response time doubling is caused by GC"],"ans":1,"fb":"When CPU usage hits the limit, Kubernetes (via Linux CFS) throttles the container — it pauses execution until the next CPU quota period. This causes latency spikes. Evidence: CPU usage plateaus at exactly the limit value. Fix: increase the limit or profile the hot path with async-profiler to reduce CPU consumption. Check `container_cpu_cfs_throttled_seconds_total` in metrics for confirmation."},
      {"level":2,"diff":3,"scenario":0,"q":"A team proposes setting resource limits to 10x the requests (e.g., request=100m, limit=1000m) for flexibility. What is the risk?","opts":["Limits must be equal to requests", "A large gap helps with traffic spikes", "A large limit-to-request ratio enables noisy neighbour problems: one pod spikes and steals", "The only risk is higher billing", "No risk — a large gap between request and limit is the recommended GKE configuration"],"ans":2,"fb":"Wide request-to-limit ratios enable noisy neighbour scenarios. The scheduler placed pods based on requests (100m), but the pod can burst to 1000m — 10x more than expected. On a node with 16 such pods, one burst can consume the entire node's CPU. For memory, hitting a high limit causes OOMKill which is a hard crash. Best practice: set limits close to requests, use VPA recommendations for initial sizing, and tune with real production data."},
      {"level":2,"diff":1,"scenario":1,"q":"You need to add the current trace ID to every log statement in a Spring Boot service. What is the correct approach?","opts":["Manually include the trace ID in every log.info() call as a string parameter", "Trace IDs are automatically included in all Spring Boot logs", "Add the trace ID to the application.properties file", "Use a custom Logback appender that queries Cloud Trace for the trace ID", "Configure the MDC"],"ans":4,"fb":"MDC is the correct pattern. A servlet filter calls `MDC.put(\"traceId\", currentTraceId)` on request entry and `MDC.clear()` on exit. Logback's pattern layout includes `%X{traceId}` to emit the MDC value in every log line. With OpenTelemetry Java agent, the trace ID is automatically set in MDC via the `otel.instrumentation.logback-mdc.add-baggage` configuration."},
      {"level":2,"diff":2,"scenario":1,"q":"A log line shows: `INFO payment completed amount=5000`. An engineer wants to filter logs by tenant. What is missing and how do you fix it?","opts":["The fix is to add a comment in the code noting the tenant ID", "The tenant ID is missing as a structured field", "Tenant filtering is done in the application layer", "Add the tenant ID as a log level suffix: `INFO:tenant-abc payment completed`", "Nothing is missing"],"ans":1,"fb":"Structured logging requires all searchable context as key-value fields in the JSON payload. A log line without tenantId cannot be filtered by tenant in Cloud Logging. Use structured logging (e.g. `log.atInfo().addKeyValue(\"tenantId\", tenantId).log(\"payment completed\")` in Spring Boot 3, or a library like `net.logstash.logback`). Cloud Logging then indexes `jsonPayload.tenantId` for filtering."},
      {"level":2,"diff":2,"scenario":1,"q":"Every log statement must include traceId, tenantId, and serviceName. Where is the best place to set these so they appear automatically?","opts":["Use a custom Logger wrapper class that all services must inherit from", "Set them in Cloud Logging directly via the GCP Console", "Set them in each log.info() call manually across all classes", "Set traceId and tenantId in MDC via a request-scoped filter", "Set them in a global static variable accessible by all loggers"],"ans":3,"fb":"MDC is request-scoped thread-local storage for contextual logging fields. A filter sets `MDC.put(\"traceId\", ...)` and `MDC.put(\"tenantId\", ...)` on request entry and clears on exit. `serviceName` is static — set it in logback.xml as a `<property>` or via Spring's `logging.structured.json.include`. This approach requires zero changes to individual log statements."},
      {"level":2,"diff":3,"scenario":1,"q":"A service logs customer email addresses in DEBUG statements used for development. These logs are reaching Cloud Logging in production. What is the risk and fix?","opts":["No risk — Cloud Logging is a secure GCP service and PII in logs is acceptable", "PII in logs violates GDPR/PCI-DSS requirements and increases breach impact", "Fix by encrypting the Cloud Logging bucket", "PII in logs is acceptable if the service is not customer-facing", "The risk is only storage costs"],"ans":1,"fb":"PII in logs creates compliance and breach risk. Under GDPR, logs are data storage — PII requires a legal basis, and a log breach is a reportable data breach. Under PCI-DSS, card data in logs is a finding. Fix: (1) remove PII from log statements — log IDs, not values, (2) set production log level to WARN to suppress DEBUG, (3) use Cloud Logging exclusion filters as a safety net, (4) implement log review in your security checklist."},
      {"level":2,"diff":1,"scenario":2,"q":"You want to count the number of payment requests per second in your Spring Boot service using Micrometer. Which Micrometer type do you use?","opts":["Timer — timers are the only Micrometer type that track request counts", "Counter — it increments on each payment request", "Histogram — Micrometer histograms count events automatically", "Distribution summary", "Gauge — it measures a current value like request count"],"ans":1,"fb":"A Counter increments monotonically and is perfect for counting events (requests, payments, errors). Use `counter.increment()` on each request. In Grafana, use `rate(payment_requests_total[5m])` to get requests per second. A Gauge would be wrong — it measures current state (queue depth, active connections), not cumulative events."},
      {"level":2,"diff":1,"scenario":2,"q":"You've added a Micrometer timer to a payment endpoint but the metric doesn't appear in Grafana. What is the most likely cause?","opts":["Grafana cannot display timer metrics", "Micrometer metrics require a restart of the Grafana server", "The Prometheus scrape endpoint", "Timer metrics appear after 100 requests", "Micrometer is disabled by default in Spring Boot 3"],"ans":2,"fb":"The most common cause for missing metrics: the Prometheus scrape endpoint isn't exposed or isn't being scraped. Check: (1) `management.endpoints.web.exposure.include=prometheus` in application.properties, (2) the Prometheus scrape config has the service's pods annotated with `prometheus.io/scrape: \"true\"`, (3) access `<pod-ip>:8080/actuator/prometheus` directly to verify the metric is emitted."},
      {"level":2,"diff":2,"scenario":2,"q":"You want a Grafana panel showing p99 response time for the payment service over the last 1 hour. Which PromQL expression is correct?","opts":["histogram_quantile(0.99, sum(rate(payment_requests_duration_seconds_bucket[5m])) by", "count(payment_requests_duration_seconds > 1)", "max(payment_requests_duration_seconds_sum / payment_requests_duration_seconds_count)", "avg(payment_requests_duration_seconds)", "payment_requests_p99"],"ans":0,"fb":"Micrometer's Timer emits `_bucket`, `_count`, and `_sum` metrics by default. `histogram_quantile(0.99, ...)` computes the 99th percentile from the histogram buckets. The `rate()` function calculates per-second rates from the counter-type bucket series. This is the standard PromQL pattern for p99/p95 latency from Micrometer Timer metrics."},
      {"level":2,"diff":2,"scenario":2,"q":"A Grafana panel shows 'No data' for a metric that was working yesterday. What are the first two things to check?","opts":["Check whether the service pods are still emitting the", "Redeploy the service", "Check if the Grafana license expired", "No data always means the service is down", "Delete the Grafana panel and recreate it"],"ans":0,"fb":"'No data' in Grafana can mean: (1) the metric is no longer being emitted (service issue, code change), (2) Prometheus stopped scraping it (pod IP changed, scrape target broken), (3) the metric name changed. Start with the raw source: `curl <pod-ip>/actuator/prometheus | grep <metric-name>`. Then check Prometheus targets for scrape errors."},
      {"level":2,"diff":3,"scenario":2,"q":"A team proposes using tenantId as a Micrometer tag on a counter. The platform has 10,000 tenants. What is the risk?","opts":["Using tenantId tags is fine if you limit the counter to once per minute", "Use tenantId tags but set a low retention period to limit storage impact", "No risk — Micrometer tags are designed for high-cardinality values like tenant IDs", "High cardinality is only a problem with histograms, not counters", "High cardinality labels cause a metric cardinality explosion"],"ans":4,"fb":"Prometheus stores each unique label combination as a separate time series. 10,000 tenants × 3 metrics × 3 label values = tens of thousands of series per scrape interval. At scale, this exhausts Prometheus memory. Solutions: (1) log the per-tenant data as structured log lines and use Cloud Logging log-based metrics with tenant filter, (2) use BigQuery for per-tenant analytics, (3) keep Micrometer metrics at aggregate level (all tenants)."},
      {"level":2,"diff":1,"scenario":3,"q":"A request is slow and you want to trace it through all services. What does a distributed trace show that logs alone cannot?","opts":["Both traces and logs show the same information in different formats", "Distributed traces show CPU usage per service", "A trace shows the timing and sequence of calls across all services as a", "Traces show error messages", "Distributed traces show the exact SQL queries executed"],"ans":2,"fb":"A distributed trace reconstructs the full call graph as a waterfall: Service A called Service B (50ms), which called Service C (200ms), which queried PostgreSQL (180ms). This cross-service timing view is impossible to reconstruct manually from per-service logs. Traces and logs complement each other: traces show where time was spent, logs show what happened within each service."},
      {"level":2,"diff":2,"scenario":3,"q":"Cloud Trace shows a request trace for a payment flow. The total duration is 2 seconds but the sum of all spans is only 800ms. What does the gap indicate?","opts":["Uninstrumented time", "The trace data is corrupted", "Cloud Trace rounds span durations", "The 1.2 second gap is network latency between services", "This is normal"],"ans":0,"fb":"In a well-instrumented trace, spans should cover nearly all the elapsed time. A large gap between total trace duration and sum of spans indicates uninstrumented code sections. Common causes: a library that isn't auto-instrumented, a thread handoff without context propagation, or Kafka consumer time where no span is active. Add manual spans to the gap sections to diagnose where the time is going."},
      {"level":2,"diff":2,"scenario":3,"q":"Service A calls Service B but Cloud Trace shows them as separate unconnected traces. What is the most likely cause?","opts":["Service B is not configured to accept trace context headers", "Trace IDs are not compatible between Spring Boot 3 services", "Cloud Trace does not support multi-service tracing", "Service A is not propagating the trace context header", "The OTEL collector is dropping spans from one of the services"],"ans":3,"fb":"Distributed trace correlation requires the caller to propagate the `traceparent` header to the callee. The OTEL Java agent auto-instruments common HTTP clients (RestTemplate, WebClient, OkHttp) to inject these headers. If using a custom HTTP client or a non-instrumented library, propagation must be done manually via `W3CTraceContextPropagator`. Check the outgoing request headers from Service A."},
      {"level":2,"diff":3,"scenario":3,"q":"A trace shows a database span taking 1.8 seconds. The SQL query is `SELECT * FROM payments WHERE tenant_id = ?`. How do you determine whether this is a query plan problem or a connection wait problem?","opts":["1.8 seconds is always a query problem", "Check EXPLAIN ANALYZE in PostgreSQL for query plan", "1.8 seconds for a filtered query means the database is overloaded", "Connection wait is always negligible", "Database spans always include connection wait time"],"ans":1,"fb":"A database span includes time from connection acquisition through query execution. If HikariCP is saturated, most of the 1.8s could be waiting for a connection, not executing the query. Check: (1) HikariCP metrics `hikaricp_connections_pending` and `hikaricp_connections_acquire_seconds` in Grafana, (2) EXPLAIN ANALYZE for the actual query execution time. If connection wait is high, increase pool size or reduce concurrent load."},
      {"level":2,"diff":1,"scenario":4,"q":"A Cloud Monitoring alert is firing every 5 minutes and resolving immediately. Engineers are ignoring it. What is the most likely issue?","opts":["The service has a real intermittent failure that engineers should not ignore", "The alert threshold is too sensitive", "The alert is correct", "Cloud Monitoring has a bug with recurring alerts", "Cloud Monitoring alert policies cannot be tuned"],"ans":1,"fb":"A flapping alert that fires and immediately resolves is a sign of threshold misconfiguration. If engineers ignore it, it loses all value as a signal. Fix: add a duration condition ('condition must be true for at least 5 minutes') and ensure the threshold is based on a meaningful signal level. Alert policies should be tuned so they only fire when action is genuinely required."},
      {"level":2,"diff":2,"scenario":4,"q":"You are defining an alert for the payment API. The SLO is 99.9% availability. What alert condition best detects an SLO breach in progress?","opts":["Alert when error rate > 0.1% sustained for 5 minutes", "Alert when any 5xx error occurs", "Alert when CPU > 80% on any payment service pod", "Alert when response time > 1 second for any request", "Alert when error rate > 50%"],"ans":0,"fb":"An SLO of 99.9% means up to 0.1% errors are acceptable. The alert threshold should match: error rate > 0.1% sustained for 5 minutes means the SLO is being consumed. A 5-minute window prevents false positives from brief spikes. Alerting on any 5xx or on CPU couples the alert to implementation details rather than user impact."},
      {"level":2,"diff":2,"scenario":4,"q":"An alert's runbook link points to a Confluence page that no longer exists (404). What should you do when you notice this?","opts":["Ignore it — the alert will still fire and engineers can investigate without the runbook", "Disable the alert until the runbook is rewritten", "Broken links are expected", "Change the alert to include the runbook content inline as a description field", "Fix the runbook link in the alert policy immediately. A broken runbook link during an incident at 03:00"],"ans":4,"fb":"A broken runbook link during an incident is an operational hazard. Alert maintenance includes: verifying runbook links are valid, ensuring runbooks are up to date, and testing that on-call engineers can find and follow them. Fix immediately — update the alert policy's runbook URL and either restore the Confluence page or redirect to the new location."},
      {"level":2,"diff":3,"scenario":4,"q":"You are setting alert thresholds for a new service with no historical data. What is the best approach to set initial thresholds?","opts":["Set all thresholds to very low values", "Deploy without alerts for the first two weeks to gather baseline data", "Set thresholds at 100% error rate", "Copy thresholds from an existing similar service without modification", "Ask the product team what thresholds feel right"],"ans":1,"fb":"Without baseline data, thresholds are guesses. The pattern: (1) deploy with loose thresholds or no alerts except for total outage, (2) observe the metric pattern for 1-2 weeks to understand normal variance, (3) set thresholds at 3-5x the observed normal level, (4) add duration conditions to prevent flapping. SLO-based alerting (error budget burn rate) is more reliable than absolute thresholds when you know your SLO."},
      {"level":3,"diff":1,"scenario":0,"q":"A trace shows Service A → Service B taking 800ms. Service B's own spans show only 50ms of work. Where is the remaining 750ms?","opts":["Service B has a memory leak causing the slowdown", "The OTEL agent is adding 750ms of overhead to every call", "Cloud Trace is incorrectly attributing time", "750ms is network latency between services in GKE", "The time is between spans: connection setup, request queuing"],"ans":4,"fb":"When total span duration exceeds the sum of child spans, there is uninstrumented time. In a service-to-service call, the gap between the caller's outgoing span and the callee's incoming span may include: thread pool queue time, serialization, connection establishment, or GKE ingress processing. Add spans to the uninstrumented sections or check if the HTTP client span is capturing connection time correctly."},
      {"level":3,"diff":1,"scenario":0,"q":"Traces show high latency for a specific tenant but aggregate metrics for the service look normal. What does this tell you?","opts":["The tenant's client has network problems", "High latency for one tenant always indicates a noisy neighbour pod issue", "The trace data is unreliable", "The aggregate metrics are masking a per-tenant issue", "This pattern means the tenant is making incorrect API calls"],"ans":3,"fb":"Aggregate metrics average across all tenants — a single slow tenant is diluted. Distributed traces allow filtering by tenantId (if the span includes it as an attribute) to isolate per-tenant performance. Common causes: the tenant has more data than others causing slower queries, a missing index for their query patterns, or a Kafka partition where they have disproportionate message volume."},
      {"level":3,"diff":2,"scenario":0,"q":"A Grafana p99 latency panel shows spikes every 15 minutes for exactly 2 minutes. A trace during a spike shows a database span jumping to 1.8 seconds. What is the most likely cause?","opts":["The Kafka consumer is rebalancing every 15 minutes", "Autovacuum or a scheduled batch job is running every 15 minutes", "A deployment occurs every 15 minutes causing pod restarts", "A garbage collection pause is causing the 2-minute slowdown every 15 minutes", "A Cloud Monitoring alert is throttling requests every 15 minutes"],"ans":1,"fb":"Regular periodic latency spikes often indicate a scheduled process. 15-minute intervals suggest: autovacuum running on a large table, a scheduled Spring job (@Scheduled), or a periodic batch query. The database span jump confirms the I/O is happening in PostgreSQL. Check `pg_stat_activity` and Cloud SQL I/O metrics (disk read/write bytes) during the spike window."},
      {"level":3,"diff":2,"scenario":0,"q":"Traces show a Kafka consumer processing each message in 5ms, but p99 end-to-end latency from produce to consume is 45 seconds. Where is the time being spent?","opts":["The 45-second gap is caused by Spring Boot serialization overhead", "The consumer is batching messages in 45-second windows", "5ms per message is too slow", "The message sits in the Kafka partition for ~45 seconds before the consumer", "Kafka has a known 45-second overhead for each message"],"ans":3,"fb":"When trace spans show fast processing but end-to-end latency is high, the time is in the queue — the message waits in Kafka before being consumed. Monitor `kafka_consumer_group_lag` in Grafana: if lag grows, consumers can't keep up with producers. Solutions: increase consumer parallelism (more partitions + consumers), optimize consumer processing, or check for consumer rebalancing causing processing gaps."},
      {"level":3,"diff":3,"scenario":0,"q":"A service occasionally shows 3-second latency spikes. Traces during spikes show a 3-second gap before the first database span with no other spans in between. What is the most likely cause?","opts":["The Cloud SQL Auth Proxy is rate-limiting connections to 3 seconds per request", "A 3-second gap is caused by OTEL span sampling", "The Spring Boot startup is slow", "A 3-second gap means the network is congested", "A gap before the first database span suggests HikariCP connection acquisition time"],"ans":4,"fb":"A gap before the first span in a request (especially before the first DB call) is classic HikariCP pool exhaustion — the request thread blocks waiting for a connection to be returned to the pool. Evidence: `hikaricp_connections_pending > 0` and `hikaricp_connections_acquire_seconds_max` approaching your observed 3-second gap. Fix: increase maximumPoolSize, reduce connection hold time, or reduce concurrent requests."},
      {"level":3,"diff":1,"scenario":1,"q":"A GKE node is showing `NotReady` status. What is the expected GKE behavior for pods on that node?","opts":["GKE marks the node NotReady and starts evicting pods after the pod eviction timeout", "All pods continue running", "GKE automatically replaces the node and reschedules pods within 30 seconds", "GKE terminates all pods immediately and they are lost permanently", "GKE requires manual intervention to reschedule pods from a NotReady node"],"ans":0,"fb":"When a node goes NotReady, the node controller waits for the pod eviction timeout (default 5 minutes) before marking pods as Failed and rescheduling them. Deployment-managed pods get rescheduled to available nodes. The 5-minute delay means services lose those pod replicas during that window. GKE Node Auto Provisioning may create a new node if capacity is insufficient."},
      {"level":3,"diff":1,"scenario":1,"q":"You run `kubectl top node` and see a node at 95% memory utilization. Pods are being OOMKilled on that node. What is the cause?","opts":["Pod OOMKills are independent of node memory", "Pods on the node collectively exceed the node's available memory", "The node's memory is undersized for the cluster", "OOMKill on a node means the node itself has a memory leak", "95% node memory means GKE will auto-scale"],"ans":1,"fb":"Node-level OOM happens when the sum of actual memory usage by all pods exceeds physical memory. This often occurs when limits >> requests — the scheduler allows over-commitment based on requests, but actual usage can exceed physical capacity. Immediate action: cordon the node to stop new pod scheduling, check which pods are consuming the most memory, and fix resource configurations."},
      {"level":3,"diff":2,"scenario":1,"q":"kubectl describe node shows: `Conditions: MemoryPressure=True`. What actions does Kubernetes take?","opts":["Kubernetes doubles the node's memory limit from the cloud provider", "Memory pressure triggers an immediate node replacement in GKE Autopilot", "Kubernetes immediately terminates all pods on the node", "Memory pressure is advisory only", "Kubernetes stops scheduling new pods to the node and may evict pods based on QoS"],"ans":4,"fb":"When kubelet detects memory pressure (available memory below eviction threshold), it: (1) taints the node to prevent new pod scheduling, (2) evicts pods in QoS order — BestEffort (no requests/limits) first, then Burstable (requests != limits), then Guaranteed (requests == limits). This is why setting proper requests and limits affects eviction priority. Set requests = limits for critical services to get Guaranteed QoS."},
      {"level":3,"diff":2,"scenario":1,"q":"You suspect CPU throttling is causing latency on a GKE service. Which metric confirms this?","opts":["kubectl top pod", "container_cpu_system_seconds_total", "rate(container_cpu_cfs_throttled_second", "container_cpu_usage_seconds_total", "node_cpu_utilization"],"ans":2,"fb":"`container_cpu_cfs_throttled_seconds_total` measures time the container was throttled by the Linux CFS scheduler. A non-zero rate means the CPU limit is being hit and the container is being artificially slowed. `kubectl top pod` shows instantaneous usage, not throttling. Use `rate(container_cpu_cfs_throttled_periods_total[5m]) / rate(container_cpu_cfs_periods_total[5m])` for the throttling percentage."},
      {"level":3,"diff":3,"scenario":1,"q":"A GKE node has 16 cores. Total pod CPU requests are 15 cores. One pod has a CPU limit of 12 cores and uses 2 cores at rest but needs 8 cores under load. Will this pod be throttled under load?","opts":["Yes — 8 cores under load triggers CFS throttling", "Throttling occurs whenever total requests exceed physical cores", "The pod is limited to 1 core", "No — the pod uses 8 cores which is below its 12-core limit", "CPU limits work differently from memory limits"],"ans":3,"fb":"CPU limits are enforced per container using CFS bandwidth control. A pod using 8 cores with a 12-core limit is not throttled — it's well within the limit. The risk: if other pods also burst, total CPU demand may exceed 16 physical cores. Unlike memory, CPU over-commitment doesn't cause crashes — it causes throttling across all pods sharing the node."},
      {"level":3,"diff":1,"scenario":2,"q":"OpenTelemetry is configured with `always_on` sampling in production. The service processes 10,000 requests/minute. What is the impact?","opts":["10,000 traces/minute is below the Cloud Trace free tier", "100% sampling generates 10,000 traces/minute", "always_on sampling only affects metrics, not traces", "always_on sampling compresses traces automatically", "No impact — OpenTelemetry is designed to handle any trace volume"],"ans":1,"fb":"`always_on` (100% sampling) is appropriate only for low-volume services or debugging. At 10,000 req/min: Cloud Trace charges per span ingested, the OTEL collector must process every trace, and each request has instrumentation overhead. Use `parentbased_traceidratio` sampler with a ratio (e.g. 0.1 = 10%) or a fixed rate limit (e.g. 100 traces/minute) to balance observability with cost."},
      {"level":3,"diff":2,"scenario":2,"q":"An OTEL collector is dropping spans under load. Increasing memory helps temporarily but recurs. What is the root cause and sustainable fix?","opts":["The collector needs to be replaced", "Span drops are expected", "Spans are being dropped due to Cloud Trace API rate limits", "Drop the OTEL collector and export directly from services to Cloud Trace", "The collector is receiving more spans than it can export to the backend"],"ans":4,"fb":"Collector span drops indicate the pipeline can't keep up: more spans arrive than can be exported. Memory helps with bursts but not sustained load. Sustainable fixes: (1) reduce ingestion at source (lower sampling ratio), (2) scale collectors horizontally, (3) tail-based sampling keeps high-value traces (errors, slow) and drops routine successful ones — this is the most impactful approach for maintaining observability while controlling costs."},
      {"level":3,"diff":2,"scenario":2,"q":"A service is emitting a span attribute `http.request.body` containing the full JSON request body. What is the problem?","opts":["This is only a problem if the span is sampled", "Span attributes are stored in trace backends and may", "The problem is attribute name convention", "Request body attributes help debug issues", "Full request bodies in spans help debugging"],"ans":1,"fb":"Span attributes in distributed trace backends are stored and potentially visible to anyone with trace access. Sensitive data (PII, payment details, auth tokens) in spans creates: (1) compliance risk (GDPR, PCI-DSS), (2) cost increase (larger spans = higher ingestion cost), (3) security risk if trace backend access is broad. Filter at the OTEL collector using attribute processors to remove or redact sensitive fields before export."},
      {"level":3,"diff":3,"scenario":2,"q":"Head-based sampling at 10% missed an important error trace for a rare payment failure. How do you ensure future error traces are always captured?","opts":["Implement tail-based sampling: the OTEL collector buffers complete traces", "Use Cloud Trace's built-in error trace retention", "Add a custom log statement in all error handlers as a fallback", "Switch to always_on sampling", "Increase sampling to 100%"],"ans":0,"fb":"Head-based sampling decides at trace start — you can't know if a trace will contain an error. Tail-based sampling (via the OTEL Collector's `tailsampling` processor) buffers complete traces and decides after completion. Rules like `type: status_code, status_codes: [ERROR]` ensure all error traces are always kept, while routine successful traces are sampled at the desired rate. This is the correct pattern for maintaining error observability while controlling costs."},
      {"level":3,"diff":1,"scenario":3,"q":"What are the four 'golden signals' for monitoring a service?","opts":["Request rate, error count, pod count, CPU utilization", "CPU, memory, disk, network", "Response time, throughput, availability, correctness", "Latency, traffic, errors, saturation", "p99 latency, p95 latency, p50 latency, error rate"],"ans":3,"fb":"The four golden signals (from Google SRE Book): (1) Latency — how long requests take, (2) Traffic — how many requests, (3) Errors — how many requests fail, (4) Saturation — how full the service is (queue depth, CPU throttling, connection pool). These four metrics can diagnose most service health issues and form the basis of good dashboards and SLO definitions."},
      {"level":3,"diff":2,"scenario":3,"q":"You are designing a Grafana dashboard for the payment service. A product manager asks to add a panel showing 'total payments processed today'. Why is this a good addition?","opts":["Business metrics require separate permissions", "Total payments is a sum metric", "It is not a good addition", "Business metrics like total payments belong on a separate business dashboard, not the golden-signals dashboard", "A payment count panel bridges technical and business context. During an incident"],"ans":4,"fb":"Golden-signals dashboards are most powerful when they include a business health panel alongside technical signals. During a 5% error rate incident, 'total payments processed today vs yesterday' immediately quantifies business impact. This guides prioritization (0 payments = P1, normal payment volume = lower priority) and provides stakeholder communication data."},
      {"level":3,"diff":2,"scenario":3,"q":"A golden-signals dashboard shows error rate, latency p99, and throughput. What is missing to complete the four golden signals?","opts":["A panel showing the number of active database connections", "A saturation panel", "A panel comparing current metrics to the previous week's baseline", "A panel showing the number of pods running", "An uptime panel showing percentage availability"],"ans":1,"fb":"Saturation is the fourth golden signal — how close the service is to capacity. Before errors appear, saturation signals impending problems: connection pool at 95%, Kafka lag growing, CPU throttling rate rising. A good saturation panel for a payment service: HikariCP `hikaricp_connections_pending` or `hikaricp_connections_usage` percentage, and Kafka consumer lag. These predict degradation 5-10 minutes before error rate spikes."},
      {"level":3,"diff":3,"scenario":3,"q":"The payment service golden-signals dashboard looks healthy but tenant support is reporting failures. What dashboard panel would surface this discrepancy?","opts":["Add per-tenant error rate panels using tenant_id as a dashboard variable", "Add a panel showing the total number of unique tenants making requests", "The discrepancy means the instrumentation is broken", "The support reports are wrong", "Add a p99.9 latency panel"],"ans":0,"fb":"Aggregate dashboards are blind to individual customer impact. One tenant at 0% success is invisible in a platform-wide 99.8% success rate. The fix: add a Grafana variable for tenantId (or use a top-N panel showing the worst-performing tenants). During incidents, this immediately identifies who is affected and helps validate when resolution is complete."},
      {"level":3,"diff":1,"scenario":4,"q":"You need to increase the Cloud SQL instance tier by editing a Terraform module. Where do you make this change?","opts":["Terraform does not support Cloud SQL tier changes", "Run `gcloud sql instances patch` to change the tier and update Terraform to match afterward", "Change the tier in Cloud SQL directly and then import the state into Terraform", "In the `google_sql_database_instance` resource block's `settings.tier` attribute", "Directly in the GCP Console"],"ans":3,"fb":"Terraform manages Cloud SQL via the `google_sql_database_instance` resource. The `settings.tier` attribute sets the instance machine type. Always run `terraform plan` before `terraform apply` to verify the plan only shows the intended change — a tier change may trigger a brief instance restart. Do not change Cloud SQL outside Terraform (console, gcloud) when IaC manages it, as this creates state drift."},
      {"level":3,"diff":2,"scenario":4,"q":"A teammate ran `terraform apply` in production directly, bypassing the PR review process. What is the organizational risk?","opts":["No risk — terraform apply is safe", "Direct terraform apply bypasses peer review", "terraform apply in production is fine if done during business hours", "The risk is that the Terraform state file becomes corrupted", "The risk is only that git history will be incorrect"],"ans":1,"fb":"Direct `terraform apply` to production is an anti-pattern in IaC workflows. The risks: no peer review catches mistakes before they hit production, changes aren't documented in PR history, and CI/CD policy controls are bypassed. Best practice: Terraform changes via PR → plan output posted as PR comment → approval → CI/CD pipeline applies. Protect production environments with Terraform Cloud workspaces or custom CI gates."},
      {"level":3,"diff":3,"scenario":4,"q":"You are reviewing a Terraform module change that adds Cloud SQL flag `cloudsql.enable_pgaudit=on`. What operational implications should you flag?","opts":["pgaudit requires a new Cloud SQL instance", "pgaudit enables PostgreSQL audit logging", "No implications", "The only implication is more data available for debugging", "pgaudit is a read-only flag change"],"ans":1,"fb":"pgaudit (PostgreSQL audit extension) generates a log line for every SQL statement. On a busy production database, this means millions of log lines per hour, dramatically increasing Cloud Logging ingestion costs. Review checklist: (1) Is this required for compliance (if yes, proceed with cost awareness), (2) what is the estimated log volume increase, (3) does enabling this flag require an instance restart, (4) is a log exclusion filter needed to prevent full audit logs reaching standard storage."},
      {"level":4,"diff":1,"scenario":0,"q":"What is the difference between an SLI and an SLO?","opts":["SLI is defined by the team", "SLO is measured by Cloud Monitoring", "SLI is the target percentage", "SLI is the metric measuring a specific aspect of service quality", "SLI and SLO are interchangeable terms for service reliability targets"],"ans":3,"fb":"SLI (Service Level Indicator) is the measurement — e.g., the ratio of successful requests to total requests. SLO (Service Level Objective) is the target — e.g., SLI ≥ 99.9% over a rolling 28-day window. The SLO defines the threshold at which the SLI is acceptable. An SLA (Service Level Agreement) is the external commitment with consequences if the SLO is missed."},
      {"level":4,"diff":2,"scenario":0,"q":"The payment service has a 99.9% availability SLO over 28 days. In the last 7 days, error rate was 0.5%. How much error budget has been consumed this week?","opts":["0.5% of the total error budget", "0.5% error rate means 99.5% availability, which is below the SLO", "The weekly error budget is 0.1% × 7/28 = 0.025%. Actual errors were 0.5%", "Error budget is calculated monthly", "The error budget is reset weekly"],"ans":2,"fb":"28-day error budget = 0.1% × 28 days = total allowable errors. Weekly allocation = 0.1% × (7/28) = 0.025%. At 0.5% actual errors, the week consumed 0.5/0.025 = 20× the weekly allocation. This means the SLO is being severely violated and the 28-day budget is already exhausted. Action: stop non-critical feature deployments and focus on reliability improvements."},
      {"level":4,"diff":3,"scenario":0,"q":"The error budget for a payment service is 80% consumed with 12 days left in the 28-day window. The team wants to deploy a risky database migration. What is the correct decision framework?","opts":["Error budget only applies to infrastructure changes", "Deploy immediately", "Never deploy when error budget is below 100%", "Evaluate deployment risk against remaining budget: 20%", "Deploy at off-peak hours"],"ans":3,"fb":"Error budget decision framework: quantify deployment risk (probability × expected downtime) against remaining budget. With 80% consumed and 12 days left, you have ~20% of total budget remaining. A risky migration that has a meaningful chance of consuming more than the remaining budget requires: (1) risk reduction (incremental rollout, feature flag), (2) delay to next window, or (3) explicit stakeholder decision to accept the risk."},
      {"level":4,"diff":1,"scenario":1,"q":"A Cloud SQL instance is provisioned with 8 vCPUs but consistently uses only 10% CPU. What is the cost implication and recommended action?","opts":["CPU usage percentage does not affect Cloud SQL cost", "Cloud SQL offers committed use discounts that make low utilization cost-neutral", "CPU underutilization is expected", "Cloud SQL instances are billed by instance tier", "Downsize during off-peak hours"],"ans":3,"fb":"Cloud SQL is billed by instance tier (machine type), not by actual CPU/memory utilization. An 8-vCPU db-n1-standard-8 costs 4× more than a 2-vCPU db-n1-standard-2 regardless of whether you use 10% or 100% of CPU. Right-sizing is the highest-impact Cloud SQL cost optimization. Check p99 CPU usage over the last 30 days before downsizing — leave headroom for bursts and maintenance operations."},
      {"level":4,"diff":2,"scenario":1,"q":"GCP billing shows $8,000/month on Cloud Logging. The team logs at DEBUG level in production across 20 services. What concrete actions reduce this cost?","opts":["Enable Cloud Logging compression", "Cloud Logging costs are fixed", "Set production log level to WARN/ERROR", "Move all services to a single logging pipeline to reduce per-service overhead", "Contact GCP to negotiate a volume discount for Cloud Logging"],"ans":2,"fb":"Cloud Logging charges $0.50/GB ingested beyond the free tier. DEBUG logs are the highest-volume category. Actions: (1) set production log level to WARN — this alone can reduce volume 80-90%, (2) add exclusion filters for health check access logs which fire every 10 seconds per pod, (3) route non-essential logs to a cheaper storage (GCS) instead of Cloud Logging. These three actions typically reduce Cloud Logging costs by 70-90%."},
      {"level":4,"diff":3,"scenario":1,"q":"GCP billing shows $45,000/month for GKE. A colleague suggests switching to Autopilot to reduce costs. When is this advice correct and when is it wrong?","opts":["GKE Autopilot always costs less than Standard mode", "Autopilot eliminates all GKE costs", "GKE Autopilot does not support Spring Boot services", "GKE Standard charges for nodes whether used or not", "Switch to Autopilot only if the team has fewer than 5 services"],"ans":3,"fb":"The cost comparison depends on workload patterns. GKE Standard: you pay for nodes 24/7 regardless of pod utilization. GKE Autopilot: you pay per-pod per-second based on resource requests — efficient for variable workloads, expensive if pods run 24/7 at high resource requests. To decide: calculate Standard cost (nodes × hours × price) vs Autopilot cost (sum of pod CPU/memory requests × hours × per-unit price). The break-even is around 60-70% node utilization in most regions."},
      {"level":4,"diff":1,"scenario":2,"q":"What is a rolling deployment and why does it prevent downtime?","opts":["A rolling deployment deploys to all pods simultaneously, then switches traffic", "A rolling deployment replaces pods incrementally", "Rolling deployment requires a feature flag to switch between old and new versions", "Rolling deployments always cause 2-3 minutes of downtime during pod restarts", "A rolling deployment is the same as a blue-green deployment"],"ans":1,"fb":"Rolling deployments maintain availability by incrementally replacing old pods with new ones. Kubernetes waits for the new pod to pass readiness probes before terminating an old pod (controlled by `maxSurge` and `maxUnavailable` settings). If a new pod fails to become ready, the rollout pauses — preventing a broken version from replacing all pods. This is the default Kubernetes deployment strategy and is zero-downtime when readiness probes are correctly configured."},
      {"level":4,"diff":2,"scenario":2,"q":"You deploy a new version of the payment service. Five minutes after deployment, error rate rises from 0.1% to 3%. What deployment observability checkpoint would have caught this earlier?","opts":["A canary or staged rollout with automated rollback: deploy to 10% of pods first", "There is no way to detect a bad deployment in under 5 minutes", "Set the deployment strategy to Recreate", "Use kubectl rollout undo immediately", "Deploy only during business hours when engineers are available to detect issues"],"ans":0,"fb":"Canary deployments are the key observability checkpoint. Deploy to 10-20% of pods, hold for 5-10 minutes while monitoring error rate and latency. Automated rollback triggers on SLI degradation allow rollbacks before full rollout. In Kubernetes, implement this with Argo Rollouts or Flagger: configure the analysis template to check error rate and latency, and automatically pause or rollback if thresholds are crossed during the canary phase."},
      {"level":4,"diff":3,"scenario":2,"q":"The payment service has a Liquibase migration that renames a column. The old and new code use different column names. How do you deploy this without downtime?","opts":["Deploy the migration with a rollback script", "Use the expand-contract pattern: Phase 1 - add the new column and copy data", "Use a feature flag to switch between old and new column names at runtime", "Rename the column directly", "Deploy code and migration simultaneously during a maintenance window with brief downtime"],"ans":1,"fb":"Column rename with rolling deployment requires expand-contract: (1) add new column + copy data (both old and new code work), (2) update code to write both columns and read new column (deploy via rolling update — backward compatible), (3) stop writing old column in a subsequent deploy, (4) drop old column after all replicas are updated. Each phase is a separate PR/deployment. Directly renaming a column breaks the old code version still running during a rolling deployment."},
      {"level":4,"diff":2,"scenario":3,"q":"You are defining the standard OTEL Java agent configuration for all Spring Boot services on GKE. Which configuration properties are essential to include in the platform baseline?","opts":["Set otel.javaagent.enabled=false and instrument manually", "Only otel.service.name", "otel.traces.exporter=zipkin and otel.metrics.exporter=prometheus", "otel.service.name and otel.traces.sampler=always_on", "otel.service.name, otel.exporter.otlp.endpoint"],"ans":4,"fb":"A platform baseline OTEL config must cover: (1) identity: otel.service.name (unique per service), (2) destination: otel.exporter.otlp.endpoint (the shared OTEL collector endpoint — do not let services export directly to backends), (3) context: otel.resource.attributes with environment, service.version, and team label, (4) sampling: otel.traces.sampler with the platform-agreed policy (not always_on in high-volume production). This ensures all services are discoverable in traces, export to the right place, and carry enough context for cross-service investigation.","context":{"Essential config":"service.name, exporter endpoint, resource attributes, sampler policy"}},
      {"level":4,"diff":2,"scenario":3,"q":"A team asks whether to use a pre-built Grafana dashboard JSON from Grafana.com versus building a custom one. What guidance should your observability guide give?","opts":["Use community dashboards as a starting point for infrastructure metrics", "The choice does not matter", "Always build custom dashboards", "Use community dashboards for all services and suppress panels that are not applicable using dashboard permissions", "Always use community dashboards"],"ans":0,"fb":"Community dashboards work well for standardized metrics: JVM heap/GC (micrometer-jvm-extras uses standard names), Kubernetes node metrics (from node-exporter), and HikariCP metrics. These metric names are consistent across services. Business metrics — payment throughput, tenant-level error rates, Kafka consumer lag for specific topics — require custom dashboards because metric names, label values, and business context are service-specific. The observability guide should provide a template for the custom business dashboard with the standard structure (golden signals + service-specific panels).","context":{}},
      {"level":4,"diff":2,"scenario":3,"q":"You are writing the alerts section of the observability guide. A team asks whether to alert on CPU utilization. What is the correct guidance?","opts":["Alert on CPU only for database pods", "CPU alerts should fire at 95% with a 1-minute window to catch only the most severe cases", "Alert when CPU exceeds 50%", "No — CPU is not a user-facing signal. Alert on symptoms", "Yes — alert when CPU exceeds 80% for more than 5 minutes on any pod"],"ans":3,"fb":"Alerting on CPU directly leads to alert fatigue — CPU spikes are common during GC, batch processing, or traffic bursts and often have no user impact. The SRE principle: alert on symptoms (what the user experiences) not causes (what the system is doing). Error rate and latency alerts are symptom-based — they fire when users are actually affected. CPU is a cause metric useful for investigation and dashboards. Exception: alert on CPU throttling specifically (container_cpu_cfs_throttled_seconds_total rate) if you know it correlates with latency in your service.","context":{}},
      {"level":4,"diff":3,"scenario":3,"q":"You are producing the Grafana dashboard standard for the platform. Teams must use dashboard-as-code (dashboard JSON stored in git). What operational problem does this solve and what tooling pattern enables it?","opts":["Dashboard-as-code is only necessary for dashboards shared across teams", "Dashboard-as-code prevents unauthorized dashboard edits", "Storing dashboard JSON in git enables version history, peer review of dashboard changes", "Dashboard-as-code enables Grafana to auto-generate dashboards from service definitions", "The main benefit is cost reduction"],"ans":2,"fb":"Dashboard-as-code solves several operational problems: (1) auditability — who changed what and when, (2) reproducibility — dashboards can be recreated from git after accidental deletion or migration, (3) consistency — PR review ensures dashboards meet standards before production, (4) multi-environment — the same dashboard JSON parametrized by datasource variable deploys to staging and production. Implementation: store JSON in git, deploy via Grafana's provisioning (configmap mounted into Grafana pod), or use the Terraform grafana_dashboard resource in the IaC pipeline.","context":{}},
      {"level":4,"diff":3,"scenario":3,"q":"The observability guide needs to address how teams should instrument multi-step business transactions (e.g. a payment flow: validate → reserve → charge → notify). What is the recommended OpenTelemetry instrumentation pattern?","opts":["Use log correlation instead of spans for business transactions", "Create metrics for each step (payment_validate_duration, payment_charge_duration) instead of spans", "Create a parent span for the overall transaction and child spans for each step", "Emit one span per HTTP request", "Instrument only the slow steps"],"ans":2,"fb":"For multi-step business transactions, manual span creation with business context is the correct pattern. The OTEL Java API: `Span span = tracer.spanBuilder('payment.charge').startSpan(); span.setAttribute('payment.id', paymentId); span.setAttribute('tenant.id', tenantId)`. Child spans form a waterfall showing step timing. Business attributes (payment_id, amount, step outcome) make traces useful for both SRE debugging and business analysis. This is superior to metrics-only (which shows timing but not which specific payment failed) and logs-only (which cannot show the full flow waterfall).","context":{}},
      {"level":4,"diff":3,"scenario":3,"q":"An engineer asks why the observability guide recommends using recording rules in Prometheus for SLI calculations rather than computing them directly in Grafana dashboard queries. What is the correct reasoning?","opts":["Grafana cannot execute PromQL queries", "Grafana's query caching handles this", "Recording rules automatically adjust SLO thresholds based on historical data", "Recording rules pre-compute expensive PromQL expressions at the Prometheus server on a", "Recording rules are required for SLI calculations"],"ans":3,"fb":"Recording rules pre-compute expensive or frequently-used queries at a configured interval (e.g. every 30s) and store results as new metrics. Benefits for SLI/SLO: (1) performance — 30-day error budget calculations are expensive; pre-computing them prevents slow dashboard loads and Prometheus overload, (2) consistency — alerting rules and dashboard panels reference the same recording rule metric, eliminating discrepancies between what fires an alert and what the dashboard shows, (3) reusability — multiple dashboards and alerts reference one recording rule. This is why the Google SRE Workbook recommends recording rules for all SLO calculations.","context":{}},
      {"level":4,"diff":1,"scenario":4,"q":"A Cloud SQL maintenance window is configured for Sunday 02:00-06:00 UTC. What happens during a Cloud SQL maintenance event?","opts":["Maintenance only affects the standby instance", "GCP performs instance maintenance", "GCP applies patches to the Cloud SQL proxy running in your GKE cluster", "The Cloud SQL instance is completely unavailable for the entire 4-hour window", "Cloud SQL maintenance is always zero-downtime"],"ans":1,"fb":"Cloud SQL maintenance involves OS patching and minor database version updates. For non-HA instances: a brief restart causes 1-2 minutes of unavailability — connections are dropped and must be retried. For HA instances: maintenance triggers a failover to the standby, causing a brief connection interruption (typically under 60 seconds) followed by automatic reconnection. Applications must handle transient connection failures gracefully via HikariCP connection validation and retry logic. The maintenance window defines when GCP is allowed to schedule this, not a guaranteed start time.","context":{"Maintenance window":"Sunday 02:00-06:00 UTC","HA instance downtime":"~60 seconds (failover)","Non-HA instance downtime":"1-2 minutes"}},
      {"level":4,"diff":1,"scenario":4,"q":"Your Cloud SQL instance has SSL certificates that expire in 30 days. What is the impact if the certificates are not rotated before expiry?","opts":["Connections using SSL enforcement will fail once the server certificate expires", "No impact — Cloud SQL automatically generates new certificates and updates all clients", "SSL expiry triggers automatic Cloud SQL instance recreation", "Only new connections fail", "The Cloud SQL Auth Proxy stops accepting connections"],"ans":0,"fb":"Cloud SQL server SSL certificates have an expiry date. The Cloud SQL Auth Proxy manages its own certificate-based authentication independently — applications using the Auth Proxy are not affected by server SSL cert expiry. However, applications connecting directly to Cloud SQL with ssl_mode=VERIFY_CA or VERIFY_FULL will reject connections to a server presenting an expired certificate. The rotation procedure: use `gcloud sql ssl server-ca-certs create`, download new certificates, update client configurations, and verify connectivity before the old cert expires.","context":{"Certificate expiry":"30 days","Affected connections":"Direct SSL connections with VERIFY_CA/VERIFY_FULL","Unaffected":"Cloud SQL Auth Proxy connections"}},
      {"level":4,"diff":1,"scenario":4,"q":"After a Cloud SQL maintenance event, the application pods report HikariCP connection errors: 'Connection is not available, request timed out after 30000ms'. The Cloud SQL instance is healthy. What is the most likely cause?","opts":["The Cloud SQL instance requires a manual restart after maintenance", "The Cloud SQL Auth Proxy needs to be restarted after every Cloud SQL maintenance event", "The maintenance event changed the Cloud SQL instance's IP address", "HikariCP's idle connections were dropped by Cloud SQL during the maintenance restart", "HikariCP pool size is too small for post-maintenance reconnection surge"],"ans":3,"fb":"During a Cloud SQL maintenance restart, the database server closes all existing connections. HikariCP pools idle connections — connections established before maintenance remain in the pool but are now dead (server-side closed). When the application tries to use a pooled connection, the attempt fails. HikariCP's connection validation settings prevent this: `connectionTestQuery=SELECT 1` validates connections before returning from the pool, `keepaliveTime=60000` proactively tests idle connections, and `idleTimeout` evicts connections that have been idle too long.","context":{"HikariCP error":"Connection is not available, request timed out after 30000ms","Cloud SQL status":"Healthy, restarted after maintenance","Root cause":"Stale pooled connections not detected by HikariCP"}},
      {"level":4,"diff":2,"scenario":4,"q":"You are planning a Cloud SQL minor version upgrade during a maintenance window. The production database has 150 active connections from 6 Spring Boot service deployments. What is the complete preparation checklist before the maintenance window?","opts":["Run `gcloud sql instances patch` and monitor", "Drain all application connections before the upgrade by scaling deployments to 0 replicas, then upgrade, then scale back up", "Verify application compatibility with the new version, confirm HikariCP is configured to retry connections", "Only upgrade during business hours so the team is available", "Verify the new version is compatible and schedule the upgrade"],"ans":2,"fb":"A Cloud SQL minor version upgrade requires full preparation: (1) compatibility testing in staging with the same application versions, (2) HikariCP reconnection validation (connectionTestQuery, keepaliveTime) to handle the brief connection reset, (3) pre-upgrade backup for rollback, (4) stakeholder notification (support teams, on-call), (5) dashboard preparation (connection count, error rate, HikariCP pool metrics), (6) rollback plan documentation. Scaling to 0 replicas is unnecessary if applications are configured for reconnection and the service has appropriate PDBs.","context":{"Active connections":"150","Services affected":"6 Spring Boot deployments"}},
      {"level":4,"diff":2,"scenario":4,"q":"A Cloud SQL HA instance failover occurs during peak hours due to a zone outage. What is the expected sequence of events for application connections, and what metric confirms the failover completed successfully?","opts":["The primary becomes unavailable", "During HA failover, all writes are queued and replayed after the standby is promoted", "The Cloud SQL load balancer automatically routes connections to the standby during failover", "Failover requires manual intervention", "Failover is transparent"],"ans":0,"fb":"Cloud SQL HA failover sequence: (1) GCP detects primary failure (~10-30s), (2) standby is promoted to primary (~30-60s total from failure), (3) the Cloud SQL IP address is remapped to the promoted instance, (4) existing connections to the old primary are dropped — applications see connection errors during this window. After promotion, applications reconnect (HikariCP eviction + reconnect). The Cloud SQL IP remains the same (it is a virtual IP), so no JDBC URL changes are needed. Monitor num_backends recovering and application error rate returning to baseline.","context":{"HA failover duration":"~60 seconds total","Connection behavior":"Existing connections dropped, new connections succeed after promotion"}},
      {"level":4,"diff":2,"scenario":4,"q":"You need to schedule Cloud SQL SSL certificate rotation across 6 production databases without causing downtime. What is the correct rotation sequence?","opts":["Phase 1: Create new server CA certs", "SSL rotation only requires a kubectl rollout restart of application pods", "Rotate all 6 databases simultaneously in a 2-hour maintenance window", "Update the JDBC connection string to disable SSL verification during rotation, rotate, then re-enable", "Delete old certificates and create new ones simultaneously"],"ans":0,"fb":"Zero-downtime SSL rotation requires a two-phase approach: (1) create new certificates while old ones remain valid — both are active simultaneously, (2) update client certificate bundles to include the new cert (deploy updated ConfigMaps/Secrets), (3) rotate the active server cert (old cert is now the 'previous' cert, still accepted during transition), (4) remove old cert from client bundles. This ensures no moment where the server presents a cert the client doesn't trust, or the client presents a cert the server doesn't accept. Cloud SQL supports this overlap period.","context":{"Certificate overlap":"Both old and new certs valid during transition","Tool":"gcloud sql ssl server-ca-certs create && rotate"}},
      {"level":4,"diff":3,"scenario":4,"q":"A Cloud SQL instance has been running at 95% storage capacity for 3 days. Auto-resize is enabled. A developer asks whether this is a problem since auto-resize will handle it. What is the complete risk assessment?","opts":["Auto-resize causes a brief Cloud SQL restart", "No risk — auto-resize is designed exactly for this situation and will expand storage automatically", "The only risk is cost", "Three risks: (1) auto-resize is triggered by storage crossing a threshold", "The database will become read-only at 100% storage"],"ans":3,"fb":"Auto-resize mitigates the storage crisis but does not eliminate risk. Key risks: (1) timing gap — auto-resize triggers at a threshold but takes time; a sudden large write (batch import, log explosion) can exhaust space before resize completes, causing disk-full errors that abort transactions and corrupt partial writes; (2) cost — disk grows permanently (Cloud SQL storage cannot shrink); (3) root cause — 95% may indicate a runaway process (table bloat, WAL accumulation, missing vacuum) that will consume new space quickly. The alert at 80% is the correct prevention — 95% is already in the danger zone.","context":{"Current storage":"95% capacity","Auto-resize":"Enabled","Duration at 95%":"3 days"}},
      {"level":4,"diff":3,"scenario":4,"q":"During a planned Cloud SQL major version upgrade (PostgreSQL 13 → 15), the upgrade fails at 40% completion. The Cloud SQL instance is showing status 'MAINTENANCE'. What is the immediate action and recovery path?","opts":["Run `gcloud sql instances patch --database-version=POSTGRES_15` again to retry the upgrade", "Delete the instance and restore from the pre-upgrade backup", "Wait for the MAINTENANCE status to resolve", "SSH into the Cloud SQL instance and run PostgreSQL upgrade scripts manually", "Scale all application pods to 0 replicas to stop database connections, allowing the upgrade to complete"],"ans":2,"fb":"Cloud SQL MAINTENANCE status means GCP is performing an operation — it is not accessible for management commands. During a failed upgrade, Cloud SQL will attempt to roll back automatically. Manual intervention (patching, deleting) during MAINTENANCE can cause data loss or undefined state. The correct action: monitor via `gcloud sql operations list --instance=INSTANCE_NAME` for the operation status, and contact GCP support if it does not resolve within a reasonable window. Always take a manual backup before major version upgrades (in addition to automated backups) precisely for this scenario.","context":{"Instance status":"MAINTENANCE","Upgrade":"PostgreSQL 13 → 15","Progress":"Failed at ~40%"}},
      {"level":4,"diff":3,"scenario":4,"q":"You discover that HikariCP is configured with `minimumIdle=50` and `maximumPoolSize=50` across 8 replicas of the payment service, connecting to a Cloud SQL instance with `max_connections=200`. After a recent scale-up to 12 replicas, the service starts throwing 'FATAL: remaining connection slots are reserved for non-replication superuser connections'. What is the root cause and the correct fix?","opts":["Set maximumPoolSize=200 and minimumIdle=0", "The error means Cloud SQL is overloaded", "Increase Cloud SQL max_connections to 500", "The fixed pool size", "Enable Cloud SQL connection pooling in the GCP console"],"ans":3,"fb":"Cloud SQL max_connections is a database-level hard limit. With minimumIdle=maximumPoolSize=50 (eager pool fill), each replica holds exactly 50 connections open — no idle eviction occurs. 12 replicas × 50 = 600, far exceeding 200. The error fires because Cloud SQL reserves some slots for superusers. Solutions: (1) reduce maximumPoolSize to floor((max_connections - reserved) / replicas) — leave headroom for replicas added by HPA, (2) PgBouncer in transaction mode multiplexes 600 application connections onto 50 database connections, (3) set minimumIdle < maximumPoolSize to allow pool shrinking when pods are idle. max_connections increasing on Cloud SQL requires an instance restart and is a less scalable long-term solution.","context":{"minimumIdle":"50","maximumPoolSize":"50","Replicas":"12","Total connections":"12 × 50 = 600","Cloud SQL max_connections":"200","Error":"FATAL: remaining connection slots are reserved for non-replication superuser connections"}},
      {"level": 4, "diff": 1, "scenario": 0, "q": "Your team is defining an SLI for a payment API. Which metric best represents availability from the user's perspective?", "opts": ["Percentage of HTTP 2xx responses out of all valid requests", "Kafka consumer lag for the payment topic", "P99 latency of all requests including healthcheck endpoints", "Average CPU utilisation across all pods", "Number of pod restarts per hour"], "ans": 0, "fb": "An availability SLI measures the ratio of successful responses to total valid requests, excluding synthetic or health-check traffic. CPU and restarts are internal signals, not user-facing correctness indicators."},
      {"level": 4, "diff": 1, "scenario": 0, "q": "Your 30-day error budget is 0.1% (43 minutes). You have consumed 80% in 10 days. What is the correct immediate action?", "opts": ["Increase the SLO target to reduce budget pressure", "Reduce the measurement window to 7 days", "Scale up pod replicas to absorb errors", "Ignore it until the budget resets next month", "Freeze non-critical deployments and investigate error sources"], "ans": 4, "fb": "Rapid budget consumption signals systemic reliability risk. Freezing risky changes protects the remaining budget while the team investigates root causes. Changing the SLO target or window is manipulating the signal rather than fixing the problem."},
      {"level": 4, "diff": 1, "scenario": 1, "q": "GCP billing shows Cloud SQL costs doubled last month. Which breakdown should you examine first?", "opts": ["Query execution times in Cloud SQL Insights", "Number of Kubernetes nodes in the cluster", "Storage, CPU, and egress split in the Cost Table by SKU", "Number of active database connections", "Terraform state file for recent infrastructure changes"], "ans": 2, "fb": "The Cost Table broken down by SKU reveals which Cloud SQL component (storage growth, CPU uptime, network egress) drove the increase. Connection counts and query times explain performance, not billing."},
      {"level": 4, "diff": 1, "scenario": 1, "q": "A service team keeps a Cloud SQL instance running 24/7 but only uses it during business hours. What is the most cost-effective recommendation?", "opts": ["Add a read replica to distribute load", "Upgrade to a larger machine type to finish queries faster", "Schedule the instance to stop outside business hours using Cloud Scheduler", "Enable automatic storage increase", "Switch to synchronous replication"], "ans": 2, "fb": "Scheduling start/stop for non-production instances can eliminate up to 65% of compute cost for business-hours workloads. Read replicas and storage increases add cost rather than reducing it."},
      {"level": 4, "diff": 1, "scenario": 2, "q": "You are sequencing a zero-downtime deployment. At which step should you first verify the new version is healthy before shifting traffic?", "opts": ["After readiness probes pass and the new pods are Ready", "Once Kafka consumer lag drops to zero", "After the first external request reaches the new pods", "Immediately after kubectl apply completes", "After the old pods are terminated"], "ans": 0, "fb": "Readiness probes gate traffic at the Kubernetes layer — only pods that pass readiness checks receive requests. Waiting until after old pods terminate is too late to catch a broken rollout."},
      {"level": 4, "diff": 1, "scenario": 2, "q": "Which deployment strategy allows you to roll back instantly by shifting 100% of traffic back to the previous version?", "opts": ["Rolling update with maxUnavailable: 1", "Canary release at 5% traffic", "Blue-green deployment with a load balancer switch", "Recreate deployment strategy", "Feature flag toggle in application config"], "ans": 2, "fb": "Blue-green keeps the previous version fully running alongside the new one. Rollback is a single traffic switch, completing in seconds. Rolling updates tear down old pods progressively, making instant rollback impossible."},
      {"level": 4, "diff": 1, "scenario": 3, "q": "A new team asks what log fields are required for distributed tracing correlation in your platform. Which fields are mandatory?", "opts": ["traceId, spanId, and tenantId on every log line", "Pod name and container image tag", "severity and timestamp only", "Kafka topic name and consumer group", "HTTP status code and endpoint path"], "ans": 0, "fb": "traceId links logs to a specific request trace, spanId identifies the local operation, and tenantId is required for multi-tenant isolation and compliance queries. Severity and timestamp alone do not enable cross-service correlation."},
      {"level": 4, "diff": 1, "scenario": 4, "q": "Cloud SQL maintenance can cause a brief outage on a non-HA instance. What is the minimum configuration change to eliminate unplanned failover downtime?", "opts": ["Set a maintenance window to off-peak hours", "Enable High Availability with a standby replica in a different zone", "Increase connection pool size in HikariCP", "Add a read replica for query offloading", "Enable automated backups with point-in-time recovery"], "ans": 1, "fb": "HA standby replica allows Cloud SQL to fail over to the standby within ~30 seconds, minimising downtime. A maintenance window controls timing but does not eliminate the downtime on non-HA instances."},
      {"level": 4, "diff": 2, "scenario": 0, "q": "Your SLO dashboard shows 99.85% availability against a 99.9% target over 28 days. The error budget is exhausted. Which action best balances reliability and delivery?", "opts": ["Add a second availability SLO for internal endpoints", "Extend the measurement window to 60 days to dilute the data", "Halt feature releases, run an incident review, and fix the top error contributors", "Lower the SLO target to 99.8% to restore the budget", "Deploy hotfixes only and restart all pods to clear errors"], "ans": 2, "fb": "An exhausted error budget is a signal to stop risky changes and address reliability debt. Lowering the target or extending the window hides the problem without improving user experience."},
      {"level": 4, "diff": 2, "scenario": 0, "q": "You need to define a latency SLI for a checkout API that has occasional large batch operations. How should you handle the batch traffic in your SLI?", "opts": ["Measure only requests that returned HTTP 200", "Set a single SLO that covers both interactive and batch at the same threshold", "Include all traffic and use P50 latency as the SLI", "Exclude batch operations using a request label and measure interactive traffic separately", "Use average latency across all requests as the SLI"], "ans": 3, "fb": "Batch operations have fundamentally different latency profiles. Mixing them with interactive traffic inflates the latency distribution and obscures user-facing performance. Separate SLIs with appropriate thresholds reflect actual user experience accurately."},
      {"level": 4, "diff": 2, "scenario": 1, "q": "GKE costs are higher than expected. You notice many pods are requesting 2 CPU but consistently using less than 0.2 CPU. What optimisation should you propose?", "opts": ["Increase node pool size to reduce per-pod contention", "Right-size CPU requests to match actual usage plus a 20% buffer", "Switch from Deployment to StatefulSet for better scheduling", "Add a Vertical Pod Autoscaler in Off mode for analysis only", "Remove CPU requests entirely and rely on burstable QoS"], "ans": 1, "fb": "Oversized CPU requests cause node over-provisioning because the scheduler reserves requested capacity. Right-sizing to actual usage plus headroom reduces node count and billing. Removing requests entirely risks CPU starvation under load."},
      {"level": 4, "diff": 2, "scenario": 1, "q": "You identify that Cloud Logging ingestion costs are unexpectedly high. Which change has the highest cost reduction impact without losing critical signals?", "opts": ["Add exclusion filters to drop DEBUG and TRACE logs from non-production namespaces", "Increase log retention period to amortise ingestion costs", "Route all logs to a dedicated GCS bucket without exclusion rules", "Switch from structured JSON logs to unstructured text to reduce payload size", "Disable all application logging and rely on metrics only"], "ans": 0, "fb": "DEBUG and TRACE logs are high-volume and rarely needed in production. Namespace-scoped exclusion filters can cut ingestion volume by 60-80% while preserving WARN and ERROR signals. Disabling all logging removes essential diagnostic capability."},
