    {"level":5,"diff":3,"scenario":2,"q":"You are running a live migration using logical replication to copy data from an old Cloud SQL instance to a new one with a different schema layout. The initial snapshot is complete. You now need to cut over with minimal downtime. What is the correct cutover sequence?","opts":["Stop all application traffic, wait for replication lag to reach zero, promote the new instance, update DNS, and restart the application","Pause application writes at the application layer (feature flag or circuit breaker), wait for replication lag to reach zero (confirm via pg_replication_slots or","Enable synchronous replication between old and new instances before cutover to guarantee zero data loss","Promote the new instance, then stop application traffic and redirect, accepting a brief period where some writes go to the old instance and are lost","Use Cloud SQL's built-in migration wizard, which handles cutover atomically"],"ans":1,"fb":"The correct zero-data-loss cutover for logical replication migration is: (1) pause writes at the application layer (not the database layer, to avoid lock accumulation), (2) wait for the replica to catch up to the primary — confirmed by pg_stat_replication.write_lag reaching zero or pg_replication_slots.confirmed_flush_lsn matching the primary, (3) verify data consistency, (4) update the DataSource configuration, (5) unpause writes. Stopping traffic before promotion (A) is safer than B but still involves a hard stop rather than a controlled pause-and-switch, and 'waiting' without a verified lag check risks data loss. Promoting before stopping traffic (B) will cause writes to be lost. Synchronous replication (D) is not available for cross-instance logical replication in this topology. Cloud SQL does not have a built-in migration wizard for logical replication cutover (E).","context":{"Migration type":"Logical replication, cross-instance","Current lag":"< 500ms under normal load","Cutover window":"Target < 60 seconds of write unavailability"}},
    {"level":5,"diff":3,"scenario":3,"q":"You are setting a platform standard for parallel query. A developer wants to enable parallel_workers = 8 globally to speed up large analytical queries on Cloud SQL. What is your guidance and why?","opts":["Parallel query is not available on Cloud SQL","Reject it and set max_parallel_workers_per_gather = 0 to disable parallel query entirely","Approve it","Approve only a moderate increase (e.g., 2-4 workers per gather) with guidance to use SET LOCAL for specific","Approve it only for tables larger than 1 GB using a per-table parallel_workers storage parameter"],"ans":3,"fb":"Parallel query in PostgreSQL can dramatically reduce analytical query latency but also multiplies CPU usage (each parallel worker uses a separate CPU). Globally setting 8 workers could cause a single analytical query to consume all available vCPUs, starving OLTP queries. The correct approach is to set a moderate global default (2-4 workers), allow teams to use SET LOCAL max_parallel_workers_per_gather for specific workloads in sessions where the CPU cost is acceptable, and monitor total worker consumption. Blanket approval (A) ignores the CPU multiplier effect. Disabling parallel query entirely (B) removes a legitimate optimisation. Per-table parallel_workers (D) is a real PostgreSQL feature but not the only tool needed. Parallel query is available on Cloud SQL PostgreSQL 16 (E is false).","context":{"Instance vCPUs":"8","Workload mix":"OLTP (90%) + analytical queries (10%)","Proposed setting":"max_parallel_workers_per_gather = 8"}},
    {"level":5,"diff":3,"scenario":3,"q":"You are reviewing a platform standard proposal that recommends setting random_page_cost = 1.1 (near seq_page_cost = 1.0) on all Cloud SQL PostgreSQL instances. What is the implication of this setting and when is it appropriate?","opts":["This setting controls the number of parallel workers used for random I/O operations","This setting disables random I/O and forces the planner to always use sequential scans, which is appropriate for all cloud instances","This setting tells the planner that random page reads are nearly as cheap as sequential reads","This setting increases memory allocated for random page caching and reduces buffer pool evictions","This setting should never be changed from the default (4.0)"],"ans":2,"fb":"random_page_cost is the planner's estimate of the relative cost of a non-sequential disk page fetch compared to seq_page_cost. The default of 4.0 was calibrated for spinning hard disks where random I/O is ~4× more expensive than sequential. Cloud SQL uses SSD storage where random I/O is far cheaper than on HDD. Setting random_page_cost = 1.1 (or 1.5) is a well-established best practice for SSD instances and tells the planner that index scans (which involve random I/O) are nearly as cheap as sequential scans, resulting in better plan choices on modern storage. It does not disable random I/O (A). It is a cost model parameter, not a memory allocation setting (C). The default of 4.0 was not calibrated for any specific PostgreSQL version — it is a legacy HDD assumption (D is false). It has nothing to do with parallel workers (E).","context":{"Storage type":"Cloud SQL SSD-backed persistent disk","Current setting":"random_page_cost = 4.0 (default)","Proposal":"Set random_page_cost = 1.1 platform-wide"}},
    {"level":5,"diff":3,"scenario":4,"q":"You are reviewing a proposal to reduce Cloud SQL costs by moving all non-production databases (dev, staging) to a single shared Cloud SQL instance with separate schemas. What is the primary risk this introduces and what mitigation would you require?","opts":["Cloud SQL does not support multiple schemas on a single instance","A single instance means one noisy or poorly-tuned service can exhaust shared resources (connections","Cloud SQL billing is per schema, so there is no cost saving from consolidation","Migration scripts (Liquibase) cannot differentiate between schemas on the same instance","Separate schemas on one instance provide no isolation"],"ans":1,"fb":"Consolidating multiple environments onto a single Cloud SQL instance creates a noisy-neighbour risk: one service consuming excessive connections, CPU, or IOPS affects all other services sharing the instance. This is acceptable for non-production but must be mitigated with per-service HikariCP pool caps (to stay within connection limits), per-schema resource monitoring, and a defined process for isolating offending services. Schema-level data isolation (A) — schemas in PostgreSQL do provide namespace separation; while row-level isolation requires RLS, schema-level separation is still meaningful for organisation and IAM. Cloud SQL does support multiple schemas (C is false). Liquibase uses schema names in connection strings and changeset contexts (D is manageable). Cloud SQL bills per instance, not per schema (E is false — consolidation does save money).","context":{"Environments":"Dev, staging, QA — 12 services","Current cost":"12 × db-f1-micro instances","Proposal":"Consolidate to 1 × db-custom-4-16384"}},
    {"level":5,"diff":3,"scenario":4,"q":"Cloud SQL costs for your platform increased 40% over six months. Analysis shows the primary driver is storage: the database has grown from 500GB to 1.8TB. Most of the growth is in two tables: `audit_events` (1TB) and `kafka_outbox` (400GB). What is the most effective cost reduction strategy that does not compromise operational correctness?","opts":["Move the Cloud SQL instance to a different region where storage costs are lower","Increase the Cloud SQL instance tier to one with more CPU to speed up autovacuum and reclaim dead tuple space","Compress all text columns in `audit_events` and `kafka_outbox` using PostgreSQL's built-in TOAST compression","Enable Cloud SQL automatic storage increase and rely on GCP to optimise costs as storage scales","Archive `audit_events` rows older than 90 days to BigQuery and implement a partitioned `kafka_outbox` with partition drop for processed messages"],"ans":4,"fb":"The `audit_events` table is a retention problem: old audit data rarely needs to be queried from the primary database and is well-suited for archival to BigQuery (cheap columnar storage, supports compliance queries). The `kafka_outbox` is a pattern where rows are inserted, processed, and should then be deleted — implementing this with partitioning allows entire partitions to be dropped (DDL, near-instant) rather than DELETEd (row-by-row, slow and bloating). TOAST compression (C) applies to large variable-length values already over 2KB; it won't help structured rows. More CPU (D) helps autovacuum speed but doesn't reduce storage. Region changes (E) have minimal impact and add latency.","context":{"Storage cost driver":"audit_events (1TB), kafka_outbox (400GB)","audit_events query pattern":"Queries are rare beyond 90 days; compliance queries acceptable on BigQuery","kafka_outbox pattern":"Insert on write, delete after processing — high write/delete churn"}},
    {"level":6,"diff":1,"scenario":0,"q":"Engineering leadership asks you to evaluate whether the platform should migrate from Cloud SQL PostgreSQL to a self-managed PostgreSQL cluster on GKE (using the Cloud Native PostgreSQL operator). What is the most important operational consideration that typically tips the decision toward staying on Cloud SQL?","opts":["Cloud SQL abstracts HA, automated failover, storage management, and backups, reducing the operational burden","Cloud SQL is always cheaper than self-managed PostgreSQL at any scale","Self-managed PostgreSQL on GKE violates PCI-DSS compliance requirements","Cloud SQL supports PostgreSQL 16 while self-managed clusters only support PostgreSQL 14","Self-managed clusters on GKE cannot use persistent disks, making data durability a concern"],"ans":0,"fb":"The primary reason most teams stay on Cloud SQL is the managed operational surface: automated HA, failover, minor version patching, backup scheduling, and storage autoscaling are handled by Google. A self-managed cluster requires the platform team to own all of these, including on-call for database infrastructure incidents — a significant cost that is often underestimated. Cloud Native PostgreSQL on GKE does support PostgreSQL 16 (A is false). GKE persistent disks are fully durable (B is false). Self-managed PostgreSQL is often cheaper at very large scale but not universally (C is false). PCI-DSS does not prohibit self-managed databases (D is false) — it requires demonstrable controls regardless of where the database runs.","context":{"Current stack":"Cloud SQL PostgreSQL 16","Alternative":"CloudNativePG operator on GKE","Driver":"Cost reduction and parameter flexibility"}},
    {"level":6,"diff":1,"scenario":0,"q":"You are evaluating whether the platform should adopt PostgreSQL 16's logical replication from a Cloud SQL primary to a self-managed analytics PostgreSQL instance for OLAP workloads. What is the primary operational risk to communicate to leadership?","opts":["Logical replication requires the primary to be restarted when the subscription is created","Logical replication cannot replicate tables without primary keys, and most PostgreSQL tables lack primary keys","Logical replication in PostgreSQL 16 is not stable enough for production use","The replication slot on the primary retains WAL until the subscriber confirms receipt","Logical replication uses significantly more CPU on the primary than streaming replication"],"ans":3,"fb":"A replication slot prevents the primary from discarding WAL segments needed by the subscriber. If the analytics subscriber is slow, paused, or disconnected for an extended period, WAL accumulates on the primary. On Cloud SQL, this can cause storage to fill up, leading to the instance going into read-only mode — a severe production impact. This risk must be mitigated by monitoring pg_replication_slots.wal_status and pg_stat_replication.sent_lsn lag, and setting a policy for dropping slots that fall too far behind. Logical replication in PostgreSQL 16 is production-stable (A is false). Creating a subscription does not require a primary restart in PostgreSQL 16 (C is false). Tables without PKs can be replicated using REPLICA IDENTITY FULL (D is overstated). Logical replication's CPU overhead is manageable (E is not the primary risk).","context":{"Source":"Cloud SQL PostgreSQL 16 primary","Destination":"Self-managed PostgreSQL on GKE for OLAP","Mechanism":"Logical replication via replication slot"}},
    {"level":6,"diff":1,"scenario":1,"q":"You are designing a disaster recovery strategy for a multi-tenant platform. The platform has a primary Cloud SQL instance in us-central1. Leadership wants a Recovery Point Objective (RPO) of 1 minute and a Recovery Time Objective (RTO) of 5 minutes. Which Cloud SQL feature combination is most appropriate?","opts":["Enable point-in-time recovery (PITR) on the primary instance and restore to a new instance in another region","Create a Cloud SQL cross-region replica in us-east1 with PITR enabled on both","Export the database to Cloud Storage every 5 minutes using a Cloud Scheduler job and restore from the export","Use Cloud SQL HA (same-region standby) only","Enable daily automated backups with a 7-day retention window"],"ans":1,"fb":"To achieve RPO of 1 minute and RTO of 5 minutes across a regional failure, you need: (1) a cross-region replica that is continuously receiving WAL, giving near-zero RPO (typically seconds to low minutes of replication lag), and (2) the ability to promote the replica quickly (achievable in under 5 minutes with pre-tested runbooks). PITR on both instances allows granular recovery if needed. Daily backups (A) have RPO of up to 24 hours. PITR restore to a new instance (B) meets RPO but RTO can be 10-30 minutes to restore a large instance. Same-region HA (D) does not survive a regional failure. Cloud Storage exports (E) have unpredictable restore times and are not suitable for a 5-minute RTO.","context":{"Primary region":"us-central1","RPO target":"1 minute","RTO target":"5 minutes","Failure scenario":"Full regional outage"}},
    {"level":6,"diff":1,"scenario":1,"q":"Your organisation currently runs all services on a single Cloud SQL regional instance. Leadership asks you to evaluate the DR posture. The current RTO is estimated at 60-90 minutes (time to restore from a backup). What is the most direct GCP-native improvement that reduces RTO to under 5 minutes?","opts":["Deploy a second Cloud SQL instance in a different region and use application-level dual writes for synchronisation","Create a read replica in the same region and manually promote it during an incident","Enable Cloud SQL High Availability, which maintains a hot standby in a different zone and performs automatic failover in 60-120 seconds","Enable automated backups with a 1-hour backup interval to reduce the backup restore window","Use Cloud SQL's export-to-GCS feature to maintain hourly exports, which can be imported faster than full backup restores"],"ans":2,"fb":"Cloud SQL HA uses a hot standby in a different zone within the same region. On primary failure, Cloud SQL automatically fails over to the standby in 60-120 seconds, satisfying a sub-5-minute RTO. Backup frequency (A) reduces RPO, not RTO — restoring a backup still takes 60-90 minutes. Manual replica promotion (C) reduces RTO compared to backup restore but requires human intervention and isn't automatic. Hourly GCS exports (D) still require import time. Dual-write across regions (E) provides cross-region DR but is complex and does not address single-zone failures faster than HA."},
    {"level":6,"diff":1,"scenario":2,"q":"You are presenting a database cost optimisation narrative to the CTO. Cloud SQL spending grew 60% year-over-year while tenant count grew 40%. Leadership wants to understand the gap. Which metric most clearly explains the discrepancy?","opts":["Backup storage costs doubled","The 40% tenant growth figure is wrong","Cloud SQL cross-region egress costs account for the 20% gap","The average instance tier has grown (more vCPUs and RAM per tenant)","Cloud SQL pricing increased by 20% during the year, which accounts for the gap"],"ans":3,"fb":"When cost grows faster than the unit metric (tenants), the explanation is almost always either price increases or per-unit resource growth. The most common cause at platform scale is teams provisioning larger instance tiers than their workload requires, without a periodic right-sizing review process. This creates a compounding cost curve. Presenting data on average vCPU/RAM per tenant over time makes the over-provisioning visible and actionable. Price increases (A) are possible but should be verified against GCP pricing history. Disputing the tenant count (C) without evidence is not helpful. Backup retention doubling (D) would increase storage costs but would not account for a 20% gap in total Cloud SQL spend. Cross-region egress (E) is a separate line item and not a primary Cloud SQL cost driver.","context":{"YoY tenant growth":"40%","YoY Cloud SQL spend growth":"60%","Audience":"CTO, VP Engineering"}},
    {"level":6,"diff":1,"scenario":2,"q":"You are presenting the Cloud SQL cost narrative to the CTO. Costs grew from $18k/month to $47k/month over 12 months. The CTO asks what is driving the increase. Your analysis shows: storage grew 4× (primary driver), compute tier was upgraded twice, and network egress from read replicas tripled. What is the most effective way to present this to a non-technical executive?","opts":["Show a cost breakdown by category (storage, compute, network), identify the top driver (storage)","Present the cost per transaction to show the platform is becoming more efficient as it scales","Show the total monthly cost trend chart and explain that cloud costs always increase with usage","Present a detailed PostgreSQL storage internals breakdown showing table bloat, dead tuples, and TOAST overhead","Recommend migrating to AlloyDB as a cost-saving measure without providing a cost comparison"],"ans":0,"fb":"Executives need context and actionable information, not raw technical detail. The right presentation structure is: (1) what is the cost and how did it change, (2) what is driving it (ranked by impact), (3) what can be done about it and what will it save. Option A (PostgreSQL internals) is not actionable for a CTO. Option C fails to explain causes or offer solutions. Option D (cost per transaction) may be useful as a supplementary metric but doesn't answer 'why did costs increase'. Option E (AlloyDB migration) is a major recommendation that requires a full evaluation — presenting it without comparison data is irresponsible.","context":{"Cost increase":"$18k → $47k/month (+161%)","Primary driver":"Storage growth (4×)","Secondary drivers":"Compute upgrades, network egress from replicas","Audience":"CTO — strategic, cost-conscious, not PostgreSQL expert"}},
    {"level":6,"diff":1,"scenario":3,"q":"You are asked to define the platform standard for Customer-Managed Encryption Keys (CMEK) on Cloud SQL. Which statement best describes when CMEK is required versus when Google-managed encryption is sufficient?","opts":["CMEK is required for all Cloud SQL instances regardless of data classification","CMEK is required only for Cloud SQL instances with more than 1 TB of data","CMEK provides stronger encryption algorithms than GMEK and is therefore always preferable","CMEK is required only if the customer explicitly requests it in their contract","Google-managed encryption (GMEK) satisfies encryption-at-rest requirements for most compliance"],"ans":4,"fb":"GMEK (AES-256) satisfies encryption-at-rest for PCI-DSS, SOX, and most other compliance frameworks because the data is encrypted and Google is a certified compliance-grade cloud provider. CMEK is specifically valuable when the organisation needs to control the encryption key lifecycle — most importantly, the ability to immediately revoke all access to encrypted data by disabling the Cloud KMS key (useful in data breach scenarios or regulatory data deletion requirements). CMEK does not use stronger algorithms (D); both use AES-256. There is no data-size threshold (E). Customer contracts may require CMEK (B) but that is an external trigger, not a definition of when it is appropriate. Requiring CMEK for all instances (A) adds operational complexity without commensurate security benefit for low-sensitivity data.","context":{"Compliance frameworks":"PCI-DSS, SOX, ISO 27001","Data sensitivity levels":"L1 (public) → L4 (regulated financial PII)","Cloud KMS":"Available and integrated with Cloud SQL"}},
    {"level":6,"diff":1,"scenario":3,"q":"You are defining the platform-wide standard for database audit logging to satisfy SOX requirements. Which combination of PostgreSQL logging parameters should form the baseline standard?","opts":["Rely on Cloud SQL's built-in audit trail in the GCP Console","Enable log_duration = on and log_min_duration_statement = 0 to capture all query timings","Enable log_statement = 'all' on all production instances","Enable pgaudit with log_catalog = on and log_level = LOG and ship logs to Cloud Logging","Enable log_connections = on, log_disconnections = on, pgaudit with OBJECT and DDL classes enabled"],"ans":4,"fb":"SOX requires a complete audit trail of who accessed or modified regulated data, with sufficient retention for audit periods (typically 7 years). The correct baseline is: pgaudit for fine-grained object-level and DDL auditing, log_connections/log_disconnections for session-level accountability, structured log output shipped to Cloud Logging (which supports log sinks to Cloud Storage for long-term retention), and a defined retention policy. log_statement = 'all' (A) generates enormous volume with no filtering — impractical at scale. pgaudit without connection logging (B) misses session events. log_duration (C) is a performance tool, not an audit tool. The GCP Console audit trail (E) captures Cloud SQL API operations (instance management) but not row-level or query-level access, which is what SOX requires."},
    {"level":6,"diff":1,"scenario":4,"q":"You are building a platform-wide database observability capability that all teams will adopt. A foundational component is surfacing slow query data. Which PostgreSQL feature should be the baseline, and how should it be exposed to teams?","opts":["Enable pg_stat_statements on all Cloud SQL instances and build a Grafana dashboard that exposes top-N queries by total_exec_time", "Build a custom log parser that reads Cloud SQL slow query logs and aggregates statistics into a BigQuery table", "Enable pg_stat_activity polling every 5 seconds and store the results in a time-series database", "Use OpenTelemetry auto-instrumentation to capture all database query spans and route them to Grafana Tempo", "Use Cloud SQL Query Insights only,"],"ans":0,"fb":"pg_stat_statements is the canonical PostgreSQL extension for query-level performance data. It is supported and easily enabled on Cloud SQL. Surfacing total_exec_time and mean_exec_time through a shared Grafana dashboard gives all teams a consistent, actionable view of their slowest queries without requiring them to build their own tooling. Cloud SQL Query Insights (B) is a good UI but is not easily integrated into a team's existing Grafana dashboards and has limited alerting capability. A custom log parser (C) is fragile and introduces unnecessary latency in feedback. pg_stat_activity polling (D) captures current sessions but does not aggregate historical query performance. OpenTelemetry span collection (E) is complementary but adds per-query tracing overhead and is not designed for aggregate query performance analysis.","context":{"Extension":"pg_stat_statements (available on Cloud SQL PostgreSQL 16)","Teams":"40 services, each with their own database","Observability stack":"Grafana, Cloud Monitoring, OpenTelemetry"}},
    {"level":6,"diff":2,"scenario":0,"q":"You are leading a technology evaluation comparing Cloud SQL PostgreSQL 16 against Spanner for a new high-throughput transactional workload (10,000 TPS, globally distributed tenants). What is the most architecturally significant difference that should drive the decision?","opts":["Cloud SQL is always cheaper than Spanner at 10,000 TPS","Spanner cannot be used with Spring Boot and JPA, making it unsuitable for the current tech stack","Spanner provides external consistency (linearisable, globally distributed transactions) at scale but requires","Cloud SQL PostgreSQL 16 can be scaled horizontally to match Spanner's throughput via read replicas","Spanner supports SQL while Cloud SQL does not, making Spanner suitable for complex queries"],"ans":2,"fb":"The fundamental architectural difference is consistency model and scalability boundaries. Spanner offers external consistency (stronger than serialisable) across globally distributed nodes with horizontal write scaling, but requires developers to work within Spanner-specific schema constraints (no auto-increment sequences — use UUID or bit-reversed integers, interleaved tables for parent-child relationships) and use Spanner's APIs or JDBC driver. Cloud SQL provides full PostgreSQL semantics and familiarity but is bounded by a single-node write throughput. For globally distributed tenants needing consistent transactions, Spanner's model is architecturally superior. Spanner does support SQL (A is false). Cost depends on workload characteristics (C is not universally true). Spanner has Spring and JPA integration via the Cloud Spanner JDBC driver (D is false). Read replicas scale reads, not writes (E is misleading).","context":{"Target TPS":"10,000 write TPS","Tenant distribution":"Users in US, EU, APAC simultaneously","Current tech stack":"Spring Boot 3, JPA/Hibernate"}},
    {"level":6,"diff":2,"scenario":0,"q":"A team wants to evaluate PostgreSQL 16's new logical replication features for replacing a Debezium CDC pipeline. You are asked to provide an authority-level assessment. What is the most important limitation to evaluate for this use case?","opts":["Logical replication in PostgreSQL 16 cannot replicate tables with JSONB columns","PostgreSQL 16 logical replication does not support replicating schema changes (DDL)","PostgreSQL 16 logical replication supports bidirectional replication, making Debezium redundant in all cases","PostgreSQL 16 logical replication is only available on Cloud SQL Enterprise Plus tier","Logical replication requires the subscriber to be the same PostgreSQL version as the publisher"],"ans":1,"fb":"The most significant operational limitation of PostgreSQL logical replication as a CDC replacement is DDL replication: schema changes (ALTER TABLE, CREATE INDEX, etc.) are NOT replicated automatically. The subscriber must have schema changes applied separately, and the replication publication/subscription must be updated if new tables are added. Debezium handles schema evolution more gracefully by capturing DDL events from the WAL and applying them to downstream systems. This makes native logical replication less suitable for pipelines where the upstream schema evolves frequently. Logical replication is available on Cloud SQL PostgreSQL 16 standard tiers (B is false). JSONB is fully supported (C is false). The subscriber can be a lower minor version but must be the same or lower major version (D is overstated). Bidirectional replication (E) is a new feature in PostgreSQL 16 but introduces conflict resolution complexity — it does not make Debezium redundant in all cases.","context":{"Current CDC":"Debezium → Kafka → downstream consumers","Proposed":"PostgreSQL 16 logical replication direct to subscribers","Schema change frequency":"~3 DDL changes per week per service"}},
    {"level":6,"diff":2,"scenario":1,"q":"You are designing a DR drill for the platform's primary Cloud SQL instance. The drill must validate both RPO and RTO under realistic conditions. What should the drill procedure include that is often omitted in untested DR plans?","opts":["Confirming that the replica instance tier matches the primary tier","Testing that the DBA team can SSH into the Cloud SQL instance to run manual recovery steps","Validating that the Cloud SQL backup button works in the GCP Console","Validating that all application services can reconnect after the replica is promoted to primary","Confirming that the Cloud SQL instance is in the correct VPC"],"ans":3,"fb":"The most commonly omitted part of DR plans is validating the full application recovery stack, not just the database failover. When a replica is promoted: the new primary has a different connection name, requiring Auth Proxy sidecar configuration updates; Liquibase may need to run any pending migrations that were applied to the old primary after the last replica sync point; application health checks must pass before traffic is re-routed; and SLO dashboards must be validated to confirm they are reading from the new instance. Clicking the backup button (A) tests backup creation, not DR. Tier matching (B) is a pre-drill check, not a drill step. VPC validation (C) is a pre-drill check. Cloud SQL instances are not directly SSH-accessible (E).","context":{"Primary":"us-central1, Cloud SQL PostgreSQL 16","Replica":"us-east1, promoted during drill","Application":"20 microservices with Auth Proxy sidecars"}},
    {"level":6,"diff":2,"scenario":1,"q":"During a quarterly DR review, you identify that the platform has no tested procedure for promoting a Cloud SQL replica when the Cloud SQL Auth Proxy is the only connectivity method. What specific failure mode does this expose and how should the runbook address it?","opts":["Cloud SQL promotion automatically creates a DNS alias that the Auth Proxy resolves transparently","Auth Proxy failover is handled by Cloud SQL HA, not by the replica promotion process","The Auth Proxy connects using the Cloud SQL instance connection name, which is unique per instance","Auth Proxy connections are automatically re-routed to the new primary after promotion","The Auth Proxy maintains a persistent connection that survives failover"],"ans":2,"fb":"The Cloud SQL Auth Proxy connects using the instance connection name (project:region:instance). When a replica is promoted to a new standalone primary, it receives a new instance connection name. All Auth Proxy sidecar containers or cloud-sql-proxy deployments must be updated with the new connection name and restarted. In a GKE deployment, this means updating the pod/deployment manifest and rolling all pods — which can take several minutes and materially extends RTO if not pre-scripted. The runbook should include the exact kubectl patch command, the new connection name, and a validation step. Auth Proxy does not auto-reroute (A is false). The persistent connection is dropped when the old instance goes offline (C is false). There is no automatic DNS alias (D is false). HA handles same-region failover to a standby, not cross-region replica promotion (E is wrong context).","context":{"Connectivity":"Cloud SQL Auth Proxy sidecar on every GKE pod","Promotion scenario":"Cross-region replica promoted to new primary","Current RTO estimate":"Unknown — never tested"}},
    {"level":6,"diff":2,"scenario":1,"q":"You are designing the cross-region DR strategy for a PCI-DSS platform that processes payments. The target RPO is 1 minute and RTO is 10 minutes. The platform spans two GCP regions. Which architecture best satisfies these requirements?","opts":["Nightly Cloud SQL backups exported to a multi-region Cloud Storage bucket, with a documented runbook to restore in the secondary region","A Cloud SQL primary in region A with point-in-time recovery enabled","A Cloud SQL primary in region A and a secondary Cloud SQL instance in region B that receives hourly data exports via Datastream","A Cloud SQL primary in region A with HA, a cross-region read replica in region B, continuous replication, and a tested promotion procedure with DNS/connection string failover","Two Cloud SQL instances in different regions running in active-active configuration with application-level conflict resolution"],"ans":3,"fb":"A cross-region read replica with continuous streaming replication and a tested promotion procedure is the standard GCP architecture for cross-region DR. Replication lag is typically seconds, satisfying 1-minute RPO. Promotion takes minutes, satisfying 10-minute RTO if the procedure is pre-tested and DNS/connection failover is automated. Nightly backups (A) give an RPO of up to 24 hours. Hourly Datastream exports (C) give 1-hour RPO. Active-active PostgreSQL (D) is not natively supported by Cloud SQL. PITR (E) reduces RPO only to the backup interval, not 1 minute."},
    {"level":6,"diff":2,"scenario":2,"q":"Cloud SQL costs have grown to $180k/year and the CFO wants a 20% reduction. You have identified that 35% of instances are consistently under 20% CPU utilisation. What is the correct way to present and execute the optimisation to leadership and teams?","opts":["Migrate all databases to Spanner to eliminate Cloud SQL costs entirely","Immediately downgrade all under-utilised instances to the smallest available tier to achieve the cost target","Set up committed use discounts (CUDs) for all instances without resizing","Enable Cloud SQL automatic storage reduction to recover over-provisioned storage costs","Present a tiered plan: (1) right-size instances with < 20% CPU to the next-lower tier after validating peak headroom and"],"ans":4,"fb":"A credible cost optimisation narrative for leadership requires a phased plan with projected savings, risk assessment, and a process change to prevent recurrence. Right-sizing is the highest-ROI action, but it requires validating that peak CPU (not average) has headroom and that connection limits on smaller tiers are sufficient. Consolidating dev/non-prod is lower risk. CUDs are complementary but not the primary lever. Immediately downgrading all instances (A) risks performance incidents on instances that have burst peaks above 20%. Migrating to Spanner (C) is a multi-year project and a different product — not a cost-reduction tactic. Cloud SQL does not support automatic storage reduction (D) — storage only grows automatically. CUDs alone (E) give a discount on the current waste rather than eliminating it.","context":{"Annual Cloud SQL spend":"$180,000","Instances under 20% CPU":"35% of fleet","Cost reduction target":"20% ($36,000)"}},
    {"level":6,"diff":2,"scenario":2,"q":"The platform's Cloud SQL bill for the next quarter is projected to be $180,000. Leadership has asked for a 30% cost reduction. You identify that 60% of the bill is storage ($108k), split between live tables ($45k) and archived/audit data ($63k). What is the most credible cost reduction plan to present?","opts":["Reduce the Cloud SQL instance tier from db-custom-16-65536 to db-custom-8-32768 to halve compute costs","Archive data older than 90 days from audit and historical tables to BigQuery or Cloud Storage (significantly cheaper)","Delete the read replicas and use the primary for all read traffic to eliminate replica storage and compute costs","Negotiate a committed use discount with GCP for Cloud SQL to achieve 30% cost reduction on all charges","Commit to switching all services from Cloud SQL to Bigtable, which is cheaper for large datasets"],"ans":1,"fb":"The largest cost lever is the $63k in archived/audit storage. Moving this to BigQuery (which costs ~$5/TB/month vs ~$200/TB/month for Cloud SQL SSD storage) can yield a 10-20× reduction on that portion. Combining this with partition-drop strategies for event/outbox tables addresses the storage root cause rather than just tuning around it. This gives a credible path to $55k-$65k savings — meeting the 30% target. Bigtable (A) is not a drop-in replacement and the migration cost would far exceed savings. Halving compute (C) would reduce $72k compute by 50% = $36k saving, but compute is only 40% of the bill so this misses the largest lever. CUDs (D) apply only to compute, not storage. Deleting replicas (E) risks RTO/RPO and the DR posture.","context":{"Quarterly bill projection":"$180,000","Storage breakdown":"$45k live tables + $63k archive/audit data","BigQuery storage cost":"~$5/TB/month vs $200/TB/month for Cloud SQL SSD","Target saving":"$54,000 (30%)"}},
    {"level":6,"diff":2,"scenario":3,"q":"You are defining the platform's policy for row-level security (RLS) on multi-tenant tables. A team has implemented RLS but a security audit finds that the application's database user has BYPASSRLS privilege. What is the finding and what is the remediation?","opts":["BYPASSRLS on the application user completely bypasses all RLS policies","The finding is a false positive","BYPASSRLS is required for application users to read their own tenant's data through RLS policies","BYPASSRLS only applies to superuser connections and has no effect on application users","BYPASSRLS only bypasses RLS for SELECT statements, not for INSERT, UPDATE, or DELETE"],"ans":0,"fb":"BYPASSRLS is a PostgreSQL role attribute that completely skips all RLS policy evaluation for that role — it is equivalent to disabling RLS for that user. An application user with BYPASSRLS can query any row in any tenant's data, bypassing the entire isolation model. This is a critical security finding in a multi-tenant platform. The remediation is to revoke BYPASSRLS, ensure the application role only has the minimum required permissions, and confirm that each session correctly sets the tenant context (e.g., SET app.current_tenant_id = '...') which the RLS policy uses via current_setting(). BYPASSRLS is not required for normal application access (A is false). It applies to any role it is granted to, not just superusers (C is false). It is not related to pgaudit (D is false). It bypasses ALL operations, not just SELECT (E is false).","context":{"Finding":"Application DB user has BYPASSRLS attribute","RLS policy":"Uses current_setting('app.current_tenant_id')","Compliance":"PCI-DSS — tenant data isolation required"}},
    {"level":6,"diff":2,"scenario":4,"q":"You are building a shared Liquibase baseline configuration that all platform teams will use. A key requirement is that migrations must be idempotent and safe to re-run. Which Liquibase feature should be mandated, and what does it protect against?","opts":["Mandate runOnChange = true on all changesets so Liquibase re-runs every changeset on every deployment","Mandate that all changesets use the runAlways flag to guarantee they are applied in every environment","Mandate that changesets use stripComments = false to preserve SQL comments for audit purposes","Mandate that all non-idempotent changesets (DDL) use preconditions (e.g., tableExists","Mandate that all changesets target a specific PostgreSQL version using the dbms precondition"],"ans":3,"fb":"Idempotent migrations protect against the scenario where a migration partially applies (e.g., the service pod restarts mid-migration) and must be re-run. PostgreSQL 16 supports IF NOT EXISTS for most DDL operations (CREATE TABLE, ADD COLUMN, CREATE INDEX CONCURRENTLY). Preconditions in Liquibase (e.g., <preconditions onFail='MARK_RAN'>) provide an alternative safety net. Rollback blocks allow clean recovery from failed deployments. runOnChange (A) re-runs a changeset whenever its content changes — appropriate for stored procedures but dangerous for DDL. runAlways (B) runs the changeset on every deployment regardless — appropriate only for very specific use cases. stripComments (D) is a formatting preference with no safety benefit. Targeting a specific PostgreSQL version (E) is unnecessarily restrictive for a platform that controls its own PostgreSQL version.","context":{"Platform":"40 services, each with Liquibase-managed schema","Problem":"Partial deployment failures require manual DB cleanup","PostgreSQL":"16 (IF NOT EXISTS supported for DDL)"}},
    {"level":6,"diff":3,"scenario":0,"q":"You are leading an authority-level evaluation of whether to adopt CockroachDB as an alternative to Cloud SQL PostgreSQL 16 for a new multi-region, high-write-throughput product. A key argument from the proposing team is that CockroachDB eliminates the need for multi-region application logic. How do you assess this claim?","opts":["CockroachDB is not suitable for financial workloads due to lack of ACID transactions","The claim is correct","CockroachDB is PostgreSQL-compatible in all cases","CockroachDB uses a different consistency model (eventual consistency) which is incompatible with PCI-DSS requirements","The claim is partially correct: CockroachDB's distributed transactions and multi-region tables eliminate the need for manual shard routing"],"ans":4,"fb":"CockroachDB does significantly simplify multi-region architecture by handling distributed consensus, automatic data placement (using REGIONAL BY ROW or GLOBAL tables), and providing serialisable transactions globally. However, the 'no application changes needed' claim is an oversimplification: (1) CockroachDB uses serialisable isolation by default, which may conflict with application assumptions about PostgreSQL's READ COMMITTED default; (2) cross-region transactions incur 50-200ms of consensus latency that must be accounted for in SLO design; (3) PostgreSQL dialect compatibility gaps (e.g., certain pg_catalog views, some stored procedure features, sequence behaviour) may require application code changes. The evaluation must include a realistic migration compatibility audit. CockroachDB is fully ACID (D is false). It uses serialisable (distributed) consistency, which is compatible with PCI-DSS (E is false).","context":{"Use case":"Multi-region financial ledger, 15,000 write TPS","Regions":"US, EU, APAC simultaneous writes","Claim":"CockroachDB eliminates multi-region application logic"}},
    {"level":6,"diff":3,"scenario":1,"q":"You are designing a cross-region DR architecture where the platform must survive a complete regional failure with zero data loss (RPO = 0). You know that Cloud SQL cross-region replicas use asynchronous replication. How do you achieve RPO = 0 within the Cloud SQL family?","opts":["Use Cloud SQL HA within the region and supplement with an application-level dual-write pattern that","Set synchronous_commit = on on the primary","RPO = 0 is impossible with Cloud SQL","Deploy a Patroni cluster on GKE in two regions with synchronous replication between them","Enable Cloud SQL PITR with a 1-second granularity"],"ans":0,"fb":"Cloud SQL cross-region replicas are asynchronous — there is no supported way to make them synchronous at the Cloud SQL layer. To achieve RPO = 0 for a critical workload, the architectural pattern is application-level dual-write: the application writes to both regional databases synchronously within the same operation before returning success to the client. This introduces cross-region write latency (50-100ms) that must be factored into the SLO design. Alternatives include designing the domain to use event sourcing with a Kafka cluster that has multi-region synchronous replication (Confluent or MSK with synchronous replication). synchronous_commit on the primary does not make Cloud SQL's cross-region replica synchronous (A is false — this setting controls local WAL durability). Spanner (B) is a valid architectural alternative but not an answer about RPO within Cloud SQL. PITR at 1-second granularity (D) is RPO = 1 second, not RPO = 0. Patroni on GKE (E) is self-managed and a separate evaluation.","context":{"RPO requirement":"0 (zero data loss)","Cloud SQL replication":"Asynchronous to cross-region replica","Cross-region latency":"~65ms between us-central1 and europe-west1"}},
    {"level":6,"diff":3,"scenario":1,"q":"Following a cross-region failover drill, the team discovers that promoting the read replica took 18 minutes — exceeding the 10-minute RTO target. Investigation shows that the promotion delay was caused by the replica needing to apply 14 minutes of accumulated WAL before becoming writable. What is the most effective long-term fix?","opts":["Switch to a synchronous replication model where the primary waits for the replica to confirm WAL before committing","Reduce replication lag by ensuring the replica instance is sized to keep up with the primary's write throughput","Disable WAL archiving on the primary to reduce the volume of WAL the replica must process","Increase the Cloud SQL instance tier of the read replica so it can apply WAL faster","Increase `max_wal_size` on the primary to buffer more WAL locally and reduce network transfer during failover"],"ans":1,"fb":"WAL accumulation on the replica indicates the replica cannot keep up with the primary's write throughput — it is perpetually lagging behind. Upsizing the replica CPU and I/O (part of B) allows it to apply WAL faster and stay closer to the primary, reducing accumulated lag. Regular DR drills (also B) are critical to detecting this drift before a real incident. Option A (increasing tier) is part of the fix but without understanding why the lag exists and without ongoing monitoring, the problem recurs. Synchronous replication (C) solves lag but adds write latency on the primary and is not Cloud SQL's default model. Disabling WAL archiving (D) would break PITR. Increasing `max_wal_size` (E) buffers more WAL in memory/disk on the primary; it does not affect the replica's application rate.","context":{"Observed issue":"Replica had 14 minutes of WAL to apply before promotion completed","Root cause":"Replica perpetually lagging behind primary write throughput","Detection gap":"No alerting on replication lag; discovered only during drill"}},
    {"level":6,"diff":3,"scenario":2,"q":"The CTO asks you to build a multi-year Cloud SQL cost model to inform a potential architecture shift. You have 3 years of cost data. A key variable is whether to continue scaling vertically (larger instances) or introduce horizontal read scaling (read replicas). How do you model and present the decision?","opts":["Present only the read replica option", "Present only the current year's cost trajectory and extrapolate linearly for 3 years without considering architecture changes", "Model three scenarios: (1) continue vertical scaling at current growth rate, (2) introduce read replicas at a defined tenant count threshold", "Build the model assuming 0% growth as a conservative baseline to avoid overstating costs", "Recommend immediately migrating to Spanner to avoid future Cloud SQL cost growth"],"ans":2,"fb":"An authority-level cost model for a strategic decision must present multiple scenarios with different architecture assumptions, not a single linear extrapolation. The three-scenario model (vertical scaling, read replica scaling, platform migration) gives leadership the information needed to make a trade-off decision: at what tenant count does the cost of vertical scaling exceed the engineering investment of horizontal scaling? What is the migration cost to Spanner versus the savings? Confidence intervals based on historical growth variance acknowledge uncertainty honestly. A linear extrapolation (A) is too simplistic for a strategic decision. Recommending Spanner immediately (C) pre-empts the analysis. Read replicas are not cheaper in all cases (D) — they add instance cost and replication lag management. A 0% growth baseline (E) is dishonest and not useful for planning.","context":{"Cost data":"3 years of Cloud SQL billing, tenant growth, and query volume","Audience":"CTO, CFO","Decision":"Architecture investment for next 3 years"}},
    {"level":6,"diff":3,"scenario":2,"q":"You are presenting to the board on the platform's database total cost of ownership (TCO). Beyond Cloud SQL instance costs, what components must be included in a complete TCO model to avoid underreporting?","opts":["Include Cloud SQL costs and a flat 20% overhead estimate for operational costs","Include only the costs that appear on the Cloud SQL billing line in the GCP invoice","TCO models for cloud databases should exclude engineering labour costs as these are fixed costs","Only Cloud SQL instance hourly costs and storage costs need to be included","Cloud SQL instance costs, storage, backup storage, network egress (especially cross-region replication and Cloud"],"ans":4,"fb":"A complete database TCO model for board-level presentation must include: (1) Cloud SQL compute (instance hours), (2) storage (provisioned + auto-growth), (3) backup storage (PITR logs + automated backups), (4) network egress (cross-region replica replication traffic, Auth Proxy traffic within the VPC, and any cross-region data access), (5) Cloud KMS key operation costs if CMEK is enabled, and (6) fully-loaded engineering labour for migrations, on-call, performance tuning, and DR activities. Engineering labour is often the largest cost component at platform scale and is frequently excluded from cloud cost dashboards, leading to systematic underreporting. Only billing-line costs (A, C) ignores labour. A flat 20% overhead (D) is an approximation that cannot be defended to a board. Excluding labour (E) is the most common and expensive omission.","context":{"Audience":"Board of Directors","Purpose":"Justify infrastructure investment for next fiscal year","Known cost components":"Cloud SQL instances, storage, CMEK"}},
    {"level":6,"diff":3,"scenario":2,"q":"You have delivered a cost reduction initiative that saved $60k/month by archiving audit data to BigQuery. Three months later, costs have rebounded to within $15k of the original level. The growth is in compute — three new teams have each provisioned db-custom-16-65536 instances for their services. What governance change would most effectively prevent uncontrolled cost growth going forward?","opts":["Establish a Cloud SQL instance provisioning policy with pre-approved tier tiers for different workload classes","Remove all engineers' ability to provision Cloud SQL instances and route all requests through a DBA ticket queue","Mandate that all new services must use Cloud Spanner instead of Cloud SQL to reduce provisioning flexibility","Set a GCP budget alert at 110% of target spend and notify the platform team when it triggers","Implement a chargeback model where each team is billed internally for their Cloud SQL costs, without changing provisioning controls"],"ans":0,"fb":"Cost rebound from unconstrained provisioning requires a governance change: a policy that defines appropriate instance sizes for workload types (e.g., development, staging, production-small, production-large), a cost approval gate for large instances, and visible cost accountability through per-team dashboards. Budget alerts (C) are reactive — they notify after costs have grown, not before. Removing all provisioning access (A) creates a bottleneck that slows development. Mandating Spanner (D) is a major architectural shift that adds complexity. Chargeback alone (E) creates financial awareness but without provisioning controls, engineers can still over-provision.","context":{"Rebound cause":"3 new teams each provisioned large Cloud SQL instances without review","Required change":"Proactive governance, not just monitoring","Policy components":"Pre-approved tier tiers, approval gate, per-team cost dashboards"}},
    {"level":6,"diff":3,"scenario":3,"q":"A new compliance requirement mandates that all SELECT queries on PCI-DSS-regulated tables must be logged with the actual user identity (not just the service account), the tenant context, and the query timestamp. The current architecture uses a single application-level service account. How do you satisfy this requirement without re-architecting the entire authentication model?","opts":["Enable log_statement = 'all' on the Cloud SQL instance","Use PostgreSQL row-level security with a policy that logs queries to a separate audit table via a BEFORE SELECT trigger","Use Cloud SQL Data Access Audit Logs in GCP","Use pgaudit with OBJECT-level auditing on the regulated tables, and require the application to inject end-user identity and tenant context","Create individual PostgreSQL users for each application user and revoke the service account"],"ans":3,"fb":"The pattern for injecting application-level user identity into PostgreSQL audit logs without changing the authentication model is session variables: at the start of each transaction, the application sets SET LOCAL app.user_id = '...' and SET LOCAL app.tenant_id = '...'. pgaudit can be configured to log these session parameters alongside the query (using log_line_prefix and pgaudit.log_parameter). This satisfies the requirement for user identity and tenant context in the audit log without requiring individual DB users. log_statement = 'all' (A) logs the service account, not the end-user identity. Individual DB users per application user (B) is architecturally disruptive and impractical at scale. Cloud SQL Data Access Audit Logs (D) capture IAM-level access, not application-level user context. BEFORE SELECT triggers (E) do not exist in PostgreSQL — triggers cannot intercept SELECT statements.","context":{"Regulated tables":"payment_instruments, card_tokens, pii_records","Current auth":"Single service account (cloud-sql-sa@project.iam)","Requirement":"Log end-user identity + tenant + timestamp per SELECT"}},
    {"level":6,"diff":3,"scenario":3,"q":"You are conducting an authority-level review of the platform's data retention and deletion standard. A new right-to-erasure (GDPR/CCPA) requirement means that deleting a tenant's PII must be reflected in all backups within 30 days. How do you address this architectural challenge given that Cloud SQL PITR backups are immutable?","opts":["Rely on the 35-day PITR retention window: all backups older than 35 days are automatically deleted, satisfying the 30-day requirement", "Implement cryptographic erasure: encrypt PII columns with a per-tenant key stored in Cloud KMS", "Store all PII in a separate Cloud Storage bucket with object-level deletion, and use Cloud SQL only for non-PII data", "Apply the erasure only to the live database", "Delete and recreate the Cloud SQL instance after each erasure request to ensure all backups are clean"],"ans":1,"fb":"Cryptographic erasure is the established architectural pattern for satisfying right-to-erasure requirements when backup immutability prevents physical deletion. By encrypting PII columns with per-tenant keys in Cloud KMS and deleting (destroying) the key upon an erasure request, the data in all existing backups becomes permanently unreadable — effectively erased — without modifying the backup files. This satisfies GDPR and CCPA erasure requirements. Recreating the instance (A) is operationally catastrophic and does not address existing backups on other systems. Relying on PITR expiry (C) means data persists for up to 35 days after an erasure request, which may violate the requirement for timely erasure. Separating PII to Cloud Storage (D) is a different architecture, not a solution to the backup immutability problem. Technical exception claims (E) are not universally accepted and expose the platform to regulatory risk.","context":{"Requirement":"GDPR/CCPA right-to-erasure: PII must be unrecoverable within 30 days","Backup mechanism":"Cloud SQL PITR (35-day retention, immutable)","Encryption":"CMEK available via Cloud KMS"}},
    {"level":6,"diff":3,"scenario":4,"q":"You are building a platform capability that automatically detects tables that are candidates for partitioning based on query patterns and growth metrics. The capability will emit recommendations to teams. What combination of PostgreSQL system catalog data should drive the detection logic?","opts":["Monitor pg_stat_user_tables.seq_scan and n_live_tup","Monitor pg_locks for tables with frequent lock wait events as a proxy for large table access patterns","Monitor pg_stat_statements for queries with long mean_exec_time and cross-reference with pg_class.reltuples > 100M and","Monitor pg_stat_bgwriter.buffers_clean to identify tables that are evicting pages frequently","Monitor only pg_stat_user_indexes.idx_scan and flag tables where index scans drop below a threshold"],"ans":2,"fb":"A partitioning recommendation engine needs multi-signal detection: (1) query performance signal from pg_stat_statements (slow mean_exec_time on queries touching the table), (2) size signal from pg_class.reltuples (row count estimate) and pg_total_relation_size(), (3) access pattern signal from pg_stat_user_tables (rising seq_scan rate over time suggests full scans that partition pruning could eliminate), and (4) schema signal from information_schema.columns to identify whether a suitable partition key column (date, tenant_id) exists. Simply thresholding seq_scan and n_live_tup (A) produces too many false positives (e.g., tables that are small but frequently scanned for other reasons). bgwriter (C) identifies buffer pressure, not partitioning candidates specifically. idx_scan dropping (D) is a weak signal without size context. pg_locks (E) indicates contention, not size/scan patterns.","context":{"Platform capability":"Automated partitioning recommendations","Signal sources":"pg_stat_statements, pg_stat_user_tables, pg_class, information_schema","Target":"Tables > 100M rows with suitable partition keys"}},
    {"level":6,"diff":3,"scenario":4,"q":"You are designing a platform-wide connection pooling capability using PgBouncer deployed as a GKE sidecar. Teams are complaining that their Liquibase migrations fail when routed through PgBouncer in transaction mode. What is the root cause and the correct architectural decision?","opts":["PgBouncer in transaction mode is not compatible with PostgreSQL 16 and must be upgraded", "PgBouncer in transaction mode cannot be used with Liquibase", "Liquibase is incompatible with connection pooling in general and must always connect directly to PostgreSQL", "PgBouncer in transaction mode is correct but Liquibase must be configured to use SET TRANSACTION instead of advisory locks", "The fix is to increase PgBouncer's pool size so Liquibase always gets a dedicated connection"],"ans":1,"fb":"Liquibase uses pg_advisory_lock() to prevent concurrent migrations from running simultaneously. pg_advisory_lock is a session-level lock — it persists for the duration of the database session. In PgBouncer transaction mode, the server-side connection is released back to the pool after each transaction commits. This means the advisory lock acquired by Liquibase at the start of its migration session is released when the first transaction ends, and another Liquibase instance could acquire the same lock and run concurrently — causing data corruption. The correct fix is to route Liquibase connections directly to Cloud SQL (bypassing PgBouncer) or to use PgBouncer in session mode for the migration service role, which holds a dedicated server connection for the duration of the client session. PgBouncer transaction mode is fully compatible with PostgreSQL 16 (A is false). Liquibase works fine with session-mode pooling (C is wrong). pg_advisory_lock cannot be replaced by SET TRANSACTION (D is wrong). Increasing pool size (E) does not change the lock release behaviour.","context":{"PgBouncer mode":"transaction","Liquibase version":"4.x","Symptom":"Liquibase fails with 'lock not held' or concurrent migration errors"}},
      {"level":1,"diff":1,"scenario":0,"q":"A query returns duplicate rows when joining orders to order_items. Which clause removes the duplicates while keeping all matched rows?","opts":["Use GROUP BY on the order ID","Switch to a RIGHT JOIN","Add DISTINCT to the SELECT","Use UNION instead of JOIN","Add a HAVING count(*) > 1 filter"],"ans":2,"fb":"DISTINCT removes duplicate output rows caused by one-to-many joins. GROUP BY changes the query semantics and requires aggregates. UNION combines result sets, not rows within a join."},,
      {"level":1,"diff":2,"scenario":1,"q":"Your Spring Boot entity has a @ManyToOne to a Tenant entity. Which column belongs in the child table?","opts":["A JSON column storing the tenant object","A join table with both IDs","A tenant_id foreign key column","A sequence shared between both tables","A child_id primary key on the tenant table"],"ans":2,"fb":"A @ManyToOne maps to a foreign key in the owning (child) table. Join tables are for many-to-many. JSON columns break relational integrity."},,
      {"level":1,"diff":3,"scenario":2,"q":"A service loads 50 invoices and for each calls invoiceRepo.findById(id) to fetch the client. How should this be fixed?","opts":["Add @Cacheable to findById","Fetch invoices with a JOIN FETCH on client","Batch the IDs into 10 separate queries","Switch from LAZY to EAGER globally","Increase the HikariCP pool size"],"ans":1,"fb":"JOIN FETCH loads the association in one query, eliminating the N+1. @Cacheable helps repeated lookups but doesn't reduce query count on first load. Switching to EAGER globally causes over-fetching."},,
      {"level":1,"diff":2,"scenario":4,"q":"A table has no index on the status column. What happens when WHERE status = 'ACTIVE' runs on a million-row table?","opts":["The query is cached after the first execution","PostgreSQL uses the primary key index automatically","PostgreSQL performs a sequential scan reading every row","PostgreSQL skips NULL rows to speed the scan","Performance is unaffected if the column has low cardinality"],"ans":2,"fb":"Without an index, PostgreSQL reads every page (sequential scan). The primary key index only helps when filtering by PK. Low cardinality may actually make an index less useful, not remove the need for one."},,
      {"level":2,"diff":1,"scenario":0,"q":"You're designing a payments schema where one payment can have many line items. Which approach correctly enforces referential integrity?","opts":["Add a payment_id FK on the line_items table","Create a trigger to validate IDs on insert","Store line items as JSONB inside the payment row","Add a line_item_ids array column on payments","Use a separate audit table to track the relationship"],"ans":0,"fb":"A foreign key on the child table is the standard relational approach enforced by the database engine. Array columns and JSONB break normalization and don't support cascades or referential checks natively."},,
      {"level":2,"diff":2,"scenario":1,"q":"EXPLAIN ANALYZE shows a Bitmap Heap Scan with a high 'Rows Removed by Filter'. What does this indicate?","opts":["The query planner chose a sequential scan incorrectly","The index is not selective enough for the query predicate","Statistics are perfectly accurate","The heap scan is always slower than an index scan","The table has no index at all"],"ans":1,"fb":"High rows removed by filter means many index-matched blocks were fetched from the heap but discarded. A more selective or partial index would reduce heap fetches."},,
      {"level":2,"diff":3,"scenario":2,"q":"You need to rename a column used by a running production service with zero downtime. What is the safest first step?","opts":["Rename the column directly with ALTER TABLE","Create a view that aliases the column name","Add the new column alongside the old one","Drop the old column and deploy new code simultaneously","Lock the table during a low-traffic window"],"ans":2,"fb":"The expand-contract pattern adds the new column first, backfills it, then updates code, and finally drops the old. Renaming directly breaks existing queries immediately."},,
      {"level":2,"diff":1,"scenario":3,"q":"A query filters on (account_id, created_at) but the index only covers account_id. What change would most help?","opts":["Run VACUUM ANALYZE on the table", "Create a composite index on (account_id,", "Add a separate index on created_at", "Increase work_mem to help the sort", "Cluster the table on account_id"],"ans":1,"fb":"A composite index allows the planner to use both columns. A separate index on created_at alone cannot be combined efficiently with the account_id equality filter."},,
      {"level":2,"diff":2,"scenario":4,"q":"Two concurrent transactions both read a balance of £100, each add £50, and each write back £150. What anomaly occurred?","opts":["Deadlock","Serialization failure","Dirty read","Lost update","Phantom read"],"ans":3,"fb":"Both transactions read the same initial value and overwrite each other's write — this is a lost update. Prevented by SELECT FOR UPDATE or REPEATABLE READ with optimistic locking."},,
      {"level":3,"diff":2,"scenario":0,"q":"You are building a ledger where entries must never be deleted or altered after posting. Which design enforces this at the database level?","opts":["Partition the table by month and detach old partitions", "Store entries as JSONB for immutability", "Add a deleted_at soft-delete column", "Grant INSERT-only privileges", "Use a trigger that logs changes to an audit table"],"ans":3,"fb":"Revoking UPDATE and DELETE at the privilege level makes mutation impossible regardless of application bugs. Soft-delete and triggers still allow updates."},,
      {"level":3,"diff":1,"scenario":1,"q":"autovacuum runs frequently but table bloat keeps growing. Which setting directly addresses this?","opts":["Run REINDEX CONCURRENTLY on all indexes","Increase max_connections to reduce contention","Lower autovacuum_vacuum_scale_factor for the table","Increase checkpoint_completion_target","Disable autovacuum and schedule manual VACUUM"],"ans":2,"fb":"A high scale factor means autovacuum only triggers after many dead rows accumulate. Lowering it triggers more frequent vacuuming on busy tables. Adjusting checkpoints or connections does not reduce bloat."},,
      {"level":3,"diff":3,"scenario":2,"q":"You must add a NOT NULL column with no default to a 200M-row live table. What is the correct approach?","opts":["Add the column as a generated always expression","Add as nullable, backfill in batches, then add NOT NULL constraint","Lock the table briefly during off-hours","Use pg_repack to rebuild with the new column","Use ADD COLUMN NOT NULL with a DEFAULT directly"],"ans":1,"fb":"Adding nullable first and backfilling in batches avoids a prolonged lock. NOT VALID then VALIDATE CONSTRAINT adds the constraint without holding an exclusive lock across the full backfill."},,
      {"level":3,"diff":2,"scenario":4,"q":"pg_stat_activity shows transactions in 'idle in transaction' holding locks for 10+ minutes. What is the immediate mitigation?","opts":["Increase max_locks_per_transaction","Set idle_in_transaction_session_timeout to terminate them","Restart the Cloud SQL instance","Increase lock_timeout globally","Add SELECT FOR UPDATE NOWAIT to blocked queries"],"ans":1,"fb":"idle_in_transaction_session_timeout automatically kills sessions that hold open transactions without activity, releasing their locks. Restarting is disruptive. NOWAIT affects new queries, not already-blocked ones."},,
      {"level":4,"diff":2,"scenario":0,"q":"A 500GB events table is range-partitioned by created_at. Queries filtering only on tenant_id scan all partitions. What is the best fix?","opts":["Add a composite partition key on (tenant_id, created_at)","Switch to list partitioning by tenant_id","Increase parallel_workers to speed partition scans","Use pg_partman to add sub-partitions by tenant","Create an index on tenant_id on each partition"],"ans":4,"fb":"A local index on tenant_id per partition allows efficient tenant filtering within each date partition without rebuilding the entire table. Changing the partition key requires a full table rebuild."},,
      {"level":4,"diff":1,"scenario":1,"q":"After a Cloud SQL primary failover, your Spring Boot service returns connection errors for 30 seconds. What is the most likely cause?","opts":["The GKE pod has been evicted","The Cloud SQL Auth Proxy has not yet restarted","HikariCP is serving stale connections from the pool","HA was not enabled so no failover occurred","The SSL certificate expired during failover"],"ans":2,"fb":"After failover the old TCP connections in the HikariCP pool are broken. connectionTestQuery or keepaliveTime helps detect and replace stale connections faster."},,
      {"level":4,"diff":3,"scenario":2,"q":"Increasing maximumPoolSize to 100 under load makes connection timeouts worse, not better. Why?","opts":["The Cloud SQL Auth Proxy has a fixed limit of 50 connections", "maximumPoolSize must equal the thread count exactly", "GKE CPU limits are throttling the Spring Boot pod", "HikariCP does not support pool sizes above 50", "More connections increase PostgreSQL memory pressure and lock"],"ans":4,"fb":"PostgreSQL degrades under very high connection counts due to per-connection overhead. Right-size the pool and use PgBouncer or Cloud SQL connection pooling to cap backend connections."},,
      {"level":4,"diff":1,"scenario":3,"q":"Compliance requires all database activity on a PCI-DSS table to be attributable to a specific user. pgaudit is enabled. What additional step is required?","opts":["Enable Cloud SQL IAM authentication for each engineer", "Enable Cloud SQL binary logging for PITR", "Set pgaudit.log='all' and configure log_line_prefix to include", "Encrypt the table with a CMEK key", "Create a separate audit schema with RLS"],"ans":2,"fb":"pgaudit captures SQL but attribution requires the log to include which user ran it. log_line_prefix with %u (user) and %a (application name) provides that context."},,
      {"level":4,"diff":2,"scenario":4,"q":"Grafana shows query latency spiking every 5 minutes. PostgreSQL logs show checkpoints taking over 30 seconds. What tuning addresses this?","opts":["Increase shared_buffers to reduce checkpoint work","Set synchronous_commit=off to reduce WAL latency","Increase max_wal_size to delay checkpoints","Increase checkpoint_completion_target closer to 1.0","Decrease checkpoint_timeout for more frequent checkpoints"],"ans":3,"fb":"A high checkpoint_completion_target (e.g. 0.9) spreads dirty-page writes across the full checkpoint interval, smoothing I/O. Decreasing timeout makes checkpoints more frequent and compounds the problem. synchronous_commit=off risks data loss."},]
  },


  jvm: {
    id: "jvm", label: "Memory Management", icon: "jvm",
    desc: "How memory works in Spring Boot services on GKE. Starts with dashboards, progresses through container memory budgets and Spring Boot internals, and reaches JVM diagnostic tools for deep investigation.",
    levels: [
      { num:1, name:"Foundations", desc:"I know my app uses memory and I can see it. I can find the right dashboard, recognise symptoms, and escalate with useful information.", scenarios:["Reading Grafana memory panels and recognising healthy vs unhealthy patterns","Understanding OOMKilled — what it means and how to spot it","Recognising memory configuration in deployment manifests (-Xmx, resource limits)","Understanding Spring Boot warm-up and why first requests are slow","Having a basic mental model of heap, stack, GC, and OutOfMemoryError"] },
      { num:2, name:"Practitioner", desc:"I understand the container memory budget. When a pod gets OOMKilled, I can figure out whether it's heap or container sizing, and configure a new service correctly.", scenarios:["Sizing JVM memory for containers: heap + Metaspace + threads + buffers must fit the limit","Applying the 60-70% rule and understanding why -Xmx = container limit causes OOMKill","Recognising non-heap memory growth when heap looks healthy but pod memory climbs","Reading kubectl describe pod after OOMKill and correlating with JVM config","Understanding UseContainerSupport and Kubernetes resource requests vs limits"] },
      { num:3, name:"Adept", desc:"I know where memory goes inside a Spring Boot app. I can reason about consumers and make informed configuration and code review decisions.", scenarios:["Reasoning about Spring Boot memory consumers: HikariCP, Kafka buffers, Tomcat threads, caches","Reading Actuator memory metrics and correlating with behaviour","Distinguishing OutOfMemoryError types: heap space, Metaspace, unable to create native thread","Flagging memory risks in code reviews: unbounded collections, missing eviction, batch accumulation","Estimating a service's memory footprint from its configuration"] },
      { num:4, name:"Veteran", desc:"I can find root causes using JVM diagnostic tools. Dashboard observation isn't enough — I look inside the JVM to find leaks, GC pressure, and contention.", scenarios:["Analysing heap dumps with Eclipse MAT to find memory leaks and retained objects","Reading GC logs to identify promotion rate, pause patterns, and old-gen growth","Using JFR to profile allocation hotspots and correlate with GC pressure","Interpreting thread dumps to diagnose contention and pool exhaustion","Investigating Metaspace growth and class loader leaks"] },
      { num:5, name:"Expert", desc:"I design for memory efficiency and set standards. Proactive decisions that prevent memory problems across services.", scenarios:["Evaluating G1 vs ZGC for production SLAs with JFR data","Designing memory budgets across thread pools and connection pools","Diagnosing cold start memory dimensions and designing readiness strategies","Defining org-wide JVM configuration baselines","Assessing Java version upgrade memory implications"] },
      { num:6, name:"Authority", desc:"I own memory strategy for the engineering organisation. Platform observability, capacity planning, SLA budgets, and technology roadmap.", scenarios:["Designing fleet-wide memory reliability strategy and driving adoption","Translating memory behaviour into SLA performance budgets","Evaluating emerging JVM capabilities (virtual threads, CRaC, GraalVM AOT)","Building fleet-wide memory observability and automated diagnostics","Leading deep production investigations involving native memory or driver-level issues"] }
    ],
    questions: [
    {"level":1,"diff":1,"scenario":0,"q":"In a Grafana JVM dashboard, 'Used Heap' shows a sawtooth pattern — rises then drops sharply, over and over. What does this pattern indicate?","opts":["A memory leak — objects are not being collected","Normal healthy behaviour — heap rises as objects are allocated, then drops when GC runs","The service is crashing and restarting repeatedly","GC is misconfigured","The heap is too small"],"ans":1,"fb":"The sawtooth pattern is the signature of healthy garbage collection: objects are allocated (heap rises), GC runs and reclaims short-lived objects (heap drops sharply), and the cycle repeats. A memory leak would show a pattern where each trough is higher than the last — the baseline rises over time."},
    {"level":1,"diff":2,"scenario":0,"q":"In Grafana, 'Used Heap' climbs steadily over 6 hours without any drops. What does this pattern suggest?","opts":["Normal behaviour — the heap hasn't filled up yet so GC hasn't run","A memory leak — objects are being retained and GC cannot reclaim them","The service is idle with no traffic","GC is disabled","The dashboard is stale"],"ans":1,"fb":"Steady heap growth without drops means GC is running but cannot reclaim enough memory — objects are being retained by references the GC cannot clear. Normal behaviour produces a sawtooth pattern with periodic drops."},
    {"level":1,"diff":3,"scenario":0,"q":"A Grafana panel shows 'GC Pause Duration' spiking to 500ms every few minutes. The 'Used Heap' sawtooth looks normal. What is the immediate concern?","opts":["Nothing — GC pauses are normal","Application threads are frozen for 500ms during each pause, causing latency spikes for API callers","The service is about to crash","The heap is too large","The dashboard time range is too narrow"],"ans":1,"fb":"GC pauses are stop-the-world events — all application threads freeze while GC runs. A 500ms pause directly translates to a 500ms latency spike for any request in progress. G1GC's default target is 200ms — 500ms pauses indicate the heap may be too large or GC needs tuning."},
    {"level":1,"diff":1,"scenario":1,"q":"A GKE pod is restarting repeatedly with exit code 137. What happened?","opts":["The liveness probe failed","The JVM threw an unhandled exception","The container was OOM-killed by the Linux kernel — it exceeded its memory limit","The pod exceeded its CPU limit","A deployment rollback was triggered"],"ans":2,"fb":"Exit code 137 = killed by signal 9 (SIGKILL). The Linux OOM killer sends SIGKILL when a container's memory usage exceeds its cgroup limit. Liveness probe failures show different events in kubectl describe. CPU throttling slows the pod but does not kill it."},
    {"level":1,"diff":2,"scenario":1,"q":"A pod was OOM-killed (exit code 137). The JVM logs do NOT show OutOfMemoryError. How is this possible?","opts":["It's not possible — OOMKill always produces an OutOfMemoryError first","The kernel killed the container before the JVM detected it — OOMKill is external to the JVM","The logs were lost during the restart","The JVM suppressed the error","The OOM-kill was for a different container in the pod"],"ans":1,"fb":"OOMKill (exit 137) and OutOfMemoryError are different mechanisms. OutOfMemoryError is the JVM detecting it cannot allocate heap. OOMKill is the Linux kernel detecting the entire container process exceeds its memory limit. OOMKill can happen when non-heap memory pushes total memory past the limit — the JVM heap may be fine."},
    {"level":1,"diff":3,"scenario":1,"q":"A service restarts 3 times per day with exit code 137, always during peak traffic. Heap dashboards show the heap is only 60% full when restarts happen. What should you investigate?","opts":["The heap is too small — increase -Xmx","Non-heap memory (thread stacks, Kafka buffers, native memory) is growing under load and pushing total process memory past the container limit","The liveness probe is too aggressive during peak traffic","The service is CPU throttled, not memory constrained","Cloud SQL is rejecting connections during peak"],"ans":1,"fb":"Heap at 60% but container OOM-killed means the problem is outside the heap. Under peak traffic: more Tomcat threads (each ~1MB stack), more Kafka consumer buffers, JIT-compiled code — all grow. If -Xmx is set too close to the container limit, there's no room for non-heap growth under load."},
    {"level":1,"diff":1,"scenario":2,"q":"In a Kubernetes deployment manifest, what does -Xmx512m control?","opts":["The container's total memory limit","The maximum heap memory the JVM can allocate","The amount of CPU allocated to the JVM","The number of threads the JVM can create","The maximum size of a single object"],"ans":1,"fb":"-Xmx512m sets the maximum Java heap size to 512 megabytes. The heap is where Java objects live. It does NOT control total JVM memory and it is NOT the container limit (set via resources.limits.memory)."},
    {"level":1,"diff":2,"scenario":2,"q":"A deployment manifest shows resources.limits.memory: 1Gi and the JVM flag -Xmx900m. Is this a good configuration?","opts":["Yes — the heap should use as much of the limit as possible","No — this leaves only ~124MB for Metaspace, thread stacks, direct byte buffers, and native memory, which is likely not enough","No — -Xmx should always equal the memory limit exactly","Yes — the 100MB headroom is standard","It depends on the CPU allocation"],"ans":1,"fb":"Total JVM memory = heap (900MB) + Metaspace (~80-150MB) + thread stacks (threads x ~1MB) + direct byte buffers + JIT code cache + native allocations. With a 1Gi limit and 900MB heap, only ~124MB remains. Safe rule: -Xmx should be 60-70% of the container limit."},
