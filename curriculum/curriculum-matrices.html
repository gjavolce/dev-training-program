* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }

.session-card { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.session-num { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }

.session-desc { font-size: 12px; color: var(--text2); margin-bottom: 10px; }

.exercise-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-bottom: 4px; }
.label-theory { background: var(--blue-bg); color: var(--blue-text); }
.label-core { background: var(--green-bg); color: var(--green-text); }
.label-medium { background: var(--orange-bg); color: var(--orange-text); }
.label-hard { background: var(--red-bg); color: var(--red-text); }
.label-between { background: var(--purple-bg); color: var(--purple-text); }
.label-blocker { background: var(--red-bg); color: var(--red-text); border: 1px solid var(--red-text); }
.exercise-text { font-size: 12px; color: var(--text); margin-bottom: 6px; line-height: 1.6; }
.blocker-box { background: var(--red-bg); border: 1px solid color-mix(in srgb, var(--red-text) 30%, transparent); border-radius: 6px; padding: 10px 12px; margin-bottom: 10px; }
.blocker-box .exercise-label { margin-bottom: 6px; }
.blocker-box .exercise-text { color: var(--red-text); }
.blocker-title { font-weight: 600; font-size: 12px; color: var(--red-text); margin-bottom: 2px; }
.blocker-symptom { font-size: 11px; color: var(--red-text); opacity: 0.85; }

.view-btn.active { background: var(--bg2); color: var(--text); }
.collapsed .exercise-section, .collapsed .blocker-box { display: none; }
.collapsed .session-card { padding: 10px 16px; }
.collapsed .session-desc { margin-bottom: 0; }
.filter-row { display: flex; gap: 16px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.filter-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }

const ALL_AREAS = { db: DB, mem: MEM, sd: SD, co: CO };

let state = { area: 'all', track: 'a', view: 'full' };

function renderAreaNav() {
  document.getElementById('area-nav').innerHTML = AREAS.map(a =>
    `<button class="nav-btn ${state.area===a.key?'active':''}" onclick="state.area='${a.key}';render()">${a.name}</button>`
  ).join('');
}

function renderTrackNav() {
  document.getElementById('track-nav').innerHTML = TRACKS.map(t =>
    `<button class="track-btn ${state.track===t.key?'active':''}" onclick="state.track='${t.key}';render()">${t.label}</button>`
  ).join('');
}

function renderViewToggle() {
  document.getElementById('view-toggle').innerHTML =
    `<button class="view-btn ${state.view==='full'?'active':''}" onclick="state.view='full';render()">Full detail</button>` +
    `<button class="view-btn ${state.view==='compact'?'active':''}" onclick="state.view='compact';render()">Compact</button>`;
}

function renderEntryNote() {
  const t = TRACKS.find(t=>t.key===state.track);
  document.getElementById('entry-note').innerHTML = `<div class="entry-note">${t.entry}</div>`;
}

function renderContent() {
  const areas = state.area === 'all' ? ['db','mem','sd','co'] : [state.area];
  let html = '';

  areas.forEach(areaKey => {
    const area = ALL_AREAS[areaKey];
    const sessions = area[state.track];
    html += `<div class="area-section">`;
    html += `<div class="area-header"><div class="area-dot-lg" style="background:${area.color}"></div><h2>${area.name}</h2>
    <span style="font-size:12px;color:var(--text2);margin-left:auto">${TRACKS.find(t=>t.key===state.track).label} · ${sessions.length} sessions</span></div>`;
    html += `<div class="session-grid ${state.view==='compact'?'collapsed':''}">`;

    sessions.forEach((s, i) => {
      html += `<div class="session-card">`;
      html += `<div class="session-num">Session ${i+1} · ${s.num}</div>`;
      html += `<div class="session-title">${s.title}</div>`;
      html += `<div class="session-desc">${s.desc}</div>`;

      if (state.view === 'full') {
        // Blocker first — prominent
        if (s.blocker) {
          html += `<div class="blocker-box">`;
          html += `<div class="exercise-label label-blocker">Planted blocker</div>`;
          html += `<div class="blocker-title">${s.blocker.title}</div>`;
          html += `<div class="blocker-symptom">${s.blocker.symptom}</div>`;
          html += `</div>`;
        }
        if (s.theory) {
          html += `<div class="exercise-section"><div class="exercise-label label-theory">Theory (credit scoring)</div><div class="exercise-text">${s.theory}</div></div>`;
        }
        html += `<div class="exercise-section"><div class="exercise-label label-core">Core (loyalty)</div><div class="exercise-text">${s.core}</div></div>`;
        html += `<div class="exercise-section"><div class="exercise-label label-medium">Medium (loyalty)</div><div class="exercise-text">${s.medium}</div></div>`;
        html += `<div class="exercise-section"><div class="exercise-label label-hard">Hard</div><div class="exercise-text">${s.hard}</div></div>`;
        html += `<div class="exercise-section"><div class="exercise-label label-between">Between sessions</div><div class="exercise-text">${s.between}</div></div>`;
      }
      html += `</div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('content').innerHTML = html;
}

function render() {
  renderAreaNav();
  renderTrackNav();
  renderViewToggle();
  renderEntryNote();
  renderContent();
}

render();
</script>
